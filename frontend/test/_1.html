<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nexus Orchestrator · GCP Visual Cloud Designer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23000'/%3E%3Cpath d='M16 6 L20 10 L16 14 L12 10 Z' fill='%233b82f6'/%3E%3Ccircle cx='16' cy='16' r='3' fill='none' stroke='%236366f1' stroke-width='2'/%3E%3C/svg%3E">
<!-- Fonts & base styles -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/reactflow@11/dist/umd/index.js"></script>
<link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-canvas: #050a14;
    --bg-surface: #0b1120;
    --bg-elevated: #111827;
    --border-subtle: #1e2a3e;
    --border-active: #2d3e5f;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-emerald: #10b981;
    --accent-amber: #f59e0b;
    --accent-rose: #f43f5e;
    --shadow-md: 0 8px 20px rgba(0,0,0,0.6);
    --radius-md: 12px;
    --radius-lg: 18px;
  }
  [data-theme="light"] {
    --bg-canvas: #f1f5f9;
    --bg-surface: #ffffff;
    --bg-elevated: #f8fafc;
    --border-subtle: #e2e8f0;
    --border-active: #cbd5e1;
    --text-primary: #0f172a;
    --text-secondary: #475569;
  }
  body, #root { height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg-canvas); color: var(--text-primary); }
  .react-flow { background: var(--bg-canvas); }
  .react-flow__background { background: var(--bg-canvas) !important; }
  .react-flow__edge-path { stroke-width: 2 !important; stroke: #3b82f6; }
  .react-flow__handle { width: 10px !important; height: 10px !important; border-radius: 50% !important; border: 2px solid var(--bg-surface) !important; transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
  .react-flow__handle:hover { transform: scale(1.5); box-shadow: 0 0 0 4px rgba(59,130,246,0.4); }
  .custom-node { background: var(--bg-elevated); border-radius: var(--radius-md); border: 1px solid var(--border-subtle); transition: all 0.2s; box-shadow: var(--shadow-md); min-width: 220px; backdrop-filter: blur(2px); }
  .custom-node:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
  .custom-node.selected { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59,130,246,0.5), var(--shadow-md); }
  .node-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-subtle); background: rgba(255,255,255,0.02); border-radius: var(--radius-md) var(--radius-md) 0 0; }
  .node-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); }
  .port-row { padding: 6px 12px; display: flex; align-items: center; gap: 8px; position: relative; font-size: 11px; font-weight: 500; }
  .vpc-group { background: rgba(16,185,129,0.05); border: 2px dashed var(--accent-emerald); border-radius: 20px; transition: all 0.2s; }
  .vpc-group.drag-over { background: rgba(16,185,129,0.15); border-color: var(--accent-emerald); box-shadow: 0 0 0 3px rgba(16,185,129,0.3); }
  .group-box { background: rgba(139,92,246,0.05); border: 2px solid rgba(139,92,246,0.4); border-radius: 20px; }
  .sidebar { background: var(--bg-surface); backdrop-filter: blur(12px); border-right: 1px solid var(--border-subtle); }
  .panel-right { background: var(--bg-surface); border-left: 1px solid var(--border-subtle); backdrop-filter: blur(8px); }
  .btn-glow { transition: all 0.2s; }
  .btn-glow:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react,typescript">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const { ReactFlow, ReactFlowProvider, MiniMap, Controls, Background, useNodesState, useEdgesState, Handle, Position, useReactFlow, NodeToolbar, addEdge, getBezierPath, getSmoothStepPath, getStraightPath } = window.ReactFlow;

// --------------------------------------------------------------
// ILLUSTRIOUS ICON SET
// --------------------------------------------------------------
const Icons = {
  Compute: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>,
  Database: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
  PubSub: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><circle cx="12" cy="20" r="1"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/></svg>,
  Storage: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/></svg>,
  Network: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="2" width="6" height="6"/><rect x="16" y="2" width="6" height="6"/><rect x="9" y="16" width="6" height="6"/><path d="M5 8v4c0 1 1 2 2 2h10c1 0 2-1 2-2V8"/></svg>,
  Secret: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777z"/><path d="M15.5 7.5l3 3L22 7l-3-3z"/></svg>,
  VPC: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v4M12 18v4M4 12H2M22 12h-2M19.07 4.93l-2.83 2.83M7.76 16.24l-2.83 2.83M16.24 16.24l2.83 2.83M7.76 7.76L4.93 4.93"/><circle cx="12" cy="12" r="3"/></svg>,
  Group: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 6h16v12H4z"/><path d="M8 10h8"/><path d="M8 14h6"/></svg>,
  LoadBalancer: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h18M12 3v18M8 8l4-4 4 4M8 16l4 4 4-4"/></svg>
};

// --------------------------------------------------------------
// NODE SCHEMAS (10x professional catalog)
// --------------------------------------------------------------
const NODE_CATALOG = [
  { type: "CloudRunNode", label: "Cloud Run", category: "Compute", icon: "Compute", color: "#3b82f6", inputs: [{ name: "request", label: "req", type: "http", required: true, multi_in: false, color: "#60a5fa" }], outputs: [{ name: "response", label: "resp", type: "http", color: "#60a5fa" }], description: "Serverless container" },
  { type: "CloudSQLNode", label: "Cloud SQL", category: "Data", icon: "Database", color: "#f97316", inputs: [{ name: "db_conn", label: "SQL", type: "db", required: true, color: "#fb923c" }], outputs: [{ name: "data_out", label: "data", type: "db", color: "#fb923c" }], description: "Managed PostgreSQL/MySQL" },
  { type: "PubSubNode", label: "Pub/Sub", category: "Messaging", icon: "PubSub", color: "#ec4899", inputs: [{ name: "publish", label: "pub", type: "topic", required: false, multi_in: true, color: "#f472b6" }], outputs: [{ name: "message", label: "msg", type: "topic", color: "#f472b6" }], description: "Async messaging" },
  { type: "GCSBucketNode", label: "Cloud Storage", category: "Storage", icon: "Storage", color: "#eab308", inputs: [{ name: "read", label: "read", type: "gcs", color: "#facc15" }], outputs: [{ name: "write", label: "write", type: "gcs", color: "#facc15" }], description: "Object storage" },
  { type: "VPCNode", label: "VPC Network", category: "Networking", icon: "VPC", color: "#10b981", inputs: [{ name: "network_in", label: "peer", type: "net", required: false, color: "#34d399" }], outputs: [{ name: "subnet", label: "subnet", type: "net", color: "#34d399" }], description: "Virtual Private Cloud" },
  { type: "SecretManagerNode", label: "Secret Manager", category: "Security", icon: "Secret", color: "#8b5cf6", inputs: [{ name: "access", label: "read", type: "secret", required: true, color: "#a78bfa" }], outputs: [{ name: "secret_value", label: "value", type: "secret", color: "#a78bfa" }], description: "Secrets & keys" },
  { type: "LoadBalancerNode", label: "Load Balancer", category: "Networking", icon: "LoadBalancer", color: "#06b6d4", inputs: [{ name: "backend", label: "svc", type: "http", multi_in: true, color: "#22d3ee" }], outputs: [{ name: "frontend", label: "ip", type: "http", color: "#22d3ee" }], description: "HTTP/S traffic distributor" },
  { type: "BigQueryNode", label: "BigQuery", category: "Data", icon: "Database", color: "#4285f4", inputs: [{ name: "query", label: "sql", type: "db", color: "#8ab4f8" }], outputs: [{ name: "result", label: "table", type: "db", color: "#8ab4f8" }], description: "Analytics warehouse" },
  { type: "MemorystoreNode", label: "Memorystore", category: "Data", icon: "Database", color: "#f59e0b", inputs: [{ name: "cache", label: "redis", type: "db", color: "#fbbf24" }], outputs: [{ name: "data", label: "value", type: "db", color: "#fbbf24" }], description: "Redis in-memory" },
  { type: "ServiceAccountNode", label: "IAM Account", category: "Security", icon: "Secret", color: "#a855f7", inputs: [{ name: "bind", label: "role", type: "iam", color: "#c084fc" }], outputs: [{ name: "token", label: "sa", type: "iam", color: "#c084fc" }], description: "Service identity" }
];

// --------------------------------------------------------------
// CUSTOM NODE COMPONENT (premium)
// --------------------------------------------------------------
const PremiumNode = ({ data, selected, id }) => {
  const schema = data.schema;
  if (!schema) return null;
  const status = data.status || 'idle';
  const collapsed = data.collapsed || false;
  const nodeColor = data.accentColor || schema.color;
  const { setNodes, deleteElements, getEdges } = useReactFlow();
  const edgeCount = getEdges().filter(e => e.source === id || e.target === id).length;
  const connectedTargets = new Set(getEdges().filter(e => e.target === id).map(e => e.targetHandle));

  const toggleCollapse = () => setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, collapsed: !n.data.collapsed } } : n));
  const duplicate = () => setNodes(nds => { const orig = nds.find(n => n.id === id); const newId = `${schema.type}-${Date.now()}`; return [...nds, { ...orig, id: newId, position: { x: orig.position.x + 40, y: orig.position.y + 40 }, selected: false }]; });
  const deleteNode = () => deleteElements({ nodes: [{ id }] });

  const IconComp = Icons[schema.icon] || Icons.Compute;
  return (
    <>
      <NodeToolbar isVisible={selected} position={Position.Top} offset={8}>
        <div style={{ display:'flex', gap:6, background:'var(--bg-surface)', border:'1px solid var(--border-active)', borderRadius:'40px', padding:'6px 12px', boxShadow:'var(--shadow-md)' }}>
          <button onClick={toggleCollapse} className="node-toolbar-btn" style={{ background:'none', border:'none', color:'var(--text-secondary)', cursor:'pointer' }}>🔽</button>
          <button onClick={duplicate} style={{ background:'none', border:'none', color:'#10b981', cursor:'pointer' }}>📋</button>
          <button onClick={deleteNode} style={{ background:'none', border:'none', color:'#ef4444', cursor:'pointer' }}>🗑️</button>
        </div>
      </NodeToolbar>
      <div className={`custom-node ${selected ? 'selected' : ''}`} style={{ '--node-color': nodeColor, borderTop: `3px solid ${nodeColor}` }}>
        <div className="node-header">
          <div style={{ width:32, height:32, borderRadius:10, background:`${nodeColor}20`, display:'flex', alignItems:'center', justifyContent:'center', color:nodeColor }}><IconComp /></div>
          <div style={{ flex:1 }}><div style={{ fontWeight:700, fontSize:13 }}>{data.label || schema.label}</div><div className="node-badge">{schema.category}</div></div>
          <div style={{ fontSize:10, background:'var(--bg-elevated)', padding:'2px 6px', borderRadius:20 }}>{edgeCount}</div>
          <div style={{ width:8, height:8, borderRadius:'50%', background: status==='deployed' ? '#10b981' : status==='error' ? '#ef4444' : '#64748b', boxShadow: status==='deployed' ? '0 0 6px #10b981' : 'none' }} />
        </div>
        {!collapsed && (<div style={{ padding:'8px 0' }}>
          {schema.inputs.map(p => (<div key={p.name} className="port-row"><Handle type="target" position={Position.Left} id={p.name} style={{ background:p.color, left:-5 }} /><span style={{ marginLeft:16, fontSize:11, fontWeight:500 }}>{p.label}: {p.name}</span>{p.required && !connectedTargets.has(p.name) && <span style={{ color:'#f59e0b', fontSize:9 }}>❗</span>}</div>))}
          {schema.outputs.map(p => (<div key={p.name} className="port-row" style={{ justifyContent:'flex-end' }}><span style={{ marginRight:16 }}>{p.label}</span><Handle type="source" position={Position.Right} id={p.name} style={{ background:p.color, right:-5 }} /></div>))}
        </div>)}
        {collapsed && (<div style={{ padding:'8px', display:'flex', gap:8, justifyContent:'center' }}>
          {schema.inputs.map(p => <Handle key={p.name} type="target" position={Position.Left} id={p.name} style={{ background:p.color, top:'50%' }} />)}
          {schema.outputs.map(p => <Handle key={p.name} type="source" position={Position.Right} id={p.name} style={{ background:p.color, top:'50%' }} />)}
        </div>)}
      </div>
    </>
  );
};

// VPC Group Node (enhanced)
const VPCGroupComp = ({ data, selected, id }) => {
  const [dragOver, setDragOver] = useState(false);
  const { setNodes, getNodes, screenToFlowPosition } = useReactFlow();
  const children = data.children || [];
  const isVisual = data.groupType === 'visual';
  const onDropInside = (e) => {
    const raw = e.dataTransfer.getData('application/vco-node');
    if (!raw || raw.startsWith('__')) return;
    const schema = NODE_CATALOG.find(t => t.type === raw);
    if (!schema) return;
    const pos = screenToFlowPosition({ x: e.clientX, y: e.clientY });
    const childId = `${raw}-${Date.now()}`;
    setNodes(nds => {
      const childNode = { id: childId, type: 'gcpNode', position: pos, data: { label: schema.label, schema, status: 'idle', props: {} }, parentNode: id, extent: 'parent' };
      const updatedGroup = nds.map(n => n.id === id ? { ...n, data: { ...n.data, children: [...children, { id: childId, label: schema.label, type: schema.type }] } } : n);
      return [...updatedGroup, childNode];
    });
  };
  return (
    <div className={`${isVisual ? 'group-box' : 'vpc-group'} ${dragOver ? 'drag-over' : ''}`} style={{ minWidth: 280, minHeight: 200, padding: 12, borderRadius: 20, position: 'relative', background: isVisual ? 'rgba(139,92,246,0.03)' : 'rgba(16,185,129,0.02)' }}
      onDragOver={(e) => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={(e) => { e.preventDefault(); setDragOver(false); onDropInside(e); }}>
      <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:12, padding:'0 8px' }}>
        <div style={{ width:28, height:28, borderRadius:12, background: isVisual ? '#8b5cf620' : '#10b98120', display:'flex', alignItems:'center', justifyContent:'center' }}>{isVisual ? Icons.Group() : Icons.VPC()}</div>
        <div style={{ flex:1, fontWeight:700 }}>{data.label || (isVisual ? 'Visual Cluster' : 'VPC Core')}</div>
        {!isVisual && <span style={{ fontSize:9, background:'#10b98120', padding:'2px 8px', borderRadius:99 }}>subnet /24</span>}
      </div>
      <div style={{ minHeight: 120, background: dragOver ? 'rgba(255,255,255,0.05)' : 'transparent', borderRadius: 16, padding: 8 }}>
        {children.length === 0 ? <div style={{ textAlign:'center', color:'var(--text-secondary)', fontSize:11, padding:32 }}>⇣ Drag resources here</div> : children.map(c => <div key={c.id} style={{ background:'var(--bg-elevated)', margin:'6px 0', padding:'6px 12px', borderRadius:12, fontSize:12, display:'flex', gap:6, border:'1px solid var(--border-subtle)' }}><span style={{ width:6, height:6, borderRadius:'50%', background:'#10b981', marginTop:6 }} />{c.label}</div>)}
      </div>
      <Handle type="target" position={Position.Left} id="vpc-in" style={{ top: 40, background: '#34d399' }} />
      <Handle type="source" position={Position.Right} id="vpc-out" style={{ top: 40, background: '#34d399' }} />
    </div>
  );
};

// Edge with label & style selector
const PremiumEdge = ({ id, sourceX, sourceY, targetX, targetY, sourcePosition, targetPosition, data, selected, markerEnd }) => {
  const edgeType = data?.edgeType || 'smoothstep';
  const color = data?.color || '#3b82f6';
  const [edgePath, labelX, labelY] = edgeType === 'straight' ? getStraightPath({ sourceX, sourceY, targetX, targetY }) : edgeType === 'step' ? getSmoothStepPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition }) : getBezierPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition });
  return (<><path d={edgePath} fill="none" stroke={color} strokeWidth={selected ? 3 : 1.8} strokeDasharray={data?.animated ? '6 4' : 'none'} markerEnd={markerEnd} /><foreignObject x={labelX-40} y={labelY-12} width={80} height={24}><div style={{ fontSize:9, background:'var(--bg-surface)', borderRadius:20, padding:'2px 8px', textAlign:'center', border:'1px solid var(--border-subtle)' }}>{data?.label || ''}</div></foreignObject></>);
};

// --------------------------------------------------------------
// MAIN APP (10x refined)
// --------------------------------------------------------------
function App() {
  const [nodes, setNodes, onNodesChange] = useNodesState([]);
  const [edges, setEdges, onEdgesChange] = useEdgesState([]);
  const [selectedNode, setSelectedNode] = useState(null);
  const [search, setSearch] = useState('');
  const [theme, setTheme] = useState('dark');
  const [toasts, setToasts] = useState([]);
  const [logVisible, setLogVisible] = useState(false);
  const [logs, setLogs] = useState([]);
  const reactFlowWrapper = useRef();
  const { screenToFlowPosition, fitView } = useReactFlow();

  const addLog = (msg, level='info') => setLogs(l => [...l.slice(-99), { ts: new Date().toLocaleTimeString(), msg, level }]);
  const showToast = (msg, type='info') => { const id = Date.now(); setToasts(t => [...t, { id, msg, type }]); setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800); };
  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  const onDragOver = useCallback(e => e.preventDefault(), []);
  const onDrop = useCallback(e => {
    e.preventDefault();
    const typeStr = e.dataTransfer.getData('application/vco-node');
    if (!typeStr) return;
    if (typeStr === '__VPC_GROUP__') {
      const id = `VPC-${Date.now()}`;
      setNodes(nds => [...nds, { id, type: 'vpcGroup', position: screenToFlowPosition({ x: e.clientX, y: e.clientY }), data: { label: 'VPC Backbone', groupType: 'vpc', children: [] } }]);
      addLog('➕ VPC Network added', 'ok');
      return;
    }
    if (typeStr === '__GROUP_BOX__') {
      const id = `Group-${Date.now()}`;
      setNodes(nds => [...nds, { id, type: 'groupBox', position: screenToFlowPosition({ x: e.clientX, y: e.clientY }), data: { label: 'Logical Zone', groupType: 'visual', children: [] } }]);
      addLog('📦 Visual Group added', 'ok');
      return;
    }
    const schema = NODE_CATALOG.find(t => t.type === typeStr);
    if (!schema) return;
    const newNode = { id: `${typeStr}-${Date.now()}`, type: 'gcpNode', position: screenToFlowPosition({ x: e.clientX, y: e.clientY }), data: { label: schema.label, schema, status: 'idle', props: {} } };
    setNodes(nds => [...nds, newNode]);
    addLog(`✨ ${schema.label} deployed to canvas`, 'info');
  }, [screenToFlowPosition]);

  const onConnect = useCallback((params) => {
    const sourceNode = nodes.find(n => n.id === params.source);
    const targetNode = nodes.find(n => n.id === params.target);
    if (sourceNode && targetNode) {
      const sourcePort = sourceNode.data.schema?.outputs?.find(p => p.name === params.sourceHandle);
      const targetPort = targetNode.data.schema?.inputs?.find(p => p.name === params.targetHandle);
      if (sourcePort && targetPort && sourcePort.type !== targetPort.type) { showToast(`Type mismatch: ${sourcePort.type} ≠ ${targetPort.type}`, 'error'); return; }
      if (targetPort && !targetPort.multi_in && edges.some(e => e.target === params.target && e.targetHandle === params.targetHandle)) { showToast(`Port '${targetPort.name}' single connection only`, 'error'); return; }
      const color = sourcePort?.color || '#3b82f6';
      setEdges(eds => addEdge({ ...params, type: 'premiumEdge', data: { color, edgeType: 'smoothstep', animated: true } }, eds));
      addLog(`🔗 Connected ${sourceNode.data.label} → ${targetNode.data.label}`, 'ok');
    } else { setEdges(eds => addEdge({ ...params, type: 'premiumEdge', data: { edgeType: 'smoothstep' } }, eds)); }
  }, [nodes, edges]);

  const handleSave = async () => {
    const payload = { nodes: nodes.map(n => ({ id: n.id, type: n.data.schema?.type, label: n.data.label, position: n.position })), edges: edges.map(e => ({ source: e.source, target: e.target })) };
    try { await fetch('http://localhost:8000/api/graph', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); showToast('Saved to backend', 'success'); } catch { const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'nexus_design.json'; a.click(); showToast('Exported as JSON', 'info'); }
    addLog('💾 Architecture persisted', 'ok');
  };
  const handleDeploy = () => { addLog('🚀 Deployment simulation started — all nodes marked deployed', 'warn'); setNodes(nds => nds.map(n => ({ ...n, data: { ...n.data, status: 'deployed' } }))); showToast('Deploy sequence triggered (simulation)', 'success'); };

  const filteredNodes = NODE_CATALOG.filter(t => t.label.toLowerCase().includes(search.toLowerCase()) || t.category.toLowerCase().includes(search.toLowerCase()));
  const categories = [...new Map(filteredNodes.map(n => [n.category, n])).keys()];
  const nodeTypes = { gcpNode: PremiumNode, vpcGroup: VPCGroupComp, groupBox: VPCGroupComp };
  const edgeTypes = { premiumEdge: PremiumEdge };

  return (<div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
    {/* Sidebar Elegant */}
    <div className="sidebar" style={{ width: 280, display: 'flex', flexDirection: 'column', zIndex: 20 }}>
      <div style={{ padding: '20px 20px 12px' }}><div style={{ fontSize: 20, fontWeight: 800, background: 'linear-gradient(135deg, #3b82f6, #8b5cf6)', WebkitBackgroundClip: 'text', backgroundClip: 'text', color: 'transparent' }}>NEXUS</div><div style={{ fontSize: 10, color: 'var(--text-secondary)', letterSpacing: 1 }}>GCP VISUAL ORCHESTRATOR</div></div>
      <div style={{ padding: '0 16px 16px' }}><input type="text" placeholder="Search resources..." value={search} onChange={e=>setSearch(e.target.value)} style={{ width:'100%', background:'var(--bg-elevated)', border:'1px solid var(--border-subtle)', borderRadius:40, padding:'8px 16px', color:'var(--text-primary)' }} /></div>
      <div style={{ flex:1, overflowY:'auto', padding:'0 12px' }}>
        <div style={{ marginBottom: 16 }}><div style={{ fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:1, marginBottom:8, color:'#10b981' }}>📦 Group Nodes</div>
          <div draggable onDragStart={e=>e.dataTransfer.setData('application/vco-node','__VPC_GROUP__')} style={{ background:'var(--bg-elevated)', borderRadius:16, padding:'10px 14px', marginBottom:8, border:'1px solid var(--border-subtle)', cursor:'grab' }}><div style={{ fontWeight:600 }}>VPC Network</div><div style={{ fontSize:10, color:'var(--text-secondary)' }}>Isolated network + subnet</div></div>
          <div draggable onDragStart={e=>e.dataTransfer.setData('application/vco-node','__GROUP_BOX__')} style={{ background:'var(--bg-elevated)', borderRadius:16, padding:'10px 14px', border:'1px solid var(--border-subtle)', cursor:'grab' }}><div style={{ fontWeight:600 }}>Visual Group</div><div style={{ fontSize:10, color:'var(--text-secondary)' }}>Logical container</div></div>
        </div>
        {categories.map(cat => (<div key={cat} style={{ marginBottom: 20 }}><div style={{ fontSize:11, fontWeight:700, color:'#8b5cf6', marginBottom:8, textTransform:'uppercase' }}>{cat}</div>{filteredNodes.filter(n=>n.category===cat).map(schema => (<div key={schema.type} draggable onDragStart={e=>e.dataTransfer.setData('application/vco-node',schema.type)} style={{ background:'var(--bg-elevated)', borderRadius:14, padding:'8px 12px', marginBottom:6, cursor:'grab', transition:'0.1s', border:'1px solid transparent', ':hover':{ borderColor:'var(--accent-blue)' } }}><div style={{ display:'flex', gap:10, alignItems:'center' }}><div style={{ width:28, height:28, borderRadius:8, background:`${schema.color}20`, display:'flex', alignItems:'center', justifyContent:'center', color:schema.color }}>{Icons[schema.icon] ? Icons[schema.icon]() : Icons.Compute()}</div><div><div style={{ fontWeight:600 }}>{schema.label}</div><div style={{ fontSize:9, color:'var(--text-secondary)' }}>{schema.description}</div></div></div></div>))}</div>))}
      </div>
    </div>

    {/* Canvas Area */}
    <div className="canvas-wrap" ref={reactFlowWrapper} style={{ flex:1, position:'relative' }}>
      <div style={{ position:'absolute', top:12, left:'50%', transform:'translateX(-50%)', zIndex:20, display:'flex', gap:8, background:'var(--bg-surface)', borderRadius:60, padding:'6px 16px', border:'1px solid var(--border-subtle)' }}>
        <button onClick={()=>fitView()} style={{ background:'none', border:'none', color:'var(--text-primary)', cursor:'pointer' }}>🎯 Fit</button>
        <button onClick={handleSave} style={{ background:'none', border:'none', color:'#3b82f6', cursor:'pointer' }}>💾 Save</button>
        <button onClick={handleDeploy} style={{ background:'linear-gradient(135deg,#10b981,#059669)', border:'none', borderRadius:40, padding:'4px 16px', color:'white', fontWeight:600, cursor:'pointer' }}>🚀 Deploy</button>
        <button onClick={()=>setLogVisible(v=>!v)} style={{ background:'none', border:'none', color:'var(--text-secondary)', cursor:'pointer' }}>📋 Logs</button>
        <button onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} style={{ background:'none', border:'none', cursor:'pointer' }}>{theme==='dark' ? '☀️' : '🌙'}</button>
      </div>
      <ReactFlow nodes={nodes} edges={edges} onNodesChange={onNodesChange} onEdgesChange={onEdgesChange} onConnect={onConnect} onNodeClick={(_,n)=>setSelectedNode(n)} onPaneClick={()=>setSelectedNode(null)} onDrop={onDrop} onDragOver={onDragOver} nodeTypes={nodeTypes} edgeTypes={edgeTypes} fitView deleteKeyCode={['Delete','Backspace']}>
        <Background variant="dots" gap={24} size={1} color="var(--border-subtle)" />
        <Controls position="bottom-left" />
        <MiniMap nodeColor={n=>n.data?.schema?.color || '#334155'} maskColor="rgba(0,0,0,0.3)" position="bottom-right" />
      </ReactFlow>
      {nodes.length===0 && (<div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', textAlign:'center', pointerEvents:'none' }}><div style={{ fontSize:28, fontWeight:800, opacity:0.3 }}>∞ canvas</div><div style={{ fontSize:13, opacity:0.5 }}>drag services, build cloud topography</div></div>)}
    </div>

    {/* Right Panel */}
    <div className="panel-right" style={{ width: selectedNode ? 320 : 0, transition:'width 0.2s', overflow:'hidden', display:'flex', flexDirection:'column' }}>
      {selectedNode && (<div style={{ padding: 20, overflowY:'auto' }}><div style={{ display:'flex', justifyContent:'space-between', marginBottom:16 }}><h3 style={{ fontSize:16 }}>{selectedNode.data.label || 'Resource'}</h3><button onClick={()=>setSelectedNode(null)} style={{ background:'none', border:'none', color:'var(--text-secondary)', fontSize:18 }}>✕</button></div>
      <div className="field-group" style={{ marginBottom:12 }}><label className="field-label">Display name</label><input className="field-input" value={selectedNode.data.label || ''} onChange={e=>setNodes(nds=>nds.map(n=>n.id===selectedNode.id?{...n,data:{...n.data,label:e.target.value}}:n))} style={{ width:'100%', background:'var(--bg-elevated)', border:'1px solid var(--border-subtle)', borderRadius:12, padding:'8px' }} /></div>
      <div className="field-group"><label className="field-label">Resource type</label><input disabled value={selectedNode.data.schema?.type || 'VPC'} style={{ width:'100%', background:'var(--bg-elevated)', borderRadius:12, padding:'8px', opacity:0.7 }} /></div>
      <div style={{ marginTop:24 }}><button className="btn-glow" onClick={()=>{setNodes(nds=>nds.map(n=>n.id===selectedNode.id?{...n,data:{...n.data,status:'deployed'}}:n)); showToast('Status updated','success');}} style={{ background:'#10b981', border:'none', borderRadius:40, padding:'8px 12px', color:'white', width:'100%', fontWeight:600 }}>✔ Mark Deployed</button></div>
      </div>)}
    </div>

    {/* Log Panel Slider */}
    <div style={{ position:'fixed', bottom:0, left:0, right:0, height: logVisible ? 200 : 0, background:'var(--bg-surface)', borderTop:'1px solid var(--border-subtle)', transition:'0.2s', overflow:'auto', zIndex:30, fontFamily:'monospace', fontSize:11 }}>
      <div style={{ padding:'8px 16px', fontWeight:600, borderBottom:'1px solid var(--border-subtle)' }}>📡 Deployment stream</div>
      <div style={{ padding:8 }}>{logs.map((l,i)=> <div key={i} style={{ color: l.level==='err'?'#ef4444': l.level==='ok'?'#10b981':'#94a3b8', padding:'2px 0' }}>[{l.ts}] {l.msg}</div>)}</div>
    </div>
    {/* toasts */}
    <div style={{ position:'fixed', bottom:20, right:20, zIndex:200, display:'flex', flexDirection:'column', gap:6 }}>{toasts.map(t=> <div key={t.id} style={{ background:'var(--bg-surface)', borderLeft:`4px solid ${t.type==='success'?'#10b981':'#ef4444'}`, padding:'8px 16px', borderRadius:12, boxShadow:'var(--shadow-md)' }}>{t.msg}</div>)}</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<ReactFlowProvider><App /></ReactFlowProvider>);
</script>
</body>
</html>
