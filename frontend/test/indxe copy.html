const nodeTypes = { gcpNode: GCPNodeComponent, vpcGroup: VPCGroupNode, groupBox: VPCGroupNode };
const edgeTypes = { gcpEdge: GCPEdge };

function VCOApp() {
  const [infoModal, setInfoModal] = useState(null); // null | 'contact' | 'guide'
  const [nodeTypesData, setNodeTypesData] = useState(DEFAULT_NODE_TYPES_DATA);
  const [nodes, setNodes, onNodesChange] = useNodesState([]);
  const [edges, setEdges, onEdgesChange] = useEdgesState([]);
  const [selectedNode, setSelectedNode] = useState(null);
  const [logs, setLogs] = useState([]);
  const [logVisible, setLogVisible] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [search, setSearch] = useState('');
  const [isDeploying, setIsDeploying] = useState(false);
  const [wsConnected, setWsConnected] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [theme, setTheme] = useState('dark');
  const [ctxMenu, setCtxMenu] = useState(null);
  const [defaultEdgeType, setDefaultEdgeType] = useState('bezier');
  const wsRef = useRef(null);
  const nodesRef = useRef(nodes);
  const [nodeLogsModal, setNodeLogsModal] = useState(null); // { nodeId, label }
  const nodeLogsEsRef = useRef(null);
  useEffect(() => { nodesRef.current = nodes; }, [nodes]);
  const reactFlowWrapper = useRef(null);
  const { screenToFlowPosition, deleteElements, fitView } = useReactFlow();

  // Apply theme to document
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    if (!menuOpen) return;
    const handleClickOutside = e => {
      const menu = document.getElementById('topbar-menu-panel');
      const button = document.getElementById('topbar-menu-button');
      if (!menu || !button) return;
      if (menu.contains(e.target) || button.contains(e.target)) return;
      setMenuOpen(false);
    };
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, [menuOpen]);

  // Context menu handlers
  const onNodeContextMenu = useCallback((event, node) => {
    event.preventDefault();
    setCtxMenu({ x: event.clientX, y: event.clientY, nodeId: node.id, nodeData: node.data });
  }, []);

  const closeCtxMenu = useCallback(() => setCtxMenu(null), []);

  // Load node types from backend (falls back to defaults)
  useEffect(() => {
    fetch('http://localhost:8000/api/node-types')
      .then(r => r.json())
      .then(data => { if (data?.length) setNodeTypesData(data); })
      .catch(() => {});
  }, []);

  // Restore saved graph on startup
  useEffect(() => {
    fetch('http://localhost:8000/api/state')
      .then(r => r.json())
      .then(state => {
        if (!state?.nodes?.length) return;
        // nodeTypesData may not be loaded yet — use DEFAULT as fallback for schema lookup
        const schemaSource = nodeTypesData.length ? nodeTypesData : DEFAULT_NODE_TYPES_DATA;
        const restored = state.nodes.map(n => {
          const schema = schemaSource.find(s => s.type === n.type);
          return {
            id: n.id,
            type: 'gcpNode',
            position: n.position || { x: Math.random() * 600, y: Math.random() * 400 },
            data: {
              label: n.label,
              schema,
              // Preserve any saved status — failed/error stays red on reload
              status: n.status || (n.deployed ? 'deployed' : 'idle'),
              props: n.props || {},
            },
          };
        });
        const restoredEdges = (state.edges || []).map(e => ({
          id: e.id || `e-${e.source}-${e.target}`,
          source: e.source,
          sourceHandle: e.sourceHandle,
          target: e.target,
          targetHandle: e.targetHandle,
          type: 'gcpEdge',
          animated: true,
          data: { color: e.color || '#60a5fa' },
        }));
        setNodes(restored);
        setEdges(restoredEdges);
        addLog(`Restored ${restored.length} node(s) from saved state`, 'info');
      })
      .catch(() => {});
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []); // run once on mount

  // WebSocket connection
  useEffect(() => {
    const connect = () => {
      try {
        const ws = new WebSocket('ws://localhost:8000/ws');
        ws.onopen = () => { setWsConnected(true); addLog('WebSocket connected', 'ok'); };
        ws.onclose = () => { setWsConnected(false); setTimeout(connect, 3000); };
        ws.onmessage = e => handleWsMessage(JSON.parse(e.data));
        wsRef.current = ws;
      } catch {}
    };
    connect();
    return () => wsRef.current?.close();
  }, []);

  const handleWsMessage = useCallback((msg) => {
    // Typed log line sent by the server
    if (msg.event === 'log') {
      addLog(msg.msg, msg.level || 'info');
    }

    if (msg.event === 'node_status') {
      const newStatus = msg.status; // 'deployed' | 'destroyed' | 'failed' | 'error'
      const action = msg.action;    // 'create' | 'update' | 'destroy' | 'unchanged'
      setNodes(nds => nds.map(n => {
        if (n.id !== msg.node_id) return n;
        // Don't overwrite a real failure with "deployed" for unchanged nodes —
        // the server marks unchanged nodes as deployed, but if this node previously
        // failed it should stay failed until the user explicitly re-deploys it.
        if (action === 'unchanged' && (n.data.status === 'failed' || n.data.status === 'error')) {
          return n;
        }
        return { ...n, data: { ...n.data, status: newStatus } };
      }));
    }

    if (msg.event === 'node_working') {
      setNodes(nds => nds.map(n =>
        n.id === msg.node_id ? { ...n, data: { ...n.data, status: 'working' } } : n
      ));
    }

    if (msg.event === 'deploy_started') {
      // Mark only the nodes that will be touched as 'deploying'
      // The server tells us which IDs will change
      const touchedIds = new Set(msg.touched_ids || []);
      setNodes(nds => nds.map(n => {
        if (touchedIds.size === 0 || touchedIds.has(n.id)) {
          return { ...n, data: { ...n.data, status: 'deploying' } };
        }
        return n;
      }));
      addLog(
        `Deploy started — ${msg.create} create / ${msg.update} update / ${msg.destroy} destroy`,
        'info'
      );
    }

    if (msg.event === 'deploy_complete') {
      setIsDeploying(false);
      if (msg.changed === 0) {
        addLog('Nothing changed — already up to date', 'ok');
        showToast('Already up to date', 'info');
      } else {
        addLog(`Deploy complete — ${msg.changed} resource(s) changed`, 'ok');
        showToast('Deployment complete!', 'success');
      }
      // Auto-save after deploy so statuses (including failed) persist on reload
      setTimeout(() => autoSaveAfterDeploy(), 400);
    }

    if (msg.event === 'graph_saved') {
      addLog(`Graph saved (${msg.node_count} nodes)`, 'ok');
    }
  }, []);

  const autoSaveAfterDeploy = useCallback(async () => {
    // Uses nodesRef so it gets the latest node statuses after WS updates
    const currentNodes = nodesRef.current;
    const payload = {
      nodes: currentNodes.map(n => ({
        id: n.id,
        type: n.data.schema?.type,
        label: n.data.label,
        props: n.data.props || {},
        position: n.position,
        status: n.data.status || 'idle',
      })),
      edges: [],
    };
    try {
      await fetch('http://localhost:8000/api/graph', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
      addLog('State auto-saved after deploy', 'ok');
    } catch { /* silent */ }
  }, []);

  const openNodeLogs = useCallback((nodeId, label) => {
    if (nodeLogsEsRef.current) {
      nodeLogsEsRef.current.close();
      nodeLogsEsRef.current = null;
    }
    setNodeLogsModal({ nodeId, label, lines: [], connecting: true });
    try {
      const es = new EventSource(`http://localhost:8000/api/logs/${nodeId}`);
      es.onopen = () => {
        setNodeLogsModal(m => m ? { ...m, connecting: false } : m);
      };
      es.onmessage = e => {
        const raw = e.data;
        // Parse level from log line: [INFO], [WARN], [ERROR]
        let level = 'info';
        if (/\[ERROR\]|\[CRIT\]/i.test(raw)) level = 'error';
        else if (/\[WARN\]/i.test(raw)) level = 'warn';
        else if (/\[OK\]|\[SUCCESS\]/i.test(raw)) level = 'ok';
        const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
        setNodeLogsModal(m => m ? { ...m, connecting: false, lines: [...(m.lines||[]).slice(-499), { text: raw, level, ts }] } : m);
      };
      es.onerror = () => {
        setNodeLogsModal(m => m ? { ...m, connecting: false } : m);
      };
      nodeLogsEsRef.current = es;
    } catch (err) {
      setNodeLogsModal(m => m ? { ...m, connecting: false, lines: [{ text: `Cannot connect to log stream: ${err.message}`, level: 'error', ts: new Date().toLocaleTimeString('en-US',{hour12:false}) }] } : m);
    }
  }, []);


  const addLog = (msg, level = 'info') => {
    const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
    setLogs(l => [...l.slice(-199), { ts, msg, level }]);
    setTimeout(() => {
      const el = document.getElementById('log-scroll');
      if (el) el.scrollTop = el.scrollHeight;
    }, 50);
  };

  const showToast = (msg, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  };

  // Drag from sidebar → drop on canvas
  const onDragOver = useCallback(e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }, []);

  const onDrop = useCallback(e => {
    e.preventDefault();
    const typeStr = e.dataTransfer.getData('application/vco-node');
    if (!typeStr) return;

    const position = screenToFlowPosition({ x: e.clientX, y: e.clientY });

    // ── VPC Group / Visual Group Node ──
    if (typeStr === '__VPC_GROUP__' || typeStr === '__GROUP_BOX__') {
      const isVisualGroup = typeStr === '__GROUP_BOX__';
      const id = `${isVisualGroup ? 'GroupBox' : 'VPCGroup'}-${Date.now()}`;
      setNodes(nds => [...nds, {
        id,
        type: isVisualGroup ? 'groupBox' : 'vpcGroup',
        position,
        style: { width: 300, minHeight: 200 },
        data: {
          label: isVisualGroup ? 'Visual Group' : 'VPC Network',
          groupType: isVisualGroup ? 'visual' : 'vpc',
          children: [],
          props: isVisualGroup ? {} : { subnet_cidr: '', region: 'us-central1' },
          onDropIntoVPC: (groupId, dropEvt) => {
            const typeStr2 = dropEvt.dataTransfer.getData('application/vco-node');
            if (!typeStr2 || typeStr2 === '__VPC_GROUP__' || typeStr2 === '__GROUP_BOX__') return;
            const schema2 = nodeTypesData.find(t => t.type === typeStr2);
            if (!schema2) return;
            const pos2 = screenToFlowPosition({ x: dropEvt.clientX, y: dropEvt.clientY });
            const childId = `${typeStr2}-${Date.now()}`;
            setNodes(nds => {
              const childNode = {
                id: childId,
                type: 'gcpNode',
                position: pos2,
                data: { label: schema2.label, schema: schema2, status: 'idle', props: {} },
                parentNode: groupId,
                extent: 'parent',
              };
              return [...nds.map(n => {
                if (n.id !== groupId) return n;
                const existing = n.data.children || [];
                return { ...n, data: { ...n.data, children: [...existing, { id: childId, label: schema2.label, type: schema2.type }] } };
              }), childNode];
            });
            addLog(`Attached ${schema2.label} → ${isVisualGroup ? 'Visual Group' : 'VPC Group'}`, 'info');
          },
        },
      }]);
      addLog(`Added ${isVisualGroup ? 'Visual Group' : 'VPC Group'}`, 'info');
      return;
    }

    // ── Regular node ──
    const schema = nodeTypesData.find(t => t.type === typeStr);
    if (!schema) return;
    const id = `${typeStr}-${Date.now()}`;
    setNodes(nds => [...nds, {
      id,
      type: 'gcpNode',
      position,
      data: { label: schema.label, schema, status: 'idle', props: {} },
    }]);
    addLog(`Added ${schema.label}`, 'info');
  }, [nodeTypesData, screenToFlowPosition]);

  // Edge connect with type validation + multi_in enforcement
  const onConnect = useCallback((params) => {
    const currentNodes = nodesRef.current;
    const sourceNode = currentNodes.find(n => n.id === params.source);
    const targetNode = currentNodes.find(n => n.id === params.target);

    if (sourceNode && targetNode) {
      const sourcePort = sourceNode.data.schema?.outputs?.find(p => p.name === params.sourceHandle);
      const targetPort = targetNode.data.schema?.inputs?.find(p => p.name === params.targetHandle);

      // ── Type mismatch ──
      if (sourcePort && targetPort && sourcePort.type !== targetPort.type) {
        showToast(`Cannot connect ${sourcePort.type} → ${targetPort.type}`, 'error');
        addLog(`Blocked: ${sourcePort.type} ≠ ${targetPort.type}`, 'err');
        return;
      }

      // ── multi_in guard: reject second edge to a single-connection input port ──
      if (targetPort && !targetPort.multi_in) {
        const alreadyConnected = edges.some(
          e => e.target === params.target && e.targetHandle === params.targetHandle
        );
        if (alreadyConnected) {
          showToast(`Port "${targetPort.name}" accepts only one connection`, 'error');
          addLog(`Blocked: port ${targetNode.data.label}.${targetPort.name} already connected`, 'err');
          return;
        }
      }

      const color = sourcePort?.color || '#60a5fa';
      setEdges(eds => addEdge({
        ...params,
        type: 'gcpEdge',
        data: { color, edgeType: defaultEdgeType, animated: true, label: '' },
      }, eds));
      addLog(`Connected ${sourceNode.data.label} → ${targetNode.data.label}${sourcePort ? ' [' + sourcePort.type + ']' : ''}`, 'ok');
    } else {
      setEdges(eds => addEdge({ ...params, type: 'gcpEdge', data: { color: '#60a5fa', edgeType: defaultEdgeType, animated: true, label: '' } }, eds));
    }
  }, [defaultEdgeType, edges]);

  // Node selection
  const onNodeClick = useCallback((_, node) => setSelectedNode(node), []);
  const onPaneClick = useCallback(() => setSelectedNode(null), []);

  // Property change
  const handlePropChange = useCallback((nodeId, key, value, isProp = false) => {
    setNodes(nds => nds.map(n => {
      if (n.id !== nodeId) return n;
      if (isProp) return { ...n, data: { ...n.data, props: { ...n.data.props, [key]: value } } };
      return { ...n, data: { ...n.data, [key]: value } };
    }));
    // Keep selectedNode in sync
    setSelectedNode(prev => {
      if (!prev || prev.id !== nodeId) return prev;
      if (isProp) return { ...prev, data: { ...prev.data, props: { ...prev.data.props, [key]: value } } };
      return { ...prev, data: { ...prev.data, [key]: value } };
    });
  }, []);

  // Deploy
  const handleDeploy = async () => {
    if (nodes.length === 0) { showToast('Add some nodes first', 'error'); return; }
    if (isDeploying) return;

    // Ask server what will change before marking nodes as deploying
    const payload = {
      nodes: nodes.map(n => ({ id: n.id, type: n.data.schema?.type, label: n.data.label, props: n.data.props || {} })),
      edges: edges.map(e => ({ source: e.source, target: e.target, sourceHandle: e.sourceHandle, targetHandle: e.targetHandle })),
    };

    setIsDeploying(true);
    setLogVisible(true);
    addLog('Initiating deployment...', 'warn');

    try {
      const res = await fetch('http://localhost:8000/api/deploy', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const err = await res.text();
        addLog(`Server error: ${err}`, 'err');
        showToast('Deploy failed — check log', 'error');
        setIsDeploying(false);
      }
      // All further status updates arrive via WebSocket node_status events
    } catch (e) {
      addLog(`Cannot reach server: ${e.message}`, 'err');
      showToast('Server unreachable', 'error');
      setIsDeploying(false);
    }
  };

  // Save — include position so we can restore the canvas layout
  const handleSave = async () => {
    const currentNodes = nodesRef.current;
    const payload = {
      nodes: currentNodes.map(n => ({
        id: n.id,
        type: n.data.schema?.type,
        label: n.data.label,
        props: n.data.props || {},
        position: n.position,
        status: n.data.status || 'idle',
      })),
      edges: edges.map(e => ({
        id: e.id,
        source: e.source,
        sourceHandle: e.sourceHandle,
        target: e.target,
        targetHandle: e.targetHandle,
        color: e.data?.color || null,
      })),
    };
    try {
      await fetch('http://localhost:8000/api/graph', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
      showToast('Saved to desired.yaml', 'success');
      addLog('Graph saved to desired.yaml', 'ok');
    } catch {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'desired.json'; a.click();
      showToast('Exported as desired.json', 'info');
    }
  };

  const handleClear = () => {
    setNodes([]); setEdges([]); setSelectedNode(null);
    addLog('Canvas cleared', 'warn');
  };

  const filteredTypes = useMemo(() =>
    nodeTypesData.filter(t =>
      t.label.toLowerCase().includes(search.toLowerCase()) ||
      t.description.toLowerCase().includes(search.toLowerCase())
    ), [nodeTypesData, search]);

  return (
    <VCOContext.Provider value={{ openNodeLogs }}>
    <div className="app">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="logo">
            <div className="logo-dot"/>
            <span>VCO</span>
          </div>
          <div style={{ fontSize: 10, color: 'var(--text2)', marginTop: 4, fontFamily: 'var(--font-mono)' }}>
            GCP Cloud Orchestrator
          </div>
        </div>
        <div className="sidebar-search">
          <span className="search-icon">{ICONS.search}</span>
          <input
            placeholder="Search nodes..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
        <div className="node-list">
          {/* VPC Group special item */}
          <div style={{ padding: '6px 8px 4px', fontSize: 9, letterSpacing: '.12em', color: 'var(--text2)', fontWeight: 700, textTransform: 'uppercase' }}>
            Group Nodes
          </div>
          <div
            className="node-item"
            style={{ borderColor: 'rgba(16,185,129,0.3)', background: 'rgba(16,185,129,0.06)', marginBottom: 8 }}
            draggable
            onDragStart={e => e.dataTransfer.setData('application/vco-node', '__VPC_GROUP__')}
          >
            <div className="node-icon" style={{ background: 'rgba(16,185,129,0.15)', color: '#10b981' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="2" width="6" height="6"/><rect x="16" y="2" width="6" height="6"/>
                <rect x="9" y="16" width="6" height="6"/>
                <path d="M5 8v4c0 1 1 2 2 2h10c1 0 2-1 2-2V8"/><line x1="12" y1="14" x2="12" y2="16"/>
              </svg>
            </div>
            <div className="node-info">
              <div className="node-name" style={{ color: '#a7f3d0' }}>VPC Group</div>
              <div className="node-desc">Drop nodes inside to attach to VPC</div>
            </div>
          </div>
          <div
            className="node-item"
            style={{ borderColor: 'rgba(139,92,246,0.28)', background: 'rgba(139,92,246,0.08)', marginBottom: 8 }}
            draggable
            onDragStart={e => e.dataTransfer.setData('application/vco-node', '__GROUP_BOX__')}
          >
            <div className="node-icon" style={{ background: 'rgba(139,92,246,0.15)', color: '#8b5cf6' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 6h16v12H4z"/><path d="M8 10h8"/><path d="M8 14h8"/>
              </svg>
            </div>
            <div className="node-info">
              <div className="node-name" style={{ color: '#c4b5fd' }}>Visual Group</div>
              <div className="node-desc">Drop nodes inside to create a visual container</div>
            </div>
          </div>

          {/* Category accordion */}
          <CategoryList filteredTypes={filteredTypes} />
        </div>
        {/* Sidebar footer: port legend */}
        <div style={{ padding: '12px 12px', borderTop: '1px solid var(--border)' }}>
          <div style={{ fontSize: 9, letterSpacing: '.12em', color: 'var(--text2)', marginBottom: 8, fontWeight: 700, textTransform: 'uppercase' }}>Port Types</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px' }}>
            {[
              { label: 'SA', color: '#a78bfa' },
              { label: 'Net', color: '#34d399' },
              { label: 'GCS', color: '#fbbf24' },
              { label: 'Secret', color: '#f472b6' },
              { label: 'Topic', color: '#60a5fa' },
              { label: 'DB', color: '#fb923c' },
            ].map(p => (
              <span key={p.label} className="port-type-badge" style={{ background: p.color + '22', color: p.color, padding: '2px 8px' }}>
                {p.label}
              </span>
            ))}
          </div>
        </div>
      </div>

      {/* Canvas */}
      <div className="canvas-wrap" ref={reactFlowWrapper} onClick={() => { closeCtxMenu(); setMenuOpen(false); }}>
        {/* Topbar */}
        <div className="topbar">
          {/* Logo — fixed width matches sidebar */}
          <div className="logo">
            <div className="logo-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
              </svg>
            </div>
            <div className="logo-text">
              <div className="logo-title">Cloud Orchestrator</div>
              <div className="logo-sub">visual infrastructure · gcp</div>
            </div>
          </div>

          {/* Breadcrumb */}
          <div className="topbar-breadcrumb" style={{ marginLeft: 16 }}>
            <span>Projects</span>
            <span className="topbar-breadcrumb-sep">›</span>
            <span>my-project</span>
            <span className="topbar-breadcrumb-sep">›</span>
            <span className="topbar-breadcrumb-active">Infrastructure</span>
          </div>

          <div className="topbar-spacer"/>

          {/* Edge type selector */}
          <div style={{ display:'flex', gap:2, background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:'var(--r8)', padding:3, marginRight:4 }}>
            {[['bezier','~'],['step','⌐'],['straight','—']].map(([t,sym]) => (
              <button key={t} onClick={() => setDefaultEdgeType(t)}
                style={{ padding:'3px 8px', borderRadius:6, border:'none',
                  background: defaultEdgeType===t ? 'var(--accent)' : 'transparent',
                  color: defaultEdgeType===t ? '#fff' : 'var(--text1)',
                  fontSize:10, fontFamily:'var(--font-mono)', cursor:'pointer', transition:'all .12s' }}
                title={`Edge style: ${t}`}>
                {sym}
              </button>
            ))}
          </div>

          {/* Stats pill */}
          <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0 12px', height:32, background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:'var(--r8)', fontSize:10, fontFamily:'var(--font-mono)', color:'var(--text2)', marginRight:4 }}>
            <span title="Nodes"><span style={{ color:'var(--text0)', fontWeight:600 }}>{nodes.length}</span> nodes</span>
            <span style={{ color:'var(--border2)' }}>|</span>
            <span title="Edges"><span style={{ color:'var(--text0)', fontWeight:600 }}>{edges.length}</span> edges</span>
          </div>

          {/* WS status pill */}
          <div className={`ws-pill${wsConnected ? ' connected' : ''}`} style={{ marginRight:4 }}>
            <div className="ws-dot"/>
            {wsConnected ? 'connected' : 'offline'}
          </div>

          <div className="topbar-divider"/>

          {/* Action buttons */}
          <button className="btn-icon" onClick={() => setLogVisible(v => !v)} title="Toggle deploy log" style={ logVisible ? { background:'var(--accent-glow)', color:'var(--accent)', borderColor:'var(--accent)44' } : {}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          </button>
          <button className="btn-icon" onClick={() => setInfoModal('guide')} title="Guide">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
          <button className="btn-icon" onClick={() => setTheme(t => t==='dark'?'light':'dark')} title="Toggle theme">
            {theme==='dark'
              ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
              : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            }
          </button>

          <div className="topbar-divider"/>

          <button className="btn btn-ghost" onClick={handleClear} style={{ gap:5 }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Clear
          </button>
          <button className="btn btn-ghost" onClick={handleSave} style={{ gap:5 }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save
          </button>
          <button className="btn btn-deploy" onClick={handleDeploy} disabled={isDeploying} style={{ minWidth:90, position:'relative', overflow:'hidden' }}>
            {isDeploying
              ? <><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ animation:'spin .8s linear infinite' }}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Deploying</>
              : <><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Deploy</>
            }
            {isDeploying && <div className="deploy-progress"/>}
          </button>
        </div>

        {/* ReactFlow Canvas */}
        <div style={{ position:'absolute', inset:0, top:52, bottom:logVisible?172:0 }}>
          <ReactFlow
            nodes={nodes}
            edges={edges}
            onNodesChange={onNodesChange}
            onEdgesChange={onEdgesChange}
            onConnect={onConnect}
            onNodeClick={onNodeClick}
            onPaneClick={(e) => { onPaneClick(e); closeCtxMenu(); }}
            onDrop={onDrop}
            onDragOver={onDragOver}
            onNodeContextMenu={onNodeContextMenu}
            nodeTypes={nodeTypes}
            edgeTypes={edgeTypes}
            fitView
            deleteKeyCode={['Backspace','Delete']}
            defaultEdgeOptions={{ type: 'gcpEdge', data: { edgeType: defaultEdgeType, animated: true, label: '' } }}
          >
            <Background variant="dots" gap={28} size={1} color="var(--border)" />
            <Controls style={{ bottom: 16, left: 16 }} />
            <MiniMap
              nodeColor={n => n.data.accentColor || n.data.schema?.color || '#1e293b'}
              maskColor={theme === 'light' ? 'rgba(226,232,240,0.7)' : 'rgba(8,11,18,0.7)'}
              style={{ bottom: 16, right: selectedNode ? 296 : 16 }}
            />
          </ReactFlow>

          {/* Empty state */}
          {nodes.length === 0 && (
            <div className="empty-canvas" style={{ pointerEvents:'none' }}>
              <div style={{ marginBottom:20, opacity:.15 }}>
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round">
                  <polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
                </svg>
              </div>
              <div className="empty-title">No resources defined</div>
              <div className="empty-sub" style={{ fontFamily:'var(--font-mono)' }}>
                <span style={{ color:'var(--accent)' }}>→</span> Drag resources from the sidebar<br/>
                <span style={{ color:'var(--accent)' }}>→</span> Connect ports to define relationships<br/>
                <span style={{ color:'var(--green)' }}>→</span> Hit <strong style={{ color:'var(--green)' }}>Deploy</strong> to provision on GCP
              </div>
            </div>
          )}
        </div>

        {/* Context Menu */}
        {ctxMenu && (
          <div className="ctx-menu" style={{ left: ctxMenu.x, top: ctxMenu.y }} onMouseLeave={closeCtxMenu}>
            <div style={{ padding: '4px 10px 6px', fontSize: 10, color: 'var(--text2)', fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase' }}>
              {ctxMenu.nodeData?.label || 'Node'}
            </div>
            <div className="ctx-item sep" />
            <div className="ctx-item" onClick={() => {
              setNodes(nds => nds.map(n => n.id===ctxMenu.nodeId ? {...n, data:{...n.data, collapsed:!n.data.collapsed}} : n));
              closeCtxMenu();
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
              Toggle Collapse
            </div>
            <div className="ctx-item" onClick={() => {
              setNodes(nds => { const orig = nds.find(n=>n.id===ctxMenu.nodeId); if(!orig) return nds; const newId=`${orig.data.schema?.type||'node'}-${Date.now()}`; return [...nds,{...orig,id:newId,position:{x:orig.position.x+40,y:orig.position.y+40},selected:false}]; });
              closeCtxMenu();
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Duplicate
            </div>
            <div className="ctx-item" onClick={() => {
              setNodes(nds => nds.map(n => n.id===ctxMenu.nodeId ? {...n, data:{...n.data, status:'deployed'}} : n));
              closeCtxMenu();
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Mark Deployed
            </div>
            <div className="ctx-item" onClick={() => {
              setNodes(nds => nds.map(n => n.id===ctxMenu.nodeId ? {...n, data:{...n.data, status:'idle'}} : n));
              closeCtxMenu();
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/></svg>
              Reset Status
            </div>
            <div className="ctx-item sep" />
            {/* Inline color picker */}
            <div style={{ padding: '4px 10px 6px' }}>
              <div style={{ fontSize: 9, color: 'var(--text2)', marginBottom: 5, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase' }}>Accent Color</div>
              <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                {NODE_ACCENT_COLORS.map(c => (
                  <div key={c} onClick={() => { setNodes(nds => nds.map(n => n.id===ctxMenu.nodeId ? {...n, data:{...n.data, accentColor:c}} : n)); closeCtxMenu(); }}
                    style={{ width:16, height:16, borderRadius:'50%', background:c, cursor:'pointer', border:'2px solid transparent', transition:'transform .1s' }}
                    onMouseEnter={e=>e.target.style.transform='scale(1.3)'} onMouseLeave={e=>e.target.style.transform='scale(1)'}
                  />
                ))}
              </div>
            </div>
            <div className="ctx-item sep" />
            <div className="ctx-item danger" onClick={() => {
              deleteElements({ nodes: [{ id: ctxMenu.nodeId }] });
              closeCtxMenu();
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              Delete Node
            </div>
          </div>
        )}

        {/* Log */}
        <LogPanel logs={logs} visible={logVisible} onToggle={() => setLogVisible(v => !v)} />
        {nodeLogsModal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', zIndex:3000, display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(4px)' }}
          onClick={() => { nodeLogsEsRef.current?.close(); nodeLogsEsRef.current=null; setNodeLogsModal(null); }}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:'var(--bg1)', border:'1px solid var(--border2)',
            borderRadius:'var(--r16)', width:680, height:480,
            display:'flex', flexDirection:'column',
            boxShadow:'0 32px 96px rgba(0,0,0,.8)',
            animation:'fade-in .15s ease',
          }}>
            {/* Modal header */}
            <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10, background:'var(--bg2)', borderRadius:'var(--r16) var(--r16) 0 0' }}>
              <div style={{ width:8, height:8, borderRadius:'50%', background: nodeLogsModal.connecting ? 'var(--yellow)' : 'var(--green)', boxShadow:`0 0 8px ${nodeLogsModal.connecting ? 'var(--yellow)' : 'var(--green)'}`, animation: nodeLogsModal.connecting ? 'pulse-dot .8s infinite' : 'none', flexShrink:0 }}/>
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:13, color:'var(--text0)' }}>
                  {nodeLogsModal.label}
                </div>
                <div style={{ fontSize:9, color:'var(--text2)', fontFamily:'var(--font-mono)', marginTop:1 }}>
                  {nodeLogsModal.connecting ? 'Connecting to log stream...' : `Live stream · node ${nodeLogsModal.nodeId?.slice(0,16)}...`}
                </div>
              </div>
              <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                <span style={{ fontSize:10, color:'var(--text2)', background:'var(--bg3)', borderRadius:99, padding:'2px 8px', fontFamily:'var(--font-mono)' }}>
                  {(nodeLogsModal.lines||[]).length} lines
                </span>
                <button
                  onClick={() => { const text = (nodeLogsModal.lines||[]).map(l=>l.text||l).join('\n'); navigator.clipboard?.writeText(text); }}
                  style={{ background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:'var(--r8)', color:'var(--text1)', cursor:'pointer', padding:'4px 10px', fontSize:10, fontFamily:'var(--font-mono)' }}
                  title="Copy all logs"
                >
                  Copy
                </button>
                <button onClick={() => { nodeLogsEsRef.current?.close(); nodeLogsEsRef.current=null; setNodeLogsModal(null); }}
                  style={{ background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:'var(--r8)', color:'var(--text2)', cursor:'pointer', padding:'4px 8px', fontSize:13, lineHeight:1 }}>
                  ✕
                </button>
              </div>
            </div>
            {/* Log body */}
            <div style={{ flex:1, overflowY:'auto', fontFamily:'var(--font-mono)', fontSize:11, lineHeight:1.7, padding:'8px 0',
              scrollbarWidth:'thin', scrollbarColor:'var(--border2) transparent' }}
              ref={el => { if (el) el.scrollTop = el.scrollHeight; }}
            >
              {(nodeLogsModal.lines||[]).length === 0 ? (
                <div style={{ padding:'24px 18px', color:'var(--text2)', textAlign:'center' }}>
                  <div style={{ fontSize:24, marginBottom:8 }}>📡</div>
                  <div>{nodeLogsModal.connecting ? 'Waiting for log stream...' : 'No logs received yet'}</div>
                </div>
              ) : (nodeLogsModal.lines||[]).map((l,i) => {
                const line = typeof l === 'string' ? { text: l, level: 'info', ts: '' } : l;
                const lvlColors = { error:'var(--red)', warn:'var(--yellow)', ok:'var(--green)', info:'var(--text1)' };
                const lvlBg = { error:'rgba(239,68,68,0.08)', warn:'rgba(245,158,11,0.06)', ok:'rgba(16,185,129,0.06)', info:'transparent' };
                const c = lvlColors[line.level] || 'var(--text1)';
                const bg = lvlBg[line.level] || 'transparent';
                return (
                  <div key={i} style={{ display:'flex', gap:10, padding:'2px 16px', background: i%2===0 ? 'transparent' : 'rgba(255,255,255,0.012)', borderLeft:`2px solid ${i%2===0?'transparent':bg}` }}>
                    {line.ts && <span style={{ color:'var(--text2)', fontSize:9.5, flexShrink:0, minWidth:60, paddingTop:1 }}>{line.ts}</span>}
                    <span style={{ fontSize:9, fontWeight:700, color:c, background:bg, borderRadius:3, padding:'1px 5px', flexShrink:0, minWidth:36, textAlign:'center', alignSelf:'flex-start', marginTop:1 }}>
                      {line.level?.toUpperCase().slice(0,4) || 'INFO'}
                    </span>
                    <span style={{ color: line.level==='error'?'var(--red)': line.level==='warn'?'var(--yellow)': line.level==='ok'?'var(--green)':'var(--text1)', flex:1, wordBreak:'break-all' }}>
                      {line.text}
                    </span>
                  </div>
                );
              })}
            </div>
            {/* Footer */}
            <div style={{ padding:'8px 16px', borderTop:'1px solid var(--border)', display:'flex', alignItems:'center', gap:8, background:'var(--bg2)', borderRadius:'0 0 var(--r16) var(--r16)' }}>
              <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--green)', animation:'pulse-dot 1.5s ease-in-out infinite' }}/>
              <span style={{ fontSize:10, color:'var(--text2)', fontFamily:'var(--font-mono)' }}>Live streaming · updates every 2s</span>
              <div style={{ flex:1 }}/>
              <button onClick={() => setNodeLogsModal(m => m ? {...m, lines:[]} : m)}
                style={{ background:'none', border:'1px solid var(--border)', borderRadius:'var(--r8)', color:'var(--text2)', cursor:'pointer', padding:'3px 10px', fontSize:10, fontFamily:'var(--font-mono)' }}>
                Clear
              </button>
            </div>
          </div>
        </div>
      )}
        {/* Toasts */}
        <ToastContainer toasts={toasts} />
      </div>

      {/* Right property panel */}
      <div className={`panel-right ${selectedNode ? '' : 'collapsed'}`}>
        {selectedNode && (
          <PropertyPanel
            node={selectedNode}
            onClose={() => setSelectedNode(null)}
            onChange={handlePropChange}
          />
        )}
      </div>

      <InfoModal type={infoModal} onClose={() => setInfoModal(null)} />
    </div>
    </VCOContext.Provider>
  );
}

function App() {
  return (
    <ReactFlowProvider>
      <VCOApp />
    </ReactFlowProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
