<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visual Cloud Orchestrator</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/reactflow@11/dist/umd/index.js"></script>
<link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12/dist/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12/dist/style.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* ── GCP-inspired dark palette ── */
  --bg0:#060a10;
  --bg1:#0a0f1a;
  --bg2:#0e1525;
  --bg3:#131d30;
  --bg4:#192338;
  --border:#1a2e4a;
  --border2:#1e3a5c;
  --border3:#2a4a70;
  --text0:#e8f0fe;
  --text1:#8aa3c8;
  --text2:#3d5a80;
  --accent:#4285f4;      /* Google Blue */
  --accent2:#1669f5;
  --accent-glow:rgba(66,133,244,0.25);
  --green:#34a853;       /* Google Green */
  --green2:#1e8e3e;
  --red:#ea4335;         /* Google Red */
  --yellow:#fbbc04;      /* Google Yellow */
  --orange:#fa7b17;
  --teal:#00bcd4;
  --purple:#ab47bc;
  --shadow:rgba(0,0,0,0.5);
  --shadow2:rgba(0,0,0,0.7);
  --font-mono:'IBM Plex Mono',monospace;
  --font-ui:'IBM Plex Sans','Inter',sans-serif;
  --font-display:'IBM Plex Sans',sans-serif;
  --r4:4px;--r6:6px;--r8:8px;--r12:12px;--r16:16px;
  --topbar-h:52px;
  --sidebar-w:268px;
}
[data-theme="light"]{
  --bg0:#f1f3f4;
  --bg1:#ffffff;
  --bg2:#f8f9fa;
  --bg3:#e8eaed;
  --bg4:#dadce0;
  --border:#dadce0;
  --border2:#bdc1c6;
  --border3:#9aa0a6;
  --text0:#202124;
  --text1:#5f6368;
  --text2:#9aa0a6;
  --accent:#1a73e8;
  --accent2:#1557b0;
  --accent-glow:rgba(26,115,232,0.15);
  --green:#188038;
  --green2:#137333;
  --red:#c5221f;
  --yellow:#e37400;
  --shadow:rgba(60,64,67,0.15);
  --shadow2:rgba(60,64,67,0.3);
}

html,body,#root{
  height:100%;width:100%;overflow:hidden;
  background:var(--bg0);color:var(--text0);
  font-family:var(--font-ui);
  transition:background .2s,color .2s;
  -webkit-font-smoothing:antialiased;
}

/* ── Layout ── */
.app{display:flex;height:100vh;width:100vw;overflow:hidden}
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--bg1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:10;
  box-shadow:2px 0 8px rgba(0,0,0,0.2);
}
.canvas-wrap{flex:1;position:relative;background:var(--bg0)}
.panel-right{
  width:288px;min-width:288px;
  background:var(--bg1);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:width .2s;z-index:10;
  box-shadow:-2px 0 8px rgba(0,0,0,0.2);
}
.panel-right.collapsed{width:0;min-width:0;overflow:hidden}

/* ── Topbar — GCP Console style ── */
.topbar{
  height:var(--topbar-h);
  background:var(--bg1);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 12px 0 0;
  gap:8px;
  position:absolute;top:0;left:0;right:0;z-index:20;
}
/* Left blue accent bar on topbar — GCP signature */
.topbar::before{
  content:'';
  position:absolute;
  bottom:-1px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--teal),var(--green));
  opacity:.7;
}
.logo{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  display:flex;align-items:center;gap:10px;
  padding:0 16px;
  border-right:1px solid var(--border);
  height:100%;
  flex-shrink:0;
}
.logo-icon{
  width:28px;height:28px;border-radius:6px;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(66,133,244,0.4);
  flex-shrink:0;
}
.logo-text{
  display:flex;flex-direction:column;min-width:0;
}
.logo-title{
  font-family:var(--font-display);font-weight:700;font-size:13px;
  letter-spacing:-.2px;color:var(--text0);line-height:1.2;
}
.logo-sub{font-size:9px;color:var(--text2);font-family:var(--font-mono);letter-spacing:.06em;margin-top:1px}
.topbar-divider{width:1px;height:24px;background:var(--border);margin:0 4px;flex-shrink:0}
.topbar-spacer{flex:1}

/* ── Topbar breadcrumb ── */
.topbar-breadcrumb{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--text1);
  font-family:var(--font-ui);
}
.topbar-breadcrumb-sep{color:var(--text2);font-size:14px}
.topbar-breadcrumb-active{color:var(--text0);font-weight:600}

/* ── Topbar buttons ── */
.btn{
  display:flex;align-items:center;gap:6px;
  padding:0 14px;height:32px;
  border-radius:var(--r6);border:1px solid transparent;
  cursor:pointer;font-family:var(--font-ui);
  font-size:12px;font-weight:500;
  transition:all .15s;white-space:nowrap;
}
.btn-ghost{
  background:transparent;color:var(--text1);
  border-color:var(--border2);
}
.btn-ghost:hover{background:var(--bg3);color:var(--text0);border-color:var(--border3)}
.btn-primary{
  background:var(--accent);color:#fff;border-color:transparent;
  box-shadow:0 1px 3px rgba(66,133,244,0.4);
}
.btn-primary:hover{background:var(--accent2);box-shadow:0 2px 8px rgba(66,133,244,0.5)}
.btn-deploy{
  background:var(--green);color:#fff;border-color:transparent;
  box-shadow:0 1px 3px rgba(52,168,83,0.4);
  font-weight:600;
}
.btn-deploy:hover:not(:disabled){background:var(--green2);box-shadow:0 2px 8px rgba(52,168,83,0.5)}
.btn-deploy:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:var(--red);color:#fff;border-color:transparent}
.btn-icon{
  width:32px;height:32px;padding:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--r6);border:1px solid var(--border2);
  background:transparent;color:var(--text1);cursor:pointer;
  transition:all .15s;
}
.btn-icon:hover{background:var(--bg3);color:var(--text0);border-color:var(--border3)}
.btn-icon.active{background:var(--accent-glow);color:var(--accent);border-color:var(--accent)44}

/* ── Menu ── */
.topbar-menu{position:relative;display:flex;align-items:center}
.topbar-menu-button{
  display:flex;align-items:center;gap:6px;
  padding:0 12px;height:32px;
  border-radius:var(--r6);border:1px solid var(--border2);
  background:var(--bg2);color:var(--text1);
  cursor:pointer;font-family:var(--font-ui);font-size:12px;
  font-weight:500;transition:all .15s;
}
.topbar-menu-button:hover{background:var(--bg3);color:var(--text0);border-color:var(--border3)}
.topbar-menu-panel{
  position:absolute;top:calc(100% + 6px);left:0;min-width:200px;
  background:var(--bg1);border:1px solid var(--border2);
  border-radius:var(--r12);
  box-shadow:0 8px 24px var(--shadow),0 2px 6px rgba(0,0,0,0.2);
  overflow:hidden;z-index:40;
  animation:fade-in .12s ease;
}
.topbar-menu-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;color:var(--text1);font-size:12px;
  cursor:pointer;transition:all .1s;font-family:var(--font-ui);
}
.topbar-menu-item:hover{background:var(--accent-glow);color:var(--text0)}
.topbar-menu-item svg{flex-shrink:0;opacity:.7}
.topbar-menu-item:hover svg{opacity:1}
.topbar-menu-item span{flex:1}
.topbar-menu-item .kbd{
  font-size:9px;color:var(--text2);background:var(--bg3);
  border:1px solid var(--border2);border-radius:3px;
  padding:1px 5px;font-family:var(--font-mono);
}
.topbar-menu-divider{height:1px;background:var(--border);margin:4px 8px}

/* ── WS status pill ── */
.ws-pill{
  display:flex;align-items:center;gap:5px;
  padding:0 10px;height:24px;border-radius:99px;
  border:1px solid var(--border);background:var(--bg2);
  font-size:10px;font-family:var(--font-mono);font-weight:500;
  color:var(--text2);transition:all .3s;
}
.ws-pill.connected{
  border-color:rgba(52,168,83,0.4);
  background:rgba(52,168,83,0.08);
  color:var(--green);
}
.ws-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.ws-pill.connected .ws-dot{animation:pulse-dot 2s ease-in-out infinite}

/* ── Deploy progress bar ── */
.deploy-progress{
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--teal),var(--green));
  animation:progress-bar 1.5s ease-in-out infinite;
  transform-origin:left;
}
@keyframes progress-bar{
  0%{transform:scaleX(0);opacity:1}
  60%{transform:scaleX(.9);opacity:1}
  100%{transform:scaleX(1);opacity:0}
}

/* ── Sidebar ── */
.sidebar-header{
  padding:12px 14px 10px;
  border-bottom:1px solid var(--border);
  background:var(--bg1);
}
.sidebar-title{
  font-family:var(--font-ui);font-size:10px;font-weight:700;
  letter-spacing:.1em;color:var(--text2);text-transform:uppercase;
  margin-bottom:2px;
}
.sidebar-search{
  margin:8px 10px;position:relative;
}
.sidebar-search input{
  width:100%;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r8);
  padding:7px 10px 7px 32px;
  color:var(--text0);
  font-family:var(--font-mono);font-size:11px;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.sidebar-search input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-glow);
}
.sidebar-search input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2)}
.node-list{flex:1;overflow-y:auto;padding:6px 8px}
.node-list::-webkit-scrollbar{width:4px}
.node-list::-webkit-scrollbar-track{background:transparent}
.node-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── Node items in sidebar ── */
.node-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:var(--r8);
  cursor:grab;user-select:none;margin-bottom:3px;
  border:1px solid transparent;
  transition:all .12s;
  background:transparent;
  position:relative;overflow:hidden;
}
.node-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--accent);opacity:0;transition:opacity .12s;
  border-radius:0 2px 2px 0;
}
.node-item:hover{
  border-color:var(--border);
  background:var(--bg2);
}
.node-item:hover::before{opacity:1}
.node-item:active{cursor:grabbing;transform:scale(.97)}
.node-icon{
  width:30px;height:30px;border-radius:var(--r6);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.node-info{flex:1;min-width:0}
.node-name{font-size:11px;font-weight:600;color:var(--text0);font-family:var(--font-ui);line-height:1.3}
.node-desc{font-size:9px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-mono)}

/* ── Canvas ── */
.canvas-wrap .react-flow{top:var(--topbar-h) !important}
.react-flow__background{background:var(--bg0) !important}
.react-flow__background pattern circle{fill:var(--border) !important;opacity:.6}

/* ── Grid overlay (subtle GCP-style) ── */
.canvas-wrap::after{
  content:'';
  position:absolute;inset:0;top:var(--topbar-h);
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.04;
  pointer-events:none;z-index:0;
}

/* ── Custom Nodes — GCP card style ── */
.gcp-node{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:var(--r12);
  min-width:210px;
  overflow:hidden;
  transition:border-color .15s,box-shadow .15s,transform .1s;
  position:relative;
  /* Subtle glass effect */
  backdrop-filter:blur(8px);
}
.gcp-node::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--node-color,var(--accent));
  border-radius:var(--r12) var(--r12) 0 0;
  transition:background .3s;
}
/* Subtle inner glow on the top strip */
.gcp-node::after{
  content:'';position:absolute;top:0;left:0;right:0;height:40px;
  background:linear-gradient(180deg,var(--node-color-alpha,rgba(66,133,244,0.06)) 0%,transparent 100%);
  pointer-events:none;
}
.gcp-node:hover{
  border-color:var(--node-color,var(--accent));
  box-shadow:0 0 0 1px var(--node-color,var(--accent))33,0 4px 24px rgba(0,0,0,.4),0 1px 4px rgba(0,0,0,.3);
  transform:translateY(-1px);
}
.gcp-node.selected{
  border-color:var(--node-color,var(--accent));
  box-shadow:0 0 0 2px var(--node-color,var(--accent))55,0 8px 32px rgba(0,0,0,.5);
}
.gcp-node.status-deployed::before{background:var(--green)}
.gcp-node.status-error::before{background:var(--red)}
.gcp-node.status-failed::before{background:var(--red);animation:pulse-bar .8s ease-in-out infinite}
.gcp-node.status-deploying::before{background:var(--yellow);animation:pulse-bar 1s ease-in-out infinite}
.gcp-node.status-working::before{background:#fff;animation:pulse-bar .4s ease-in-out infinite}
.gcp-node.status-working{box-shadow:0 0 0 2px rgba(255,255,255,0.5),0 0 20px rgba(255,255,255,0.15) !important}
@keyframes pulse-bar{0%,100%{opacity:1}50%{opacity:.25}}

/* ── Node header ── */
.node-header{
  padding:10px 12px 8px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);
  position:relative;z-index:1;
}
.node-header-icon{
  width:28px;height:28px;border-radius:var(--r6);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.node-header-name{
  font-family:var(--font-ui);font-size:12px;font-weight:600;
  color:var(--text0);flex:1;line-height:1.3;
}
.node-header-type{
  font-size:8px;font-weight:600;letter-spacing:.12em;
  color:var(--text2);text-transform:uppercase;
  margin-top:2px;font-family:var(--font-mono);
}

/* ── Status badge ── */
.status-badge{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-badge.idle{background:var(--border3)}
.status-badge.deployed{background:var(--green);box-shadow:0 0 5px var(--green)}
.status-badge.deploying{background:var(--yellow);animation:pulse-dot 1s ease-in-out infinite}
.status-badge.working{background:#fff;box-shadow:0 0 8px #fff;animation:pulse-dot .4s ease-in-out infinite}
.status-badge.failed{background:var(--red);box-shadow:0 0 5px var(--red);animation:pulse-dot .6s ease-in-out infinite}
.status-badge.error{background:var(--red);box-shadow:0 0 5px var(--red)}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}

/* ── Ports ── */
.node-ports{padding:6px 0;position:relative;z-index:1}
.port-row{display:flex;align-items:center;padding:2px 0;position:relative;height:24px}
.port-label{font-size:9.5px;color:var(--text1);padding:0 10px;flex:1;font-family:var(--font-mono)}
.port-label.input{padding-left:20px}
.port-label.output{padding-right:20px;text-align:right}

/* ── Handles ── */
.react-flow__handle{
  width:10px!important;height:10px!important;
  border-radius:50%!important;
  border:2px solid var(--bg2)!important;
  transition:transform .15s,box-shadow .15s!important;
}
.react-flow__handle:hover{transform:scale(1.5)!important;box-shadow:0 0 0 3px rgba(255,255,255,.12)!important}
.react-flow__handle-left{left:-5px!important}
.react-flow__handle-right{right:-5px!important}
.react-flow__handle-connecting{transform:scale(1.6)!important;box-shadow:0 0 0 4px rgba(66,133,244,0.25)!important}
.react-flow__handle-valid{box-shadow:0 0 0 4px rgba(52,168,83,0.4)!important}
.react-flow__handle[data-multiin="true"]{box-shadow:0 0 0 2px rgba(52,211,153,0.5)!important}

/* ── Edges ── */
.react-flow__edge-path{stroke-width:1.5!important}
.react-flow__edge.invalid .react-flow__edge-path{stroke:var(--red)!important;stroke-dasharray:4 3}
.react-flow__connection-line{stroke:var(--accent)!important;stroke-width:1.5!important;stroke-dasharray:5 3!important}

/* ── MiniMap ── */
.react-flow__minimap{
  background:var(--bg2)!important;
  border:1px solid var(--border)!important;
  border-radius:var(--r8)!important;
  box-shadow:0 4px 16px var(--shadow)!important;
}
.react-flow__minimap-mask{fill:var(--bg0)!important;opacity:.8!important}

/* ── Controls ── */
.react-flow__controls{
  background:var(--bg2)!important;
  border:1px solid var(--border)!important;
  border-radius:var(--r8)!important;
  box-shadow:0 2px 8px var(--shadow)!important;
  overflow:hidden;
}
.react-flow__controls-button{
  background:transparent!important;border:none!important;
  border-bottom:1px solid var(--border)!important;
  color:var(--text1)!important;transition:all .12s!important;
}
.react-flow__controls-button:last-child{border-bottom:none!important}
.react-flow__controls-button:hover{background:var(--bg3)!important;color:var(--text0)!important}
.react-flow__controls-button svg{fill:currentColor!important}

/* ── Property Panel ── */
.panel-header{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);
}
.panel-title{font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--text0)}
.panel-close{
  width:26px;height:26px;border-radius:var(--r6);
  background:none;border:1px solid transparent;
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;
}
.panel-close:hover{color:var(--text0);background:var(--bg3);border-color:var(--border2)}
.panel-body{flex:1;overflow-y:auto;padding:14px}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.field-group{margin-bottom:14px}
.field-label{
  font-size:9.5px;font-weight:700;letter-spacing:.1em;
  color:var(--text2);text-transform:uppercase;
  margin-bottom:5px;display:block;font-family:var(--font-ui);
}
.field-input{
  width:100%;background:var(--bg0);
  border:1px solid var(--border);border-radius:var(--r6);
  padding:7px 10px;color:var(--text0);
  font-family:var(--font-mono);font-size:11px;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.field-select{
  width:100%;background:var(--bg0);
  border:1px solid var(--border);border-radius:var(--r6);
  padding:7px 10px;color:var(--text0);
  font-family:var(--font-mono);font-size:11px;
  outline:none;cursor:pointer;transition:border-color .15s;

.field-select:focus{border-color:var(--accent)}
.field-checkbox{display:flex;align-items:center;gap:8px;cursor:pointer}
.field-checkbox input{accent-color:var(--accent);width:13px;height:13px}
.section-title{
  font-family:var(--font-ui);font-size:9.5px;font-weight:700;
  letter-spacing:.1em;color:var(--accent);text-transform:uppercase;
  margin:16px 0 8px;padding:0 0 6px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.section-title::before{
  content:'';width:3px;height:10px;border-radius:2px;
  background:var(--accent);display:inline-block;
}

/* ── Log Panel — terminal aesthetic ── */
.log-panel{
  position:absolute;bottom:0;left:0;right:0;
  height:172px;
  background:var(--bg0);
  border-top:1px solid var(--border);
  z-index:15;display:flex;flex-direction:column;
  font-family:var(--font-mono);
}
.log-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--accent),var(--teal));
  opacity:.5;
}
.log-panel.hidden{height:0;overflow:hidden}
.log-header{
  padding:5px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;background:var(--bg1);
}
.log-title{font-size:9.5px;font-weight:700;letter-spacing:.12em;color:var(--text2);text-transform:uppercase;font-family:var(--font-ui)}
.log-body{flex:1;overflow-y:auto;padding:4px 0;font-size:10.5px;line-height:1.65}
.log-body::-webkit-scrollbar{width:3px}
.log-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.log-entry{display:flex;gap:8px;color:var(--text1)}
.log-entry .ts{color:var(--text2);flex-shrink:0}
.log-entry.ok .msg{color:var(--green)}
.log-entry.err .msg{color:var(--red)}
.log-entry.info .msg{color:var(--accent)}
.log-entry.warn .msg{color:var(--yellow)}

/* ── Canvas Toolbar — floating pill ── */
.canvas-toolbar{
  position:absolute;top:64px;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;
  background:var(--bg1);
  border:1px solid var(--border2);
  border-radius:var(--r12);
  padding:5px;z-index:15;
  box-shadow:0 4px 16px var(--shadow);
}

/* ── Toast — GCP snackbar style ── */
.toast-container{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;flex-direction:column;gap:6px;
  pointer-events:none;align-items:center;
}
.toast{
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:var(--r8);
  padding:10px 16px;
  font-size:12px;color:var(--text0);
  display:flex;align-items:center;gap:10px;
  animation:slide-up .2s ease;
  pointer-events:all;max-width:320px;
  box-shadow:0 4px 16px var(--shadow);
  font-family:var(--font-ui);
}
.toast::before{
  content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0;
}
.toast.success::before{background:var(--green);box-shadow:0 0 6px var(--green)}
.toast.error::before{background:var(--red);box-shadow:0 0 6px var(--red)}
.toast.info::before{background:var(--accent);box-shadow:0 0 6px var(--accent)}
@keyframes slide-up{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── Empty state ── */
.empty-canvas{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;user-select:none;
}
.empty-title{
  font-family:var(--font-display);font-size:20px;font-weight:700;
  color:var(--text2);letter-spacing:-.3px;margin-bottom:10px;
}
.empty-sub{font-size:11px;color:var(--text2);line-height:1.8;font-family:var(--font-mono)}
.empty-grid{
  position:absolute;inset:0;
  background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);
  background-size:28px 28px;opacity:.25;pointer-events:none;
}

/* ── Badge ── */
.port-type-badge{
  display:inline-flex;align-items:center;
  padding:1px 6px;border-radius:99px;
  font-size:8.5px;font-weight:700;letter-spacing:.05em;
  font-family:var(--font-mono);
}

/* ── Node Toolbar ── */
.react-flow__node-toolbar{
  display:flex!important;gap:2px!important;
  background:var(--bg1)!important;
  border:1px solid var(--border2)!important;
  border-radius:var(--r8)!important;
  padding:3px!important;
  box-shadow:0 4px 16px var(--shadow2)!important;
}
.node-toolbar-btn{
  width:26px;height:26px;border-radius:var(--r6);
  border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text1);transition:all .1s;
}
.node-toolbar-btn:hover{background:var(--bg3);color:var(--text0)}
.node-toolbar-btn.danger:hover{background:rgba(234,67,53,.15);color:var(--red)}
.node-toolbar-btn.success:hover{background:rgba(52,168,83,.15);color:var(--green)}
.node-toolbar-divider{width:1px;background:var(--border);margin:2px 0;align-self:stretch}

/* ── Context Menu ── */
.ctx-menu{
  position:fixed;
  background:var(--bg1);border:1px solid var(--border2);
  border-radius:var(--r12);padding:5px;
  box-shadow:0 8px 32px var(--shadow2);
  z-index:1000;min-width:170px;
  animation:fade-in .1s ease;
}
@keyframes fade-in{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:var(--r6);
  cursor:pointer;font-size:11px;color:var(--text1);
  transition:all .1s;font-family:var(--font-ui);
}
.ctx-item:hover{background:var(--accent-glow);color:var(--text0)}
.ctx-item.danger:hover{background:rgba(234,67,53,.12);color:var(--red)}
.ctx-item.sep{height:1px;background:var(--border);margin:3px 0;padding:0;cursor:default}
.ctx-item.sep:hover{background:var(--border)}

.node-collapsed .node-ports{display:none}
.node-collapsed .node-header{border-bottom:none}
.collapse-btn{
  width:18px;height:18px;border-radius:4px;
  border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .12s;padding:0;flex-shrink:0;
}
.collapse-btn:hover{color:var(--text0);background:var(--bg3)}

/* ── Category accordion ── */
.cat-header{transition:background .15s}
.cat-header:hover{opacity:.9}

/* ── Edge label ── */
.edge-label-wrapper{
  background:var(--bg2);border:1px solid var(--border);

}

/* ── Resizer ── */
.react-flow__resize-control.handle{
  width:7px!important;height:7px!important;
  background:var(--accent)!important;
  border:2px solid var(--bg0)!important;
  border-radius:2px!important;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── VPC Group ── */
.vpc-group-node{
  border:1.5px dashed rgba(52,168,83,0.5);
  border-radius:16px;
  background:rgba(52,168,83,0.03);
  position:relative;min-width:280px;min-height:200px;
  transition:border-color .2s,background .2s;
}
.vpc-group-node.drag-over{
  border-color:var(--green);
  background:rgba(52,168,83,0.08);
  box-shadow:0 0 0 3px rgba(52,168,83,0.15);
}
.vpc-group-node.selected{
  border-color:var(--green);
  box-shadow:0 0 0 2px rgba(52,168,83,0.3);
}
.vpc-group-header{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px 8px;
  border-bottom:1px dashed rgba(52,168,83,0.25);
}
.vpc-group-icon{
  width:26px;height:26px;border-radius:6px;
  background:rgba(52,168,83,0.12);color:var(--green);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.vpc-group-title{font-family:var(--font-ui);font-size:12px;font-weight:700;color:var(--text0);flex:1}
.vpc-group-subtitle{font-size:8.5px;color:var(--green);letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-mono)}
.vpc-group-cidr{font-size:9px;color:var(--green);font-family:var(--font-mono);background:rgba(52,168,83,0.1);padding:1px 7px;border-radius:99px}
.vpc-group-body{padding:10px;min-height:130px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.vpc-group-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:rgba(52,168,83,0.3);font-size:10px;letter-spacing:.04em;
  border:1px dashed rgba(52,168,83,0.18);border-radius:8px;
  padding:20px;text-align:center;line-height:1.7;pointer-events:none;
  font-family:var(--font-mono);
}
.vpc-child-badge{
  display:flex;align-items:center;gap:6px;
  background:rgba(52,168,83,0.07);border:1px solid rgba(52,168,83,0.18);
  border-radius:6px;padding:4px 8px;font-size:10px;color:rgba(200,240,215,0.9);
  font-family:var(--font-mono);
}
.vpc-child-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ── node-missing required ── */
.node-missing-required::after{
  content:'!';position:absolute;top:-3px;right:-3px;
  width:13px;height:13px;background:var(--yellow);color:#000;
  font-size:8px;font-weight:900;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  line-height:13px;text-align:center;
}

/* ── Light theme patches ── */
[data-theme="light"] .react-flow__background{background:var(--bg0)!important}
[data-theme="light"] .react-flow__background pattern circle{fill:var(--border2)!important;opacity:.5}
[data-theme="light"] .react-flow__minimap{background:var(--bg2)!important;border-color:var(--border)!important}

[data-theme="light"] .react-flow__controls{background:var(--bg1)!important;border-color:var(--border)!important}
[data-theme="light"] .react-flow__controls-button{color:var(--text1)!important;border-bottom-color:var(--border)!important}
[data-theme="light"] .react-flow__controls-button:hover{background:var(--bg3)!important}
[data-theme="light"] .react-flow__handle{border-color:var(--bg1)!important}
[data-theme="light"] .field-input,[data-theme="light"] .field-select{background:var(--bg1);color:var(--text0);border-color:var(--border)}
[data-theme="light"] .node-header{border-bottom-color:var(--border)}

[data-theme="light"] .log-panel{background:var(--bg0)}
[data-theme="light"] .canvas-wrap::after{opacity:.08}

// ── GCP Icon Loader — tries icons/{NodeType}.svg first, falls back to inline ──
const gcpIconCache = {};

const GCPIcon = ({ nodeType, fallbackIcon, color, size = 20 }) => {
  const [src, setSrc] = React.useState(() => gcpIconCache[nodeType] || null);
  const [failed, setFailed] = React.useState(gcpIconCache[nodeType] === false);

  React.useEffect(() => {
    if (gcpIconCache[nodeType] !== undefined) {
      if (gcpIconCache[nodeType] === false) setFailed(true);
      else setSrc(gcpIconCache[nodeType]);
      return;
    }
    
    const formattedType = nodeType
    .slice(0, -4)              // מוריד את 4 התווים האחרונים (Node)
    .replace(/([a-z])([A-Z])/g, '$1_$2') // מוסיף קו תחתון בין אות קטנה לגדולה
    .toLowerCase();            // הופך הכל לאותיות קטנות
    
    const url = `icons/${formattedType}/${formattedType}.svg`;
    fetch(url)
      .then(r => {
        if (!r.ok) throw new Error('not found');
        return r.text();
      })
      .then(text => {
        gcpIconCache[nodeType] = url;
        setSrc(url);
      })
      .catch(() => {
        gcpIconCache[nodeType] = false;
        setFailed(true);
      });
  }, [nodeType]);

  if (src && !failed) {
    return (
      <img
        src={src}
        width={size}
        height={size}
        style={{ display: 'block', objectFit: 'contain', filter: 'drop-shadow(0 0 2px rgba(0,0,0,0.4))' }}
        onError={() => { gcpIconCache[nodeType] = false; setFailed(true); setSrc(null); }}
        alt={nodeType}
      />
    );
  }
  // fallback to inline SVG icon
  return <span style={{ color, display: 'flex', alignItems: 'center' }}>{ICONS[fallbackIcon] || ICONS.cloud}</span>;
};

// ── GCP Custom Node Component ─────────────────────────────────────────────────
const NODE_ACCENT_COLORS = ['#6366f1','#3b82f6','#10b981','#f97316','#ec4899','#eab308','#8b5cf6','#ef4444','#06b6d4','#f43f5e'];

// Global context so GCPNodeComponent can call openNodeLogs without prop-drilling
const VCOContext = React.createContext({ openNodeLogs: null });

const GCPNodeComponent = ({ data, selected, id }) => {
  const schema = data.schema;
  if (!schema) return null;
  const status = data.status || 'idle';
  const collapsed = data.collapsed || false;
  const nodeColor = data.accentColor || schema.color;
  const { setNodes, deleteElements, getEdges } = useReactFlow();
  const { openNodeLogs: openNodeLogsCtx } = React.useContext(VCOContext);

  // ── חישוב חיבורים ──
  const allEdges = getEdges();
  const edgeCount = allEdges.filter(e => e.source === id || e.target === id).length;
  const connectedTargets = new Set(allEdges.filter(e => e.target === id).map(e => e.targetHandle));

  const toggleCollapse = (e) => {
    e.stopPropagation();
    setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, collapsed: !n.data.collapsed } } : n));
  };

  const duplicateNode = () => {
    setNodes(nds => {
      const orig = nds.find(n => n.id === id);
      if (!orig) return nds;
      const newId = `${schema.type}-${Date.now()}`;
      return [...nds, { ...orig, id: newId, position: { x: orig.position.x + 40, y: orig.position.y + 40 }, selected: false }];
    });
  };

  const deleteNode = () => deleteElements({ nodes: [{ id }] });

  const setColor = (color) => {
    setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, accentColor: color } } : n));
  };

  const setStatus = (s) => {
    setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, status: s } } : n));
  };

  const renameNode = () => {
    const newLabel = prompt('Node label:', data.label || schema.label);
    if (newLabel && newLabel.trim()) {
      setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, label: newLabel.trim() } } : n));
    }
  };

  return (
    <>
      {/* Node Toolbar */}
      <NodeToolbar isVisible={selected} position={Position.Top} offset={8}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 3, background: 'var(--bg1)', border: '1px solid var(--border)', borderRadius: 'var(--r8)', padding: '4px 6px', boxShadow: '0 4px 16px var(--shadow)' }}>
          {/* Collapse toggle */}
          <button className="node-toolbar-btn" title={collapsed ? 'Expand' : 'Collapse'} onClick={toggleCollapse}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              {collapsed
                ? <><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>
                : <><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></>}
            </svg>
          </button>
          {/* Duplicate */}
          <button className="node-toolbar-btn success" title="Duplicate" onClick={duplicateNode}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          {/* Rename */}
          <button className="node-toolbar-btn" title="Rename" onClick={renameNode}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          {/* Copy ID */}
          <button className="node-toolbar-btn" title="Copy node ID" onClick={() => navigator.clipboard?.writeText(id)}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          </button>
          {/* Status cycle */}
          <button className="node-toolbar-btn" title="Cycle status" onClick={() => setStatus(['idle','deployed','deploying','error'][((['idle','deployed','deploying','error'].indexOf(status)+1)%4)])}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>

// ── Custom Edge ───────────────────────────────────────────────────────────────
const GCPEdge = ({ id, sourceX, sourceY, targetX, targetY, sourcePosition, targetPosition, data, style, markerEnd, selected }) => {
  const edgeType = data?.edgeType || 'bezier';
  const color = data?.color || '#60a5fa';
  const animated = data?.animated !== false;
  const label = data?.label || '';
  const { deleteElements, setEdges } = useReactFlow();

  let edgePath, labelX, labelY;
  if (edgeType === 'straight') {
    [edgePath, labelX, labelY] = getStraightPath({ sourceX, sourceY, targetX, targetY });
  } else if (edgeType === 'step') {
    [edgePath, labelX, labelY] = getSmoothStepPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition, borderRadius: 8 });
  } else {
    [edgePath, labelX, labelY] = getBezierPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition });
  }

  return (
    <>
      <path
        id={id}
        d={edgePath}
        className="react-flow__edge-path"
        style={{
          stroke: color,
          strokeWidth: selected ? 2.5 : 1.5,
          strokeOpacity: 0.85,
          fill: 'none',
          strokeDasharray: animated ? '5 3' : 'none',
          ...style
        }}
        markerEnd={markerEnd}
      />
      {/* Edge label */}
      {label && (
        <foreignObject x={labelX - 35} y={labelY - 11} width={70} height={22} style={{ overflow: 'visible' }}>
          <div className="edge-label-wrapper" style={{ textAlign: 'center' }}>{label}</div>
        </foreignObject>
      )}
      {/* Delete + options on selection */}
      {selected && (
        <foreignObject x={labelX - 60} y={labelY - (label ? 30 : 14)} width={120} height={28} style={{ overflow: 'visible', zIndex: 50 }}>
          <div style={{ display: 'flex', gap: 3, justifyContent: 'center' }}>
            {['bezier','step','straight'].map(t => (
              <button key={t} onClick={() => setEdges(eds => eds.map(e => e.id===id ? {...e, data:{...e.data, edgeType:t}} : e))}
                style={{ padding:'2px 5px', borderRadius:4, border:'1px solid var(--border)', background: edgeType===t?'var(--accent)':'var(--bg1)', color: edgeType===t?'#fff':'var(--text1)', fontSize:8, fontFamily:'var(--font-mono)', cursor:'pointer' }}>
                {t[0].toUpperCase()}
              </button>
            ))}
            <button onClick={() => setEdges(eds => eds.map(e => e.id===id ? {...e, data:{...e.data, animated:!animated}} : e))}
              style={{ padding:'2px 5px', borderRadius:4, border:'1px solid var(--border)', background: animated?'var(--accent)':'var(--bg1)', color: animated?'#fff':'var(--text1)', fontSize:8, fontFamily:'var(--font-mono)', cursor:'pointer' }}>
              ~
            </button>
            <button onClick={() => deleteElements({ edges: [{ id }] })}
              style={{ padding:'2px 5px', borderRadius:4, border:'1px solid var(--red)44', background:'var(--bg1)', color:'var(--red)', fontSize:8, fontFamily:'var(--font-mono)', cursor:'pointer' }}>
              ✕
            </button>
          </div>
        </foreignObject>
      )}
    </>
  );
};

  Compute:       { color: '#6366f1', icon: 'cloud' },

  Messaging:     { color: '#3b82f6', icon: 'radio' },

const CategoryList = ({ filteredTypes }) => {
  // Group by category
  const grouped = useMemo(() => {
    const map = {};
    filteredTypes.forEach(schema => {
      const cat = schema.category || 'General';
      if (!map[cat]) map[cat] = [];
      map[cat].push(schema);
    });
    return map;
  }, [filteredTypes]);

  // All categories open by default
  const allCats = Object.keys(grouped);
  const [open, setOpen] = useState(() => Object.fromEntries(allCats.map(c => [c, true])));

  // Open newly-appearing categories when search changes
  useEffect(() => {
    setOpen(prev => {
      const next = { ...prev };
      allCats.forEach(c => { if (!(c in next)) next[c] = true; });
      return next;
    });
  }, [allCats.join(',')]);

  const toggle = (cat) => setOpen(prev => ({ ...prev, [cat]: !prev[cat] }));

  if (allCats.length === 0) {
    return <div style={{ padding: '12px', fontSize: 11, color: 'var(--text2)', textAlign: 'center' }}>No nodes match</div>;
  }

  return (
    <>
      {allCats.map(cat => {
        const meta = CATEGORY_META[cat] || { color: 'var(--accent)', icon: 'cloud' };
        const isOpen = open[cat] !== false;
        return (
          <div key={cat} style={{ marginBottom: 4 }}>
            {/* Category header */}
            <div
              onClick={() => toggle(cat)}
              style={{
                display: 'flex', alignItems: 'center', gap: 7,
                padding: '5px 8px', borderRadius: 'var(--r8)',
                cursor: 'pointer', userSelect: 'none',
                background: isOpen ? meta.color + '14' : 'transparent',
                border: `1px solid ${isOpen ? meta.color + '33' : 'transparent'}`,
                marginBottom: isOpen ? 4 : 0,
                transition: 'all .15s',
              }}
            >
              <div style={{
                width: 18, height: 18, borderRadius: 5,
                background: meta.color + '22', color: meta.color,
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
              }}>
                <GCPIcon nodeType={cat + 'Cat'} fallbackIcon={meta.icon} color={meta.color} size={11} />
              </div>
              <span style={{ flex: 1, fontSize: 10, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: isOpen ? meta.color : 'var(--text2)', fontFamily: 'var(--font-display)' }}>
                {cat}
              </span>
              <span style={{ fontSize: 9, color: 'var(--text2)', background: 'var(--bg3)', borderRadius: 99, padding: '1px 5px' }}>
                {grouped[cat].length}
              </span>
              <span style={{ color: isOpen ? meta.color : 'var(--text2)', transition: 'transform .15s', transform: isOpen ? 'rotate(0deg)' : 'rotate(-90deg)', display: 'inline-flex' }}>
                {ICONS['chevron-down']}
              </span>
            </div>

            {/* Node items */}
            {isOpen && grouped[cat].map(schema => (
              <div
                key={schema.type}
                className="node-item"
                style={{ marginLeft: 8, marginBottom: 2, '--item-color': schema.color }}
                draggable
                onDragStart={e => e.dataTransfer.setData('application/vco-node', schema.type)}
              >
                <div className="node-icon" style={{ background: schema.color + '18', color: schema.color, width: 26, height: 26, border: `1px solid ${schema.color}28` }}>
                  <GCPIcon nodeType={schema.type} fallbackIcon={schema.icon} color={schema.color} size={13} />
                </div>
                <div className="node-info">
                  <div className="node-name" style={{ fontSize:11 }}>{schema.label}</div>
                  <div className="node-desc">{schema.description}</div>
                </div>
              </div>
            ))}
          </div>
        );
      })}
    </>
  );
};

// ── VPC Group Node Component ──────────────────────────────────────────────────
const VPCGroupNode = ({ data, selected, id }) => {
  const [dragOver, setDragOver] = React.useState(false);
  const { getNodes, setNodes } = useReactFlow();

  const children = (data.children || []);

  // Auto-resize based on children
  React.useEffect(() => {
    if (children.length === 0) return;

    const nodes = getNodes();
    const childNodes = nodes.filter(n => children.some(c => c.id === n.id));

    if (childNodes.length === 0) return;

    // Calculate bounding box of children
    const minX = Math.min(...childNodes.map(n => n.position.x));
    const maxX = Math.max(...childNodes.map(n => n.position.x + (n.width || 200)));
    const minY = Math.min(...childNodes.map(n => n.position.y));
    const maxY = Math.max(...childNodes.map(n => n.position.y + (n.height || 100)));

    const padding = 40;
    const newWidth = Math.max(300, maxX - minX + padding * 2);
    const newHeight = Math.max(200, maxY - minY + padding * 2 + 60); // +60 for header

    // Only update if significantly different to avoid loops
    const currentWidth = data.width || 300;
    const currentHeight = data.height || 200;

    if (Math.abs(newWidth - currentWidth) > 20 || Math.abs(newHeight - currentHeight) > 20) {
      setNodes(nds => nds.map(n =>
        n.id === id ? { ...n, data: { ...n.data, width: newWidth, height: newHeight } } : n
      ));
    }
  }, [children, getNodes, setNodes, id, data.width, data.height]);

  const handleDragOver = (e) => {
    e.preventDefault();
    e.stopPropagation();
    // Only accept gcpNode drops
    if (e.dataTransfer.types.includes('application/vco-node') ||
        e.dataTransfer.types.includes('application/reactflow')) {
      setDragOver(true);
    }
  };

  const handleDragLeave = (e) => {
    e.stopPropagation();
    setDragOver(false);
  };

  const handleDrop = (e) => {
    e.stopPropagation();
    setDragOver(false);
    // When a node is dragged from sidebar into the VPC group, 
    // the main onDrop will fire — we just need to register it as a child
    // This is handled by the parent via onDropIntoVPC
    if (data.onDropIntoVPC) {
      data.onDropIntoVPC(id, e);
    }
  };

  const isVisual = data.groupType === 'visual';
  return (
    <div
      className={`vpc-group-node${selected ? ' selected' : ''}${dragOver ? ' drag-over' : ''}`}
      onDragOver={handleDragOver}
      onDragLeave={handleDragLeave}
      onDrop={handleDrop}
      style={{ width: data.width || 300, height: data.height || 200 }}
    >
      <NodeResizer
        color={isVisual ? "#8b5cf6" : "#10b981"}
        isVisible={selected}
        minWidth={200}
        minHeight={150}
        onResizeEnd={(event, params) => {
          const { width, height } = params;
          setNodes(nds => nds.map(n =>
            n.id === id ? { ...n, data: { ...n.data, width, height } } : n
          ));
        }}
      />
      {!isVisual && (
        <>
          <Handle type="target" position={Position.Left} id="network_in"
            style={{ background: '#10b981', border: '2px solid #0d1117', top: 28 }} />
          <Handle type="source" position={Position.Right} id="subnet"
            style={{ background: '#34d399', border: '2px solid #0d1117', top: 28 }} />
        </>
      )}

      <div className="vpc-group-header" style={{ cursor: 'default' }}>
        <div className="vpc-group-icon" style={{ background: isVisual ? 'rgba(139,92,246,0.15)' : 'rgba(16,185,129,0.15)', color: isVisual ? '#8b5cf6' : '#10b981' }}>
          {isVisual ? (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M4 6h16v12H4z"/><path d="M8 10h8"/><path d="M8 14h8"/>
            </svg>
          ) : (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="2" y="2" width="6" height="6"/><rect x="16" y="2" width="6" height="6"/>
              <rect x="9" y="16" width="6" height="6"/>
              <path d="M5 8v4c0 1 1 2 2 2h10c1 0 2-1 2-2V8"/><line x1="12" y1="14" x2="12" y2="16"/>
            </svg>
          )}
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="vpc-group-title">{data.label || (isVisual ? 'Visual Group' : 'VPC Network')}</div>
          <div className="vpc-group-subtitle">{isVisual ? 'visual container' : 'vpc group'}</div>
        </div>
        {!isVisual && data.props?.subnet_cidr && (
          <div className="vpc-group-cidr">{data.props.subnet_cidr}</div>
        )}
      </div>

      <div className="vpc-group-body" style={{ minHeight: Math.max(140, children.length * 40 + 60), height: (data.height || 200) - 60 }}>
        {children.length === 0 ? (
          <div className="vpc-group-empty">
            Drop Cloud Run, VM,<br/>or SQL nodes here<br/>to attach to this VPC
          </div>
        ) : (
          children.map(c => (
            <div key={c.id} className="vpc-child-badge">
              <div className="vpc-child-badge-dot"/>
              <span style={{ flex: 1 }}>{c.label}</span>
              <span style={{ fontSize: 9, color: '#6ee7b7', letterSpacing: '.05em' }}>{c.type?.replace('Node','')}</span>
            </div>
          ))
        )}
      </div>
    </div>
  );
};
