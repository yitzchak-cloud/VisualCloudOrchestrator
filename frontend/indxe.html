          edges: currentEdges.map(e => ({
            id: e.id,
            source: e.source,
            sourceHandle: e.sourceHandle,
            target: e.target,
            targetHandle: e.targetHandle,
            color: e.data?.color || null,
          })),
        };
        try {
          await fetch('http://localhost:8000/api/graph', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
          });
          addLog('State auto-saved after deploy', 'ok');
        } catch { /* silent */ }
      }, []);

      // Use a ref so handleWsMessage always calls the latest autoSaveAfterDeploy
      const autoSaveRef = useRef(autoSaveAfterDeploy);
      useEffect(() => { autoSaveRef.current = autoSaveAfterDeploy; }, [autoSaveAfterDeploy]);

      const handleWsMessage = useCallback((msg) => {
        // Typed log line sent by the server
        if (msg.event === 'log') {
          addLog(msg.msg, msg.level || 'info', msg.node_id || null);
        }

        if (msg.event === 'node_status') {
          const newStatus = msg.status;
          const action = msg.action;
          setNodes(nds => {
            const updated = nds.map(n => {
              if (n.id !== msg.node_id) return n;
              if (action === 'unchanged' && (n.data.status === 'failed' || n.data.status === 'error')) {
                return n;
              }
              return { ...n, data: { ...n.data, status: newStatus } };
            });
            nodesRef.current = updated; // sync immediately, don't wait for useEffect
            return updated;
          });
          // Refresh node events after status change
          if (newStatus === 'deployed' || newStatus === 'failed') {
            setTimeout(() => {
              fetch(`http://localhost:8000/api/deploy-logs/node-events?namespace=${encodeURIComponent(namespaceRef.current)}`)
                .then(r => r.ok ? r.json() : null)
                .then(data => { if (data) setNodeEvents(data); })
                .catch(() => { });
            }, 800);
          }
        }

        if (msg.event === 'node_working') {
          setNodes(nds => {
            const updated = nds.map(n =>
              n.id === msg.node_id ? { ...n, data: { ...n.data, status: 'working' } } : n
            );
            nodesRef.current = updated;
            return updated;
          });
        }

        if (msg.event === 'deploy_started') {
          const touchedIds = new Set(msg.touched_ids || []);
          setNodes(nds => {
            const updated = nds.map(n => {
              if (touchedIds.size === 0 || touchedIds.has(n.id)) {
                return { ...n, data: { ...n.data, status: 'deploying' } };
              }
              return n;
            });
            nodesRef.current = updated;
            return updated;
          });
          addLog(
            `Deploy started — ${msg.create} create / ${msg.update} update / ${msg.destroy} destroy`,
            'info'
          );
        }

        if (msg.event === 'deploy_complete') {
          setIsDeploying(false);
          if (msg.changed === 0) {
            addLog('Nothing changed — already up to date', 'ok');
            showToast('Already up to date', 'info');
          } else {
            addLog(`Deploy complete — ${msg.changed} resource(s) changed`, 'ok');
            showToast('Deployment complete!', 'success');
          }
          // Refresh node events after deploy
          setTimeout(() => {
            fetch(`http://localhost:8000/api/deploy-logs/node-events?namespace=${encodeURIComponent(namespaceRef.current)}`)
              .then(r => r.ok ? r.json() : null)
              .then(data => { if (data) setNodeEvents(data); })
              .catch(() => { });
          }, 1000);
          setTimeout(() => autoSaveRef.current(), 600);
        }

        if (msg.event === 'graph_saved') {
          addLog(`Graph saved (${msg.node_count} nodes)`, 'ok');
        }
      }, []);

      const openNodeLogs = useCallback((nodeId, label) => {
        if (nodeLogsEsRef.current) {
          nodeLogsEsRef.current.close();
          nodeLogsEsRef.current = null;
        }
        setNodeLogsModal({ nodeId, label, lines: [], connecting: true });
        try {
          const es = new EventSource(`http://localhost:8000/api/logs/${nodeId}`);
          es.onopen = () => {
            setNodeLogsModal(m => m ? { ...m, connecting: false } : m);
          };
          es.onmessage = e => {
            const raw = e.data;
            // Parse level from log line: [INFO], [WARN], [ERROR]
            let level = 'info';
            if (/\[ERROR\]|\[CRIT\]/i.test(raw)) level = 'error';
            else if (/\[WARN\]/i.test(raw)) level = 'warn';
            else if (/\[OK\]|\[SUCCESS\]/i.test(raw)) level = 'ok';
            const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
            setNodeLogsModal(m => m ? { ...m, connecting: false, lines: [...(m.lines || []).slice(-499), { text: raw, level, ts }] } : m);
          };
          es.onerror = () => {
            setNodeLogsModal(m => m ? { ...m, connecting: false } : m);
          };
          nodeLogsEsRef.current = es;
        } catch (err) {
          setNodeLogsModal(m => m ? { ...m, connecting: false, lines: [{ text: `Cannot connect to log stream: ${err.message}`, level: 'error', ts: new Date().toLocaleTimeString('en-US', { hour12: false }) }] } : m);
        }
      }, []);

      // Drag from sidebar → drop on canvas
      const onDragOver = useCallback(e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }, []);

      const onDrop = useCallback(e => {
        e.preventDefault();
        const typeStr = e.dataTransfer.getData('application/vco-node');
        if (!typeStr) return;

        const position = screenToFlowPosition({ x: e.clientX, y: e.clientY });

        // ── VPC Group / Visual Group Node ──
        if (typeStr === '__VPC_GROUP__' || typeStr === '__GROUP_BOX__') {
          const isVisualGroup = typeStr === '__GROUP_BOX__';
          const id = `${isVisualGroup ? 'GroupBox' : 'VPCGroup'}-${Date.now()}`;
          setNodes(nds => [...nds, {
            id,
            type: isVisualGroup ? 'groupBox' : 'vpcGroup',
            position,
            style: { width: 300, minHeight: 200 },
            data: {
              label: isVisualGroup ? 'Visual Group' : 'VPC Network',
              groupType: isVisualGroup ? 'visual' : 'vpc',
              children: [],
              props: isVisualGroup ? {} : { subnet_cidr: '', region: 'us-central1' },
              onDropIntoVPC: (groupId, dropEvt) => {
                const typeStr2 = dropEvt.dataTransfer.getData('application/vco-node');
                if (!typeStr2 || typeStr2 === '__VPC_GROUP__' || typeStr2 === '__GROUP_BOX__') return;
                const schema2 = nodeTypesData.find(t => t.type === typeStr2);
                if (!schema2) return;
                const pos2 = screenToFlowPosition({ x: dropEvt.clientX, y: dropEvt.clientY });
                const childId = `${typeStr2}-${Date.now()}`;
                setNodes(nds => {
                  const childNode = {
                    id: childId,
                    type: 'gcpNode',
                    position: pos2,
                    data: { label: schema2.label, schema: schema2, status: 'idle', props: {} },
                    parentNode: groupId,
                    extent: 'parent',
                  };
                  return [...nds.map(n => {
                    if (n.id !== groupId) return n;
                    const existing = n.data.children || [];
                    return { ...n, data: { ...n.data, children: [...existing, { id: childId, label: schema2.label, type: schema2.type }] } };
                  }), childNode];
                });
                addLog(`Attached ${schema2.label} → ${isVisualGroup ? 'Visual Group' : 'VPC Group'}`, 'info');
              },
            },
          }]);
          addLog(`Added ${isVisualGroup ? 'Visual Group' : 'VPC Group'}`, 'info');
          return;
        }

        // ── Regular node ──
        const schema = nodeTypesData.find(t => t.type === typeStr);
        if (!schema) return;
        const id = `${typeStr}-${Date.now()}`;
        setNodes(nds => [...nds, {
          id,
          type: 'gcpNode',
          position,
          data: { label: schema.label, schema, status: 'idle', props: {} },
        }]);
        addLog(`Added ${schema.label}`, 'info');
      }, [nodeTypesData, screenToFlowPosition]);

      // Edge connect with type validation + multi_in enforcement
      const onConnect = useCallback((params) => {
        const currentNodes = nodesRef.current;
        const sourceNode = currentNodes.find(n => n.id === params.source);
        const targetNode = currentNodes.find(n => n.id === params.target);

        if (sourceNode && targetNode) {
          const sourcePort = sourceNode.data.schema?.outputs?.find(p => p.name === params.sourceHandle);
          const targetPort = targetNode.data.schema?.inputs?.find(p => p.name === params.targetHandle);

          // ── Type mismatch ──
          if (sourcePort && targetPort && sourcePort.type !== targetPort.type) {
            showToast(`Cannot connect ${sourcePort.type} → ${targetPort.type}`, 'error');
            addLog(`Blocked: ${sourcePort.type} ≠ ${targetPort.type}`, 'err');
            return;
          }

          // ── multi_in guard: reject second edge to a single-connection input port ──
          if (targetPort && !targetPort.multi_in) {
            const alreadyConnected = edges.some(
              e => e.target === params.target && e.targetHandle === params.targetHandle
            );
            if (alreadyConnected) {
              showToast(`Port "${targetPort.name}" accepts only one connection`, 'error');
              addLog(`Blocked: port ${targetNode.data.label}.${targetPort.name} already connected`, 'err');
              return;
            }
          }

          const color = sourcePort?.color || '#60a5fa';

          // ── auto_from_port: embed detectedProvider when wiring into a direct_event input ──
          let detectedProvider = null;
          if (targetPort?.type === 'direct_event') {
            const srcType = sourceNode.data.schema?.type || '';
            // Map source node type → provider label (mirrors direct_event_trigger.py catalog)
            const PORT_PROVIDER_MAP = {
              FirestoreNode: 'Cloud Firestore',
              FirebaseRTDBNode: 'Firebase Realtime Database',
              CloudBuildNode: 'Cloud Build',
              GcsBucketNode: 'Cloud Storage',
            };
            detectedProvider = PORT_PROVIDER_MAP[srcType] || null;
            if (detectedProvider) {
              // Auto-write provider prop on the target node so it persists
              setNodes(nds => nds.map(n => n.id === params.target
                ? { ...n, data: { ...n.data, props: { ...n.data.props, provider: detectedProvider } } }
                : n
              ));
            }
          }

          setEdges(eds => addEdge({
            ...params,
            type: 'gcpEdge',
            data: { color, edgeType: defaultEdgeType, animated: true, label: '', ...(detectedProvider ? { detectedProvider, sourceType: sourceNode.data.schema?.type } : {}) },
          }, eds));
          addLog(`Connected ${sourceNode.data.label} → ${targetNode.data.label}${sourcePort ? ' [' + sourcePort.type + ']' : ''}`, 'ok');
        } else {
          setEdges(eds => addEdge({ ...params, type: 'gcpEdge', data: { color: '#60a5fa', edgeType: defaultEdgeType, animated: true, label: '' } }, eds));
        }
      }, [defaultEdgeType, edges]);

      // Node selection — single click selects (shows toolbar), double click opens parameter modal
      const onNodeClick = useCallback((_, node) => {
        setSelectedNode(node);
        // Do NOT open editModalNode here — user must double-click for that
      }, []);
      const onNodeDoubleClick = useCallback((_, node) => {
        setSelectedNode(node);
        setEditModalNode(node);
      }, []);
      const onPaneClick = useCallback(() => setSelectedNode(null), []);

      // Generic edge disconnect — cleans up node props based on port types
      const handleDisconnectEdge = useCallback(({ source, target, sourceHandle, targetHandle, sourceNode, targetNode }) => {
        if (!sourceNode || !targetNode) return;

        const sourcePort = sourceNode.data.schema?.outputs?.find(p => p.name === sourceHandle);
        const targetPort = targetNode.data.schema?.inputs?.find(p => p.name === targetHandle);
        const portType = sourcePort?.type || targetPort?.type || '';

        setNodes(nds => nds.map(n => {
          // ── CloudRun: remove env vars injected from disconnected Topic / Subscription ──
          if (n.id === target && portType === 'topic') {
            // Source was a topic publisher — remove PUBSUB_TOPIC_<LABEL> env var
            const topicLabel = sourceNode.data.label || source;
            const envKey = 'PUBSUB_TOPIC_' + topicLabel.toUpperCase().replace(/[^A-Z0-9]/g, '_');
            const props = { ...n.data.props };
            delete props[envKey];
            return { ...n, data: { ...n.data, props } };
          }
          if (n.id === target && portType === 'message') {
            // Source was a subscription — remove PUBSUB_SUBSCRIPTION_<LABEL> env var
            const subLabel = sourceNode.data.label || source;
            const envKey = 'PUBSUB_SUBSCRIPTION_' + subLabel.toUpperCase().replace(/[^A-Z0-9]/g, '_');
            const props = { ...n.data.props };
            delete props[envKey];
            return { ...n, data: { ...n.data, props } };
          }
          // ── Push subscription: clear push_endpoint when CR disconnects ──
          if (n.id === source && portType === 'message' && n.data.schema?.type === 'PubsubPushSubscriptionNode') {
            return { ...n, data: { ...n.data, props: { ...n.data.props, push_endpoint: '' } } };
          }
          // ── VPC group: remove child badge when node disconnects ──
          if (n.id === source && portType === 'network') {
            const children = (n.data.children || []).filter(c => c.id !== target);
            return { ...n, data: { ...n.data, children } };
          }
          return n;
        }));

        const srcLabel = sourceNode.data.label || source;
        const tgtLabel = targetNode.data.label || target;
        addLog(`Disconnected ${srcLabel} → ${tgtLabel} [${portType || sourceHandle}→${targetHandle}]`, 'warn');
      }, [setNodes, addLog]);

      // Property change
      const handlePropChange = useCallback((nodeId, key, value, isProp = false) => {
        setNodes(nds => nds.map(n => {
          if (n.id !== nodeId) return n;
          if (isProp) return { ...n, data: { ...n.data, props: { ...n.data.props, [key]: value } } };
          return { ...n, data: { ...n.data, [key]: value } };
        }));
        // Keep selectedNode in sync
        setSelectedNode(prev => {
          if (!prev || prev.id !== nodeId) return prev;
          if (isProp) return { ...prev, data: { ...prev.data, props: { ...prev.data.props, [key]: value } } };
          return { ...prev, data: { ...prev.data, [key]: value } };
        });
        // Keep editModalNode in sync
        setEditModalNode(prev => {
          if (!prev || prev.id !== nodeId) return prev;
          if (isProp) return { ...prev, data: { ...prev.data, props: { ...prev.data.props, [key]: value } } };
          return { ...prev, data: { ...prev.data, [key]: value } };
        });
      }, []);

      // Deploy
      const handleDeploy = async () => {
        if (nodes.length === 0) { showToast('Add some nodes first', 'error'); return; }
        if (isDeploying) return;

        // Ask server what will change before marking nodes as deploying
        const payload = {
          namespace: namespaceRef.current,
          nodes: nodes.map(n => ({ id: n.id, type: n.data.schema?.type, label: n.data.label, props: n.data.props || {} })),
          edges: edges.map(e => ({ source: e.source, target: e.target, sourceHandle: e.sourceHandle, targetHandle: e.targetHandle })),
        };

        setIsDeploying(true);
        setLogVisible(true);
        addLog('Initiating deployment...', 'warn');

        try {
          const res = await fetch('http://localhost:8000/api/deploy', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
          });
          if (!res.ok) {
            const err = await res.text();
            addLog(`Server error: ${err}`, 'err');
            showToast('Deploy failed — check log', 'error');
            setIsDeploying(false);
          }
          // All further status updates arrive via WebSocket node_status events
        } catch (e) {
          addLog(`Cannot reach server: ${e.message}`, 'err');
          showToast('Server unreachable', 'error');
          setIsDeploying(false);
        }
      };

      // Track whether initial graph load is complete
      const graphLoadedRef = useRef(false);

      // Save — include position so we can restore the canvas layout
      const handleSave = async () => {
        const currentNodes = nodesRef.current;
        // Guard: don't overwrite saved state before initial load completes
        if (!graphLoadedRef.current && currentNodes.length === 0) {
          showToast('Still loading — try again in a moment', 'warn');
          return;
        }
        const currentEdges = edgesRef.current;
        const payload = {
          nodes: currentNodes.map(n => ({
            id: n.id,
            type: n.data.schema?.type,
            label: n.data.label,
            props: n.data.props || {},
            position: n.position,
            status: n.data.status || 'idle',
          })),
          edges: currentEdges.map(e => ({
            id: e.id,
            source: e.source,
            sourceHandle: e.sourceHandle,
            target: e.target,
            targetHandle: e.targetHandle,
            color: e.data?.color || null,
          })),
        };
        try {
          await fetch('http://localhost:8000/api/graph', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...payload, namespace: namespaceRef.current }),
          });
          showToast('Saved to desired.yaml', 'success');
          addLog('Graph saved to desired.yaml', 'ok');
        } catch {
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
          const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
          a.download = 'desired.json'; a.click();
          showToast('Exported as desired.json', 'info');
        }
      };

      const handleClear = async () => {
        setNodes([]); setEdges([]); setSelectedNode(null);
        addLog('Canvas cleared', 'warn');
        // Persist the empty state so reload doesn't bring back deleted nodes
        try {
          await fetch('http://localhost:8000/api/graph', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nodes: [], edges: [], namespace: namespaceRef.current }),
          });
        } catch { /* silent */ }
      };

      const filteredTypes = useMemo(() =>
        nodeTypesData.filter(t =>
          t.label.toLowerCase().includes(search.toLowerCase()) ||
          t.description.toLowerCase().includes(search.toLowerCase())
        ), [nodeTypesData, search]);

      const openEditModal = useCallback((nodeId) => {
        const node = nodesRef.current.find(n => n.id === nodeId);
        if (node) {
          setSelectedNode(node);
          setEditModalNode(node);
        }
      }, []);

      return (
        <VCOContext.Provider value={{ openNodeLogs, openEditModal, onDisconnectEdge: handleDisconnectEdge }}>
          <div className="app">
            {/* Sidebar */}
            <div className="sidebar">
              <div className="sidebar-header">
                <div className="logo">
                  <div className="logo-dot" />
                  <span>VCO</span>
                </div>
                <div style={{ fontSize: 10, color: 'var(--text2)', marginTop: 4, fontFamily: 'var(--font-mono)' }}>
                  GCP Cloud Orchestrator
                </div>
              </div>
              <div className="sidebar-search">
                <span className="search-icon">{ICONS.search}</span>
                <input
                  placeholder="Search nodes..."
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                />
              </div>
              <div className="node-list">
                {/* VPC Group special item */}
                <div style={{ padding: '6px 8px 4px', fontSize: 9, letterSpacing: '.12em', color: 'var(--text2)', fontWeight: 700, textTransform: 'uppercase' }}>
                  Group Nodes
                </div>
                <div
                  className="node-item"
                  style={{ borderColor: 'rgba(16,185,129,0.3)', background: 'rgba(16,185,129,0.06)', marginBottom: 8 }}
                  draggable
                  onDragStart={e => e.dataTransfer.setData('application/vco-node', '__VPC_GROUP__')}
                >
                  <div className="node-icon" style={{ background: 'rgba(16,185,129,0.15)', color: '#10b981' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="2" y="2" width="6" height="6" /><rect x="16" y="2" width="6" height="6" />
                      <rect x="9" y="16" width="6" height="6" />
                      <path d="M5 8v4c0 1 1 2 2 2h10c1 0 2-1 2-2V8" /><line x1="12" y1="14" x2="12" y2="16" />
                    </svg>
                  </div>
                  <div className="node-info">
                    <div className="node-name" style={{ color: '#a7f3d0' }}>VPC Group</div>
                    <div className="node-desc">Drop nodes inside to attach to VPC</div>
                  </div>
                </div>
                <div
                  className="node-item"
                  style={{ borderColor: 'rgba(139,92,246,0.28)', background: 'rgba(139,92,246,0.08)', marginBottom: 8 }}
                  draggable
                  onDragStart={e => e.dataTransfer.setData('application/vco-node', '__GROUP_BOX__')}
                >
                  <div className="node-icon" style={{ background: 'rgba(139,92,246,0.15)', color: '#8b5cf6' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M4 6h16v12H4z" /><path d="M8 10h8" /><path d="M8 14h8" />
                    </svg>
                  </div>
                  <div className="node-info">
                    <div className="node-name" style={{ color: '#c4b5fd' }}>Visual Group</div>
                    <div className="node-desc">Drop nodes inside to create a visual container</div>
                  </div>
                </div>

                {/* Category accordion */}
                <CategoryList filteredTypes={filteredTypes} isSearching={search.trim().length > 0} />
              </div>
              {/* Sidebar footer: port legend */}
              <div style={{ padding: '12px 12px', borderTop: '1px solid var(--border)' }}>
                <div style={{ fontSize: 9, letterSpacing: '.12em', color: 'var(--text2)', marginBottom: 8, fontWeight: 700, textTransform: 'uppercase' }}>Port Types</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px' }}>
                  {[
                    { label: 'SA', color: '#a78bfa' },
                    { label: 'Net', color: '#34d399' },
                    { label: 'GCS', color: '#fbbf24' },
                    { label: 'Secret', color: '#f472b6' },
                    { label: 'Topic', color: '#60a5fa' },
                    { label: 'DB', color: '#fb923c' },
                  ].map(p => (
                    <span key={p.label} className="port-type-badge" style={{ background: p.color + '22', color: p.color, padding: '2px 8px' }}>
                      {p.label}
                    </span>
                  ))}
                </div>
              </div>
            </div>

            {/* Canvas */}
            <div className="canvas-wrap" ref={reactFlowWrapper} onClick={() => { closeCtxMenu(); setMenuOpen(false); setNsModalOpen(false); }}>
              {/* Topbar */}
              <div className="topbar" onClick={e => e.stopPropagation()}>
                <div className="topbar-menu">
                  <button
                    id="topbar-menu-button"
                    className="topbar-menu-button"
                    onClick={e => {
                      e.stopPropagation();
                      setMenuOpen(open => !open);
                    }}
                    type="button"
                  >
                    ☰ Menu
                  </button>
                  {menuOpen && (
                    <div id="topbar-menu-panel" className="topbar-menu-panel" onClick={e => e.stopPropagation()}>
                      <div className="topbar-menu-item" onClick={() => { fitView(); setMenuOpen(false); }}>
                        <span>Center View</span>
                        <span style={{ color: 'var(--text2)' }}>focus</span>
                      </div>
                      <div className="topbar-menu-item" onClick={() => { handleSave(); setMenuOpen(false); }}>
                        <span>Save Graph</span>
                        <span style={{ color: 'var(--text2)' }}>yaml/json</span>
                      </div>
                      <div className="topbar-menu-item" onClick={() => { handleDeploy(); setMenuOpen(false); }}>
                        <span>Deploy</span>
                        <span style={{ color: 'var(--text2)' }}>run</span>
                      </div>
                      <div className="topbar-menu-item" onClick={() => { handleClear(); setMenuOpen(false); }}>
                        <span>Clear Canvas</span>
                        <span style={{ color: 'var(--text2)' }}>reset</span>
                      </div>
                      <div className="topbar-menu-divider" />
                      <div className="topbar-menu-item" onClick={() => { setInfoModal('guide'); setMenuOpen(false); }}>
                        <span>Guide</span>
                        <span style={{ color: 'var(--text2)' }}>help</span>
                      </div>
                      <div className="topbar-menu-item" onClick={() => { setInfoModal('contact'); setMenuOpen(false); }}>
                        <span>Contact</span>
                        <span style={{ color: 'var(--text2)' }}>about</span>
                      </div>
                      <div className="topbar-menu-divider" />
                      <div className="topbar-menu-item" onClick={() => { setTheme(t => t === 'dark' ? 'light' : 'dark'); setMenuOpen(false); }}>
                        <span>Toggle Theme</span>
                        <span style={{ color: 'var(--text2)' }}>{theme === 'dark' ? 'Light' : 'Dark'}</span>
                      </div>
                    </div>
                  )}
                </div>
                {/* ── Namespace Selector ── */}
                <div onClick={e => e.stopPropagation()} style={{ display: 'flex', alignItems: 'center', gap: 6, position: 'relative' }}>
                  {/* namespace pill */}
                  <button
                    onClick={e => { e.stopPropagation(); setNsModalOpen(v => !v); }}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 6,
                      padding: '4px 10px 4px 8px',
                      borderRadius: 99,
                      border: '1.5px solid var(--accent2)',
                      background: 'rgba(99,102,241,0.12)',
                      color: 'var(--text0)',
                      cursor: 'pointer', fontFamily: 'var(--font-mono)', fontSize: 11,
                      fontWeight: 700, letterSpacing: '.04em',
                      transition: 'all .15s', maxWidth: 200,
                    }}
                    title="Switch namespace"
                  >
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                    </svg>
                    <span style={{ maxWidth: 120, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{namespace}</span>
                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: .7 }}><polyline points="6 9 12 15 18 9" /></svg>
                  </button>
                  {/* Dropdown */}
                  {nsModalOpen && (
                    <div onClick={e => e.stopPropagation()} style={{
                      position: 'absolute', top: 'calc(100% + 6px)', left: 0,
                      minWidth: 220, background: 'var(--bg1)',
                      border: '1px solid var(--border2)', borderRadius: 'var(--r12)',
                      boxShadow: '0 16px 40px rgba(0,0,0,.35)', zIndex: 200,
                      padding: 6, animation: 'fade-in .12s ease',
                    }}>
                      {/* Title */}
                      <div style={{ padding: '4px 8px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <span style={{ fontSize: 9, fontWeight: 700, color: 'var(--text2)', letterSpacing: '.12em', textTransform: 'uppercase' }}>Namespaces</span>
                        <span style={{ fontSize: 9, color: 'var(--text2)' }}>{namespaces.length} total</span>
                      </div>
                      {/* List */}
                      <div style={{ maxHeight: 200, overflowY: 'auto' }}>
                        {namespaces.map(ns => (
                          <div key={ns} style={{
                            display: 'flex', alignItems: 'center', gap: 6,
                            padding: '7px 10px', borderRadius: 8, cursor: 'pointer',
                            background: ns === namespace ? 'rgba(99,102,241,0.15)' : 'transparent',
                            border: `1px solid ${ns === namespace ? 'rgba(99,102,241,0.4)' : 'transparent'}`,
                            marginBottom: 2,
                          }}
                            onMouseEnter={e => { if (ns !== namespace) e.currentTarget.style.background = 'var(--bg3)'; }}
                            onMouseLeave={e => { if (ns !== namespace) e.currentTarget.style.background = 'transparent'; }}
                          >
                            <div style={{ width: 7, height: 7, borderRadius: '50%', background: ns === namespace ? '#818cf8' : 'var(--text2)', flexShrink: 0 }} />
                            <span onClick={() => { switchNamespace(ns); setNsModalOpen(false); }}
                              style={{ flex: 1, fontSize: 12, fontFamily: 'var(--font-mono)', color: ns === namespace ? '#c7d2fe' : 'var(--text1)', fontWeight: ns === namespace ? 700 : 400 }}>
                              {ns}
                            </span>
                            {ns !== 'default' && (
                              <button onClick={() => { deleteNamespace(ns); setNsModalOpen(false); }}
                                style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text2)', fontSize: 12, padding: '0 2px', borderRadius: 3, lineHeight: 1 }}
                                title="Delete namespace"
                                onMouseEnter={e => e.currentTarget.style.color = 'var(--red)'}
                                onMouseLeave={e => e.currentTarget.style.color = 'var(--text2)'}
                              >✕</button>
                            )}
                          </div>
                        ))}
                      </div>
                      {/* Create new */}
                      <div style={{ borderTop: '1px solid var(--border)', marginTop: 4, paddingTop: 8, padding: '8px 6px 4px' }}>
                        <div style={{ display: 'flex', gap: 4 }}>
                          <input
                            value={nsNewName}
                            onChange={e => setNsNewName(e.target.value.replace(/[^a-zA-Z0-9_-]/g, ''))}
                            onKeyDown={e => { if (e.key === 'Enter' && nsNewName.trim()) { createNamespace(nsNewName.trim()); setNsModalOpen(false); } }}
                            placeholder="new-namespace"
                            style={{
                              flex: 1, background: 'var(--bg2)', border: '1px solid var(--border)',
                              borderRadius: 6, padding: '5px 8px', color: 'var(--text0)',
                              fontFamily: 'var(--font-mono)', fontSize: 11, outline: 'none',
                            }}
                          />
                          <button
                            disabled={!nsNewName.trim() || nsLoading}
                            onClick={() => { if (nsNewName.trim()) { createNamespace(nsNewName.trim()); setNsModalOpen(false); } }}
                            style={{
                              background: 'var(--accent2)', color: '#fff', border: 'none',
                              borderRadius: 6, padding: '5px 10px', cursor: 'pointer',
                              fontSize: 11, fontFamily: 'var(--font-mono)', fontWeight: 700,
                              opacity: nsNewName.trim() ? 1 : 0.4,
                            }}
                          >+ New</button>
                        </div>
                        <div style={{ fontSize: 9, color: 'var(--text2)', marginTop: 4, paddingLeft: 2 }}>
                          Letters, digits, - and _ only
                        </div>
                      </div>
                    </div>
                  )}
                </div>
                <div className="topbar-spacer" />

                {/* Edge type selector */}
                <div style={{ display: 'flex', gap: 2, background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 'var(--r8)', padding: 3 }}>
                  {['step', 'bezier', 'straight'].map(t => (
                    <button key={t} onClick={() => setDefaultEdgeType(t)}
                      style={{ padding: '3px 8px', borderRadius: 6, border: 'none', background: defaultEdgeType === t ? 'var(--accent)' : 'transparent', color: defaultEdgeType === t ? '#fff' : 'var(--text1)', fontSize: 10, fontFamily: 'var(--font-mono)', cursor: 'pointer', transition: 'all .12s' }}>
                      {t[0].toUpperCase() + t.slice(1)}
                    </button>
                  ))}
                </div>

                {/* WS status */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <div style={{ width: 6, height: 6, borderRadius: '50%', background: wsConnected ? 'var(--green)' : 'var(--text2)', boxShadow: wsConnected ? '0 0 6px var(--green)' : 'none' }} />
                  <span style={{ fontSize: 10, color: wsConnected ? 'var(--green)' : 'var(--text2)' }}>
                    {wsConnected ? 'live' : 'offline'}
                  </span>
                </div>
                <button className="btn btn-ghost" onClick={() => setInfoModal('contact')} title="מידע ויצירת קשר">
                  {/* info icon */}
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>
                  Info
                </button>
                <button className="btn btn-ghost" onClick={() => setInfoModal('guide')} title="System Guide">
                  {/* book icon */}
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></svg>
                  Guide
                </button>
                <button className="btn btn-ghost" onClick={handleClear}>{ICONS.trash} Clear</button>
                <button className="btn btn-ghost" onClick={handleSave}>{ICONS.save} Save</button>
                <button className="btn btn-deploy" onClick={handleDeploy} disabled={isDeploying}>
                  {ICONS.play} {isDeploying ? 'Deploying...' : 'Deploy'}
                </button>
                <button className="btn btn-ghost" onClick={() => setLogVisible(v => !v)} style={{ marginLeft: 4 }}>
                  {ICONS.terminal} Log
                </button>
                <button
                  className="btn btn-ghost"
                  onClick={() => setTfModalOpen(true)}
                  title="Export Terraform workspace"
                  style={{ borderColor: '#7c3aed', color: '#a78bfa' }}
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" strokeWidth="2"
                    strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                  </svg>
                  Export TF
                </button>

                {/* Theme toggle */}
                <button
                  onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
                  style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '5px 10px', borderRadius: 99, border: '1px solid var(--border2)', background: 'var(--bg2)', color: 'var(--text1)', cursor: 'pointer', fontSize: 11, fontFamily: 'var(--font-mono)', transition: 'all .15s' }}
                  title="Toggle light/dark mode"
                >
                  {theme === 'dark'
                    ? <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg>
                    : <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>
                  }
                  {theme === 'dark' ? 'Light' : 'Dark'}
                </button>
              </div>

              {/* ReactFlow Canvas */}
              <div style={{ position: 'absolute', inset: 0, top: 48, bottom: logVisible ? logPanelH : 36 }}>
                <ReactFlow
                  nodes={nodes}
                  edges={edges}
                  onNodesChange={onNodesChange}
                  onEdgesChange={onEdgesChange}
                  onConnect={onConnect}
                  onNodeClick={onNodeClick}
                  onNodeDoubleClick={onNodeDoubleClick}
                  onPaneClick={(e) => { onPaneClick(e); closeCtxMenu(); setEdgeCtxMenu(null); }}
                  onDrop={onDrop}
                  onDragOver={onDragOver}
                  onNodeContextMenu={onNodeContextMenu}
                  onEdgeContextMenu={(e, edge) => {
                    e.preventDefault();
                    const nodes = nodesRef.current;
                    setEdgeCtxMenu({
                      x: e.clientX, y: e.clientY,
                      edge,
                      sourceNode: nodes.find(n => n.id === edge.source),
                      targetNode: nodes.find(n => n.id === edge.target),
                    });
                  }}
                  nodeTypes={nodeTypes}
                  edgeTypes={edgeTypes}
                  fitView
                  deleteKeyCode={['Backspace', 'Delete']}
                  defaultEdgeOptions={{ type: 'gcpEdge', data: { edgeType: defaultEdgeType, animated: true, label: '' } }}
                >
                  <Background variant="dots" gap={28} size={1} color="var(--border)" />
                  <Controls style={{ bottom: 16, left: 16 }} />
                  <MiniMap
                    nodeColor={n => n.data.accentColor || n.data.schema?.color || '#1e293b'}
                    maskColor={theme === 'light' ? 'rgba(226,232,240,0.7)' : 'rgba(8,11,18,0.7)'}
                    style={{ bottom: 16, right: selectedNode ? 296 : 16 }}
                  />
                </ReactFlow>

                {/* Empty state */}
                {nodes.length === 0 && (
                  <div className="empty-canvas" style={{ pointerEvents: 'none' }}>
                    <div className="empty-title">Drop nodes to start</div>
                    <div className="empty-sub">
                      Drag resources from the sidebar<br />
                      Connect ports to define relationships<br />
                      Single-click to select · Double-click to edit params<br />
                      Hit Deploy to provision on GCP
                    </div>
                  </div>
                )}
              </div>

              {/* Context Menu */}
              {ctxMenu && (
                <div className="ctx-menu" style={{ left: ctxMenu.x, top: ctxMenu.y }} onMouseLeave={closeCtxMenu}>
                  <div style={{ padding: '4px 10px 6px', fontSize: 10, color: 'var(--text2)', fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase' }}>
                    {ctxMenu.nodeData?.label || 'Node'}
                  </div>
                  <div className="ctx-item sep" />
                  <div className="ctx-item" onClick={() => {
                    setNodes(nds => nds.map(n => n.id === ctxMenu.nodeId ? { ...n, data: { ...n.data, collapsed: !n.data.collapsed } } : n));
                    closeCtxMenu();
                  }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 14 10 14 10 20" /><polyline points="20 10 14 10 14 4" /><line x1="10" y1="14" x2="3" y2="21" /><line x1="21" y1="3" x2="14" y2="10" /></svg>
                    Toggle Collapse
                  </div>
                  <div className="ctx-item" onClick={() => {
                    setNodes(nds => { const orig = nds.find(n => n.id === ctxMenu.nodeId); if (!orig) return nds; const newId = `${orig.data.schema?.type || 'node'}-${Date.now()}`; return [...nds, { ...orig, id: newId, position: { x: orig.position.x + 40, y: orig.position.y + 40 }, selected: false }]; });
                    closeCtxMenu();
                  }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></svg>
                    Duplicate
                  </div>
                  <div className="ctx-item" onClick={() => {
                    setNodes(nds => nds.map(n => n.id === ctxMenu.nodeId ? { ...n, data: { ...n.data, status: 'deployed' } } : n));
                    closeCtxMenu();
                  }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
                    Mark Deployed
                  </div>
                  <div className="ctx-item" onClick={() => {
                    setNodes(nds => nds.map(n => n.id === ctxMenu.nodeId ? { ...n, data: { ...n.data, status: 'idle' } } : n));
                    closeCtxMenu();
                  }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /></svg>
                    Reset Status
                  </div>
                  <div className="ctx-item sep" />
                  {/* Inline color picker */}
                  <div style={{ padding: '4px 10px 6px' }}>
                    <div style={{ fontSize: 9, color: 'var(--text2)', marginBottom: 5, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase' }}>Accent Color</div>
                    <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                      {NODE_ACCENT_COLORS.map(c => (
                        <div key={c} onClick={() => { setNodes(nds => nds.map(n => n.id === ctxMenu.nodeId ? { ...n, data: { ...n.data, accentColor: c } } : n)); closeCtxMenu(); }}
                          style={{ width: 16, height: 16, borderRadius: '50%', background: c, cursor: 'pointer', border: '2px solid transparent', transition: 'transform .1s' }}
                          onMouseEnter={e => e.target.style.transform = 'scale(1.3)'} onMouseLeave={e => e.target.style.transform = 'scale(1)'}
                        />
                      ))}
                    </div>
                  </div>
                  <div className="ctx-item sep" />
                  <div className="ctx-item danger" onClick={() => {
                    const deletedId = ctxMenu.nodeId;
                    deleteElements({ nodes: [{ id: deletedId }] });
                    closeCtxMenu();
                    // Auto-save so deletion persists on reload
                    setTimeout(async () => {
                      const currentNodes = nodesRef.current.filter(n => n.id !== deletedId);
                      const currentEdges = edgesRef.current.filter(e => e.source !== deletedId && e.target !== deletedId);
                      try {
                        await fetch('http://localhost:8000/api/graph', {
                          method: 'POST', headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify({
                            namespace: namespaceRef.current,
                            nodes: currentNodes.map(n => ({ id: n.id, type: n.data.schema?.type, label: n.data.label, props: n.data.props || {}, position: n.position, status: n.data.status || 'idle' })),
                            edges: currentEdges.map(e => ({ id: e.id, source: e.source, sourceHandle: e.sourceHandle, target: e.target, targetHandle: e.targetHandle, color: e.data?.color || null })),
                          }),
                        });
                      } catch { /* silent */ }
                    }, 100);
                  }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></svg>
                    Delete Node
                  </div>
                </div>
              )}

              {/* Edge Context Menu */}
              {edgeCtxMenu && (
                <div className="ctx-menu" style={{ left: edgeCtxMenu.x, top: edgeCtxMenu.y }} onMouseLeave={() => setEdgeCtxMenu(null)}>
                  {/* Header */}
                  <div style={{ padding: '4px 10px 6px', fontSize: 10, color: 'var(--text2)', fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 8, height: 8, borderRadius: '50%', background: edgeCtxMenu.edge.data?.color || '#60a5fa', flexShrink: 0 }} />
                    {edgeCtxMenu.sourceNode?.data.label || edgeCtxMenu.edge.source}
                    <span style={{ color: 'var(--text2)', fontSize: 8 }}>→</span>
                    {edgeCtxMenu.targetNode?.data.label || edgeCtxMenu.edge.target}
                  </div>
                  <div className="ctx-item sep" />

                  {/* Port info */}
                  {edgeCtxMenu.edge.sourceHandle && (
                    <div style={{ padding: '2px 10px 6px', fontSize: 9, color: 'var(--text2)', fontFamily: 'var(--font-mono)' }}>
                      {edgeCtxMenu.edge.sourceHandle} → {edgeCtxMenu.edge.targetHandle}
                    </div>
                  )}

                  {/* Style options */}
                  {['bezier', 'step', 'straight'].map(t => (
                    <div key={t} className="ctx-item" onClick={() => {
                      setEdges(eds => eds.map(e => e.id === edgeCtxMenu.edge.id ? { ...e, data: { ...e.data, edgeType: t } } : e));
                      setEdgeCtxMenu(null);
                    }}>
                      <span style={{ width: 14, textAlign: 'center', opacity: edgeCtxMenu.edge.data?.edgeType === t ? 1 : 0.3 }}>
                        {edgeCtxMenu.edge.data?.edgeType === t ? '●' : '○'}
                      </span>
                      <span>Style: {t}</span>
                    </div>
                  ))}
                  <div className="ctx-item" onClick={() => {
                    setEdges(eds => eds.map(e => e.id === edgeCtxMenu.edge.id ? { ...e, data: { ...e.data, animated: !e.data?.animated } } : e));
                    setEdgeCtxMenu(null);
                  }}>
                    <span style={{ width: 14, textAlign: 'center' }}>~</span>
                    <span>Toggle Animation</span>
                  </div>
                  <div className="ctx-item sep" />

                  {/* Disconnect */}
                  <div className="ctx-item danger" onClick={() => {
                    const { edge, sourceNode, targetNode } = edgeCtxMenu;
                    handleDisconnectEdge({
                      source: edge.source, target: edge.target,
                      sourceHandle: edge.sourceHandle, targetHandle: edge.targetHandle,
                      sourceNode, targetNode,
                    });
                    deleteElements({ edges: [{ id: edge.id }] });
                    setEdgeCtxMenu(null);
                  }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                    Disconnect Edge
                  </div>
                </div>
              )}

              {/* Log */}
              <LogPanel logs={logs} visible={logVisible} onToggle={() => setLogVisible(v => !v)} onClear={() => {
                setLogs([]);
                fetch(`http://localhost:8000/api/deploy-logs/history?namespace=${encodeURIComponent(namespaceRef.current)}`, { method: 'DELETE' }).catch(() => { });
              }} panelH={logPanelH} onResize={setLogPanelH} nodeEvents={nodeEvents} />
              {nodeLogsModal && (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)', zIndex: 3000, display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(4px)' }}
                  onClick={() => { nodeLogsEsRef.current?.close(); nodeLogsEsRef.current = null; setNodeLogsModal(null); }}>
                  <div onClick={e => e.stopPropagation()} style={{
                    background: 'var(--bg1)', border: '1px solid var(--border2)',
                    borderRadius: 'var(--r16)', width: 680, height: 480,
                    display: 'flex', flexDirection: 'column',
                    boxShadow: '0 32px 96px rgba(0,0,0,.8)',
                    animation: 'fade-in .15s ease',
                  }}>
                    {/* Modal header */}
                    <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10, background: 'var(--bg2)', borderRadius: 'var(--r16) var(--r16) 0 0' }}>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', background: nodeLogsModal.connecting ? 'var(--yellow)' : 'var(--green)', boxShadow: `0 0 8px ${nodeLogsModal.connecting ? 'var(--yellow)' : 'var(--green)'}`, animation: nodeLogsModal.connecting ? 'pulse-dot .8s infinite' : 'none', flexShrink: 0 }} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, color: 'var(--text0)' }}>
                          {nodeLogsModal.label}
                        </div>
                        <div style={{ fontSize: 9, color: 'var(--text2)', fontFamily: 'var(--font-mono)', marginTop: 1 }}>
                          {nodeLogsModal.connecting ? 'Connecting to log stream...' : `Live stream · node ${nodeLogsModal.nodeId?.slice(0, 16)}...`}
                        </div>
                      </div>
                      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                        <span style={{ fontSize: 10, color: 'var(--text2)', background: 'var(--bg3)', borderRadius: 99, padding: '2px 8px', fontFamily: 'var(--font-mono)' }}>
                          {(nodeLogsModal.lines || []).length} lines
                        </span>
                        <button
                          onClick={() => { const text = (nodeLogsModal.lines || []).map(l => l.text || l).join('\n'); navigator.clipboard?.writeText(text); }}
                          style={{ background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 'var(--r8)', color: 'var(--text1)', cursor: 'pointer', padding: '4px 10px', fontSize: 10, fontFamily: 'var(--font-mono)' }}
                          title="Copy all logs"
                        >
                          Copy
                        </button>
                        <button onClick={() => { nodeLogsEsRef.current?.close(); nodeLogsEsRef.current = null; setNodeLogsModal(null); }}
                          style={{ background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 'var(--r8)', color: 'var(--text2)', cursor: 'pointer', padding: '4px 8px', fontSize: 13, lineHeight: 1 }}>
                          ✕
                        </button>
                      </div>
                    </div>
                    {/* Log body */}
                    <div style={{
                      flex: 1, overflowY: 'auto', fontFamily: 'var(--font-mono)', fontSize: 11, lineHeight: 1.7, padding: '8px 0',
                      scrollbarWidth: 'thin', scrollbarColor: 'var(--border2) transparent'
                    }}
                      ref={el => { if (el) el.scrollTop = el.scrollHeight; }}
                    >
                      {(nodeLogsModal.lines || []).length === 0 ? (
                        <div style={{ padding: '24px 18px', color: 'var(--text2)', textAlign: 'center' }}>
                          <div style={{ fontSize: 24, marginBottom: 8 }}>📡</div>
                          <div>{nodeLogsModal.connecting ? 'Waiting for log stream...' : 'No logs received yet'}</div>
                        </div>
                      ) : (nodeLogsModal.lines || []).map((l, i) => {
                        const line = typeof l === 'string' ? { text: l, level: 'info', ts: '' } : l;
                        const lvlColors = { error: 'var(--red)', warn: 'var(--yellow)', ok: 'var(--green)', info: 'var(--text1)' };
                        const lvlBg = { error: 'rgba(239,68,68,0.08)', warn: 'rgba(245,158,11,0.06)', ok: 'rgba(16,185,129,0.06)', info: 'transparent' };
                        const c = lvlColors[line.level] || 'var(--text1)';
                        const bg = lvlBg[line.level] || 'transparent';
                        return (
                          <div key={i} style={{ display: 'flex', gap: 10, padding: '2px 16px', background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.012)', borderLeft: `2px solid ${i % 2 === 0 ? 'transparent' : bg}` }}>
                            {line.ts && <span style={{ color: 'var(--text2)', fontSize: 9.5, flexShrink: 0, minWidth: 60, paddingTop: 1 }}>{line.ts}</span>}
                            <span style={{ fontSize: 9, fontWeight: 700, color: c, background: bg, borderRadius: 3, padding: '1px 5px', flexShrink: 0, minWidth: 36, textAlign: 'center', alignSelf: 'flex-start', marginTop: 1 }}>
                              {line.level?.toUpperCase().slice(0, 4) || 'INFO'}
                            </span>
                            <span style={{ color: line.level === 'error' ? 'var(--red)' : line.level === 'warn' ? 'var(--yellow)' : line.level === 'ok' ? 'var(--green)' : 'var(--text1)', flex: 1, wordBreak: 'break-all' }}>
                              {line.text}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                    {/* Footer */}
                    <div style={{ padding: '8px 16px', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 8, background: 'var(--bg2)', borderRadius: '0 0 var(--r16) var(--r16)' }}>
                      <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--green)', animation: 'pulse-dot 1.5s ease-in-out infinite' }} />
                      <span style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--font-mono)' }}>Live streaming · updates every 2s</span>
                      <div style={{ flex: 1 }} />
                      <button onClick={() => setNodeLogsModal(m => m ? { ...m, lines: [] } : m)}
                        style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 'var(--r8)', color: 'var(--text2)', cursor: 'pointer', padding: '3px 10px', fontSize: 10, fontFamily: 'var(--font-mono)' }}>
                        Clear
                      </button>
                    </div>
                  </div>
                </div>
              )}
              {/* Toasts */}
              <ToastContainer toasts={toasts} />
            </div>

            {/* Right property panel */}
            <div className={`panel-right ${selectedNode ? '' : 'collapsed'}`}>
              {selectedNode && (
                <PropertyPanel
                  node={selectedNode}
                  onClose={() => setSelectedNode(null)}
                  onChange={handlePropChange}
                  nodeEvent={nodeEvents[selectedNode?.id] || null}
                />
              )}
            </div>

            {tfModalOpen && (
              <TerraformExportModal
                nodes={nodes.map(n => ({
                  id: n.id,
                  type: n.data.schema?.type,
                  label: n.data.label,
                  props: n.data.props || {},
                }))}
                edges={edges.map(e => ({
                  id: e.id,
                  source: e.source,
                  sourceHandle: e.sourceHandle,
                  target: e.target,
                  targetHandle: e.targetHandle,
                }))}
                namespace={namespace}
                project={namespace}
                region="me-west1"
                onClose={() => setTfModalOpen(false)}
              />
            )}

            <InfoModal type={infoModal} onClose={() => setInfoModal(null)} />
            {editModalNode && (
              <NodeEditModal
                node={editModalNode}
                onClose={() => setEditModalNode(null)}
                onChange={handlePropChange}
                nodeEvent={nodeEvents[editModalNode?.id] || null}
              />
            )}
          </div>
        </VCOContext.Provider>
      );
    }

    function App() {
      return (
        <ReactFlowProvider>
          <VCOApp />
        </ReactFlowProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
