                </>
              )}

              {/* Accent color picker — full width */}
              <div className="modal-field-group modal-full">
                <label className="modal-field-label">Accent Color</label>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {NODE_ACCENT_COLORS.map(c => (
                    <div key={c} onClick={() => onChange(node.id, 'accentColor', c)}
                      style={{
                        width: 26, height: 26, borderRadius: '50%', background: c, cursor: 'pointer',
                        border: `3px solid ${nodeColor === c ? 'var(--text0)' : 'transparent'}`,
                        transition: 'transform .1s, border-color .1s',
                        boxShadow: nodeColor === c ? `0 0 12px ${c}88` : 'none',
                      }}
                      onMouseEnter={e => e.target.style.transform = 'scale(1.25)'}
                      onMouseLeave={e => e.target.style.transform = 'scale(1)'}
                    />
                  ))}
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="node-edit-modal-footer">
              <span style={{ flex: 1, fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--font-mono)' }}>
                Changes apply immediately
              </span>
              <button onClick={onClose} className="btn btn-primary" style={{ padding: '8px 20px', fontSize: 12 }}>
                Done
              </button>
            </div>
          </div>
        </div>
      );
    };


    const VPCGroupNode = ({ data, selected, id }) => {
      const [dragOver, setDragOver] = React.useState(false);
      const { getNodes, setNodes } = useReactFlow();

      const children = (data.children || []);

      // Auto-resize based on children
      React.useEffect(() => {
        if (children.length === 0) return;

        const nodes = getNodes();
        const childNodes = nodes.filter(n => children.some(c => c.id === n.id));

        if (childNodes.length === 0) return;

        // Calculate bounding box of children
        const minX = Math.min(...childNodes.map(n => n.position.x));
        const maxX = Math.max(...childNodes.map(n => n.position.x + (n.width || 200)));
        const minY = Math.min(...childNodes.map(n => n.position.y));
        const maxY = Math.max(...childNodes.map(n => n.position.y + (n.height || 100)));

        const padding = 40;
        const newWidth = Math.max(300, maxX - minX + padding * 2);
        const newHeight = Math.max(200, maxY - minY + padding * 2 + 60); // +60 for header

        // Only update if significantly different to avoid loops
        const currentWidth = data.width || 300;
        const currentHeight = data.height || 200;

        if (Math.abs(newWidth - currentWidth) > 20 || Math.abs(newHeight - currentHeight) > 20) {
          setNodes(nds => nds.map(n =>
            n.id === id ? { ...n, data: { ...n.data, width: newWidth, height: newHeight } } : n
          ));
        }
      }, [children, getNodes, setNodes, id, data.width, data.height]);

      const handleDragOver = (e) => {
        e.preventDefault();
        e.stopPropagation();
        // Only accept gcpNode drops
        if (e.dataTransfer.types.includes('application/vco-node') ||
          e.dataTransfer.types.includes('application/reactflow')) {
          setDragOver(true);
        }
      };

      const handleDragLeave = (e) => {
        e.stopPropagation();
        setDragOver(false);
      };

      const handleDrop = (e) => {
        e.stopPropagation();
        setDragOver(false);
        // When a node is dragged from sidebar into the VPC group, 
        // the main onDrop will fire — we just need to register it as a child
        // This is handled by the parent via onDropIntoVPC
        if (data.onDropIntoVPC) {
          data.onDropIntoVPC(id, e);
        }
      };

      const isVisual = data.groupType === 'visual';
      return (
        <div
          className={`vpc-group-node${selected ? ' selected' : ''}${dragOver ? ' drag-over' : ''}`}
          onDragOver={handleDragOver}
          onDragLeave={handleDragLeave}
          onDrop={handleDrop}
          style={{ width: data.width || 300, height: data.height || 200 }}
        >
          <NodeResizer
            color={isVisual ? "#8b5cf6" : "#10b981"}
            isVisible={selected}
            minWidth={200}
            minHeight={150}
            onResizeEnd={(event, params) => {
              const { width, height } = params;
              setNodes(nds => nds.map(n =>
                n.id === id ? { ...n, data: { ...n.data, width, height } } : n
              ));
            }}
          />
          {!isVisual && (
            <>
              <Handle type="target" position={Position.Left} id="network_in"
                style={{ background: '#10b981', border: '2px solid #0d1117', top: 28 }} />
              <Handle type="source" position={Position.Right} id="subnet"
                style={{ background: '#34d399', border: '2px solid #0d1117', top: 28 }} />
            </>
          )}

          <div className="vpc-group-header" style={{ cursor: 'default' }}>
            <div className="vpc-group-icon" style={{ background: isVisual ? 'rgba(139,92,246,0.15)' : 'rgba(16,185,129,0.15)', color: isVisual ? '#8b5cf6' : '#10b981' }}>
              {isVisual ? (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M4 6h16v12H4z" /><path d="M8 10h8" /><path d="M8 14h8" />
                </svg>
              ) : (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="2" y="2" width="6" height="6" /><rect x="16" y="2" width="6" height="6" />
                  <rect x="9" y="16" width="6" height="6" />
                  <path d="M5 8v4c0 1 1 2 2 2h10c1 0 2-1 2-2V8" /><line x1="12" y1="14" x2="12" y2="16" />
                </svg>
              )}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="vpc-group-title">{data.label || (isVisual ? 'Visual Group' : 'VPC Network')}</div>
              <div className="vpc-group-subtitle">{isVisual ? 'visual container' : 'vpc group'}</div>
            </div>
            {!isVisual && data.props?.subnet_cidr && (
              <div className="vpc-group-cidr">{data.props.subnet_cidr}</div>
            )}
          </div>

          <div className="vpc-group-body" style={{ minHeight: Math.max(140, children.length * 40 + 60), height: (data.height || 200) - 60 }}>
            {children.length === 0 ? (
              <div className="vpc-group-empty">
                Drop Cloud Run, VM,<br />or SQL nodes here<br />to attach to this VPC
              </div>
            ) : (
              children.map(c => (
                <div key={c.id} className="vpc-child-badge">
                  <div className="vpc-child-badge-dot" />
                  <span style={{ flex: 1 }}>{c.label}</span>
                  <span style={{ fontSize: 9, color: '#6ee7b7', letterSpacing: '.05em' }}>{c.type?.replace('Node', '')}</span>
                </div>
              ))
            )}
          </div>
        </div>
      );
    };


    const PropertyPanel = ({ node, onClose, onChange, nodeEvent }) => {
      if (!node) return null;

      // VPC Group / Visual Group panel
      if (node.type === 'vpcGroup' || node.type === 'groupBox') {
        const props = node.data.props || {};
        const children = node.data.children || [];
        const isVisualGroup = node.type === 'groupBox';
        return (
          <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
            <div className="panel-header">
              <div>
                <div className="panel-title" style={{ color: isVisualGroup ? '#c4b5fd' : '#a7f3d0' }}>{node.data.label || (isVisualGroup ? 'Visual Group' : 'VPC Group')}</div>
                <div style={{ fontSize: 10, color: 'var(--text2)', marginTop: 2, fontFamily: 'var(--font-mono)' }}>
                  {isVisualGroup ? 'Visual Group' : 'VPC Group'} · {node.id.slice(0, 8)}
                </div>
              </div>
              <button className="panel-close" onClick={onClose}>{ICONS.close}</button>
            </div>
            <div className="panel-body">
              <div className="field-group">
                <label className="field-label">Label</label>
                <input className="field-input" value={node.data.label || ''} onChange={e => onChange(node.id, 'label', e.target.value)} placeholder={isVisualGroup ? 'Visual Group' : 'VPC Network'} />
              </div>
              {isVisualGroup ? (
                <div className="field-group">
                  <label className="field-label">Description</label>
                  <input className="field-input" value={node.data.description || ''} onChange={e => onChange(node.id, 'description', e.target.value)} placeholder="e.g. Private Zone" />
                </div>
              ) : (
                <>
                  <div className="section-title">Network Config</div>
                  <div className="field-group">
                    <label className="field-label">Subnet CIDR</label>
                    <input className="field-input" value={props.subnet_cidr || ''} onChange={e => onChange(node.id, 'subnet_cidr', e.target.value, true)} placeholder="10.0.0.0/24" />
                  </div>
                  <div className="field-group">
                    <label className="field-label">Region</label>
                    <select className="field-select" value={props.region || ''} onChange={e => onChange(node.id, 'region', e.target.value, true)}>
                      <option value="">— select —</option>
                      {['us-central1', 'us-east1', 'europe-west1', 'asia-east1'].map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  </div>
                </>
              )}
              <div className="section-title">Contained Nodes ({children.length})</div>
              {children.length === 0 ? (
                <div style={{ fontSize: 11, color: 'var(--text2)', padding: '12px 0', lineHeight: 1.6 }}>
                  No nodes inside yet.<br />Drag nodes into the box on the canvas.
                </div>
              ) : children.map(c => (
                <div key={c.id} className="vpc-child-badge" style={{ marginBottom: 6 }}>
                  <div className="vpc-child-badge-dot" />
                  <span style={{ flex: 1, fontSize: 11 }}>{c.label}</span>
                  <span style={{ fontSize: 9, color: '#6ee7b7' }}>{c.type?.replace('Node', '')}</span>
                </div>
              ))}
            </div>
          </div>
        );
      }

      const schema = node.data.schema;
      const props = node.data.props || {};

      const fields = {
        CloudRunNode: [
          { key: 'image', label: 'Container Image', type: 'text', placeholder: 'gcr.io/project/image:tag' },
          { key: 'memory', label: 'Memory', type: 'select', options: ['256Mi', '512Mi', '1Gi', '2Gi', '4Gi', '8Gi'] },
          { key: 'cpu', label: 'CPU', type: 'select', options: ['1', '2', '4', '8'] },
          { key: 'min_instances', label: 'Min Instances', type: 'number' },
          { key: 'max_instances', label: 'Max Instances', type: 'number' },
          { key: 'port', label: 'Container Port', type: 'number' },
        ],
        CloudSQLNode: [
          { key: 'database_version', label: 'Engine', type: 'select', options: ['POSTGRES_15', 'POSTGRES_14', 'MYSQL_8_0', 'SQLSERVER_2019_STANDARD'] },
          { key: 'tier', label: 'Machine Tier', type: 'select', options: ['db-f1-micro', 'db-g1-small', 'db-n1-standard-1', 'db-n1-standard-2', 'db-n1-standard-4'] },
          { key: 'region', label: 'Region', type: 'select', options: ['us-central1', 'us-east1', 'europe-west1', 'asia-east1'] },
          { key: 'disk_size_gb', label: 'Disk (GB)', type: 'number' },
          { key: 'ha', label: 'High Availability', type: 'checkbox' },
        ],
        PubSubNode: [
          { key: 'ack_deadline_seconds', label: 'Ack Deadline (sec)', type: 'number' },
          { key: 'message_retention_duration', label: 'Retention', type: 'text', placeholder: '604800s' },
        ],
        GCSBucketNode: [
          { key: 'location', label: 'Location', type: 'select', options: ['US', 'EU', 'ASIA', 'us-central1', 'europe-west1'] },
          { key: 'storage_class', label: 'Storage Class', type: 'select', options: ['STANDARD', 'NEARLINE', 'COLDLINE', 'ARCHIVE'] },
          { key: 'versioning', label: 'Versioning', type: 'checkbox' },
          { key: 'public_access', label: 'Public Access', type: 'checkbox' },
        ],
        ServiceAccountNode: [
          { key: 'description_sa', label: 'Description', type: 'text', placeholder: 'Service account for...' },
        ],
        VPCNode: [
          { key: 'subnet_cidr', label: 'Subnet CIDR', type: 'text', placeholder: '10.0.0.0/24' },
          { key: 'region', label: 'Region', type: 'select', options: ['us-central1', 'us-east1', 'europe-west1', 'asia-east1'] },
          { key: 'private_google_access', label: 'Private Google Access', type: 'checkbox' },
        ],
        SecretManagerNode: [
          { key: 'replication', label: 'Replication', type: 'select', options: ['automatic', 'user-managed'] },
          { key: 'rotation_days', label: 'Rotation (days, 0=off)', type: 'number' },
        ],
        SubscriptionNode: [
          { key: 'ack_deadline_seconds', label: 'Ack Deadline (sec)', type: 'number' },
          { key: 'retain_acked_messages', label: 'Retain Acked Messages', type: 'checkbox' },
          { key: 'filter_expr', label: 'Filter Expression', type: 'text', placeholder: 'attributes.env="prod"' },
          { key: 'push_endpoint', label: 'Push Endpoint (empty = pull)', type: 'text', placeholder: 'https://...' },
        ],
        CloudFunctionNode: [
          { key: 'runtime', label: 'Runtime', type: 'select', options: ['python311', 'python310', 'nodejs20', 'nodejs18', 'go121', 'java21'] },
          { key: 'entry_point', label: 'Entry Point', type: 'text', placeholder: 'main' },
          { key: 'memory', label: 'Memory', type: 'select', options: ['128Mi', '256Mi', '512Mi', '1Gi', '2Gi', '4Gi'] },
          { key: 'timeout', label: 'Timeout (sec)', type: 'number' },
          { key: 'trigger', label: 'Trigger', type: 'select', options: ['http', 'pubsub', 'storage'] },
        ],
        BigQueryNode: [
          { key: 'location', label: 'Location', type: 'select', options: ['US', 'EU', 'asia-northeast1', 'europe-west1'] },
          { key: 'dataset_id', label: 'Dataset ID', type: 'text', placeholder: 'my_dataset' },
          { key: 'partition_by', label: 'Partition Field', type: 'text', placeholder: '_PARTITIONTIME' },
          { key: 'expiration_ms', label: 'Table Expiration (ms, 0=never)', type: 'number' },
        ],
        FirestoreNode: [
          { key: 'mode', label: 'Mode', type: 'select', options: ['NATIVE', 'DATASTORE_COMPAT'] },
          { key: 'location', label: 'Location', type: 'select', options: ['us-central', 'us-east1', 'europe-west1', 'asia-east1'] },
          { key: 'ttl_field', label: 'TTL Field', type: 'text', placeholder: 'expireAt' },
        ],
        MemorystoreNode: [
          { key: 'tier', label: 'Tier', type: 'select', options: ['BASIC', 'STANDARD_HA'] },
          { key: 'memory_size_gb', label: 'Memory (GB)', type: 'number' },
          { key: 'redis_version', label: 'Redis Version', type: 'select', options: ['REDIS_7_0', 'REDIS_6_X', 'REDIS_5_0'] },
          { key: 'region', label: 'Region', type: 'select', options: ['us-central1', 'us-east1', 'europe-west1', 'asia-east1'] },
        ],
        LoadBalancerNode: [
          { key: 'lb_type', label: 'Type', type: 'select', options: ['EXTERNAL', 'INTERNAL'] },
          { key: 'protocol', label: 'Protocol', type: 'select', options: ['HTTP', 'HTTPS', 'TCP', 'UDP'] },
          { key: 'ssl_cert', label: 'SSL Certificate', type: 'text', placeholder: 'projects/.../sslCertificates/...' },
          { key: 'cdn_enabled', label: 'Cloud CDN', type: 'checkbox' },
        ],
      };

      const nodeFields = schema?.params_schema || fields[schema?.type] || [];

      // ── Edges for auto_from_port ──────────────────────────────────────────────
      const allEdges = useEdges();

      const getCascadeOptions = (f) => {
        if (!f.cascade_parent || !f.catalog) return f.options || [];
        return f.catalog[props[f.cascade_parent] || ''] || f.options || [];
      };

      const getPortLockedValue = (f) => {
        if (!f.auto_from_port) return null;
        const incomingEdge = allEdges.find(
          e => e.target === node.id && e.targetHandle === 'source'
        );
        return incomingEdge?.data?.detectedProvider || null;
      };

      const renderPanelField = (f) => {
        if (f.show_if) {
          const conditionMet = Object.entries(f.show_if).every(([k, v]) => (props[k] || '') === v);
          if (!conditionMet) return null;
        }

        const isCodeField = f.type === 'yaml' || f.type === 'code' || f.type === 'json';
        const codeLang = f.type === 'yaml' ? 'yaml' : f.type === 'json' ? 'json' : (f.language || 'yaml');
        const portLockedValue = getPortLockedValue(f);
        const isPortLocked = portLockedValue !== null;
        const selectOptions = f.cascade_parent ? getCascadeOptions(f) : (f.options || []);

        return (
          <div key={f.key} className="field-group">
            <label className="field-label" style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
              {f.label}
              {isPortLocked && (
                <span style={{ fontSize: 9, fontWeight: 700, padding: '1px 5px', borderRadius: 99, background: 'rgba(16,185,129,0.15)', color: '#34d399', border: '1px solid rgba(16,185,129,0.25)' }}>port</span>
              )}
            </label>
            {isCodeField ? (
              <YamlFieldTrigger label={f.label} fieldKey={f.key} language={codeLang}
                value={props[f.key] ?? (f.default || '')}
                onChange={(val) => onChange(node.id, f.key, val, true)} />
            ) : f.type === 'checkbox' ? (
              <label className="field-checkbox">
                <input type="checkbox" checked={props[f.key] ?? false}
                  onChange={e => onChange(node.id, f.key, e.target.checked, true)} />
                <span style={{ fontSize: 12, color: 'var(--text1)' }}>Enabled</span>
              </label>
            ) : f.type === 'select' ? (
              <select className="field-select"
                value={isPortLocked ? portLockedValue : (props[f.key] || (selectOptions[0] || ''))}
                disabled={isPortLocked}
                style={isPortLocked ? { opacity: 0.6, cursor: 'not-allowed' } : {}}
                onChange={e => {
                  const newVal = e.target.value;
                  onChange(node.id, f.key, newVal, true);
                  if (f.cascade_target && f.catalog) {
                    const childOptions = f.catalog[newVal] || [];
                    if (childOptions.length > 0) onChange(node.id, f.cascade_target, childOptions[0], true);
                  }
                }}
              >
                {!isPortLocked && <option value="">— select —</option>}
                {selectOptions.map(o => <option key={o} value={o}>{o}</option>)}
              </select>
            ) : (
              <input className="field-input" type={f.type}
                value={props[f.key] ?? ''}
                placeholder={f.placeholder || ''}
                onChange={e => onChange(node.id, f.key, f.type === 'number' ? +e.target.value : e.target.value, true)} />
            )}
          </div>
        );
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
          <div className="panel-header">
            <div>
              <div className="panel-title">{node.data.label || schema?.label}</div>
              <div style={{ fontSize: 10, color: 'var(--text2)', marginTop: 2, fontFamily: 'var(--font-mono)' }}>
                {schema?.type?.replace('Node', '')} · {node.id.slice(0, 8)}
              </div>
            </div>
            <button className="panel-close" onClick={onClose}>{ICONS.close}</button>
          </div>
          <div className="panel-body">
            {/* Last deploy event */}
            {nodeEvent && (
              <>
                <div className="section-title" style={{ marginTop: 0 }}>Last Deploy</div>
                <NodeEventCard event={nodeEvent} />
              </>
            )}

            <div className="field-group">
              <label className="field-label">Label</label>
              <input
                className="field-input"
                value={node.data.label || ''}
                onChange={e => onChange(node.id, 'label', e.target.value)}
                placeholder={schema?.label}
              />
            </div>

            <div className="section-title">Configuration</div>

            {nodeFields.map(f => renderPanelField(f))}

            <div className="section-title">Ports</div>
            {schema?.inputs?.length > 0 && (
              <>
                <div style={{ fontSize: 10, color: 'var(--text2)', marginBottom: 6 }}>INPUTS</div>
                {schema.inputs.map(p => (
                  <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                    <div style={{ width: 8, height: 8, borderRadius: '50%', background: p.color, flexShrink: 0 }} />
                    <span style={{ fontSize: 11, color: 'var(--text1)', flex: 1 }}>{p.name.replace(/_/g, ' ')}</span>
                    <span className="port-type-badge" style={{ background: p.color + '22', color: p.color }}>{p.label}</span>
                    {p.required && <span style={{ fontSize: 9, color: 'var(--red)' }}>req</span>}
                    {p.multi_in
                      ? <span title="Accepts multiple connections" style={{ fontSize: 9, color: '#34d399', background: '#34d39920', borderRadius: 99, padding: '1px 5px' }}>multi-in</span>
                      : <span title="Single connection only" style={{ fontSize: 9, color: 'var(--text2)', background: 'var(--bg3)', borderRadius: 99, padding: '1px 5px' }}>×1</span>}
                  </div>
                ))}
              </>
            )}
            {schema?.outputs?.length > 0 && (
              <>
                <div style={{ fontSize: 10, color: 'var(--text2)', margin: '10px 0 6px' }}>OUTPUTS</div>
                {schema.outputs.map(p => (
                  <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                    <div style={{ width: 8, height: 8, borderRadius: '50%', background: p.color, flexShrink: 0 }} />
                    <span style={{ fontSize: 11, color: 'var(--text1)', flex: 1 }}>{p.name.replace(/_/g, ' ')}</span>
                    <span className="port-type-badge" style={{ background: p.color + '22', color: p.color }}>{p.label}</span>
                    {p.multi && <span style={{ fontSize: 9, color: 'var(--text2)' }}>multi</span>}
                  </div>
                ))}
              </>
            )}
          </div>
        </div>
      );
    };

    // ── Log Panel ─────────────────────────────────────────────────────────────────
    // ── Smart log message renderer — handles JSON, long lines, errors ─────────────
    const LogMessage = ({ msg, level }) => {
      const [expanded, setExpanded] = React.useState(false);

      // Try to detect and pretty-print embedded JSON blocks
      const renderMsg = (text) => {
        if (!text) return null;

        // ── Split on JSON blocks ──
        // Matches { ... } or [ ... ] spanning multiple lines
        const parts = [];
        let lastIdx = 0;
        const jsonRe = /(\{[\s\S]*?\}|\[[\s\S]*?\])/g;
        let m;
        const candidates = [];
        while ((m = jsonRe.exec(text)) !== null) {
          try {
            const parsed = JSON.parse(m[0]);
            if (typeof parsed === 'object' && parsed !== null) {
              candidates.push({ start: m.index, end: m.index + m[0].length, parsed, raw: m[0] });
            }
          } catch { }
        }

        if (candidates.length === 0) {
          // No JSON — just render as text, handle very long lines
          return <PlainMsg text={text} level={level} />;
        }

        // Render mixed text + JSON blocks
        const out = [];
        let cursor = 0;
        candidates.forEach((c, ci) => {
          if (cursor < c.start) {
            const pre = text.slice(cursor, c.start).trim();
            if (pre) out.push(<PlainMsg key={`pre-${ci}`} text={pre} level={level} />);
          }
          out.push(<JsonBlock key={`json-${ci}`} data={c.parsed} />);
          cursor = c.end;
        });
        if (cursor < text.length) {
          const rest = text.slice(cursor).trim();
          if (rest) out.push(<PlainMsg key="rest" text={rest} level={level} />);
        }
        return <>{out}</>;
      };

      return <div style={{ flex: 1, minWidth: 0 }}>{renderMsg(msg)}</div>;
    };

    const PlainMsg = ({ text, level }) => {
      const [expanded, setExpanded] = React.useState(false);
      const TRUNCATE = 200;
      const isLong = text.length > TRUNCATE;
      const shown = isLong && !expanded ? text.slice(0, TRUNCATE) + '…' : text;

      // colour keywords
      const highlight = (s) => {
        // Bold the leading status token like "[1/3] ▶ CloudRun (CloudRunNode)"
        const m = s.match(/^(\[\d+\/\d+\]\s*[▶✓✗⚠]\s*\S.*?\))/);
        if (m) {
          return <><strong style={{ color: 'var(--text0)' }}>{m[1]}</strong>{s.slice(m[1].length)}</>;
        }
        return s;
      };

      return (
        <span style={{ wordBreak: 'break-word', whiteSpace: 'pre-wrap', fontSize: 11 }}>
          {highlight(shown)}
          {isLong && (
            <button onClick={() => setExpanded(v => !v)} style={{
              marginLeft: 6, fontSize: 9, color: 'var(--accent)', background: 'none',
              border: 'none', cursor: 'pointer', padding: '0 4px', borderRadius: 3,
              background: 'rgba(59,130,246,0.1)', fontFamily: 'var(--font-mono)',
            }}>
              {expanded ? 'less' : `+${text.length - TRUNCATE} more`}
            </button>
          )}
        </span>
      );
    };

    const JsonBlock = ({ data }) => {
      const [open, setOpen] = React.useState(false);
      // One-line preview
      const preview = JSON.stringify(data);
      const shortPreview = preview.length > 60 ? preview.slice(0, 60) + '…' : preview;
      return (
        <div style={{ margin: '3px 0', borderRadius: 6, overflow: 'hidden', border: '1px solid rgba(59,130,246,0.2)' }}>
          <div
            onClick={() => setOpen(v => !v)}
            style={{
              display: 'flex', alignItems: 'center', gap: 6,
              padding: '3px 8px', cursor: 'pointer', userSelect: 'none',
              background: 'rgba(59,130,246,0.07)',
              fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text1)',
            }}
          >
            <span style={{ color: 'var(--accent)', fontSize: 9, fontWeight: 700, letterSpacing: '.05em' }}>JSON</span>
            <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: 'var(--text2)' }}>{shortPreview}</span>
            <span style={{ color: 'var(--text2)', fontSize: 9 }}>{open ? '▲' : '▼'}</span>
          </div>
          {open && (
            <pre style={{
              margin: 0, padding: '8px 10px', fontSize: 10, lineHeight: 1.6,
              background: 'rgba(8,11,18,0.6)', color: '#a5f3fc',
              overflowX: 'auto', maxHeight: 200, overflowY: 'auto',
              fontFamily: 'var(--font-mono)',
              borderTop: '1px solid rgba(59,130,246,0.15)',
            }}>
              {JSON.stringify(data, null, 2)}
            </pre>
          )}
        </div>
      );
    };

    // ── Node Event Card — shown in PropertyPanel and NodeEditModal ────────────────
    // ── Raw log renderer — GCP Console style ─────────────────────────────────────
    const RawLogViewer = ({ raw, accentColor }) => {
      if (!raw) return null;

      // Split raw into lines and render each with colour + JSON collapsing
      const lines = raw.split('\n');

      return (
        <div style={{
          background: '#0a0e1a', borderRadius: 8,
          fontFamily: 'var(--font-mono)', fontSize: 10.5,
          lineHeight: 1.65, overflowY: 'auto', maxHeight: 340,
          padding: '8px 0',
        }}>
          {lines.map((line, i) => {
            const trimmed = line.trimStart();
            const indent = line.length - trimmed.length;

            // Detect colour
            let color = '#94a3b8';
            if (/error|failed|FAILED/i.test(trimmed)) color = '#f87171';
            else if (/warning/i.test(trimmed)) color = '#fbbf24';
            else if (/✓|created|updated|\+ /i.test(trimmed)) color = '#34d399';
            else if (/\[|\]/.test(trimmed) && /\d+\/\d+/.test(trimmed)) color = '#60a5fa';
            else if (trimmed.startsWith('"') || /^\w+:/.test(trimmed)) color = '#c4b5fd';
            else if (/^\{|^\[|\}$|\]$/.test(trimmed)) color = '#7dd3fc';

            // Detect inline JSON object/array
            const jsonMatch = trimmed.match(/^(\{[\s\S]*\}|\[[\s\S]*\])$/);
            if (jsonMatch) {
              try {
                const parsed = JSON.parse(jsonMatch[0]);
                return <InlineJsonBlock key={i} data={parsed} indent={indent} />;
              } catch { }
            }

            return (
              <div key={i} style={{
                display: 'flex', gap: 10, padding: '0 12px',
                background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.018)',
              }}>
                <span style={{ color: '#334155', fontSize: 9, minWidth: 28, textAlign: 'right', flexShrink: 0, userSelect: 'none', paddingTop: 1 }}>
                  {i + 1}
                </span>
                <span style={{ color, whiteSpace: 'pre-wrap', wordBreak: 'break-all', flex: 1 }}>
                  {line}
                </span>
              </div>
            );
          })}
        </div>
      );
    };

    const InlineJsonBlock = ({ data, indent = 0 }) => {
      const [open, setOpen] = React.useState(false);
      const preview = JSON.stringify(data);
      const short = preview.length > 70 ? preview.slice(0, 70) + '…' : preview;
      return (
        <div style={{ padding: `0 12px 0 ${12 + indent * 6}px` }}>
          <div onClick={() => setOpen(v => !v)} style={{
            display: 'flex', alignItems: 'center', gap: 6,
            cursor: 'pointer', padding: '1px 0', userSelect: 'none',
          }}>
            <span style={{ color: open ? '#7dd3fc' : '#60a5fa', fontSize: 9, fontWeight: 700, width: 12, flexShrink: 0 }}>
              {open ? '▼' : '▶'}
            </span>
            {!open && (
              <span style={{ color: '#7dd3fc', fontFamily: 'var(--font-mono)', fontSize: 10.5, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', flex: 1 }}>
                {short}
              </span>
            )}
            {!open && (
              <span style={{ color: '#334155', fontSize: 9, flexShrink: 0 }}>
                {Array.isArray(data) ? `[${data.length}]` : `{${Object.keys(data).length}}`}
              </span>
            )}
          </div>
          {open && (
            <pre style={{
              margin: '2px 0 4px 18px', padding: '6px 10px',
              background: 'rgba(255,255,255,0.04)', borderRadius: 6,
              fontSize: 10, color: '#a5f3fc', lineHeight: 1.6,
              overflowX: 'auto', border: '1px solid rgba(99,102,241,0.2)',
              whiteSpace: 'pre', wordBreak: 'normal',
            }}>
              {JSON.stringify(data, null, 2)}
            </pre>
          )}
        </div>
      );
    };

    const NodeEventCard = ({ event }) => {
      const [showRaw, setShowRaw] = React.useState(false);
      const [activeTab, setActiveTab] = React.useState('summary'); // summary | log | outputs
      if (!event) return null;

      const statusMeta = {
        deployed: { color: '#34d399', icon: '✓', label: 'Deployed', bg: 'rgba(52,211,153,0.08)' },
        no_change: { color: '#60a5fa', icon: '≡', label: 'No Changes', bg: 'rgba(96,165,250,0.08)' },
        failed: { color: '#f87171', icon: '✗', label: 'Failed', bg: 'rgba(248,113,113,0.1)' },
        skipped: { color: '#fbbf24', icon: '⚠', label: 'Skipped', bg: 'rgba(251,191,36,0.08)' },
      };
      const meta = statusMeta[event.status] || statusMeta.skipped;
      const tsStr = event.ts
        ? new Date(event.ts).toLocaleString('he-IL', { hour12: false, timeZoneName: 'short' })
        : '';

      const hasOutputs = event.outputs && Object.keys(event.outputs).length > 0;
      const hasRaw = Boolean(event.raw && event.raw.length > 10);
      const hasError = Boolean(event.error);

      const tabs = [
        { id: 'summary', label: 'Summary' },
        ...(hasRaw ? [{ id: 'log', label: 'Full Log' }] : []),
        ...(hasOutputs ? [{ id: 'outputs', label: 'Outputs' }] : []),
      ];

      return (
        <div style={{
          borderRadius: 10, overflow: 'hidden',
          border: `1px solid ${meta.color}44`,
          background: 'var(--bg2)', marginBottom: 14,
        }}>
          {/* ── Header ── */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px',
            background: meta.bg,
            borderBottom: `1px solid ${meta.color}28`,
          }}>
            <div style={{
              width: 28, height: 28, borderRadius: 8, flexShrink: 0,
              background: meta.color + '20', color: meta.color,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 14, fontWeight: 900,
              boxShadow: `0 0 10px ${meta.color}44`,
            }}>{meta.icon}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 12, color: meta.color }}>
                {meta.label}
              </div>
              <div style={{ fontSize: 9, color: 'var(--text2)', fontFamily: 'var(--font-mono)', marginTop: 1 }}>
                {tsStr || 'Unknown time'}
              </div>
            </div>
            {/* Status dot with glow */}
            <div style={{
              width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
              background: meta.color, boxShadow: `0 0 8px ${meta.color}`,
            }} />
          </div>

          {/* ── Tab bar ── */}
          {tabs.length > 1 && (
            <div style={{
              display: 'flex', gap: 0,
              borderBottom: '1px solid var(--border)',
              background: 'var(--bg1)',
            }}>
              {tabs.map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
                  padding: '6px 14px', border: 'none', background: 'transparent',
                  cursor: 'pointer', fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 600,
                  color: activeTab === t.id ? meta.color : 'var(--text2)',
                  borderBottom: activeTab === t.id ? `2px solid ${meta.color}` : '2px solid transparent',
                  transition: 'color .15s',
                  letterSpacing: '.04em',
                }}>
                  {t.label}
                </button>
              ))}
            </div>
          )}

          {/* ── Summary tab ── */}
          {activeTab === 'summary' && (
            <div style={{ padding: '10px 14px' }}>
              {/* One-line summary */}
              <div style={{
                fontSize: 12, color: 'var(--text0)', lineHeight: 1.6,
                fontWeight: 500, marginBottom: hasError ? 10 : 0,
              }}>
                {event.summary || '—'}
              </div>

              {/* Error block */}
              {hasError && (
                <div style={{
                  marginTop: 8, padding: '8px 12px',
                  background: 'rgba(248,113,113,0.08)',
                  border: '1px solid rgba(248,113,113,0.25)',
                  borderRadius: 8, fontFamily: 'var(--font-mono)',
                }}>
                  <div style={{ fontSize: 9, fontWeight: 700, color: '#f87171', letterSpacing: '.08em', marginBottom: 5, textTransform: 'uppercase' }}>
                    Error Detail
                  </div>
                  {event.error.split('\n').map((line, i) => {
                    const isConstraint = line.startsWith('Org-policy');
                    const isURL = line.startsWith('http');
                    return (
                      <div key={i} style={{
                        fontSize: 10.5, lineHeight: 1.7,
                        color: isConstraint ? '#fbbf24' : isURL ? '#60a5fa' : '#fca5a5',
                        fontWeight: isConstraint ? 700 : 400,
                      }}>
                        {isURL
                          ? <a href={line} target="_blank" style={{ color: '#60a5fa' }}>{line}</a>
                          : line}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* ── Full Log tab ── */}
          {activeTab === 'log' && hasRaw && (
            <div style={{ padding: '8px 0' }}>
              <RawLogViewer raw={event.raw} accentColor={meta.color} />
              <div style={{ padding: '4px 12px 0', display: 'flex', justifyContent: 'flex-end' }}>
                <button
                  onClick={() => navigator.clipboard?.writeText(event.raw)}
                  style={{
                    fontSize: 9, fontFamily: 'var(--font-mono)', letterSpacing: '.06em',
                    background: 'none', border: '1px solid var(--border)', borderRadius: 5,
                    color: 'var(--text2)', cursor: 'pointer', padding: '2px 8px',
                  }}
                >
                  ⎘ Copy log
                </button>
              </div>
            </div>
          )}

          {/* ── Outputs tab ── */}
          {activeTab === 'outputs' && hasOutputs && (
            <div style={{ padding: '10px 14px' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {Object.entries(event.outputs).map(([k, v]) => {
                  const isUrl = typeof v === 'string' && v.startsWith('http');
                  const isId = k === 'id' || k === 'name';
                  return (
                    <div key={k} style={{
                      display: 'flex', alignItems: 'flex-start', gap: 8,
                      padding: '6px 10px', borderRadius: 7,
                      background: 'var(--bg1)', border: '1px solid var(--border)',
                    }}>
                      <span style={{
                        fontSize: 10, fontWeight: 700, color: 'var(--text2)',
                        fontFamily: 'var(--font-mono)', minWidth: 60, flexShrink: 0,
                        letterSpacing: '.03em', paddingTop: 1,
                      }}>{k}</span>
                      <span style={{ flex: 1, fontSize: 11, fontFamily: 'var(--font-mono)', wordBreak: 'break-all', color: isUrl ? '#60a5fa' : isId ? '#c4b5fd' : 'var(--text0)' }}>
                        {isUrl
                          ? <a href={v} target="_blank" style={{ color: '#60a5fa', textDecoration: 'none' }}>{v}</a>
                          : String(v)}
                      </span>
                      <button onClick={() => navigator.clipboard?.writeText(String(v))} style={{
                        background: 'none', border: 'none', color: 'var(--text2)',
                        cursor: 'pointer', fontSize: 10, flexShrink: 0, padding: '0 2px',
                        opacity: 0.6,
                      }} title="Copy">⎘</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    };

    // ── OutcomeRow — expandable log row with full raw output drawer ───────────────
    const OutcomeRow = ({ l, lvlKey, cfg, nodeEvents }) => {
      const [open, setOpen] = React.useState(false);
      const [copied, setCopied] = React.useState(false);

      // Get raw log from nodeEvents if available, fall back to msg
      const event = l.node_id ? nodeEvents[l.node_id] : null;
      const raw = event?.raw || null;
      const hasRaw = Boolean(raw && raw.length > 10);
      const hasError = Boolean(event?.error);

      const bgColor = lvlKey === 'ok'
        ? 'rgba(52,211,153,0.07)'
        : lvlKey === 'err'
          ? 'rgba(248,113,113,0.09)'
          : lvlKey === 'warn'
            ? 'rgba(251,191,36,0.07)'
            : 'rgba(255,255,255,0.03)';

      const copyRaw = () => {
        navigator.clipboard?.writeText(raw || l.msg || '');
        setCopied(true);
        setTimeout(() => setCopied(false), 1500);
      };

      return (
        <div style={{ margin: '2px 0', borderRadius: 7, overflow: 'hidden', border: `1px solid ${open ? cfg.color + '44' : 'transparent'}` }}>
          {/* ── Main row ── */}
          <div
            onClick={() => setOpen(v => !v)}
            style={{
              display: 'flex', alignItems: 'center', gap: 8,
              padding: '5px 8px', cursor: hasRaw ? 'pointer' : 'default',
              background: bgColor,
              borderLeft: `3px solid ${cfg.color}`,
              userSelect: 'none',
            }}
          >
            {/* Expand toggle */}
            <span style={{
              fontSize: 8, color: hasRaw ? cfg.color : 'transparent',
              flexShrink: 0, width: 10, transition: 'transform .15s',
              transform: open ? 'rotate(90deg)' : 'none',
              display: 'inline-block',
            }}>▶</span>

            <span style={{ fontSize: 9, color: 'var(--text2)', fontFamily: 'var(--font-mono)', flexShrink: 0, minWidth: 62 }}>{l.ts || ''}</span>

            <span style={{
              fontSize: 9, fontWeight: 800, letterSpacing: '.06em',
              padding: '2px 7px', borderRadius: 99,
              background: cfg.bg, color: cfg.color, flexShrink: 0,
            }}>{cfg.label}</span>

            <span style={{
              fontSize: 11.5, fontWeight: 600, color: cfg.color,
              fontFamily: 'var(--font-mono)', flex: 1,
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>
              {l.msg || ''}
            </span>

            {hasRaw && (
              <span style={{
                fontSize: 8.5, color: 'var(--text2)', fontFamily: 'var(--font-mono)',
                flexShrink: 0, letterSpacing: '.05em',
                opacity: open ? 1 : 0.5,
              }}>
                {open ? 'hide' : 'details'}
              </span>
            )}
          </div>

          {/* ── Drawer ── */}
          {open && hasRaw && (
            <div style={{ background: '#070a12', borderTop: `1px solid ${cfg.color}22` }}>

              {/* Error summary banner if failed */}
              {hasError && (
                <div style={{
                  padding: '7px 12px',
                  background: 'rgba(248,113,113,0.08)',
                  borderBottom: '1px solid rgba(248,113,113,0.15)',
                  display: 'flex', alignItems: 'flex-start', gap: 8,
                }}>
                  <span style={{ fontSize: 10, color: '#f87171', fontWeight: 800, flexShrink: 0, marginTop: 1 }}>✗</span>
                  <div style={{ flex: 1 }}>
                    {event.error.split('\n').map((line, i) => (
                      <div key={i} style={{
                        fontSize: 10.5, fontFamily: 'var(--font-mono)', lineHeight: 1.6,
                        color: line.startsWith('→') ? '#60a5fa'
                          : line.startsWith('Org-policy') || line.startsWith('Auth') ? '#fbbf24'
                            : '#fca5a5',
                        fontWeight: line.startsWith('→') || i === 0 ? 600 : 400,
                      }}>{line}</div>
                    ))}
                  </div>
                </div>
              )}

              {/* Toolbar */}
              <div style={{
                display: 'flex', alignItems: 'center', gap: 6,
                padding: '4px 10px', borderBottom: '1px solid rgba(255,255,255,0.05)',
                background: 'rgba(255,255,255,0.02)',
              }}>
                <span style={{ fontSize: 9, color: '#334155', fontFamily: 'var(--font-mono)', flex: 1 }}>
                  raw pulumi output · {raw.split('\n').length} lines
                </span>
                <button onClick={copyRaw} style={{
                  fontSize: 9, fontFamily: 'var(--font-mono)', letterSpacing: '.05em',
                  background: copied ? 'rgba(52,211,153,0.15)' : 'rgba(255,255,255,0.05)',
                  border: `1px solid ${copied ? '#34d399' : 'rgba(255,255,255,0.1)'}`,
                  borderRadius: 4, color: copied ? '#34d399' : '#64748b',
                  cursor: 'pointer', padding: '2px 8px',
                }}>
                  {copied ? '✓ copied' : '⎘ copy'}
                </button>
                <button onClick={() => {
                  const w = window.open('', '_blank', 'width=900,height=650,menubar=no,toolbar=no');
                  if (!w) return;
                  const rawLines = raw.split('\n');
                  const bodyHtml = rawLines.map((line, i) => {
                    const isErr = /error|failed/i.test(line);
                    const isOk = /created|updated|✓|\+ /.test(line) && !isErr;
                    const isWarn = /warning/i.test(line) && !isErr;
                    const clr = isErr ? '#f87171' : isOk ? '#34d399' : isWarn ? '#fbbf24' : '#94a3b8';
                    const safe = line.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    return '<div style="display:flex;gap:10px;padding:1px 0">'
                      + '<span style="color:#1e2d42;min-width:32px;text-align:right;flex-shrink:0;user-select:none">' + (i + 1) + '</span>'
                      + '<span style="color:' + clr + ';white-space:pre-wrap;word-break:break-all">' + safe + '</span>'
                      + '</div>';
                  }).join('');
                  const pageHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Pulumi Log</title>'
                    + '<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#070a12;color:#94a3b8;font-family:monospace;font-size:11px}'
                    + '.toolbar{position:sticky;top:0;background:#0d1117;border-bottom:1px solid #1e3a5f;padding:8px 14px;display:flex;gap:10px;align-items:center}'
                    + '.title{font-size:12px;font-weight:700;color:#f0f6ff;flex:1}.meta{font-size:10px;color:#4a6080}'
                    + '.lines{padding:8px 14px}</style></head><body>'
                    + '<div class="toolbar"><span class="title">Pulumi Raw Output</span>'
                    + '<span class="meta">' + (l.msg || '').slice(0, 80) + '</span>'
                    + '<span class="meta">' + rawLines.length + ' lines</span></div>'
                    + '<div class="lines">' + bodyHtml + '</div></body></html>';
                  w.document.write(pageHtml);
                  w.document.close();
                }} style={{
                  fontSize: 9, fontFamily: 'var(--font-mono)',
                  background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)',
                  borderRadius: 4, color: '#64748b', cursor: 'pointer', padding: '2px 8px',
                }}>
                  ⬡ popout
                </button>
              </div>

              {/* Raw lines */}
              <div style={{
                overflowY: 'auto', maxHeight: 320,
                fontFamily: 'var(--font-mono)', fontSize: 10.5, lineHeight: 1.65,
                padding: '6px 0',
              }}>
                {raw.split('\n').map((line, i) => {
                  const isErr = /error|failed|\*\*/i.test(line);
                  const isOk = /created|updated|✓|\+ (?!.*error)/i.test(line) && !isErr;
                  const isWarn = /warning/i.test(line) && !isErr;
                  const color = isErr ? '#f87171'
                    : isOk ? '#34d399'
                      : isWarn ? '#fbbf24'
                        : line.trim().startsWith('"') || /^\s+\w+\s*:/.test(line) ? '#c4b5fd'
                          : '#94a3b8';
                  if (!line.trim()) return <div key={i} style={{ height: 4 }} />;
                  return (
                    <div key={i} style={{

    const LogPanel = ({ logs, visible, onToggle, onClear, panelH, onResize, nodeEvents = {} }) => {

      const bodyRef = useRef(null);

      const onResizeMouseDown = (e) => {
        e.preventDefault();
        dragRef.current = { dragging: true, startY: e.clientY, startH: panelH };
        const onMove = (ev) => {
          if (!dragRef.current.dragging) return;
          const delta = dragRef.current.startY - ev.clientY;
          const newH = Math.max(36, Math.min(window.innerHeight * 0.8, dragRef.current.startH + delta));
          onResize(newH);
        };
        const onUp = () => {
          dragRef.current.dragging = false;
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      const openPopout = () => {
        const filtered = getFiltered();
        const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Deploy Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080b12;color:#f0f6ff;font-family:'JetBrains Mono',monospace;font-size:11px;padding:12px}
h2{font-size:13px;font-weight:700;margin-bottom:10px;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase}
.entry{display:flex;gap:10px;padding:3px 6px;border-radius:4px;margin-bottom:1px;align-items:flex-start}
.entry:nth-child(even){background:rgba(255,255,255,0.03)}
.ts{color:#4a6080;min-width:70px;flex-shrink:0;padding-top:1px}
.badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;min-width:32px;text-align:center;flex-shrink:0;margin-top:1px}
.ok .badge{background:rgba(16,185,129,.15);color:#10b981}
.err .badge{background:rgba(239,68,68,.15);color:#ef4444}
.info .badge{background:rgba(59,130,246,.15);color:#3b82f6}
.warn .badge{background:rgba(245,158,11,.15);color:#f59e0b}
.ok .msg{color:#10b981}.err .msg{color:#ef4444}.info .msg{color:#3b82f6}.warn .msg{color:#f59e0b}
.msg{white-space:pre-wrap;word-break:break-word;flex:1}
</style></head><body>
<h2>Deploy Log — ${filtered.length} entries</h2>
${filtered.map((l, i) => `<div class="entry ${l.level || 'info'}"><span class="ts">${l.ts || ''}</span><span class="badge">${(l.level || 'info').toUpperCase().slice(0, 4)}</span><span class="msg">${(l.msg || '').replace(/</g, '&lt;')}</span></div>`).join('')}
</body></html>`;
        const w = window.open('', '_blank', 'width=860,height=640,menubar=no,toolbar=no');
        if (w) { w.document.write(html); w.document.close(); }
      };

      const copyAll = () => {
        const text = getFiltered().map(l => `[${l.ts}] [${(l.level || 'info').toUpperCase()}] ${l.msg}`).join('\n');
        navigator.clipboard?.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
      };

      const getFiltered = () => {
        let result = logs;
        const lvl = filter === 'err' ? ['err', 'error'] : filter === 'all' ? null : [filter];
        if (lvl) result = result.filter(l => lvl.includes(l.level));
        if (search.trim()) {
          const q = search.toLowerCase();
          result = result.filter(l => l.msg?.toLowerCase().includes(q));
        }
        return result;
      };

      const filtered = getFiltered();
      const errCount = logs.filter(l => l.level === 'err' || l.level === 'error').length;
      const warnCount = logs.filter(l => l.level === 'warn').length;

      return (
        <div
          ref={panelRef}
          className={`log-panel ${visible ? '' : 'hidden'}`}
          style={{ height: visible ? panelH : 36 }}

          {visible && <div className="log-resize-handle" onMouseDown={onResizeMouseDown} />}

          <div className="log-header">
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: errCount > 0 ? 'var(--red)' : 'var(--green)', boxShadow: `0 0 6px ${errCount > 0 ? 'var(--red)' : 'var(--green)'}`, flexShrink: 0 }} />
            <div className="log-title">Deploy Log</div>
            {errCount > 0 && <span style={{ fontSize: 9, fontWeight: 700, background: 'rgba(239,68,68,0.15)', color: 'var(--red)', borderRadius: 99, padding: '1px 6px' }}>{errCount} ERR</span>}
            {warnCount > 0 && <span style={{ fontSize: 9, fontWeight: 700, background: 'rgba(245,158,11,0.15)', color: 'var(--yellow)', borderRadius: 99, padding: '1px 6px' }}>{warnCount} WARN</span>}
            <div style={{ flex: 1 }} />
            <span style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--font-mono)' }}>{filtered.length}/{logs.length}</span>
            <button title="Auto-scroll" onClick={() => setAutoScroll(v => !v)}

            </button>
            <button title="Open in window" onClick={openPopout}
              style={{ background: 'transparent', border: '1px solid var(--border)', borderRadius: 6, color: 'var(--text2)', cursor: 'pointer', padding: '2px 6px', fontSize: 10, lineHeight: 1 }}>
              ⬡
            </button>
            <button title="Copy all" onClick={copyAll}
              style={{ background: copied ? 'rgba(16,185,129,0.15)' : 'transparent', border: '1px solid ' + (copied ? 'var(--green)' : 'var(--border)'), borderRadius: 6, color: copied ? 'var(--green)' : 'var(--text2)', cursor: 'pointer', padding: '2px 6px', fontSize: 10 }}>

            <button className="btn btn-ghost" style={{ padding: '2px 8px', fontSize: 10 }} onClick={onToggle}>

          </div>

          {visible && (
            <div className="log-toolbar">
              {['all', 'ok', 'info', 'warn', 'err'].map(f => (
                <button key={f} className={`log-filter-btn ${filter === f ? 'active-' + f : ''}`} onClick={() => setFilter(f)}>

              <input

              {filtered.map((l, i) => {
                const lvlKey = l.level === 'error' ? 'err' : (l.level || 'info');
                const cfg = levelConfig[lvlKey] || levelConfig.info;
                const isOutcome = /[✓✗⚠▶]/.test(l.msg || '') && /\[\d+\/\d+\]/.test(l.msg || '');
                const isPhase = !isOutcome && (l.msg?.startsWith('Phase ') || l.msg?.startsWith('Deploy'));
                const isNoise = !isOutcome && !isPhase;

                if (isNoise) {
                  return (
                    <div key={i} style={{
                      display: 'flex', alignItems: 'baseline', gap: 6,
                      padding: '0px 8px', opacity: 0.55,

                      <span style={{ fontSize: 8.5, color: 'var(--text2)', fontFamily: 'var(--font-mono)', flexShrink: 0, minWidth: 62 }}>{l.ts || ''}</span>
                      <span style={{ fontSize: 8.5, color: cfg.color, fontFamily: 'var(--font-mono)', flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>

                  return (
                    <div key={i} style={{
                      display: 'flex', alignItems: 'center', gap: 8,
                      padding: '6px 8px 3px',
                      borderTop: i > 0 ? '1px solid var(--border)' : 'none',

                      <span style={{ fontSize: 9, color: 'var(--text2)', fontFamily: 'var(--font-mono)', flexShrink: 0 }}>{l.ts || ''}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, color: 'var(--text2)', letterSpacing: '.08em', textTransform: 'uppercase' }}>
                        {l.msg}
                      </span>
                    </div>

                // isOutcome — expandable row with raw log drawer
                return <OutcomeRow key={i} l={l} lvlKey={lvlKey} cfg={cfg} nodeEvents={nodeEvents} />;
              })}
            </div>
          )}
        </div>

    // ── Toast ─────────────────────────────────────────────────────────────────────
    const ToastContainer = ({ toasts }) => (

            {/* Body */}

                  <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16, color: 'var(--text0)', marginBottom: 12 }}>

                  <div style={{ background: 'var(--bg2)', borderRadius: 'var(--r8)', padding: '12px 16px', marginBottom: 12 }}>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>

                      <span>📌 גרסה: <span style={{ color: 'var(--green)' }}>1.0.0</span></span>
                    </div>

              ) : (

                  <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 15, color: 'var(--text0)', marginBottom: 16 }}>

                  </div>
                  {[
                    { icon: '🖱️', title: 'Drag & Drop Nodes', desc: 'Drag any resource from the left sidebar onto the canvas to add it to your architecture.' },

          </div>

    // ── Terraform Export Modal ────────────────────────────────────────────────────
    const TerraformExportModal = ({ nodes, edges, namespace, project, region, onClose }) => {
      const [preview, setPreview] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      const [downloading, setDownloading] = React.useState(false);
      const [error, setError] = React.useState(null);
      const [projOverride, setProjOverride] = React.useState(project || 'my-gcp-project');
      const [regionOverride, setRegionOverride] = React.useState(region || 'us-central1');

      // Load preview on mount
      React.useEffect(() => {
        fetchPreview();
      }, []);

      const fetchPreview = async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch('http://localhost:8000/api/terraform/preview', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              nodes,
              edges,
              namespace,
              project: projOverride,
              region: regionOverride,
            }),
          });
          if (!res.ok) throw new Error(`Server error ${res.status}`);
          setPreview(await res.json());
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const handleDownload = async () => {
        setDownloading(true);
        setError(null);
        try {
          const res = await fetch('http://localhost:8000/api/terraform/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              nodes,
              edges,
              namespace,
              project: projOverride,
              region: regionOverride,
            }),
          });
          if (!res.ok) throw new Error(`Server error ${res.status}`);
          // Trigger browser download
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'vco-terraform.zip';
          a.click();
          URL.revokeObjectURL(url);
        } catch (e) {
          setError(e.message);
        } finally {
          setDownloading(false);
        }
      };

                      }}>
                        <div style={{ fontSize: 22, fontWeight: 800, color: c.color, fontFamily: 'var(--font-display)' }}>{c.value}</div>
                        <div style={{ fontSize: 10, color: 'var(--text2)', marginTop: 2, letterSpacing: '.06em', textTransform: 'uppercase' }}>{c.label}</div>
                      </div>
                    ))}
                  </div>

                  {/* File list */}
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text2)', letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: 8 }}>
                      Generated Files
                    </div>
                    {['versions.tf', 'variables.tf', 'terraform.tfvars', 'main.tf', 'outputs.tf', 'README.md'].map(f => (
                      <div key={f} style={{
                        display: 'flex', alignItems: 'center', gap: 8, padding: '5px 10px',
                        background: 'var(--bg2)', borderRadius: 6, marginBottom: 4,
                        border: '1px solid var(--border)',
                      }}>
                        <span style={{ fontSize: 11, color: '#818cf8', fontFamily: 'var(--font-mono)' }}>📄</span>
                        <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text0)', flex: 1 }}>{f}</span>
                        <span style={{ fontSize: 9, color: 'var(--green)', background: 'rgba(16,185,129,0.1)', borderRadius: 99, padding: '1px 6px' }}>included</span>
                      </div>
                    ))}
                  </div>

                  {/* Node list */}
                  <div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text2)', letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: 8 }}>
                      Nodes
                    </div>
                    {preview.nodes.map(n => (
                      <div key={n.node_id} style={{
                        display: 'flex', alignItems: 'center', gap: 8, padding: '5px 10px',
                        background: 'var(--bg2)', borderRadius: 6, marginBottom: 4,
                        border: `1px solid ${n.supported ? 'var(--border)' : 'rgba(245,158,11,0.3)'}`,
                      }}>
                        <div style={{
                          width: 7, height: 7, borderRadius: '50%', flexShrink: 0,
                          background: n.supported ? 'var(--green)' : 'var(--yellow)',
                        }} />
                        <span style={{ fontSize: 11, color: 'var(--text0)', flex: 1 }}>{n.label}</span>
                        <span style={{ fontSize: 9, color: 'var(--text2)', fontFamily: 'var(--font-mono)' }}>
                          {n.type.replace('Node', '')}
                        </span>
                        {!n.supported && (
                          <span style={{ fontSize: 9, color: 'var(--yellow)', background: 'rgba(245,158,11,0.1)', borderRadius: 99, padding: '1px 6px' }}>
                            no TF generator
                          </span>
                        )}
                      </div>
                    ))}
                  </div>

                  {/* Quick start hint */}
                  <div style={{
                    marginTop: 14, padding: '10px 14px',
                    background: 'rgba(99,102,241,0.08)', border: '1px solid rgba(99,102,241,0.25)',
                    borderRadius: 8, fontFamily: 'var(--font-mono)', fontSize: 10.5,
                    color: '#a5b4fc', lineHeight: 1.8,
                  }}>
                    <strong style={{ color: '#c7d2fe' }}>After download:</strong><br />
                    unzip vco-terraform.zip · edit terraform.tfvars · terraform init && terraform apply
                  </div>
                </>
              )}
            </div>

            {/* Footer */}
            <div style={{
              padding: '14px 24px', borderTop: '1px solid var(--border)',
              display: 'flex', alignItems: 'center', gap: 10, background: 'var(--bg2)',
            }}>
              <span style={{ flex: 1, fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--font-mono)' }}>
                namespace: {namespace} · project: {projOverride}
              </span>
              <button onClick={onClose} style={{
                padding: '7px 16px', borderRadius: 8, border: '1px solid var(--border)',
                background: 'transparent', color: 'var(--text1)', cursor: 'pointer',
                fontFamily: 'var(--font-mono)', fontSize: 11,
              }}>
                Cancel
              </button>
              <button
                onClick={handleDownload}
                disabled={downloading || loading || !preview}
                style={{
                  padding: '8px 22px', borderRadius: 8, border: 'none',
                  background: downloading ? 'rgba(124,58,237,0.4)' : 'linear-gradient(135deg,#7c3aed,#4f46e5)',
                  color: '#fff', cursor: downloading ? 'wait' : 'pointer',
                  fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 700,
                  boxShadow: '0 4px 16px rgba(124,58,237,0.4)',
                  opacity: (!preview || loading) ? 0.5 : 1,
                }}
              >
                {downloading ? '⏳ Generating…' : '⬇ Download .zip'}
              </button>
            </div>
          </div>
        </div>
      );
    };


    // ── Main App ──────────────────────────────────────────────────────────────────
    const nodeTypes = { gcpNode: GCPNodeComponent, vpcGroup: VPCGroupNode, groupBox: VPCGroupNode };
    const edgeTypes = { gcpEdge: GCPEdge };

    function VCOApp() {
      const [infoModal, setInfoModal] = useState(null); // null | 'contact' | 'guide'
      const [nodeTypesData, setNodeTypesData] = useState(DEFAULT_NODE_TYPES_DATA);
      const [nodes, setNodes, onNodesChange] = useNodesState([]);
      const [edges, setEdges, onEdgesChange] = useEdgesState([]);
      const [selectedNode, setSelectedNode] = useState(null);
      const [editModalNode, setEditModalNode] = useState(null);
      const [logs, setLogs] = useState([]);
      const [nodeEvents, setNodeEvents] = useState({}); // node_id → last deploy event
      const [logVisible, setLogVisible] = useState(false);
      const [logPanelH, setLogPanelH] = useState(160);
      const [toasts, setToasts] = useState([]);
      const [search, setSearch] = useState('');
      const [isDeploying, setIsDeploying] = useState(false);
      const [wsConnected, setWsConnected] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [theme, setTheme] = useState('dark');
      const [ctxMenu, setCtxMenu] = useState(null);
      const [edgeCtxMenu, setEdgeCtxMenu] = useState(null);
      const [defaultEdgeType, setDefaultEdgeType] = useState('bezier');
      // ── Namespaces ──────────────────────────────────────────────────────────────
      const [namespace, setNamespace] = useState('default');
      const [namespaces, setNamespaces] = useState(['default']);
      const [nsModalOpen, setNsModalOpen] = useState(false);
      const [nsNewName, setNsNewName] = useState('');
      const [nsLoading, setNsLoading] = useState(false);
      const namespaceRef = useRef('default');
      useEffect(() => { namespaceRef.current = namespace; }, [namespace]);
      const wsRef = useRef(null);
      const nodesRef = useRef(nodes);
      const [nodeLogsModal, setNodeLogsModal] = useState(null); // { nodeId, label }
      const nodeLogsEsRef = useRef(null);
      useEffect(() => { nodesRef.current = nodes; }, [nodes]);
      const reactFlowWrapper = useRef(null);
      const { screenToFlowPosition, deleteElements, fitView } = useReactFlow();
      // ── Terraform export modal ──
      const [tfModalOpen, setTfModalOpen] = useState(false);



      const addLog = (msg, level = 'info', node_id = null) => {
        const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
        const entry = { ts, msg, level, node_id };
        // Append to existing logs (history already loaded from server)
        setLogs(l => [...l.slice(-1499), entry]);
        // Persist to backend (fire-and-forget — don't await, don't block UI)
        fetch('http://localhost:8000/api/deploy-logs/append', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...entry, namespace: namespaceRef.current }),
        }).catch(() => { });
        setTimeout(() => {
          const el = document.getElementById('log-scroll');
          if (el) el.scrollTop = el.scrollHeight;
        }, 50);
      };

      const showToast = (msg, type = 'info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
      };


      // ── Load namespace list on mount ──────────────────────────────────────────
      useEffect(() => {
        fetch('http://localhost:8000/api/namespaces')
          .then(r => r.ok ? r.json() : null)
          .then(d => { if (d?.namespaces) setNamespaces(d.namespaces); })
          .catch(() => { });
      }, []);

      // ── Switch to a different namespace (reset canvas + reload data) ──────────
      const switchNamespace = useCallback(async (ns) => {
        if (ns === namespaceRef.current) return;
        setNamespace(ns);
        namespaceRef.current = ns;
        setNodes([]);
        setEdges([]);
        setSelectedNode(null);
        setLogs([]);
        setNodeEvents({});
        graphLoadedRef.current = false;
        try {
          const stateRes = await fetch(`http://localhost:8000/api/state?namespace=${encodeURIComponent(ns)}`);
          const state = await stateRes.json();
          if (state?.nodes?.length) {
            const schemaSource = nodeTypesData;
            const restored = state.nodes.map(n => {
              const schema = schemaSource.find(s => s.type === n.type);
              return {
                id: n.id, type: 'gcpNode',
                position: n.position || { x: Math.random() * 600, y: Math.random() * 400 },
                data: { label: n.label, schema, status: n.status || (n.deployed ? 'deployed' : 'idle'), props: n.props || {} },
              };
            });
            const restoredEdges = (state.edges || []).map(e => ({
              id: e.id || `e-${e.source}-${e.target}`,
              source: e.source, sourceHandle: e.sourceHandle,
              target: e.target, targetHandle: e.targetHandle,
              type: 'gcpEdge', animated: true,
              data: { color: e.color || '#60a5fa' },
            }));
            setNodes(restored);
            setEdges(restoredEdges);
          }
        } catch (e) { /* silent */ }
        try {
          const logRes = await fetch(`http://localhost:8000/api/deploy-logs/history?limit=500&namespace=${encodeURIComponent(ns)}`);
          if (logRes.ok) { const d = await logRes.json(); if (d.entries?.length) setLogs(d.entries); }
        } catch { }
        try {
          const evRes = await fetch(`http://localhost:8000/api/deploy-logs/node-events?namespace=${encodeURIComponent(ns)}`);
          if (evRes.ok) { const d = await evRes.json(); setNodeEvents(d || {}); }
        } catch { }
        graphLoadedRef.current = true;
        addLog(`Switched to namespace "${ns}"`, 'info');
      }, [nodeTypesData]);

      // ── Create namespace ──────────────────────────────────────────────────────
      const createNamespace = useCallback(async (name) => {
        setNsLoading(true);
        try {
          const res = await fetch('http://localhost:8000/api/namespaces', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
          });
          if (!res.ok) { const err = await res.json(); showToast(err.detail || 'Failed', 'error'); return; }
          const updated = [...namespaces, name].sort();
          setNamespaces(updated);
          setNsNewName('');
          showToast(`Namespace "${name}" created`, 'success');
          await switchNamespace(name);
        } catch (e) { showToast(`Error: ${e.message}`, 'error'); }
        finally { setNsLoading(false); }
      }, [namespaces, switchNamespace]);

      // ── Delete namespace ──────────────────────────────────────────────────────
      const deleteNamespace = useCallback(async (name) => {
        if (name === 'default') { showToast('Cannot delete the default namespace', 'error'); return; }
        if (!confirm(`Delete namespace "${name}" and ALL its data?`)) return;
        try {
          const res = await fetch(`http://localhost:8000/api/namespaces/${encodeURIComponent(name)}`, { method: 'DELETE' });
          if (!res.ok) { const err = await res.json(); showToast(err.detail || 'Failed', 'error'); return; }
          setNamespaces(namespaces.filter(n => n !== name));
          showToast(`Namespace "${name}" deleted`, 'success');
          if (namespaceRef.current === name) await switchNamespace('default');
        } catch (e) { showToast(`Error: ${e.message}`, 'error'); }
      }, [namespaces, switchNamespace]);

      // Apply theme to document
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);

      useEffect(() => {
        if (!menuOpen) return;
        const handleClickOutside = e => {
          const menu = document.getElementById('topbar-menu-panel');
          const button = document.getElementById('topbar-menu-button');
          if (!menu || !button) return;
          if (menu.contains(e.target) || button.contains(e.target)) return;
          setMenuOpen(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, [menuOpen]);

      // Context menu handlers
      const onNodeContextMenu = useCallback((event, node) => {
        event.preventDefault();
        setCtxMenu({ x: event.clientX, y: event.clientY, nodeId: node.id, nodeData: node.data });
      }, []);

      const closeCtxMenu = useCallback(() => setCtxMenu(null), []);

      // Load node types AND saved state in sequence — avoids all race conditions
      useEffect(() => {
        (async () => {
          try {
            // 1. First get the node schemas
            const typesRes = await fetch('http://localhost:8000/api/node-types');
            const typesData = await typesRes.json();
            if (typesData?.length) setNodeTypesData(typesData);

            // 2. Then get the saved graph (schemas are now available in typesData)
            const stateRes = await fetch(`http://localhost:8000/api/state?namespace=${encodeURIComponent(namespaceRef.current)}`);
            const state = await stateRes.json();
            if (!state?.nodes?.length) {
              graphLoadedRef.current = true;
              // Still load logs + events even if no nodes
              try {
                const logRes = await fetch(`http://localhost:8000/api/deploy-logs/history?limit=500&namespace=${encodeURIComponent(namespaceRef.current)}`);
                if (logRes.ok) { const d = await logRes.json(); if (d.entries?.length) setLogs(d.entries); }
              } catch { }
              try {
                const evRes = await fetch(`http://localhost:8000/api/deploy-logs/node-events?namespace=${encodeURIComponent(namespaceRef.current)}`);
                if (evRes.ok) { const d = await evRes.json(); setNodeEvents(d || {}); }
              } catch { }
              return;
            }

            const schemaSource = typesData?.length ? typesData : [];
            const restored = state.nodes.map(n => {
              const schema = schemaSource.find(s => s.type === n.type);
              return {
                id: n.id,
                type: 'gcpNode',
                position: n.position || { x: Math.random() * 600, y: Math.random() * 400 },
                data: {
                  label: n.label,
                  schema,
                  status: n.status || (n.deployed ? 'deployed' : 'idle'),
                  props: n.props || {},
                },
              };
            });
            const restoredEdges = (state.edges || []).map(e => ({
              id: e.id || `e-${e.source}-${e.target}`,
              source: e.source,
              sourceHandle: e.sourceHandle,
              target: e.target,
              targetHandle: e.targetHandle,
              type: 'gcpEdge',
              animated: true,
              data: { color: e.color || '#60a5fa' },
            }));
            setNodes(restored);
            setEdges(restoredEdges);
            graphLoadedRef.current = true;

            // 3. Load persisted log history FIRST (before addLog so we don't overwrite)
            try {
              const logRes = await fetch(`http://localhost:8000/api/deploy-logs/history?limit=500&namespace=${encodeURIComponent(namespaceRef.current)}`);
              if (logRes.ok) {
                const logData = await logRes.json();
                if (logData.entries?.length) {
                  // Set history directly — don't call addLog which would re-POST to server
                  setLogs(logData.entries);
                }
              }
            } catch { /* silent */ }

            // 4. Load per-node last-deploy events
            try {
              const evRes = await fetch(`http://localhost:8000/api/deploy-logs/node-events?namespace=${encodeURIComponent(namespaceRef.current)}`);
              if (evRes.ok) {
                const evData = await evRes.json();
                setNodeEvents(evData || {});
              }
            } catch { /* silent */ }

            // 5. Add "session started" marker AFTER history is loaded (appends, doesn't replace)
            addLog(`Session restored — ${restored.length} node(s)`, 'info');

          } catch (e) {
            graphLoadedRef.current = true; // allow saves even if restore fails
            addLog(`Failed to load saved state: ${e.message}`, 'warn');
          }
        })();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // WebSocket connection
      useEffect(() => {
        const connect = () => {
          try {
            const ws = new WebSocket('ws://localhost:8000/ws');
            ws.onopen = () => { setWsConnected(true); addLog('WebSocket connected', 'ok'); };
            ws.onclose = () => { setWsConnected(false); setTimeout(connect, 3000); };
            ws.onmessage = e => handleWsMessage(JSON.parse(e.data));
            wsRef.current = ws;
          } catch { }
        };
        connect();
        return () => wsRef.current?.close();
      }, []);

      // Keep edges in a ref so autoSave always reads the latest value
      const edgesRef = useRef(edges);
      useEffect(() => { edgesRef.current = edges; }, [edges]);

      // autoSaveAfterDeploy — defined BEFORE handleWsMessage so it's in scope
      const autoSaveAfterDeploy = useCallback(async () => {
        const currentNodes = nodesRef.current;
        const currentEdges = edgesRef.current;
        const ns = namespaceRef.current;
        const payload = {
          namespace: ns,
          nodes: currentNodes.map(n => ({
            id: n.id,
            type: n.data.schema?.type,
            label: n.data.label,
            props: n.data.props || {},
            position: n.position,
            status: n.data.status || 'idle',
          })),
