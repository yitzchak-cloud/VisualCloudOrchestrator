<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Cloud Orchestrator</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d1117'/%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='%233b82f6' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%233b82f6'/%3E%3Cpath d='M16 4 L16 8 M16 24 L16 28 M4 16 L8 16 M24 16 L28 16' stroke='%233b82f6' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M8.5 8.5 L11.2 11.2 M20.8 20.8 L23.5 23.5 M23.5 8.5 L20.8 11.2 M11.2 20.8 L8.5 23.5' stroke='%236366f1' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" />

  <!-- CodeMirror 6 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/fold/foldcode.min.js"></script>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/fold/foldgutter.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/lint/lint.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <style>

  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react,typescript">
    const {
      useState, useEffect, useCallback, useRef, useMemo
    } = React;

    const {
      ReactFlow, ReactFlowProvider, MiniMap, Controls, Background,
      BackgroundVariant, addEdge, useNodesState, useEdgesState,
      Handle, Position, useReactFlow, Panel,
      getBezierPath, getStraightPath, getSmoothStepPath,
      NodeResizer, NodeToolbar, useEdges,
    } = window.ReactFlow;

    // ── Icons (inline SVG) ────────────────────────────────────────────────────────
    const ICONS = {
      cloud: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" /></svg>,
      database: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" /><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" /></svg>,
      radio: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0" /><path d="M1.42 9a16 16 0 0 1 21.16 0" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" /><circle cx="12" cy="20" r="1" /></svg>,
      archive: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8" /><rect x="1" y="3" width="22" height="5" /><line x1="10" y1="12" x2="14" y2="12" /></svg>,
      'user-check': <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><polyline points="16 11 18 13 22 9" /></svg>,
      network: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="6" height="6" /><rect x="16" y="2" width="6" height="6" /><rect x="9" y="16" width="6" height="6" /><path d="M5 8v4c0 1 1 2 2 2h10c1 0 2-1 2-2V8" /><line x1="12" y1="14" x2="12" y2="16" /></svg>,
      key: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" /></svg>,
      search: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>,
      play: <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3" /></svg>,
      save: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></svg>,
      trash: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></svg>,
      terminal: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5" /><line x1="12" y1="19" x2="20" y2="19" /></svg>,
      close: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
      chevron: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6" /></svg>,
      zap: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>,
      table: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" /><path d="M3 9h18M3 15h18M9 3v18" /></svg>,
      layers: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></svg>,
      inbox: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12" /><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" /></svg>,
      globe: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>,
      'chevron-down': <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9" /></svg>,
      'chevron-right': <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6" /></svg>,
    };

    // ── Node type definitions (fallback if backend offline) ───────────────────────
    // multi_in: input port accepts >1 incoming edge  |  multi: output fans-out to many
    const DEFAULT_NODE_TYPES_DATA = [];

    // ── GCP Icon Loader — tries icons/{NodeType}.svg first, falls back to inline ──
    const gcpIconCache = {};

    const GCPIcon = ({ nodeType, fallbackIcon, color, size = 20 }) => {
      const [src, setSrc] = React.useState(() => gcpIconCache[nodeType] || null);
      const [failed, setFailed] = React.useState(gcpIconCache[nodeType] === false);

      React.useEffect(() => {
        if (gcpIconCache[nodeType] !== undefined) {
          if (gcpIconCache[nodeType] === false) setFailed(true);
          else setSrc(gcpIconCache[nodeType]);
          return;
        }

        const formattedType = fallbackIcon
          .replace(/([a-z])([A-Z])/g, '$1_$2') // מוסיף קו תחתון בין אות קטנה לגדולה
          .toLowerCase();            // הופך הכל לאותיות קטנות

        const url = `icons/${formattedType}/${formattedType}.svg`;
        fetch(url)
          .then(r => {
            if (!r.ok) throw new Error('not found');
            return r.text();
          })
          .then(text => {
            gcpIconCache[nodeType] = url;
            setSrc(url);
          })
          .catch(() => {
            gcpIconCache[nodeType] = false;
            setFailed(true);
          });
      }, [nodeType]);

      if (src && !failed) {
        return (
          <img
            src={src}
            width={size}
            height={size}
            style={{ display: 'block', objectFit: 'contain', filter: 'drop-shadow(0 0 2px rgba(0,0,0,0.4))' }}
            onError={() => { gcpIconCache[nodeType] = false; setFailed(true); setSrc(null); }}
            alt={nodeType}
          />
        );
      }
      // fallback to inline SVG icon
      return <span style={{ color, display: 'flex', alignItems: 'center' }}>{ICONS[fallbackIcon] || ICONS.cloud}</span>;
    };

    // ── YAML / Code Editor Modal ──────────────────────────────────────────────────
    /**
     * Full-featured CodeMirror editor modal for YAML, JSON, Python, JS fields.
     * Triggered from any params_schema field with type "yaml", "code", "json".
     *
     * Props:
     *   fieldLabel  — human name of the field being edited
     *   language    — "yaml" | "javascript" | "python" | "json" (default: "yaml")
     *   value       — current string value
     *   onSave(val) — called with new string when user clicks Save
     *   onClose()   — called when modal dismissed without saving
     */
    const YamlCodeEditor = ({ fieldLabel, language: initLang = 'yaml', value = '', onSave, onClose }) => {
      const editorRef = useRef(null);
      const cmRef = useRef(null);
      const [lang, setLang] = React.useState(initLang);
      const [validation, setValidation] = React.useState({ ok: true, msg: '' });
      const [lineCount, setLineCount] = React.useState(0);
      const [charCount, setCharCount] = React.useState(0);
      const [copied, setCopied] = React.useState(false);
      const [hasChanges, setHasChanges] = React.useState(false);

      // Detect mode from language
      const modeFor = (l) => {
        if (l === 'javascript' || l === 'json') return 'javascript';
        if (l === 'python') return 'python';
        return 'yaml';
      };

      // Validate current content
      const validate = React.useCallback((content, l) => {
        if (l === 'json') {
          try { JSON.parse(content); return { ok: true, msg: 'Valid JSON' }; }
          catch (e) { return { ok: false, msg: e.message.slice(0, 80) }; }
        }
        if (l === 'yaml') {
          // Basic YAML checks: detect obvious indent errors
          const lines = content.split('\n');
          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.trimStart().startsWith('\t')) {
              return { ok: false, msg: `Line ${i + 1}: tabs not allowed in YAML` };
            }
          }
          return { ok: true, msg: 'Valid YAML' };
        }
        return { ok: true, msg: `${l} mode` };
      }, []);

      // Init CodeMirror
      useEffect(() => {
        if (!editorRef.current || !window.CodeMirror) return;
        const cm = window.CodeMirror(editorRef.current, {
          value: value || '',
          mode: modeFor(lang),
          theme: 'dracula',
          lineNumbers: true,
          lineWrapping: false,
          tabSize: 2,
          indentWithTabs: false,
          matchBrackets: true,
          autoCloseBrackets: true,
          foldGutter: true,
          gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
          extraKeys: {
            'Tab': (cm) => { cm.execCommand('indentMore'); },
            'Shift-Tab': (cm) => { cm.execCommand('indentLess'); },
            'Ctrl-S': () => handleSave(),
            'Cmd-S': () => handleSave(),
            'Escape': () => onClose(),
          },
        });
        cmRef.current = cm;

        // Stats
        const update = () => {
          const v = cm.getValue();
          setLineCount(cm.lineCount());
          setCharCount(v.length);
          setValidation(validate(v, lang));
          setHasChanges(v !== value);
        };
        cm.on('change', update);
        update();

        // Focus
        setTimeout(() => cm.refresh(), 50);
        setTimeout(() => { cm.focus(); cm.setCursor(0, 0); }, 80);

        return () => { cm.off('change', update); };
      }, []); // only on mount

      // Language switch
      useEffect(() => {
        if (!cmRef.current) return;
        cmRef.current.setOption('mode', modeFor(lang));
        const v = cmRef.current.getValue();
        setValidation(validate(v, lang));
      }, [lang]);

      const handleSave = () => {
        if (cmRef.current) onSave(cmRef.current.getValue());
        onClose();
      };

      const handleCopy = () => {
        if (cmRef.current) {
          navigator.clipboard?.writeText(cmRef.current.getValue());
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        }
      };

      const handleFormat = () => {
        if (!cmRef.current) return;
        const val = cmRef.current.getValue();
        if (lang === 'json') {
          try {
            const formatted = JSON.stringify(JSON.parse(val), null, 2);
            cmRef.current.setValue(formatted);
          } catch { /* invalid JSON, skip */ }
        }
        // YAML auto-indent: normalize 2-space indentation
        if (lang === 'yaml') {
          const lines = val.split('\n');
          const fixed = lines.map(l => {
            const spaces = l.match(/^(\t+)/);
            if (spaces) return l.replace(/\t/g, '  ');
            return l;
          }).join('\n');
          if (fixed !== val) cmRef.current.setValue(fixed);
        }
      };

      const LANGS = ['yaml', 'json', 'javascript', 'python'];

      return (
        <div className="yaml-editor-overlay" onClick={(e) => { if (e.target === e.currentTarget) { if (hasChanges && !confirm('Discard changes?')) return; onClose(); } }}>
          <div className="yaml-editor-modal" onClick={e => e.stopPropagation()}>

            {/* ── Header ── */}
            <div className="yaml-editor-header">
              {/* Field icon */}
              <div style={{
                width: 36, height: 36, borderRadius: 10, flexShrink: 0,
                background: 'linear-gradient(135deg, rgba(59,130,246,0.25), rgba(99,102,241,0.15))',
                color: '#60a5fa', display: 'flex', alignItems: 'center', justifyContent: 'center',
                border: '1px solid rgba(59,130,246,0.35)',
              }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" />
                </svg>
              </div>
              {/* Title */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 14, color: '#f0f6ff', letterSpacing: '-.2px' }}>
                  {fieldLabel}
                </div>
                <div style={{ fontSize: 9, color: '#4a6080', fontFamily: 'JetBrains Mono', marginTop: 1, letterSpacing: '.04em' }}>
                  Code Editor · {lineCount} lines · {charCount} chars
                </div>
              </div>
              {/* Language tabs */}
              <div style={{ display: 'flex', gap: 4, background: '#080b12', borderRadius: 8, padding: 4, border: '1px solid #1e3a5f' }}>
                {LANGS.map(l => (
                  <button key={l} className={`yaml-lang-tab ${lang === l ? 'active' : ''}`} onClick={() => setLang(l)}>
                    {l.toUpperCase()}
                  </button>
                ))}
              </div>
              {/* Close */}
              <button onClick={() => { if (hasChanges && !confirm('Discard changes?')) return; onClose(); }} style={{
                width: 30, height: 30, borderRadius: 8, border: '1px solid #1e3a5f',
                background: '#111827', color: '#475569', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'all .12s', flexShrink: 0,
              }}
                onMouseEnter={e => { e.currentTarget.style.color = '#f87171'; e.currentTarget.style.borderColor = '#ef444466'; }}
                onMouseLeave={e => { e.currentTarget.style.color = '#475569'; e.currentTarget.style.borderColor = '#1e3a5f'; }}
              >
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
              </button>
            </div>

            {/* ── Editor ── */}
            <div className="yaml-editor-body" ref={editorRef} />

            {/* ── Footer ── */}
            <div className="yaml-editor-footer">
              {/* Validation badge */}
              <div className={`yaml-valid-badge ${validation.ok ? 'ok' : 'err'}`}>
                <span>{validation.ok ? '✓' : '✗'}</span>
                <span>{validation.msg}</span>
              </div>

              <div style={{ flex: 1 }} />

              {/* Keyboard hint */}
              <span style={{ fontSize: 9, color: '#334155', fontFamily: 'JetBrains Mono', letterSpacing: '.04em' }}>
                Ctrl+S to save · Esc to close
              </span>

              {/* Format */}
              {(lang === 'json' || lang === 'yaml') && (
                <button onClick={handleFormat} style={{
                  padding: '6px 12px', borderRadius: 7, border: '1px solid #1e3a5f',
                  background: '#111827', color: '#64748b', cursor: 'pointer',
                  fontFamily: 'JetBrains Mono', fontSize: 10, fontWeight: 600,
                  transition: 'all .12s',
                }}
                  onMouseEnter={e => { e.currentTarget.style.color = '#94a3b8'; e.currentTarget.style.borderColor = '#243b55'; }}
                  onMouseLeave={e => { e.currentTarget.style.color = '#64748b'; e.currentTarget.style.borderColor = '#1e3a5f'; }}
                >
                  Format
                </button>
              )}

              {/* Copy */}
              <button onClick={handleCopy} style={{
                padding: '6px 12px', borderRadius: 7,
                border: `1px solid ${copied ? 'rgba(16,185,129,0.4)' : '#1e3a5f'}`,
                background: copied ? 'rgba(16,185,129,0.1)' : '#111827',
                color: copied ? '#34d399' : '#64748b', cursor: 'pointer',
                fontFamily: 'JetBrains Mono', fontSize: 10, fontWeight: 600,
                transition: 'all .15s',
              }}>
                {copied ? '✓ Copied' : '⎘ Copy'}
              </button>

              {/* Cancel */}
              <button onClick={() => { if (hasChanges && !confirm('Discard changes?')) return; onClose(); }} style={{
                padding: '7px 16px', borderRadius: 7, border: '1px solid #1e3a5f',
                background: 'transparent', color: '#64748b', cursor: 'pointer',
                fontFamily: 'JetBrains Mono', fontSize: 11, fontWeight: 600,
                transition: 'all .12s',
              }}
                onMouseEnter={e => { e.currentTarget.style.color = '#94a3b8'; }}
                onMouseLeave={e => { e.currentTarget.style.color = '#64748b'; }}
              >
                Cancel
              </button>

              {/* Save */}
              <button onClick={handleSave} style={{
                padding: '7px 20px', borderRadius: 7, border: 'none',
                background: validation.ok
                  ? 'linear-gradient(135deg, #3b82f6, #6366f1)'
                  : 'rgba(239,68,68,0.2)',
                color: validation.ok ? '#fff' : '#f87171',
                cursor: 'pointer',
                fontFamily: 'JetBrains Mono', fontSize: 11, fontWeight: 700,
                boxShadow: validation.ok ? '0 4px 16px rgba(59,130,246,0.35)' : 'none',
                transition: 'all .15s',
              }}>
                {hasChanges ? '💾 Save' : '✓ Close'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    /**
     * Inline trigger button shown instead of a raw <textarea> for yaml/code fields.
     * Shows a compact preview of the current value with a "Open Editor" button.
     */
    const YamlFieldTrigger = ({ label, fieldKey, language = 'yaml', value = '', onChange }) => {
      const [editorOpen, setEditorOpen] = React.useState(false);
      const lines = (value || '').split('\n');
      const preview = lines[0]?.slice(0, 60) || '— empty —';
      const extra = lines.length > 1 ? ` +${lines.length - 1} lines` : '';

      return (
        <>
          <button
            className="yaml-field-trigger"
            onClick={() => setEditorOpen(true)}
            title={`Edit ${label} in code editor`}
          >
            {/* Language badge */}
            <span style={{
              fontSize: 8, fontWeight: 800, letterSpacing: '.1em', textTransform: 'uppercase',
              padding: '2px 7px', borderRadius: 99,
              background: language === 'yaml' ? 'rgba(99,102,241,0.2)' : language === 'json' ? 'rgba(251,191,36,0.15)' : 'rgba(16,185,129,0.15)',
              color: language === 'yaml' ? '#818cf8' : language === 'json' ? '#fbbf24' : '#34d399',
              border: `1px solid ${language === 'yaml' ? 'rgba(99,102,241,0.35)' : language === 'json' ? 'rgba(251,191,36,0.3)' : 'rgba(16,185,129,0.3)'}`,
              flexShrink: 0,
            }}>
              {language.toUpperCase()}
            </span>
            {/* Preview */}
            <span className="yaml-field-preview">
              {preview}{extra}
            </span>
            {/* Open button */}
            <span style={{
              fontSize: 9, fontWeight: 700, color: '#3b82f6',
              display: 'flex', alignItems: 'center', gap: 4, flexShrink: 0,
              letterSpacing: '.04em',
            }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" />
              </svg>
              Edit
            </span>
          </button>

          {editorOpen && (
            <YamlCodeEditor
              fieldLabel={label}
              language={language}
              value={value}
              onSave={(newVal) => { onChange(newVal); setEditorOpen(false); }}
              onClose={() => setEditorOpen(false)}
            />
          )}
        </>
      );
    };

    // ── GCP Custom Node Component ─────────────────────────────────────────────────
    const NODE_ACCENT_COLORS = ['#6366f1', '#3b82f6', '#10b981', '#f97316', '#ec4899', '#eab308', '#8b5cf6', '#ef4444', '#06b6d4', '#f43f5e'];

    // Global context so GCPNodeComponent can call openNodeLogs without prop-drilling
    const VCOContext = React.createContext({ openNodeLogs: null, openEditModal: null, onDisconnectEdge: null });

    const GCPNodeComponent = ({ data, selected, id }) => {
      const schema = data.schema;
      if (!schema) return null;
      const status = data.status || 'idle';
      const collapsed = data.collapsed || false;
      const nodeColor = data.accentColor || schema.color;
      const { setNodes, deleteElements, getEdges } = useReactFlow();
      const { openNodeLogs: openNodeLogsCtx, openEditModal: openEditModalCtx } = React.useContext(VCOContext);

      // ── חישוב חיבורים ──
      const allEdges = getEdges();
      const edgeCount = allEdges.filter(e => e.source === id || e.target === id).length;
      const connectedTargets = new Set(allEdges.filter(e => e.target === id).map(e => e.targetHandle));

      const toggleCollapse = (e) => {
        e.stopPropagation();
        setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, collapsed: !n.data.collapsed } } : n));
      };

      const duplicateNode = () => {
        setNodes(nds => {
          const orig = nds.find(n => n.id === id);
          if (!orig) return nds;
          const newId = `${schema.type}-${Date.now()}`;
          return [...nds, { ...orig, id: newId, position: { x: orig.position.x + 40, y: orig.position.y + 40 }, selected: false }];
        });
      };

      const deleteNode = () => deleteElements({ nodes: [{ id }] });

      const setColor = (color) => {
        setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, accentColor: color } } : n));
      };

      const setStatus = (s) => {
        setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, status: s } } : n));
      };

      const renameNode = () => {
        const newLabel = prompt('Node label:', data.label || schema.label);
        if (newLabel && newLabel.trim()) {
          setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, label: newLabel.trim() } } : n));
        }
      };

      return (
        <>
          {/* Node Toolbar */}
          <NodeToolbar isVisible={selected} position={Position.Top} offset={8}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 3, background: 'var(--bg1)', border: '1px solid var(--border)', borderRadius: 'var(--r8)', padding: '4px 6px', boxShadow: '0 4px 16px var(--shadow)' }}>
              {/* Collapse toggle */}
              <button className="node-toolbar-btn" title={collapsed ? 'Expand' : 'Collapse'} onClick={toggleCollapse}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  {collapsed
                    ? <><polyline points="15 3 21 3 21 9" /><polyline points="9 21 3 21 3 15" /><line x1="21" y1="3" x2="14" y2="10" /><line x1="3" y1="21" x2="10" y2="14" /></>
                    : <><polyline points="4 14 10 14 10 20" /><polyline points="20 10 14 10 14 4" /><line x1="10" y1="14" x2="3" y2="21" /><line x1="21" y1="3" x2="14" y2="10" /></>}
                </svg>
              </button>
              {/* Duplicate */}
              <button className="node-toolbar-btn success" title="Duplicate" onClick={duplicateNode}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></svg>
              </button>
              {/* Rename */}
              <button className="node-toolbar-btn" title="Rename" onClick={renameNode}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
              </button>
              {/* Copy ID */}
              <button className="node-toolbar-btn" title="Copy node ID" onClick={() => navigator.clipboard?.writeText(id)}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><rect x="8" y="2" width="8" height="4" rx="1" ry="1" /></svg>
              </button>
              {/* Status cycle */}
              <button className="node-toolbar-btn" title="Cycle status" onClick={() => setStatus(['idle', 'deployed', 'deploying', 'error'][((['idle', 'deployed', 'deploying', 'error'].indexOf(status) + 1) % 4)])}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></svg>
              </button>
              {/* Mark Error */}
              <button className="node-toolbar-btn danger" title="Mark Error" onClick={() => setStatus('error')}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>
              </button>
              <div className="node-toolbar-divider" />
              {/* Color swatches */}
              {NODE_ACCENT_COLORS.slice(0, 6).map(c => (
                <div key={c} onClick={() => setColor(c)} style={{ width: 14, height: 14, borderRadius: '50%', background: c, cursor: 'pointer', border: nodeColor === c ? '2px solid var(--text0)' : '2px solid transparent', transition: 'transform .1s', flexShrink: 0 }}
                  onMouseEnter={e => e.target.style.transform = 'scale(1.3)'} onMouseLeave={e => e.target.style.transform = 'scale(1)'}
                />
              ))}
              <div className="node-toolbar-divider" />
              {/* Edit Params */}
              <button
                className="node-toolbar-btn"
                title="Edit Parameters (double-click)"
                onClick={e => { e.stopPropagation(); openEditModalCtx && openEditModalCtx(id); }}
                style={{ color: 'var(--accent2)', fontWeight: 700, fontSize: 10, padding: '2px 7px', letterSpacing: '.03em' }}
              >
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>
              </button>
              <div className="node-toolbar-divider" />
              {/* Logs button */}
              <button
                className="node-toolbar-btn"
                title="View Live Logs"
                onClick={e => { e.stopPropagation(); openNodeLogsCtx && openNodeLogsCtx(id, data.label || schema.label); }}
                style={{ color: 'var(--accent)' }}
              >
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" />
                  <line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" />
                </svg>
              </button>
              {/* URL button — only if node has a url_field with a value */}
              {schema.url_field && data.props?.[schema.url_field] && (
                <button
                  className="node-toolbar-btn"
                  title={`Open: ${data.props[schema.url_field]}`}
                  onClick={e => { e.stopPropagation(); window.open(data.props[schema.url_field], '_blank'); }}
                  style={{ color: 'var(--green)' }}
                >
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                    <polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" />
                  </svg>
                </button>
              )}
              <div className="node-toolbar-divider" />
              {/* Delete */}
              <button className="node-toolbar-btn danger" title="Delete" onClick={deleteNode}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></svg>
              </button>
            </div>
          </NodeToolbar>

          {/* Resizer */}
          <NodeResizer
            isVisible={selected}
            minWidth={180}
            minHeight={collapsed ? 52 : 90}
            handleStyle={{ width: 8, height: 8, background: 'var(--accent)', border: '2px solid var(--bg1)', borderRadius: 2 }}
            lineStyle={{ border: '1px solid var(--accent)', opacity: .5 }}
          />

          <div
            className={`gcp-node ${selected ? 'selected' : ''} status-${status} ${collapsed ? 'node-collapsed' : ''}`}
            style={{ '--node-color': nodeColor, width: '100%', height: '100%' }}
          >
            {/* Header */}
            <div className="node-header">
              <div className="node-header-icon" style={{ background: nodeColor + '22', color: nodeColor }}>
                <GCPIcon nodeType={schema.type} fallbackIcon={schema.icon} color={nodeColor} size={18} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="node-header-name">{data.label || schema.label}</div>
                <div className="node-header-type">{schema.type.replace('Node', '')}</div>
              </div>
              {/* Connection count badge */}
              {edgeCount > 0 && (
                <span title={`${edgeCount} connection(s)`} style={{
                  fontSize: 9, fontWeight: 700, color: 'var(--text2)',
                  background: 'var(--bg3)', borderRadius: 99,
                  padding: '1px 5px', marginRight: 4, flexShrink: 0,
                }}>
                  {edgeCount}
                </span>
              )}
              <div className={`status-badge ${status}`} style={{ marginRight: 2 }} />
              <button className="collapse-btn" onClick={toggleCollapse} title={collapsed ? 'Expand' : 'Collapse'}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  {collapsed ? <polyline points="6 9 12 15 18 9" /> : <polyline points="18 15 12 9 6 15" />}
                </svg>
              </button>
            </div>

            {/* Ports */}
            {!collapsed && (
              <div className="node-ports">
                {schema.inputs.map((port) => {
                  const isConnected = connectedTargets.has(port.name);
                  const isMissingRequired = port.required && !isConnected;
                  return (
                    <div key={`in-${port.name}`} className="port-row" style={{ position: 'relative' }}>
                      <Handle
                        type="target"
                        position={Position.Left}
                        id={port.name}
                        data-multiin={port.multi_in ? 'true' : 'false'}
                        title={port.multi_in ? `${port.name} · multi-in` : `${port.name} · single connection`}
                        style={{
                          background: port.color,
                          border: isMissingRequired ? '2px solid var(--yellow)' : port.multi_in ? '2px solid #34d399' : '2px solid var(--bg2)',
                          position: 'absolute', left: -5, top: '50%', transform: 'translateY(-50%)',
                          transition: 'transform .15s, box-shadow .15s',
                          boxShadow: isMissingRequired ? '0 0 0 3px rgba(245,158,11,0.35)' : 'none',
                        }}
                      />
                      <span className="port-label input" style={{ paddingLeft: 20 }}>
                        <span style={{ color: port.color, fontSize: 9, fontWeight: 700, marginRight: 4 }}>{port.label}</span>
                        {port.name.replace(/_/g, ' ')}
                        {port.required && (
                          <span style={{ color: isConnected ? 'var(--green)' : 'var(--yellow)', marginLeft: 3, fontSize: 9 }}>
                            {isConnected ? '✓' : '!'}
                          </span>
                        )}
                      </span>
                    </div>
                  );
                })}
                {schema.inputs.length > 0 && schema.outputs.length > 0 && (
                  <div style={{ height: 1, background: 'var(--border)', margin: '4px 0' }} />
                )}
                {schema.outputs.map((port) => (
                  <div key={`out-${port.name}`} className="port-row" style={{ position: 'relative' }}>
                    <span className="port-label output" style={{ textAlign: 'right', paddingRight: 20 }}>
                      {port.name.replace(/_/g, ' ')}
                      <span style={{ color: port.color, fontSize: 9, fontWeight: 700, marginLeft: 4 }}>{port.label}</span>
                    </span>
                    <Handle
                      type="source"
                      position={Position.Right}
                      id={port.name}
                      style={{
                        background: port.color,
                        border: '2px solid var(--bg2)',
                        position: 'absolute', right: -5, top: '50%', transform: 'translateY(-50%)',
                        transition: 'transform .15s, box-shadow .15s',
                      }}
                    />
                  </div>
                ))}
              </div>
            )}

            {/* Collapsed: show inline handles */}
            {collapsed && (
              <>
                {schema.inputs.map((port, i) => (
                  <Handle key={`in-${port.name}`} type="target" position={Position.Left} id={port.name}
                    style={{ background: port.color, border: '2px solid var(--bg2)', top: `${50 + (i - (schema.inputs.length - 1) / 2) * 20}%` }} />
                ))}
                {schema.outputs.map((port, i) => (
                  <Handle key={`out-${port.name}`} type="source" position={Position.Right} id={port.name}
                    style={{ background: port.color, border: '2px solid var(--bg2)', top: `${50 + (i - (schema.outputs.length - 1) / 2) * 20}%` }} />
                ))}
              </>
            )}
          </div>
        </>
      );
    };

    // ── Custom Edge ───────────────────────────────────────────────────────────────
    const GCPEdge = ({ id, sourceX, sourceY, targetX, targetY, sourcePosition, targetPosition, data, style, markerEnd, selected, source, target, sourceHandle, targetHandle }) => {
      const edgeType = data?.edgeType || 'bezier';
      const color = data?.color || '#60a5fa';
      const animated = data?.animated !== false;
      const label = data?.label || '';
      const { deleteElements, setEdges, getNodes } = useReactFlow();
      const { onDisconnectEdge } = React.useContext(VCOContext);

      let edgePath, labelX, labelY;
      if (edgeType === 'straight') {
        [edgePath, labelX, labelY] = getStraightPath({ sourceX, sourceY, targetX, targetY });
      } else if (edgeType === 'step') {
        [edgePath, labelX, labelY] = getSmoothStepPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition, borderRadius: 8 });
      } else {
        [edgePath, labelX, labelY] = getBezierPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition });
      }

      const handleDelete = () => {
        const nodes = getNodes();
        const sourceNode = nodes.find(n => n.id === source);
        const targetNode = nodes.find(n => n.id === target);
        if (onDisconnectEdge) {
          onDisconnectEdge({ id, source, target, sourceHandle, targetHandle, sourceNode, targetNode });
        }
        deleteElements({ edges: [{ id }] });
      };

      // Mid-point for controls
      const midX = (sourceX + targetX) / 2;
      const midY = (sourceY + targetY) / 2;

      return (
        <>
          {/* Wider invisible hit area */}
          <path
            d={edgePath}
            fill="none"
            stroke="transparent"
            strokeWidth={14}
            style={{ cursor: 'pointer' }}
          />
          <path
            id={id}
            d={edgePath}
            className="react-flow__edge-path"
            style={{
              stroke: color,
              strokeWidth: selected ? 2.5 : 1.5,
              strokeOpacity: 0.85,
              fill: 'none',
              strokeDasharray: animated ? '5 3' : 'none',
              ...style
            }}
            markerEnd={markerEnd}
          />

          {/* Always-visible X button near midpoint — small, appears on hover via CSS */}
          <foreignObject
            x={midX - 10} y={midY - 10}
            width={20} height={20}
            style={{ overflow: 'visible', pointerEvents: 'all' }}
            className="edge-delete-btn-wrapper"
          >
            <div
              onClick={e => { e.stopPropagation(); handleDelete(); }}
              title="Disconnect edge"
              style={{
                width: 20, height: 20, borderRadius: '50%',
                background: selected ? '#ef4444' : 'var(--bg2)',
                border: `1.5px solid ${selected ? '#ef4444' : 'var(--border2)'}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                cursor: 'pointer', fontSize: 9, color: selected ? '#fff' : 'var(--text2)',
                opacity: selected ? 1 : 0,
                transition: 'opacity .15s, background .15s',
                fontWeight: 900,
                boxShadow: selected ? '0 0 8px rgba(239,68,68,0.5)' : 'none',
              }}
              className="edge-delete-btn"
            >
              ✕
            </div>
          </foreignObject>

          {/* Edge label */}
          {label && (
            <foreignObject x={labelX - 35} y={labelY - 11} width={70} height={22} style={{ overflow: 'visible' }}>
              <div className="edge-label-wrapper" style={{ textAlign: 'center' }}>{label}</div>
            </foreignObject>
          )}

          {/* Style controls on selection */}
          {selected && (
            <foreignObject x={midX - 72} y={midY - 36} width={144} height={24} style={{ overflow: 'visible', zIndex: 50 }}>
              <div style={{ display: 'flex', gap: 3, justifyContent: 'center' }}>
                {['step', 'bezier', 'straight'].map(t => (
                  <button key={t} onClick={() => setEdges(eds => eds.map(e => e.id === id ? { ...e, data: { ...e.data, edgeType: t } } : e))}
                    style={{ padding: '2px 5px', borderRadius: 4, border: '1px solid var(--border)', background: edgeType === t ? 'var(--accent)' : 'var(--bg1)', color: edgeType === t ? '#fff' : 'var(--text1)', fontSize: 8, fontFamily: 'var(--font-mono)', cursor: 'pointer' }}>
                    {t[0].toUpperCase()}
                  </button>
                ))}
                <button onClick={() => setEdges(eds => eds.map(e => e.id === id ? { ...e, data: { ...e.data, animated: !animated } } : e))}
                  style={{ padding: '2px 5px', borderRadius: 4, border: '1px solid var(--border)', background: animated ? 'var(--accent)' : 'var(--bg1)', color: animated ? '#fff' : 'var(--text1)', fontSize: 8, fontFamily: 'var(--font-mono)', cursor: 'pointer' }}>
                  ~
                </button>
                <button onClick={handleDelete}
                  style={{ padding: '2px 6px', borderRadius: 4, border: '1px solid #ef444466', background: 'var(--bg1)', color: '#ef4444', fontSize: 8, fontFamily: 'var(--font-mono)', cursor: 'pointer', fontWeight: 700 }}>
                  ✕ disconnect
                </button>
              </div>
            </foreignObject>
          )}
        </>
      );
    };

    // ── Category colours (used in accordion header) ───────────────────────────────
    const CATEGORY_META = {
      Compute: { color: '#0097a7', icon: 'Compute' },
      Data: { color: '#0097a7', icon: 'Databases' },
      Messaging: { color: '#0097a7', icon: 'ServerlessComputing' },
      Storage: { color: '#0097a7', icon: 'Storage' },
      Security: { color: '#0097a7', icon: 'SecurityIdentity' },
      LoadBalancer: { color: '#0097a7', icon: 'cloudLoadBalancing' },
      Networking: { color: '#0097a7', icon: 'Networking' },
      Observability: { color: '#0097a7', icon: 'Observability' },
      IAM: { color: '#0097a7', icon: 'identity_and_access_management' },
      Integration_Services: { color: '#0097a7', icon: 'Integration_Services' },
    };

    // ── Sidebar Navigation — Categories → Nodes two-level drill-down ─────────────
    const CategoryList = ({ filteredTypes, isSearching }) => {
      const grouped = useMemo(() => {
        const map = {};
        filteredTypes.forEach(schema => {
          const cat = schema.category || 'General';
          if (!map[cat]) map[cat] = [];
          map[cat].push(schema);
        });
        return map;
      }, [filteredTypes]);

      const allCats = Object.keys(grouped);
      // activeCategory: null = show categories list, string = show nodes of that category
      const [activeCategory, setActiveCategory] = useState(null);

      // When searching, always show all flat
      const showFlat = isSearching;

      // If active cat disappears from filtered results, reset
      useEffect(() => {
        if (activeCategory && !grouped[activeCategory]) setActiveCategory(null);
      }, [grouped, activeCategory]);

      if (allCats.length === 0) {
        return <div style={{ padding: '24px 12px', fontSize: 11, color: 'var(--text2)', textAlign: 'center' }}>
          <div style={{ fontSize: 20, marginBottom: 8 }}>🔍</div>
          No nodes match
        </div>;
      }

      // ── FLAT search view ──────────────────────────────────────────────────────
      if (showFlat) {
        return (
          <>
            {allCats.map(cat => {
              const meta = CATEGORY_META[cat] || { color: 'var(--accent)', icon: 'cloud' };
              return (
                <div key={cat} style={{ marginBottom: 6 }}>
                  <div style={{ padding: '3px 8px 5px', fontSize: 9, letterSpacing: '.12em', color: meta.color, fontWeight: 700, textTransform: 'uppercase', display: 'flex', alignItems: 'center', gap: 5 }}>
                    <div style={{ width: 5, height: 5, borderRadius: '50%', background: meta.color, flexShrink: 0 }} />
                    {cat}
                  </div>
                  {grouped[cat].map(schema => (
                    <div key={schema.type} className="node-item" style={{ marginLeft: 8, marginBottom: 3 }}
                      draggable onDragStart={e => e.dataTransfer.setData('application/vco-node', schema.type)}>
                      <div className="node-icon" style={{ background: schema.color + '22', color: schema.color, width: 28, height: 28 }}>
                        <GCPIcon nodeType={schema.type} fallbackIcon={schema.icon} color={schema.color} size={14} />
                      </div>
                      <div className="node-info">
                        <div className="node-name">{schema.label}</div>
                        <div className="node-desc">{schema.description}</div>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
          </>
        );
      }

      // ── NODE DRILL-DOWN view ──────────────────────────────────────────────────
      if (activeCategory) {
        const meta = CATEGORY_META[activeCategory] || { color: 'var(--accent)', icon: 'cloud' };
        const nodes = grouped[activeCategory] || [];
        return (
          <div>
            {/* Back button */}
            <div onClick={() => setActiveCategory(null)} style={{
              display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px 10px',
              cursor: 'pointer', color: 'var(--text2)', fontSize: 11, fontFamily: 'var(--font-mono)',
              borderBottom: '1px solid var(--border)', marginBottom: 6,
              transition: 'color .15s',
            }}
              onMouseEnter={e => e.currentTarget.style.color = 'var(--text0)'}
              onMouseLeave={e => e.currentTarget.style.color = 'var(--text2)'}
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6" />
              </svg>
              <span>All Categories</span>
              <div style={{ flex: 1 }} />
              <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <div style={{ width: 14, height: 14, borderRadius: 4, background: meta.color + '22', color: meta.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <GCPIcon nodeType={activeCategory + 'Cat'} fallbackIcon={meta.icon} color={meta.color} size={9} />
                </div>
                <span style={{ fontSize: 10, fontWeight: 700, color: meta.color, textTransform: 'uppercase', letterSpacing: '.08em' }}>{activeCategory}</span>
              </div>
            </div>

            {/* Node count badge */}
            <div style={{ padding: '0 10px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontSize: 9, color: 'var(--text2)', letterSpacing: '.1em', textTransform: 'uppercase', fontWeight: 600 }}>
                {nodes.length} nodes
              </span>
              <div style={{ height: 2, flex: 1, marginLeft: 8, borderRadius: 99, background: `linear-gradient(90deg, ${meta.color}66, transparent)` }} />
            </div>

            {/* Nodes list */}
            {nodes.map(schema => (
              <div key={schema.type} className="node-item" style={{ marginBottom: 4, borderColor: 'transparent' }}
                draggable onDragStart={e => e.dataTransfer.setData('application/vco-node', schema.type)}>
                <div className="node-icon" style={{ background: schema.color + '22', color: schema.color, width: 30, height: 30 }}>
                  <GCPIcon nodeType={schema.type} fallbackIcon={schema.icon} color={schema.color} size={16} />
                </div>
                <div className="node-info">
                  <div className="node-name" style={{ fontSize: 12 }}>{schema.label}</div>
                  <div className="node-desc">{schema.description}</div>
                </div>
              </div>
            ))}
          </div>
        );
      }

      // ── CATEGORIES GRID view ──────────────────────────────────────────────────
      return (
        <div>
          <div style={{ padding: '4px 8px 8px', fontSize: 9, letterSpacing: '.12em', color: 'var(--text2)', fontWeight: 700, textTransform: 'uppercase' }}>
            Categories
          </div>
          {allCats.map(cat => {
            const meta = CATEGORY_META[cat] || { color: 'var(--accent)', icon: 'cloud' };
            const count = grouped[cat].length;
            return (
              <div key={cat} onClick={() => setActiveCategory(cat)} style={{
                display: 'flex', alignItems: 'center', gap: 10,
                padding: '10px 10px', borderRadius: 'var(--r8)', marginBottom: 3,
                cursor: 'pointer', userSelect: 'none',
                background: 'var(--bg2)',
                border: `1px solid transparent`,
                transition: 'all .15s',
              }}
                onMouseEnter={e => { e.currentTarget.style.background = meta.color + '0f'; e.currentTarget.style.borderColor = meta.color + '33'; e.currentTarget.style.transform = 'translateX(2px)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'var(--bg2)'; e.currentTarget.style.borderColor = 'transparent'; e.currentTarget.style.transform = 'translateX(0)'; }}
              >
                {/* Icon */}
                <div style={{
                  width: 36, height: 36, borderRadius: 10,
                  background: `linear-gradient(135deg, ${meta.color}33, ${meta.color}11)`,
                  color: meta.color, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0, border: `1px solid ${meta.color}33`,
                }}>
                  <GCPIcon nodeType={cat + 'Cat'} fallbackIcon={meta.icon} color={meta.color} size={16} />
                </div>
                {/* Text */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 12, fontWeight: 700, color: 'var(--text0)', letterSpacing: '.02em' }}>
                    {cat}
                  </div>
                  <div style={{ fontSize: 9, color: 'var(--text2)', marginTop: 1 }}>
                    {count} node{count !== 1 ? 's' : ''}
                  </div>
                </div>
                {/* Arrow + count */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: meta.color, background: meta.color + '18', borderRadius: 99, padding: '2px 8px', fontFamily: 'var(--font-mono)' }}>
                    {count}
                  </span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--text2)' }}>
                    <polyline points="9 18 15 12 9 6" />
                  </svg>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    // ── Node Edit Modal ───────────────────────────────────────────────────────────
    const NodeEditModal = ({ node, onClose, onChange, nodeEvent }) => {
      if (!node) return null;

      const isGroup = node.type === 'vpcGroup' || node.type === 'groupBox';
      const schema = node.data.schema;
      const props = node.data.props || {};
      const isVisualGroup = node.type === 'groupBox';
      const nodeColor = node.data.accentColor || schema?.color || 'var(--accent)';

      // Fields definition (same as PropertyPanel)
      const fieldDefs = {
        CloudRunNode: [
          { key: 'image', label: 'Container Image', type: 'text', placeholder: 'gcr.io/project/image:tag' },
          { key: 'memory', label: 'Memory', type: 'select', options: ['256Mi', '512Mi', '1Gi', '2Gi', '4Gi', '8Gi'] },
          { key: 'cpu', label: 'CPU', type: 'select', options: ['1', '2', '4', '8'] },
          { key: 'min_instances', label: 'Min Instances', type: 'number' },
          { key: 'max_instances', label: 'Max Instances', type: 'number' },
          { key: 'port', label: 'Container Port', type: 'number' },
        ],
        CloudSQLNode: [
          { key: 'database_version', label: 'Engine', type: 'select', options: ['POSTGRES_15', 'POSTGRES_14', 'MYSQL_8_0', 'SQLSERVER_2019_STANDARD'] },
          { key: 'tier', label: 'Machine Tier', type: 'select', options: ['db-f1-micro', 'db-g1-small', 'db-n1-standard-1', 'db-n1-standard-2', 'db-n1-standard-4'] },
          { key: 'region', label: 'Region', type: 'select', options: ['us-central1', 'us-east1', 'europe-west1', 'asia-east1'] },
          { key: 'disk_size_gb', label: 'Disk (GB)', type: 'number' },
          { key: 'ha', label: 'High Availability', type: 'checkbox' },
        ],
        PubSubNode: [
          { key: 'ack_deadline_seconds', label: 'Ack Deadline (sec)', type: 'number' },
          { key: 'message_retention_duration', label: 'Retention', type: 'text', placeholder: '604800s' },
        ],
        GCSBucketNode: [
          { key: 'location', label: 'Location', type: 'select', options: ['US', 'EU', 'ASIA', 'us-central1', 'europe-west1'] },
          { key: 'storage_class', label: 'Storage Class', type: 'select', options: ['STANDARD', 'NEARLINE', 'COLDLINE', 'ARCHIVE'] },
          { key: 'versioning', label: 'Versioning', type: 'checkbox' },
          { key: 'public_access', label: 'Public Access', type: 'checkbox' },
        ],
        ServiceAccountNode: [
          { key: 'description_sa', label: 'Description', type: 'text', placeholder: 'Service account for...' },
        ],
        VPCNode: [
          { key: 'subnet_cidr', label: 'Subnet CIDR', type: 'text', placeholder: '10.0.0.0/24' },
          { key: 'region', label: 'Region', type: 'select', options: ['us-central1', 'us-east1', 'europe-west1', 'asia-east1'] },
          { key: 'private_google_access', label: 'Private Google Access', type: 'checkbox' },
        ],
        SecretManagerNode: [
          { key: 'replication', label: 'Replication', type: 'select', options: ['automatic', 'user-managed'] },
          { key: 'rotation_days', label: 'Rotation (days, 0=off)', type: 'number' },
        ],
        SubscriptionNode: [
          { key: 'ack_deadline_seconds', label: 'Ack Deadline (sec)', type: 'number' },
          { key: 'retain_acked_messages', label: 'Retain Acked Messages', type: 'checkbox' },
          { key: 'filter_expr', label: 'Filter Expression', type: 'text', placeholder: 'attributes.env="prod"' },
          { key: 'push_endpoint', label: 'Push Endpoint (empty = pull)', type: 'text', placeholder: 'https://...' },
        ],
        CloudFunctionNode: [
          { key: 'runtime', label: 'Runtime', type: 'select', options: ['python311', 'python310', 'nodejs20', 'nodejs18', 'go121', 'java21'] },
          { key: 'memory', label: 'Memory', type: 'select', options: ['128Mi', '256Mi', '512Mi', '1Gi', '2Gi', '4Gi'] },
          { key: 'timeout', label: 'Timeout (sec)', type: 'number' },
          { key: 'trigger', label: 'Trigger', type: 'select', options: ['http', 'pubsub', 'storage'] },
        ],
        BigQueryNode: [
          { key: 'location', label: 'Location', type: 'select', options: ['US', 'EU', 'asia-northeast1', 'europe-west1'] },
          { key: 'dataset_id', label: 'Dataset ID', type: 'text', placeholder: 'my_dataset' },
          { key: 'partition_by', label: 'Partition Field', type: 'text', placeholder: '_PARTITIONTIME' },
          { key: 'expiration_ms', label: 'Table Expiration (ms, 0=never)', type: 'number' },
        ],
        FirestoreNode: [
          { key: 'mode', label: 'Mode', type: 'select', options: ['NATIVE', 'DATASTORE_COMPAT'] },
          { key: 'location', label: 'Location', type: 'select', options: ['us-central', 'us-east1', 'europe-west1', 'asia-east1'] },
          { key: 'ttl_field', label: 'TTL Field', type: 'text', placeholder: 'expireAt' },
        ],
        MemorystoreNode: [
          { key: 'tier', label: 'Tier', type: 'select', options: ['BASIC', 'STANDARD_HA'] },
          { key: 'memory_size_gb', label: 'Memory (GB)', type: 'number' },
          { key: 'redis_version', label: 'Redis Version', type: 'select', options: ['REDIS_7_0', 'REDIS_6_X', 'REDIS_5_0'] },
          { key: 'region', label: 'Region', type: 'select', options: ['us-central1', 'us-east1', 'europe-west1', 'asia-east1'] },
        ],
        LoadBalancerNode: [
          { key: 'lb_type', label: 'Type', type: 'select', options: ['EXTERNAL', 'INTERNAL'] },
          { key: 'protocol', label: 'Protocol', type: 'select', options: ['HTTP', 'HTTPS', 'TCP', 'UDP'] },
          { key: 'ssl_cert', label: 'SSL Certificate', type: 'text', placeholder: 'projects/.../sslCertificates/...' },
          { key: 'cdn_enabled', label: 'Cloud CDN', type: 'checkbox' },
        ],
      };

      const nodeFields = schema?.params_schema || fieldDefs[schema?.type] || [];

      // ── Edges: used for auto_from_port detection ──────────────────────────────
      const allEdges = useEdges();

      // For a cascade-select field: derive current options from the parent field value
      const getCascadeOptions = (f) => {
        if (!f.cascade_parent || !f.catalog) return f.options || [];
        const parentVal = props[f.cascade_parent] || '';
        return f.catalog[parentVal] || f.options || [];
      };

      // For auto_from_port: check if the 'source' input port has an incoming edge
      // and if so, read the source node's schema type to map to a provider label
      const getPortLockedValue = (f) => {
        if (!f.auto_from_port) return null;
        // Find any edge targeting this node's 'source' handle
        const incomingEdge = allEdges.find(
          e => e.target === node.id && e.targetHandle === 'source'
        );
        if (!incomingEdge) return null;
        // The source node type is embedded in its id prefix (e.g. "FirestoreNode-abc123")
        // or we read schema from data — but we only have edge here, not nodes.
        // So we encode the provider in the edge's data.sourceType (set during onConnect).
        // Fallback: parse the source id prefix.
        const srcType = incomingEdge.data?.sourceType || incomingEdge.source.split('-')[0];
        // Map node type → provider label using the catalog keys stored on the field
        if (f.catalog) {
          // catalog shape: { "Cloud Firestore": [...], ... }
          // We stored the mapping in PORT_PROVIDER_MAP below
        }
        return incomingEdge.data?.detectedProvider || null;
      };

      // ── Field renderer — cascade / show_if / auto_from_port aware ────────────
      const renderField = (f) => {
        // show_if: hide field when condition not met
        if (f.show_if) {
          const conditionMet = Object.entries(f.show_if).every(
            ([k, v]) => (props[k] || '') === v
          );
          if (!conditionMet) return null;
        }

        const isCodeField = f.type === 'yaml' || f.type === 'code' || f.type === 'json';
        const codeLang = f.type === 'yaml' ? 'yaml' : f.type === 'json' ? 'json' : (f.language || 'yaml');

        // auto_from_port: lock a select to a value derived from the connected port
        const portLockedValue = getPortLockedValue(f);
        const isPortLocked = portLockedValue !== null;

        // cascade select: options depend on sibling field value
        const selectOptions = f.cascade_parent
          ? getCascadeOptions(f)
          : (f.options || []);

        // When provider cascades, auto-pick first method if current method is no longer valid
        const currentVal = props[f.key] ?? (isPortLocked ? portLockedValue : (f.default || ''));

        return (
          <div key={f.key} className={`modal-field-group ${isCodeField ? 'modal-full' : ''}`}>
            <label className="modal-field-label" style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              {f.label}
              {isPortLocked && (
                <span style={{
                  fontSize: 9, fontWeight: 700, letterSpacing: '.05em',
                  padding: '1px 6px', borderRadius: 99,
                  background: 'rgba(16,185,129,0.15)', color: '#34d399',
                  border: '1px solid rgba(16,185,129,0.3)',
                }}>auto · from port</span>
              )}
            </label>
            {isCodeField ? (
              <YamlFieldTrigger
                label={f.label}
                fieldKey={f.key}
                language={codeLang}
                value={props[f.key] ?? (f.default || '')}
                onChange={(val) => onChange(node.id, f.key, val, true)}
              />
            ) : f.type === 'checkbox' ? (
              <label style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', padding: '8px 0' }}>
                <div style={{ position: 'relative', width: 38, height: 22, flexShrink: 0 }}>
                  <input type="checkbox" checked={props[f.key] ?? false}
                    onChange={e => onChange(node.id, f.key, e.target.checked, true)}
                    style={{ opacity: 0, position: 'absolute', inset: 0, width: '100%', height: '100%', cursor: 'pointer', zIndex: 1, margin: 0 }} />
                  <div style={{
                    position: 'absolute', inset: 0, borderRadius: 99,
                    background: (props[f.key]) ? 'var(--accent)' : 'var(--bg3)',
                    border: `1.5px solid ${(props[f.key]) ? 'var(--accent)' : 'var(--border)'}`,
                    transition: 'background .2s, border-color .2s',
                  }}>
                    <div style={{
                      position: 'absolute', top: 2, width: 14, height: 14, borderRadius: '50%',
                      background: '#fff', transition: 'left .2s',
                      left: (props[f.key]) ? 20 : 2,
                      boxShadow: '0 1px 3px rgba(0,0,0,.3)',
                    }} />
                  </div>
                </div>
                <span style={{ fontSize: 12, color: 'var(--text1)' }}>Enabled</span>
              </label>
            ) : f.type === 'select' ? (
              <select
                className="modal-field-select"
                value={isPortLocked ? portLockedValue : (props[f.key] || (selectOptions[0] || ''))}
                disabled={isPortLocked}
                style={isPortLocked ? { opacity: 0.6, cursor: 'not-allowed' } : {}}
                onChange={e => {
                  const newVal = e.target.value;
                  onChange(node.id, f.key, newVal, true);
                  // If this field has a cascade_target, reset that child field to first option
                  if (f.cascade_target && f.catalog) {
                    const childOptions = f.catalog[newVal] || [];
                    if (childOptions.length > 0) {
                      onChange(node.id, f.cascade_target, childOptions[0], true);
                    }
                  }
                }}
              >
                {!isPortLocked && <option value="">— select —</option>}
                {selectOptions.map(o => <option key={o} value={o}>{o}</option>)}
              </select>
            ) : (
              <input className="modal-field-input" type={f.type || 'text'}
                value={props[f.key] ?? ''}
                placeholder={f.placeholder || ''}
                onChange={e => onChange(node.id, f.key, f.type === 'number' ? +e.target.value : e.target.value, true)} />
            )}
          </div>
        );
      };

      // Split fields into two columns — code fields always go full-width
      const checkboxFields = nodeFields.filter(f => f.type === 'checkbox');
      const normalFields = nodeFields.filter(f => f.type !== 'checkbox');

      const statusColors = { idle: 'var(--text2)', deployed: 'var(--green)', deploying: 'var(--yellow)', error: 'var(--red)', working: '#fff', failed: 'var(--red)' };
      const currentStatus = node.data.status || 'idle';

      return (
        <div className="node-edit-modal-overlay" onClick={onClose}>
          <div className="node-edit-modal" style={{ '--modal-accent': nodeColor }} onClick={e => e.stopPropagation()}>
            {/* Header */}
            <div className="node-edit-modal-header">
              {/* Node icon */}
              <div style={{
                width: 52, height: 52, borderRadius: 14, flexShrink: 0,
                background: `linear-gradient(135deg, ${nodeColor}33, ${nodeColor}18)`,
                color: nodeColor, display: 'flex', alignItems: 'center', justifyContent: 'center',
                border: `1.5px solid ${nodeColor}44`,
                boxShadow: `0 4px 16px ${nodeColor}22`,
              }}>
                {schema && <GCPIcon nodeType={schema.type} fallbackIcon={schema.icon} color={nodeColor} size={26} />}
              </div>
              {/* Title & meta */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 17, color: 'var(--text0)', letterSpacing: '-.3px', marginBottom: 3 }}>
                  {node.data.label || schema?.label || 'Node'}
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--font-mono)', background: 'var(--bg3)', padding: '1px 7px', borderRadius: 99 }}>
                    {schema?.type?.replace('Node', '') || node.type}
                  </span>
                  <span style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--font-mono)' }}>
                    #{node.id.slice(0, 8)}
                  </span>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                    <div style={{ width: 7, height: 7, borderRadius: '50%', background: statusColors[currentStatus] || 'var(--text2)', boxShadow: `0 0 6px ${statusColors[currentStatus] || 'var(--text2)'}` }} />
                    <span style={{ fontSize: 10, color: statusColors[currentStatus] || 'var(--text2)', textTransform: 'capitalize', fontFamily: 'var(--font-mono)' }}>{currentStatus}</span>
                  </div>
                </div>
              </div>
              {/* Close */}
              <button onClick={onClose} style={{
                width: 32, height: 32, borderRadius: 8, border: '1px solid var(--border)',
                background: 'var(--bg3)', color: 'var(--text2)', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                transition: 'all .15s',
              }}
                onMouseEnter={e => { e.currentTarget.style.color = 'var(--text0)'; e.currentTarget.style.background = 'var(--bg4)'; }}
                onMouseLeave={e => { e.currentTarget.style.color = 'var(--text2)'; e.currentTarget.style.background = 'var(--bg3)'; }}
              >
                {ICONS.close}
              </button>
            </div>

            {/* Body */}
            <div className="node-edit-modal-body">
              {/* Last deploy event — full width */}
              {nodeEvent && (
                <div className="modal-full">
                  <div className="modal-section-title" style={{ marginTop: 0 }}>🚀 Last Deploy</div>
                  <NodeEventCard event={nodeEvent} />
                </div>
              )}

              {/* Label — full width */}
              <div className="modal-field-group modal-full">
                <label className="modal-field-label">Node Label</label>
                <input className="modal-field-input" style={{ fontSize: 14, fontWeight: 600 }}
                  value={node.data.label || ''}
                  onChange={e => onChange(node.id, 'label', e.target.value)}
                  placeholder={schema?.label || 'Label'} />
              </div>

              {/* Configuration section */}
              {nodeFields.length > 0 && (
                <div className="modal-section-title">⚙ Configuration</div>
              )}

              {/* Normal fields — in 2 cols */}
              {normalFields.map(f => renderField(f))}

              {/* Checkbox fields — full width */}
              {checkboxFields.length > 0 && (
                <div className="modal-full" style={{ display: 'flex', gap: 24, flexWrap: 'wrap' }}>
                  {checkboxFields.map(f => (
                    <div key={f.key} style={{ flex: '1 1 180px' }}>{renderField(f)}</div>
                  ))}
                </div>
              )}

              {/* Ports section */}
              {((schema?.inputs?.length > 0) || (schema?.outputs?.length > 0)) && (
                <>
                  <div className="modal-section-title">🔌 Ports</div>
                  {schema?.inputs?.length > 0 && (
                    <div>
                      <div style={{ fontSize: 10, color: 'var(--text2)', marginBottom: 8, fontWeight: 700, letterSpacing: '.08em' }}>INPUTS</div>
                      {schema.inputs.map(p => (
                        <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, padding: '6px 10px', background: 'var(--bg2)', borderRadius: 8, border: '1px solid var(--border)' }}>
                          <div style={{ width: 9, height: 9, borderRadius: '50%', background: p.color, flexShrink: 0, boxShadow: `0 0 5px ${p.color}` }} />
                          <span style={{ fontSize: 12, color: 'var(--text1)', flex: 1 }}>{p.name.replace(/_/g, ' ')}</span>
                          <span className="port-type-badge" style={{ background: p.color + '22', color: p.color }}>{p.label}</span>
                          {p.required && <span style={{ fontSize: 9, color: 'var(--red)', fontWeight: 700 }}>REQ</span>}
                          {p.multi_in && <span style={{ fontSize: 9, color: '#34d399', background: '#34d39920', borderRadius: 99, padding: '1px 6px' }}>multi-in</span>}
                        </div>
                      ))}
                    </div>
                  )}
                  {schema?.outputs?.length > 0 && (
                    <div>
                      <div style={{ fontSize: 10, color: 'var(--text2)', marginBottom: 8, fontWeight: 700, letterSpacing: '.08em' }}>OUTPUTS</div>
                      {schema.outputs.map(p => (
                        <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, padding: '6px 10px', background: 'var(--bg2)', borderRadius: 8, border: '1px solid var(--border)' }}>
                          <div style={{ width: 9, height: 9, borderRadius: '50%', background: p.color, flexShrink: 0, boxShadow: `0 0 5px ${p.color}` }} />
                          <span style={{ fontSize: 12, color: 'var(--text1)', flex: 1 }}>{p.name.replace(/_/g, ' ')}</span>
                          <span className="port-type-badge" style={{ background: p.color + '22', color: p.color }}>{p.label}</span>
                          {p.multi && <span style={{ fontSize: 9, color: 'var(--text2)' }}>multi</span>}
                        </div>
                      ))}
                    </div>
