<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visual Cloud Orchestrator</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d1117'/%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='%233b82f6' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%233b82f6'/%3E%3Cpath d='M16 4 L16 8 M16 24 L16 28 M4 16 L8 16 M24 16 L28 16' stroke='%233b82f6' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M8.5 8.5 L11.2 11.2 M20.8 20.8 L23.5 23.5 M23.5 8.5 L20.8 11.2 M11.2 20.8 L8.5 23.5' stroke='%236366f1' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/reactflow@11/dist/umd/index.js"></script>
<link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12/dist/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12/dist/style.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg0:#080b12;
  --bg1:#0d1117;
  --bg2:#111827;
  --bg3:#1a2235;
  --bg4:#1e2d42;
  --border:#1e3a5f;
  --border2:#243b55;
  --text0:#f0f6ff;
  --text1:#94a3b8;
  --text2:#4a6080;
  --accent:#3b82f6;
  --accent2:#6366f1;
  --green:#10b981;
  --red:#ef4444;
  --yellow:#f59e0b;
  --shadow:rgba(0,0,0,0.4);
  --font-mono:'JetBrains Mono',monospace;
  --font-display:'Syne',sans-serif;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
}
[data-theme="light"]{
  --bg0:#f0f4f8;
  --bg1:#ffffff;
  --bg2:#f8fafc;
  --bg3:#e2e8f0;
  --bg4:#cbd5e1;
  --border:#c7d7e8;
  --border2:#b0c4d8;
  --text0:#0f172a;
  --text1:#475569;
  --text2:#94a3b8;
  --accent:#2563eb;
  --accent2:#4f46e5;
  --green:#059669;
  --red:#dc2626;
  --yellow:#d97706;
  --shadow:rgba(0,0,0,0.12);
}
[data-theme="light"] .react-flow__background{background:var(--bg0)!important}
[data-theme="light"] .react-flow__background pattern circle{fill:var(--border2)!important;opacity:.6}
[data-theme="light"] .react-flow__minimap{background:var(--bg2)!important;border-color:var(--border)!important}
[data-theme="light"] .react-flow__minimap-mask{fill:var(--bg3)!important;opacity:.6!important}
[data-theme="light"] .react-flow__controls{background:var(--bg1)!important;border-color:var(--border)!important;box-shadow:0 2px 8px var(--shadow)!important}
[data-theme="light"] .react-flow__controls-button{color:var(--text1)!important;border-bottom-color:var(--border)!important}
[data-theme="light"] .react-flow__controls-button:hover{background:var(--bg3)!important}
[data-theme="light"] .react-flow__handle{border-color:var(--bg1)!important}
[data-theme="light"] .field-input,[data-theme="light"] .field-select{background:var(--bg1);color:var(--text0);border-color:var(--border)}
[data-theme="light"] .node-header{border-bottom-color:var(--border)}
[data-theme="light"] .gcp-node{box-shadow:0 2px 8px var(--shadow)}

html,body,#root{height:100%;width:100%;overflow:hidden;background:var(--bg0);color:var(--text0);font-family:var(--font-mono);transition:background .2s,color .2s}

/* ── Layout ── */
.app{display:flex;height:100vh;width:100vw;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;background: linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%)}
.canvas-wrap{flex:1;position:relative;background:var(--bg0)}
.panel-right{width:280px;min-width:280px;background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s;z-index:10}
.panel-right.collapsed{width:0;min-width:0;overflow:hidden}

/* ── Topbar ── */
.topbar{height:48px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:absolute;top:0;left:0;right:0;z-index:20}
.logo{font-family:var(--font-display);font-weight:800;font-size:15px;letter-spacing:-.5px;color:var(--text0);display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.topbar-spacer{flex:1}
.topbar-menu{position:relative;display:flex;align-items:center}
.topbar-menu-button{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;border:1px solid var(--border2);background:var(--bg2);color:var(--text1);cursor:pointer;font-family:var(--font-mono);font-size:11px;transition:all .15s}
.topbar-menu-button:hover{background:var(--bg3);color:var(--text0)}
.topbar-menu-panel{position:absolute;top:calc(100% + 6px);left:0;min-width:180px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r12);box-shadow:0 16px 40px rgba(0,0,0,.3);overflow:hidden;z-index:40}
.topbar-menu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;color:var(--text1);font-size:12px;cursor:pointer;transition:all .12s}
.topbar-menu-item:hover{background:var(--bg3);color:var(--text0)}
.topbar-menu-item span{flex:1}
.topbar-menu-divider{height:1px;background:var(--border);margin:4px 0}
.btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--r8);border:none;cursor:pointer;font-family:var(--font-mono);font-size:12px;font-weight:500;transition:all .15s}
.btn-ghost{background:transparent;color:var(--text1);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text0);border-color:var(--border)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb;box-shadow:0 0 16px rgba(59,130,246,.4)}
.btn-deploy{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-deploy:hover{box-shadow:0 0 16px rgba(16,185,129,.4)}
.btn-danger{background:var(--red);color:#fff}


/* ── Sidebar ── */
.sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.sidebar-title{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--text2);text-transform:uppercase}
.sidebar-search{margin:10px 12px;position:relative}
.sidebar-search input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r8);padding:7px 10px 7px 30px;color:var(--text0);font-family:var(--font-mono);font-size:12px;outline:none}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:13px}
.node-list{flex:1;overflow-y:auto;padding:8px}
.node-list::-webkit-scrollbar{width:3px}
.node-list::-webkit-scrollbar-track{background:transparent}
.node-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

.node-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--r8);
  cursor:grab;user-select:none;margin-bottom:4px;
  border:1px solid transparent;
  transition:all .15s;
  background:var(--bg2);
}
.node-item:hover{border-color:var(--border);background:var(--bg3);transform:translateX(2px)}
.node-item:active{cursor:grabbing;opacity:.8}
.node-icon{width:32px;height:32px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.node-info{flex:1;min-width:0}
.node-name{font-size:12px;font-weight:600;color:var(--text0);font-family:var(--font-display)}
.node-desc{font-size:10px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Canvas ── */
.canvas-wrap .react-flow{top:48px !important}
.react-flow__background{background:var(--bg0) !important}
.react-flow__background pattern circle{fill:var(--border) !important}

/* ── Custom Nodes ── */
.gcp-node{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:var(--r12);
  min-width:200px;
  overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
  position:relative;
}
.gcp-node::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--node-color,var(--accent));
  border-radius:var(--r12) var(--r12) 0 0;
}
.gcp-node:hover{border-color:var(--node-color,var(--accent));box-shadow:0 0 0 1px var(--node-color,var(--accent))33,0 8px 32px rgba(0,0,0,.4)}
.gcp-node.selected{border-color:var(--node-color,var(--accent));box-shadow:0 0 0 2px var(--node-color,var(--accent))66,0 8px 32px rgba(0,0,0,.5)}
.gcp-node.status-deployed::before{background:var(--green)}
.gcp-node.status-error::before{background:var(--red)}

/* צהוב — בתור → עובדים על זה בקרוב */
.gcp-node.status-deploying::before { background: var(--yellow); animation: pulse-bar 1s ease-in-out infinite }
.status-badge.deploying { background: var(--yellow); animation: pulse-dot 1s ease-in-out infinite }

/* לבן — עובדים על זה עכשיו ממש */
.gcp-node.status-working::before { background: #fff; animation: pulse-bar 0.4s ease-in-out infinite }
.gcp-node.status-working { box-shadow: 0 0 0 2px rgba(255,255,255,0.8), 0 0 24px rgba(255,255,255,0.3) !important }
.status-badge.working { background: #fff; box-shadow: 0 0 10px #fff; animation: pulse-dot 0.4s ease-in-out infinite }

.gcp-node.status-failed::before { background: var(--red); animation: pulse-bar 0.4s ease-in-out infinite; }
.status-badge.failed { background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse-dot 0.4s ease-in-out infinite; }
@keyframes pulse-bar{0%,100%{opacity:1}50%{opacity:.3}}

.node-header{padding:10px 12px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.node-header-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.node-header-name{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text0);flex:1}
.node-header-type{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--text2);text-transform:uppercase;margin-top:1px}
.status-badge{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-badge.idle{background:var(--text2)}
.status-badge.deployed{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-badge.deploying{background:var(--yellow);animation:pulse-dot 1s ease-in-out infinite}
.status-badge.error{background:var(--red);box-shadow:0 0 6px var(--red)}
.node-missing-required::after {
  content: '!';
  position: absolute;
  top: -4px; right: -4px;
  width: 14px; height: 14px;
  background: var(--yellow);
  color: #000;
  font-size: 9px; font-weight: 900;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  line-height: 14px; text-align: center;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

.node-ports{padding:8px 0}
.port-row{display:flex;align-items:center;padding:3px 0;position:relative;height:26px}
.port-label{font-size:10px;color:var(--text1);padding:0 10px;flex:1}
.port-label.input{padding-left:20px}
.port-label.output{padding-right:20px;text-align:right}

/* ── Custom Handles ── */
.react-flow__handle{
  width:10px!important;height:10px!important;
  border-radius:50%!important;
  border:2px solid var(--bg2)!important;
  transition:transform .15s,box-shadow .15s!important;
}
.react-flow__handle:hover{transform:scale(1.4)!important;box-shadow:0 0 0 3px rgba(255,255,255,.1)!important}
.react-flow__handle-left{left:-5px!important}
.react-flow__handle-right{right:-5px!important}

.react-flow__handle-connecting {
  transform: scale(1.6) !important;
  box-shadow: 0 0 0 4px rgba(255,255,255,0.15) !important;
}
.react-flow__handle-valid {
  box-shadow: 0 0 0 4px rgba(16,185,129,0.4) !important;
}

/* ── Edges ── */
.react-flow__edge-path{stroke-width:1.5!important}
.react-flow__edge.animated .react-flow__edge-path{stroke-dasharray:5 3}
.react-flow__edge.invalid .react-flow__edge-path{stroke:var(--red)!important;stroke-dasharray:4 3}
.react-flow__connection-line{stroke:var(--text1)!important;stroke-width:1.5!important;stroke-dasharray:5 3!important}

/* ── MiniMap ── */
.react-flow__minimap{background:var(--bg2)!important;border:1px solid var(--border)!important;border-radius:var(--r8)!important}
.react-flow__minimap-mask{fill:var(--bg1)!important;opacity:.7!important}

/* ── Controls ── */
.react-flow__controls{background:var(--bg2)!important;border:1px solid var(--border)!important;border-radius:var(--r8)!important}
.react-flow__controls-button{background:transparent!important;border:none!important;border-bottom:1px solid var(--border)!important;color:var(--text1)!important}
.react-flow__controls-button:last-child{border-bottom:none!important}
.react-flow__controls-button:hover{background:var(--bg3)!important;color:var(--text0)!important}
.react-flow__controls-button svg{fill:currentColor!important}

/* ── Property Panel ── */
.panel-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text0)}
.panel-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.panel-close:hover{color:var(--text0);background:var(--bg3)}
.panel-body{flex:1;overflow-y:auto;padding:16px}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.field-group{margin-bottom:16px}
.field-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text2);text-transform:uppercase;margin-bottom:6px;display:block}
.field-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r8);padding:7px 10px;color:var(--text0);font-family:var(--font-mono);font-size:12px;outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--accent)}
.field-select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r8);padding:7px 10px;color:var(--text0);font-family:var(--font-mono);font-size:12px;outline:none;cursor:pointer}
.field-checkbox{display:flex;align-items:center;gap:8px;cursor:pointer}
.field-checkbox input{accent-color:var(--accent)}
.section-title{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--text2);text-transform:uppercase;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* ── Log Panel ── */
.log-panel{position:absolute;bottom:0;left:0;right:0;height:160px;background:var(--bg1);border-top:1px solid var(--border);z-index:15;display:flex;flex-direction:column;min-height:36px;max-height:80vh}
.log-panel.hidden{height:36px!important;overflow:hidden}
.log-panel.hidden .log-body,.log-panel.hidden .log-toolbar{display:none}
.log-resize-handle{position:absolute;top:-4px;left:0;right:0;height:8px;cursor:ns-resize;z-index:20;display:flex;align-items:center;justify-content:center}
.log-resize-handle::after{content:'';width:40px;height:3px;border-radius:99px;background:var(--border2);transition:background .15s}
.log-resize-handle:hover::after{background:var(--accent)}
.log-header{padding:5px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;height:36px}
.log-title{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--text2);text-transform:uppercase}
.log-toolbar{padding:5px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--bg2)}
.log-filter-btn{padding:2px 8px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:9px;font-family:var(--font-mono);cursor:pointer;font-weight:600;letter-spacing:.05em;transition:all .12s}
.log-filter-btn:hover{border-color:var(--border2);color:var(--text1)}
.log-filter-btn.active-ok{background:rgba(16,185,129,0.15);border-color:#10b981;color:#10b981}
.log-filter-btn.active-err{background:rgba(239,68,68,0.15);border-color:#ef4444;color:#ef4444}
.log-filter-btn.active-info{background:rgba(59,130,246,0.15);border-color:#3b82f6;color:#3b82f6}
.log-filter-btn.active-warn{background:rgba(245,158,11,0.15);border-color:#f59e0b;color:#f59e0b}
.log-filter-btn.active-all{background:var(--bg3);border-color:var(--border2);color:var(--text0)}
.log-search{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r8);padding:3px 8px;color:var(--text0);font-family:var(--font-mono);font-size:10px;outline:none;width:130px;transition:border-color .15s}
.log-search:focus{border-color:var(--accent)}
.log-search::placeholder{color:var(--text2)}
.log-body{flex:1;overflow-y:auto;padding:6px 14px;font-size:11px;line-height:1.7}
.log-body::-webkit-scrollbar{width:3px}
.log-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.log-entry{display:flex;gap:8px;color:var(--text1)}
.log-entry .ts{color:var(--text2);flex-shrink:0}
.log-entry.ok .msg{color:var(--green)}
.log-entry.err .msg{color:var(--red)}
.log-entry.info .msg{color:var(--accent)}
.log-entry.warn .msg{color:var(--yellow)}

/* ── Toolbar ── */
.canvas-toolbar{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r12);padding:6px;z-index:15}

/* ── Toast ── */
.toast-container{position:absolute;top:60px;right:16px;z-index:100;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r8);padding:10px 14px;font-size:12px;color:var(--text0);display:flex;align-items:center;gap:8px;animation:slide-in .2s ease;pointer-events:all;max-width:280px}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--accent)}
@keyframes slide-in{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Empty State ── */
.empty-canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;user-select:none}
.empty-title{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--text2);letter-spacing:-.5px;margin-bottom:8px}
.empty-sub{font-size:12px;color:var(--text2);line-height:1.6}
.empty-grid{position:absolute;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:28px 28px;opacity:.3;pointer-events:none}

/* ── Badge ── */
.port-type-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:9px;font-weight:600;letter-spacing:.05em}

/* ── Node Toolbar ── */
.react-flow__node-toolbar{
  display:flex!important;gap:3px!important;
  background:var(--bg1)!important;
  border:1px solid var(--border)!important;
  border-radius:var(--r8)!important;
  padding:4px!important;
  box-shadow:0 4px 16px var(--shadow)!important;
}
.node-toolbar-btn{
  width:26px;height:26px;border-radius:6px;
  border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text1);transition:all .12s;font-size:11px;
}
.node-toolbar-btn:hover{background:var(--bg3);color:var(--text0)}
.node-toolbar-btn.danger:hover{background:#ef444422;color:var(--red)}
.node-toolbar-btn.success:hover{background:#10b98122;color:var(--green)}
.node-toolbar-divider{width:1px;background:var(--border);margin:2px 1px;align-self:stretch}

/* ── Edge Toolbar (floating on selected edge) ── */
.edge-btn{
  position:absolute;
  display:flex;align-items:center;gap:3px;
  background:var(--bg1);border:1px solid var(--border);
  border-radius:var(--r8);padding:3px 6px;

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react,typescript">
const {
  useState, useEffect, useCallback, useRef, useMemo
} = React;

const {
  ReactFlow, ReactFlowProvider, MiniMap, Controls, Background,
  BackgroundVariant, addEdge, useNodesState, useEdgesState,
  Handle, Position, useReactFlow, Panel,
  getBezierPath, getStraightPath, getSmoothStepPath,
  NodeResizer, NodeToolbar,
} = window.ReactFlow;

// ── Icons (inline SVG) ────────────────────────────────────────────────────────
const ICONS = {
  cloud:      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>,
  database:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
  radio:      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg>,
  archive:    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>,
  'user-check':<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>,
  network:    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="6" height="6"/><rect x="16" y="2" width="6" height="6"/><rect x="9" y="16" width="6" height="6"/><path d="M5 8v4c0 1 1 2 2 2h10c1 0 2-1 2-2V8"/><line x1="12" y1="14" x2="12" y2="16"/></svg>,
  key:        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
  search:     <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  play:       <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
  save:       <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
  trash:      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
  terminal:   <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
  close:      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  chevron:    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
  zap:        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  table:      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>,
  layers:     <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
  inbox:      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>,
  globe:      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
  'chevron-down': <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
  'chevron-right':<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
};

// ── Node type definitions (fallback if backend offline) ───────────────────────
// multi_in: input port accepts >1 incoming edge  |  multi: output fans-out to many
const DEFAULT_NODE_TYPES_DATA = [];

// ── GCP Icon Loader — tries icons/{NodeType}.svg first, falls back to inline ──
const gcpIconCache = {};

const GCPIcon = ({ nodeType, fallbackIcon, color, size = 20 }) => {
  const [src, setSrc] = React.useState(() => gcpIconCache[nodeType] || null);
  const [failed, setFailed] = React.useState(gcpIconCache[nodeType] === false);

  React.useEffect(() => {
    if (gcpIconCache[nodeType] !== undefined) {
      if (gcpIconCache[nodeType] === false) setFailed(true);
      else setSrc(gcpIconCache[nodeType]);
      return;
    }
    
    const formattedType = fallbackIcon
    .replace(/([a-z])([A-Z])/g, '$1_$2') // מוסיף קו תחתון בין אות קטנה לגדולה
    .toLowerCase();            // הופך הכל לאותיות קטנות
    
    const url = `icons/${formattedType}/${formattedType}.svg`;
    fetch(url)
      .then(r => {
        if (!r.ok) throw new Error('not found');
        return r.text();
      })
      .then(text => {
        gcpIconCache[nodeType] = url;
        setSrc(url);
      })
      .catch(() => {
        gcpIconCache[nodeType] = false;
        setFailed(true);
      });
  }, [nodeType]);

  if (src && !failed) {
    return (
      <img
        src={src}
        width={size}
        height={size}
        style={{ display: 'block', objectFit: 'contain', filter: 'drop-shadow(0 0 2px rgba(0,0,0,0.4))' }}
        onError={() => { gcpIconCache[nodeType] = false; setFailed(true); setSrc(null); }}
        alt={nodeType}
      />
    );
  }
  // fallback to inline SVG icon
  return <span style={{ color, display: 'flex', alignItems: 'center' }}>{ICONS[fallbackIcon] || ICONS.cloud}</span>;
};

// ── GCP Custom Node Component ─────────────────────────────────────────────────
const NODE_ACCENT_COLORS = ['#6366f1','#3b82f6','#10b981','#f97316','#ec4899','#eab308','#8b5cf6','#ef4444','#06b6d4','#f43f5e'];

// Global context so GCPNodeComponent can call openNodeLogs without prop-drilling
const VCOContext = React.createContext({ openNodeLogs: null, openEditModal: null });

const GCPNodeComponent = ({ data, selected, id }) => {
  const schema = data.schema;
  if (!schema) return null;
  const status = data.status || 'idle';
  const collapsed = data.collapsed || false;
  const nodeColor = data.accentColor || schema.color;
  const { setNodes, deleteElements, getEdges } = useReactFlow();
  const { openNodeLogs: openNodeLogsCtx, openEditModal: openEditModalCtx } = React.useContext(VCOContext);

  // ── חישוב חיבורים ──
  const allEdges = getEdges();
  const edgeCount = allEdges.filter(e => e.source === id || e.target === id).length;
  const connectedTargets = new Set(allEdges.filter(e => e.target === id).map(e => e.targetHandle));

  const toggleCollapse = (e) => {
    e.stopPropagation();
    setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, collapsed: !n.data.collapsed } } : n));
  };

  const duplicateNode = () => {
    setNodes(nds => {
      const orig = nds.find(n => n.id === id);
      if (!orig) return nds;
      const newId = `${schema.type}-${Date.now()}`;
      return [...nds, { ...orig, id: newId, position: { x: orig.position.x + 40, y: orig.position.y + 40 }, selected: false }];
    });
  };

  const deleteNode = () => deleteElements({ nodes: [{ id }] });

  const setColor = (color) => {
    setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, accentColor: color } } : n));
  };

  const setStatus = (s) => {
    setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, status: s } } : n));
  };

  const renameNode = () => {
    const newLabel = prompt('Node label:', data.label || schema.label);
    if (newLabel && newLabel.trim()) {
      setNodes(nds => nds.map(n => n.id === id ? { ...n, data: { ...n.data, label: newLabel.trim() } } : n));
    }
  };

  return (
    <>
      {/* Node Toolbar */}
      <NodeToolbar isVisible={selected} position={Position.Top} offset={8}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 3, background: 'var(--bg1)', border: '1px solid var(--border)', borderRadius: 'var(--r8)', padding: '4px 6px', boxShadow: '0 4px 16px var(--shadow)' }}>
          {/* Collapse toggle */}
          <button className="node-toolbar-btn" title={collapsed ? 'Expand' : 'Collapse'} onClick={toggleCollapse}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              {collapsed
                ? <><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>
                : <><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></>}
            </svg>
          </button>
          {/* Duplicate */}
          <button className="node-toolbar-btn success" title="Duplicate" onClick={duplicateNode}>

        isVisible={selected}

        minHeight={collapsed ? 52 : 90}
        handleStyle={{ width: 8, height: 8, background: 'var(--accent)', border: '2px solid var(--bg1)', borderRadius: 2 }}
        lineStyle={{ border: '1px solid var(--accent)', opacity: .5 }}
      />

      <div
        className={`gcp-node ${selected ? 'selected' : ''} status-${status} ${collapsed ? 'node-collapsed' : ''}`}
        style={{ '--node-color': nodeColor, width: '100%', height: '100%' }}
      >
        {/* Header */}
        <div className="node-header">
          <div className="node-header-icon" style={{ background: nodeColor + '22', color: nodeColor }}>

          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="node-header-name">{data.label || schema.label}</div>
            <div className="node-header-type">{schema.type.replace('Node', '')}</div>
          </div>
          {/* Connection count badge */}
          {edgeCount > 0 && (
            <span title={`${edgeCount} connection(s)`} style={{
              fontSize: 9, fontWeight: 700, color: 'var(--text2)',
              background: 'var(--bg3)', borderRadius: 99,
              padding: '1px 5px', marginRight: 4, flexShrink: 0,
            }}>
              {edgeCount}
            </span>
          )}
          <div className={`status-badge ${status}`} style={{ marginRight: 2 }}/>
          <button className="collapse-btn" onClick={toggleCollapse} title={collapsed ? 'Expand' : 'Collapse'}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              {collapsed ? <polyline points="6 9 12 15 18 9"/> : <polyline points="18 15 12 9 6 15"/>}
            </svg>
          </button>
        </div>

        {/* Ports */}
        {!collapsed && (
          <div className="node-ports">
            {schema.inputs.map((port) => {
              const isConnected = connectedTargets.has(port.name);
              const isMissingRequired = port.required && !isConnected;
              return (
                <div key={`in-${port.name}`} className="port-row" style={{ position: 'relative' }}>
                  <Handle
                    type="target"
                    position={Position.Left}
                    id={port.name}
                    data-multiin={port.multi_in ? 'true' : 'false'}
                    title={port.multi_in ? `${port.name} · multi-in` : `${port.name} · single connection`}
                    style={{
                      background: port.color,
                      border: isMissingRequired ? '2px solid var(--yellow)' : port.multi_in ? '2px solid #34d399' : '2px solid var(--bg2)',
                      position: 'absolute', left: -5, top: '50%', transform: 'translateY(-50%)',
                      transition: 'transform .15s, box-shadow .15s',
                      boxShadow: isMissingRequired ? '0 0 0 3px rgba(245,158,11,0.35)' : 'none',
                    }}
                  />
                  <span className="port-label input" style={{ paddingLeft: 20 }}>
                    <span style={{ color: port.color, fontSize: 9, fontWeight: 700, marginRight: 4 }}>{port.label}</span>
                    {port.name.replace(/_/g, ' ')}
                    {port.required && (
                      <span style={{ color: isConnected ? 'var(--green)' : 'var(--yellow)', marginLeft: 3, fontSize: 9 }}>
                        {isConnected ? '✓' : '!'}
                      </span>
                    )}
                  </span>
                </div>
              );
            })}
            {schema.inputs.length > 0 && schema.outputs.length > 0 && (
              <div style={{ height: 1, background: 'var(--border)', margin: '4px 0' }} />
            )}
            {schema.outputs.map((port) => (
              <div key={`out-${port.name}`} className="port-row" style={{ position: 'relative' }}>
                <span className="port-label output" style={{ textAlign: 'right', paddingRight: 20 }}>
                  {port.name.replace(/_/g, ' ')}
                  <span style={{ color: port.color, fontSize: 9, fontWeight: 700, marginLeft: 4 }}>{port.label}</span>
                </span>
                <Handle
                  type="source"
                  position={Position.Right}
                  id={port.name}
                  style={{
                    background: port.color,
                    border: '2px solid var(--bg2)',
                    position: 'absolute', right: -5, top: '50%', transform: 'translateY(-50%)',
                    transition: 'transform .15s, box-shadow .15s',
                  }}
                />
              </div>
            ))}
          </div>
        )}

        {/* Collapsed: show inline handles */}
        {collapsed && (
          <>
            {schema.inputs.map((port,i) => (
              <Handle key={`in-${port.name}`} type="target" position={Position.Left} id={port.name}
                style={{ background: port.color, border: '2px solid var(--bg2)', top: `${50 + (i - (schema.inputs.length-1)/2)*20}%` }} />
            ))}
            {schema.outputs.map((port,i) => (
              <Handle key={`out-${port.name}`} type="source" position={Position.Right} id={port.name}
                style={{ background: port.color, border: '2px solid var(--bg2)', top: `${50 + (i - (schema.outputs.length-1)/2)*20}%` }} />
            ))}
          </>
        )}
      </div>
    </>
  );
};

// ── Custom Edge ───────────────────────────────────────────────────────────────
const GCPEdge = ({ id, sourceX, sourceY, targetX, targetY, sourcePosition, targetPosition, data, style, markerEnd, selected }) => {
  const edgeType = data?.edgeType || 'bezier';
  const color = data?.color || '#60a5fa';
  const animated = data?.animated !== false;
  const label = data?.label || '';
  const { deleteElements, setEdges } = useReactFlow();

  let edgePath, labelX, labelY;
  if (edgeType === 'straight') {
    [edgePath, labelX, labelY] = getStraightPath({ sourceX, sourceY, targetX, targetY });
  } else if (edgeType === 'step') {
    [edgePath, labelX, labelY] = getSmoothStepPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition, borderRadius: 8 });
  } else {
    [edgePath, labelX, labelY] = getBezierPath({ sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition });
  }

  return (
    <>
      <path
        id={id}
        d={edgePath}
        className="react-flow__edge-path"
        style={{
          stroke: color,
          strokeWidth: selected ? 2.5 : 1.5,
          strokeOpacity: 0.85,
          fill: 'none',
          strokeDasharray: animated ? '5 3' : 'none',
          ...style
        }}
        markerEnd={markerEnd}
      />
      {/* Edge label */}
      {label && (
        <foreignObject x={labelX - 35} y={labelY - 11} width={70} height={22} style={{ overflow: 'visible' }}>
          <div className="edge-label-wrapper" style={{ textAlign: 'center' }}>{label}</div>
        </foreignObject>
      )}
      {/* Delete + options on selection */}
      {selected && (
        <foreignObject x={labelX - 60} y={labelY - (label ? 30 : 14)} width={120} height={28} style={{ overflow: 'visible', zIndex: 50 }}>
          <div style={{ display: 'flex', gap: 3, justifyContent: 'center' }}>
            {['step', 'bezier','straight'].map(t => (
              <button key={t} onClick={() => setEdges(eds => eds.map(e => e.id===id ? {...e, data:{...e.data, edgeType:t}} : e))}
                style={{ padding:'2px 5px', borderRadius:4, border:'1px solid var(--border)', background: edgeType===t?'var(--accent)':'var(--bg1)', color: edgeType===t?'#fff':'var(--text1)', fontSize:8, fontFamily:'var(--font-mono)', cursor:'pointer' }}>
                {t[0].toUpperCase()}
              </button>
            ))}
            <button onClick={() => setEdges(eds => eds.map(e => e.id===id ? {...e, data:{...e.data, animated:!animated}} : e))}
              style={{ padding:'2px 5px', borderRadius:4, border:'1px solid var(--border)', background: animated?'var(--accent)':'var(--bg1)', color: animated?'#fff':'var(--text1)', fontSize:8, fontFamily:'var(--font-mono)', cursor:'pointer' }}>
              ~
            </button>
            <button onClick={() => deleteElements({ edges: [{ id }] })}
              style={{ padding:'2px 5px', borderRadius:4, border:'1px solid var(--red)44', background:'var(--bg1)', color:'var(--red)', fontSize:8, fontFamily:'var(--font-mono)', cursor:'pointer' }}>
              ✕
            </button>
          </div>
        </foreignObject>
      )}
    </>
  );
};

  Compute:       { color: '#0097a7', icon: 'Compute' },
  Data:          { color: '#0097a7', icon: 'Databases' },
  Messaging:     { color: '#0097a7', icon: 'ServerlessComputing' },
  Storage:       { color: '#0097a7', icon: 'Storage' },
  Security:      { color: '#0097a7', icon: 'SecurityIdentity' },
  LoadBalancer: { color: '#0097a7', icon: 'cloudLoadBalancing' },
  Networking:    { color: '#0097a7', icon: 'Networking' },
  Observability: { color: '#0097a7', icon: 'Observability' },
  IAM :     { color: '#0097a7', icon: 'identity_and_access_management' },
  IntegrationServices: { color: '#0097a7', icon: 'Integration_Services' },
};

// ── Sidebar Navigation — Categories → Nodes two-level drill-down ─────────────
const CategoryList = ({ filteredTypes, isSearching }) => {
  const grouped = useMemo(() => {
    const map = {};
    filteredTypes.forEach(schema => {
      const cat = schema.category || 'General';
      if (!map[cat]) map[cat] = [];
      map[cat].push(schema);
    });
    return map;
  }, [filteredTypes]);

  const allCats = Object.keys(grouped);
  // activeCategory: null = show categories list, string = show nodes of that category
  const [activeCategory, setActiveCategory] = useState(null);

  // When searching, always show all flat
  const showFlat = isSearching;

  // If active cat disappears from filtered results, reset
  useEffect(() => {
    if (activeCategory && !grouped[activeCategory]) setActiveCategory(null);
  }, [grouped, activeCategory]);

  if (allCats.length === 0) {
    return <div style={{ padding: '24px 12px', fontSize: 11, color: 'var(--text2)', textAlign: 'center' }}>
      <div style={{ fontSize: 20, marginBottom: 8 }}>🔍</div>
      No nodes match
    </div>;
  }

  // ── FLAT search view ──────────────────────────────────────────────────────
  if (showFlat) {
    return (
      <>
        {allCats.map(cat => {
          const meta = CATEGORY_META[cat] || { color: 'var(--accent)', icon: 'cloud' };
          return (
            <div key={cat} style={{ marginBottom: 6 }}>
              <div style={{ padding: '3px 8px 5px', fontSize: 9, letterSpacing: '.12em', color: meta.color, fontWeight: 700, textTransform: 'uppercase', display: 'flex', alignItems: 'center', gap: 5 }}>
                <div style={{ width: 5, height: 5, borderRadius: '50%', background: meta.color, flexShrink: 0 }} />
                {cat}
              </div>
              {grouped[cat].map(schema => (
                <div key={schema.type} className="node-item" style={{ marginLeft: 8, marginBottom: 3 }}
                  draggable onDragStart={e => e.dataTransfer.setData('application/vco-node', schema.type)}>
                  <div className="node-icon" style={{ background: schema.color + '22', color: schema.color, width: 28, height: 28 }}>
                    <GCPIcon nodeType={schema.type} fallbackIcon={schema.icon} color={schema.color} size={14} />
                  </div>
                  <div className="node-info">
                    <div className="node-name">{schema.label}</div>
                    <div className="node-desc">{schema.description}</div>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </>
    );
  }

  // ── NODE DRILL-DOWN view ──────────────────────────────────────────────────
  if (activeCategory) {
    const meta = CATEGORY_META[activeCategory] || { color: 'var(--accent)', icon: 'cloud' };
    const nodes = grouped[activeCategory] || [];
    return (
      <div>
        {/* Back button */}
        <div onClick={() => setActiveCategory(null)} style={{
          display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px 10px',
          cursor: 'pointer', color: 'var(--text2)', fontSize: 11, fontFamily: 'var(--font-mono)',
          borderBottom: '1px solid var(--border)', marginBottom: 6,
          transition: 'color .15s',
        }}
          onMouseEnter={e => e.currentTarget.style.color = 'var(--text0)'}
          onMouseLeave={e => e.currentTarget.style.color = 'var(--text2)'}
        >
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          <span>All Categories</span>
          <div style={{ flex: 1 }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 14, height: 14, borderRadius: 4, background: meta.color + '22', color: meta.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <GCPIcon nodeType={activeCategory + 'Cat'} fallbackIcon={meta.icon} color={meta.color} size={9} />
            </div>
            <span style={{ fontSize: 10, fontWeight: 700, color: meta.color, textTransform: 'uppercase', letterSpacing: '.08em' }}>{activeCategory}</span>
          </div>
        </div>

        {/* Node count badge */}
        <div style={{ padding: '0 10px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 9, color: 'var(--text2)', letterSpacing: '.1em', textTransform: 'uppercase', fontWeight: 600 }}>
            {nodes.length} nodes
          </span>
          <div style={{ height: 2, flex: 1, marginLeft: 8, borderRadius: 99, background: `linear-gradient(90deg, ${meta.color}66, transparent)` }} />
        </div>

        {/* Nodes list */}
        {nodes.map(schema => (
          <div key={schema.type} className="node-item" style={{ marginBottom: 4, borderColor: 'transparent' }}
            draggable onDragStart={e => e.dataTransfer.setData('application/vco-node', schema.type)}>
            <div className="node-icon" style={{ background: schema.color + '22', color: schema.color, width: 30, height: 30 }}>
              <GCPIcon nodeType={schema.type} fallbackIcon={schema.icon} color={schema.color} size={16} />
            </div>
            <div className="node-info">
              <div className="node-name" style={{ fontSize: 12 }}>{schema.label}</div>
              <div className="node-desc">{schema.description}</div>
            </div>
          </div>
        ))}
      </div>
    );
  }

  // ── CATEGORIES GRID view ──────────────────────────────────────────────────
  return (
    <div>
      <div style={{ padding: '4px 8px 8px', fontSize: 9, letterSpacing: '.12em', color: 'var(--text2)', fontWeight: 700, textTransform: 'uppercase' }}>
        Categories
      </div>
      {allCats.map(cat => {
        const meta = CATEGORY_META[cat] || { color: 'var(--accent)', icon: 'cloud' };
        const count = grouped[cat].length;
        return (
          <div key={cat} onClick={() => setActiveCategory(cat)} style={{
            display: 'flex', alignItems: 'center', gap: 10,
            padding: '10px 10px', borderRadius: 'var(--r8)', marginBottom: 3,
            cursor: 'pointer', userSelect: 'none',
            background: 'var(--bg2)',
            border: `1px solid transparent`,
            transition: 'all .15s',
          }}
            onMouseEnter={e => { e.currentTarget.style.background = meta.color + '0f'; e.currentTarget.style.borderColor = meta.color + '33'; e.currentTarget.style.transform = 'translateX(2px)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'var(--bg2)'; e.currentTarget.style.borderColor = 'transparent'; e.currentTarget.style.transform = 'translateX(0)'; }}
          >
            {/* Icon */}
            <div style={{
              width: 36, height: 36, borderRadius: 10,
              background: `linear-gradient(135deg, ${meta.color}33, ${meta.color}11)`,
              color: meta.color, display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0, border: `1px solid ${meta.color}33`,
            }}>
              <GCPIcon nodeType={cat + 'Cat'} fallbackIcon={meta.icon} color={meta.color} size={16} />
            </div>
            {/* Text */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 12, fontWeight: 700, color: 'var(--text0)', letterSpacing: '.02em' }}>
                {cat}
              </div>
              <div style={{ fontSize: 9, color: 'var(--text2)', marginTop: 1 }}>
                {count} node{count !== 1 ? 's' : ''}
              </div>
            </div>
            {/* Arrow + count */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: meta.color, background: meta.color + '18', borderRadius: 99, padding: '2px 8px', fontFamily: 'var(--font-mono)' }}>
                {count}
              </span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--text2)' }}>
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </div>
          </div>
        );
      })}
    </div>
  );
};

// ── Node Edit Modal ───────────────────────────────────────────────────────────
const NodeEditModal = ({ node, onClose, onChange }) => {
  if (!node) return null;

  const isGroup = node.type === 'vpcGroup' || node.type === 'groupBox';
  const schema = node.data.schema;
  const props = node.data.props || {};
  const isVisualGroup = node.type === 'groupBox';
  const nodeColor = node.data.accentColor || schema?.color || 'var(--accent)';

  // Fields definition (same as PropertyPanel)
  const fieldDefs = {
    CloudRunNode: [
      { key: 'image', label: 'Container Image', type: 'text', placeholder: 'gcr.io/project/image:tag' },
      { key: 'memory', label: 'Memory', type: 'select', options: ['256Mi','512Mi','1Gi','2Gi','4Gi','8Gi'] },
      { key: 'cpu', label: 'CPU', type: 'select', options: ['1','2','4','8'] },
      { key: 'min_instances', label: 'Min Instances', type: 'number' },
      { key: 'max_instances', label: 'Max Instances', type: 'number' },

    ],
    CloudSQLNode: [
      { key: 'database_version', label: 'Engine', type: 'select', options: ['POSTGRES_15','POSTGRES_14','MYSQL_8_0','SQLSERVER_2019_STANDARD'] },
      { key: 'tier', label: 'Machine Tier', type: 'select', options: ['db-f1-micro','db-g1-small','db-n1-standard-1','db-n1-standard-2','db-n1-standard-4'] },
      { key: 'region', label: 'Region', type: 'select', options: ['us-central1','us-east1','europe-west1','asia-east1'] },
      { key: 'disk_size_gb', label: 'Disk (GB)', type: 'number' },
      { key: 'ha', label: 'High Availability', type: 'checkbox' },
    ],
    PubSubNode: [
      { key: 'ack_deadline_seconds', label: 'Ack Deadline (sec)', type: 'number' },
      { key: 'message_retention_duration', label: 'Retention', type: 'text', placeholder: '604800s' },
    ],
    GCSBucketNode: [
      { key: 'location', label: 'Location', type: 'select', options: ['US','EU','ASIA','us-central1','europe-west1'] },
      { key: 'storage_class', label: 'Storage Class', type: 'select', options: ['STANDARD','NEARLINE','COLDLINE','ARCHIVE'] },
      { key: 'versioning', label: 'Versioning', type: 'checkbox' },
      { key: 'public_access', label: 'Public Access', type: 'checkbox' },
    ],
    ServiceAccountNode: [
      { key: 'description_sa', label: 'Description', type: 'text', placeholder: 'Service account for...' },
    ],
    VPCNode: [
      { key: 'subnet_cidr', label: 'Subnet CIDR', type: 'text', placeholder: '10.0.0.0/24' },
      { key: 'region', label: 'Region', type: 'select', options: ['us-central1','us-east1','europe-west1','asia-east1'] },
      { key: 'private_google_access', label: 'Private Google Access', type: 'checkbox' },
    ],
    SecretManagerNode: [
      { key: 'replication', label: 'Replication', type: 'select', options: ['automatic','user-managed'] },
      { key: 'rotation_days', label: 'Rotation (days, 0=off)', type: 'number' },
    ],
    SubscriptionNode: [
      { key: 'ack_deadline_seconds', label: 'Ack Deadline (sec)', type: 'number' },
      { key: 'retain_acked_messages', label: 'Retain Acked Messages', type: 'checkbox' },

              position: 'absolute', inset: 0, borderRadius: 99,

              onChange={e => onChange(node.id, 'label', e.target.value)}

          {/* Checkbox fields — full width */}

            <div className="modal-full" style={{ display: 'flex', gap: 24, flexWrap: 'wrap' }}>
              {checkboxFields.map(f => (
                <div key={f.key} style={{ flex: '1 1 180px' }}>{renderField(f)}</div>

          )}

          {/* Ports section */}
          {((schema?.inputs?.length > 0) || (schema?.outputs?.length > 0)) && (
            <>
              <div className="modal-section-title">🔌 Ports</div>
              {schema?.inputs?.length > 0 && (
                <div>
                  <div style={{ fontSize: 10, color: 'var(--text2)', marginBottom: 8, fontWeight: 700, letterSpacing: '.08em' }}>INPUTS</div>

                      {p.required && <span style={{ fontSize: 9, color: 'var(--red)', fontWeight: 700 }}>REQ</span>}
                      {p.multi_in && <span style={{ fontSize: 9, color: '#34d399', background: '#34d39920', borderRadius: 99, padding: '1px 6px' }}>multi-in</span>}
                    </div>
                  ))}

              {schema?.outputs?.length > 0 && (
                <div>
                  <div style={{ fontSize: 10, color: 'var(--text2)', marginBottom: 8, fontWeight: 700, letterSpacing: '.08em' }}>OUTPUTS</div>
                  {schema.outputs.map(p => (
                    <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, padding: '6px 10px', background: 'var(--bg2)', borderRadius: 8, border: '1px solid var(--border)' }}>
                      <div style={{ width: 9, height: 9, borderRadius: '50%', background: p.color, flexShrink: 0, boxShadow: `0 0 5px ${p.color}` }} />
                      <span style={{ fontSize: 12, color: 'var(--text1)', flex: 1 }}>{p.name.replace(/_/g,' ')}</span>

                      {p.multi && <span style={{ fontSize: 9, color: 'var(--text2)' }}>multi</span>}
                    </div>
                  ))}

              )}
            </>
          )}

          {/* Accent color picker — full width */}
          <div className="modal-field-group modal-full">
            <label className="modal-field-label">Accent Color</label>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {NODE_ACCENT_COLORS.map(c => (
                <div key={c} onClick={() => onChange(node.id, 'accentColor', c)}
                  style={{
                    width: 26, height: 26, borderRadius: '50%', background: c, cursor: 'pointer',
                    border: `3px solid ${nodeColor === c ? 'var(--text0)' : 'transparent'}`,
                    transition: 'transform .1s, border-color .1s',

                  }}
                  onMouseEnter={e => e.target.style.transform = 'scale(1.25)'}
                  onMouseLeave={e => e.target.style.transform = 'scale(1)'}

        {/* Footer */}

            Changes apply immediately

            Done
          </button>
        </div>
      </div>
    </div>
  );
};


const VPCGroupNode = ({ data, selected, id }) => {
  const [dragOver, setDragOver] = React.useState(false);
  const { getNodes, setNodes } = useReactFlow();

  const children = (data.children || []);

  // Auto-resize based on children
  React.useEffect(() => {
    if (children.length === 0) return;

    const nodes = getNodes();
    const childNodes = nodes.filter(n => children.some(c => c.id === n.id));

    if (childNodes.length === 0) return;

    // Calculate bounding box of children
    const minX = Math.min(...childNodes.map(n => n.position.x));
    const maxX = Math.max(...childNodes.map(n => n.position.x + (n.width || 200)));
    const minY = Math.min(...childNodes.map(n => n.position.y));
    const maxY = Math.max(...childNodes.map(n => n.position.y + (n.height || 100)));

    const padding = 40;
    const newWidth = Math.max(300, maxX - minX + padding * 2);
    const newHeight = Math.max(200, maxY - minY + padding * 2 + 60); // +60 for header

    // Only update if significantly different to avoid loops
    const currentWidth = data.width || 300;
    const currentHeight = data.height || 200;

    if (Math.abs(newWidth - currentWidth) > 20 || Math.abs(newHeight - currentHeight) > 20) {
      setNodes(nds => nds.map(n =>
        n.id === id ? { ...n, data: { ...n.data, width: newWidth, height: newHeight } } : n
      ));
    }
  }, [children, getNodes, setNodes, id, data.width, data.height]);

  const handleDragOver = (e) => {
    e.preventDefault();
    e.stopPropagation();
    // Only accept gcpNode drops
    if (e.dataTransfer.types.includes('application/vco-node') ||
        e.dataTransfer.types.includes('application/reactflow')) {
      setDragOver(true);
    }
  };

  const handleDragLeave = (e) => {
    e.stopPropagation();
    setDragOver(false);
  };

  const handleDrop = (e) => {
    e.stopPropagation();
    setDragOver(false);
    // When a node is dragged from sidebar into the VPC group, 
    // the main onDrop will fire — we just need to register it as a child
    // This is handled by the parent via onDropIntoVPC
    if (data.onDropIntoVPC) {
      data.onDropIntoVPC(id, e);
    }
  };

  const isVisual = data.groupType === 'visual';
  return (
    <div
      className={`vpc-group-node${selected ? ' selected' : ''}${dragOver ? ' drag-over' : ''}`}
      onDragOver={handleDragOver}
      onDragLeave={handleDragLeave}
      onDrop={handleDrop}
      style={{ width: data.width || 300, height: data.height || 200 }}
    >
      <NodeResizer
        color={isVisual ? "#8b5cf6" : "#10b981"}
        isVisible={selected}
        minWidth={200}
        minHeight={150}
        onResizeEnd={(event, params) => {
          const { width, height } = params;
          setNodes(nds => nds.map(n =>
            n.id === id ? { ...n, data: { ...n.data, width, height } } : n
          ));
        }}
      />
      {!isVisual && (
        <>
          <Handle type="target" position={Position.Left} id="network_in"
            style={{ background: '#10b981', border: '2px solid #0d1117', top: 28 }} />
          <Handle type="source" position={Position.Right} id="subnet"
            style={{ background: '#34d399', border: '2px solid #0d1117', top: 28 }} />
        </>
      )}

      <div className="vpc-group-header" style={{ cursor: 'default' }}>
        <div className="vpc-group-icon" style={{ background: isVisual ? 'rgba(139,92,246,0.15)' : 'rgba(16,185,129,0.15)', color: isVisual ? '#8b5cf6' : '#10b981' }}>
          {isVisual ? (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M4 6h16v12H4z"/><path d="M8 10h8"/><path d="M8 14h8"/>
            </svg>
          ) : (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="2" y="2" width="6" height="6"/><rect x="16" y="2" width="6" height="6"/>
              <rect x="9" y="16" width="6" height="6"/>
              <path d="M5 8v4c0 1 1 2 2 2h10c1 0 2-1 2-2V8"/><line x1="12" y1="14" x2="12" y2="16"/>
            </svg>
          )}
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="vpc-group-title">{data.label || (isVisual ? 'Visual Group' : 'VPC Network')}</div>
          <div className="vpc-group-subtitle">{isVisual ? 'visual container' : 'vpc group'}</div>
        </div>
        {!isVisual && data.props?.subnet_cidr && (
          <div className="vpc-group-cidr">{data.props.subnet_cidr}</div>
        )}
      </div>

      <div className="vpc-group-body" style={{ minHeight: Math.max(140, children.length * 40 + 60), height: (data.height || 200) - 60 }}>
        {children.length === 0 ? (
          <div className="vpc-group-empty">
            Drop Cloud Run, VM,<br/>or SQL nodes here<br/>to attach to this VPC
          </div>
        ) : (
          children.map(c => (
            <div key={c.id} className="vpc-child-badge">
              <div className="vpc-child-badge-dot"/>
              <span style={{ flex: 1 }}>{c.label}</span>
              <span style={{ fontSize: 9, color: '#6ee7b7', letterSpacing: '.05em' }}>{c.type?.replace('Node','')}</span>
            </div>
          ))
        )}
      </div>
    </div>
  );
};


const PropertyPanel = ({ node, onClose, onChange }) => {
  if (!node) return null;

  // VPC Group / Visual Group panel
  if (node.type === 'vpcGroup' || node.type === 'groupBox') {
    const props = node.data.props || {};
    const children = node.data.children || [];
    const isVisualGroup = node.type === 'groupBox';
    return (
      <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
        <div className="panel-header">
          <div>
            <div className="panel-title" style={{ color: isVisualGroup ? '#c4b5fd' : '#a7f3d0' }}>{node.data.label || (isVisualGroup ? 'Visual Group' : 'VPC Group')}</div>
            <div style={{ fontSize: 10, color: 'var(--text2)', marginTop: 2, fontFamily: 'var(--font-mono)' }}>
              {isVisualGroup ? 'Visual Group' : 'VPC Group'} · {node.id.slice(0, 8)}
            </div>
          </div>
          <button className="panel-close" onClick={onClose}>{ICONS.close}</button>
        </div>
        <div className="panel-body">
          <div className="field-group">
            <label className="field-label">Label</label>
            <input className="field-input" value={node.data.label || ''} onChange={e => onChange(node.id, 'label', e.target.value)} placeholder={isVisualGroup ? 'Visual Group' : 'VPC Network'} />
          </div>
          {isVisualGroup ? (
            <div className="field-group">
              <label className="field-label">Description</label>
              <input className="field-input" value={node.data.description || ''} onChange={e => onChange(node.id, 'description', e.target.value)} placeholder="e.g. Private Zone" />
            </div>
          ) : (
            <>
              <div className="section-title">Network Config</div>
              <div className="field-group">
                <label className="field-label">Subnet CIDR</label>
                <input className="field-input" value={props.subnet_cidr || ''} onChange={e => onChange(node.id, 'subnet_cidr', e.target.value, true)} placeholder="10.0.0.0/24" />
              </div>
              <div className="field-group">
                <label className="field-label">Region</label>
                <select className="field-select" value={props.region || ''} onChange={e => onChange(node.id, 'region', e.target.value, true)}>
                  <option value="">— select —</option>
                  {['us-central1','us-east1','europe-west1','asia-east1'].map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              </div>
            </>
          )}
          <div className="section-title">Contained Nodes ({children.length})</div>
          {children.length === 0 ? (
            <div style={{ fontSize: 11, color: 'var(--text2)', padding: '12px 0', lineHeight: 1.6 }}>
              No nodes inside yet.<br/>Drag nodes into the box on the canvas.
            </div>
          ) : children.map(c => (
            <div key={c.id} className="vpc-child-badge" style={{ marginBottom: 6 }}>
              <div className="vpc-child-badge-dot"/>
              <span style={{ flex: 1, fontSize: 11 }}>{c.label}</span>
              <span style={{ fontSize: 9, color: '#6ee7b7' }}>{c.type?.replace('Node','')}</span>
            </div>
          ))}
        </div>
      </div>
    );

// ── Log Panel ─────────────────────────────────────────────────────────────────
const LogPanel = ({ logs, visible, onToggle, onClear, panelH, onResize }) => {
  const levelConfig = {
    ok:   { color: 'var(--green)',  label: 'OK',   bg: 'rgba(16,185,129,0.08)'  },
    err:  { color: 'var(--red)',    label: 'ERR',  bg: 'rgba(239,68,68,0.08)'   },
    info: { color: 'var(--accent)', label: 'INFO', bg: 'rgba(59,130,246,0.08)'  },
    warn: { color: 'var(--yellow)', label: 'WARN', bg: 'rgba(245,158,11,0.08)'  },
  };
  const panelRef = useRef(null);
  const bodyRef = useRef(null);
  const dragRef = useRef({ dragging: false, startY: 0, startH: 0 });
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [autoScroll, setAutoScroll] = useState(true);
  const [copied, setCopied] = useState(false);

  // auto-scroll when new logs arrive
  useEffect(() => {
    if (autoScroll && bodyRef.current && visible) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [logs, autoScroll, visible]);

  // resize drag
  const onResizeMouseDown = (e) => {
    e.preventDefault();
    dragRef.current = { dragging: true, startY: e.clientY, startH: panelH };
    const onMove = (ev) => {
      if (!dragRef.current.dragging) return;
      const delta = dragRef.current.startY - ev.clientY;
      const newH = Math.max(36, Math.min(window.innerHeight * 0.8, dragRef.current.startH + delta));
      onResize(newH);
    };
    const onUp = () => {
      dragRef.current.dragging = false;
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  // open in separate window
  const openPopout = () => {
    const filtered = getFiltered();
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Deploy Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080b12;color:#f0f6ff;font-family:'JetBrains Mono',monospace;font-size:11px;padding:12px}
h2{font-size:13px;font-weight:700;margin-bottom:10px;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase}
.entry{display:flex;gap:10px;padding:3px 6px;border-radius:4px;margin-bottom:1px}
.entry:nth-child(even){background:rgba(255,255,255,0.03)}
.ts{color:#4a6080;min-width:65px;flex-shrink:0}
.badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;min-width:30px;text-align:center;flex-shrink:0}
.ok .badge{background:rgba(16,185,129,.15);color:#10b981}
.err .badge{background:rgba(239,68,68,.15);color:#ef4444}
.info .badge{background:rgba(59,130,246,.15);color:#3b82f6}
.warn .badge{background:rgba(245,158,11,.15);color:#f59e0b}
.ok .msg{color:#10b981}.err .msg{color:#ef4444}.info .msg{color:#3b82f6}.warn .msg{color:#f59e0b}
</style></head><body>
<h2>Deploy Log — ${filtered.length} entries</h2>
${filtered.map((l,i) => `<div class="entry ${l.level||'info'}"><span class="ts">${l.ts}</span><span class="badge">${(l.level||'info').toUpperCase().slice(0,4)}</span><span class="msg">${l.msg}</span></div>`).join('')}
</body></html>`;
    const w = window.open('', '_blank', 'width=800,height=600,menubar=no,toolbar=no');
    if (w) { w.document.write(html); w.document.close(); }
  };

  const copyAll = () => {
    const text = getFiltered().map(l => `[${l.ts}] [${(l.level||'info').toUpperCase()}] ${l.msg}`).join('\n');
    navigator.clipboard?.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
  };

  const getFiltered = () => {
    let result = logs;
    if (filter !== 'all') result = result.filter(l => l.level === filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      result = result.filter(l => l.msg?.toLowerCase().includes(q));
    }
    return result;
  };

  const filtered = getFiltered();
  const errCount = logs.filter(l => l.level === 'err').length;
  const warnCount = logs.filter(l => l.level === 'warn').length;

  return (
    <div
      ref={panelRef}
      className={`log-panel ${visible ? '' : 'hidden'}`}
      style={{ height: visible ? panelH : 36 }}
    >
      {/* Resize handle */}
      {visible && <div className="log-resize-handle" onMouseDown={onResizeMouseDown} />}

      {/* Header */}
      <div className="log-header">
        <div style={{ width: 6, height: 6, borderRadius: '50%', background: errCount > 0 ? 'var(--red)' : 'var(--green)', boxShadow: `0 0 6px ${errCount > 0 ? 'var(--red)' : 'var(--green)'}`, flexShrink: 0 }} />
        <div className="log-title">Deploy Log</div>
        {errCount > 0 && <span style={{ fontSize: 9, fontWeight: 700, background: 'rgba(239,68,68,0.15)', color: 'var(--red)', borderRadius: 99, padding: '1px 6px' }}>{errCount} ERR</span>}
        {warnCount > 0 && <span style={{ fontSize: 9, fontWeight: 700, background: 'rgba(245,158,11,0.15)', color: 'var(--yellow)', borderRadius: 99, padding: '1px 6px' }}>{warnCount} WARN</span>}
        <div style={{ flex: 1 }} />
        <span style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--font-mono)' }}>{filtered.length}/{logs.length}</span>
        {/* auto-scroll toggle */}
        <button title="Auto-scroll" onClick={() => setAutoScroll(v => !v)}
          style={{ background: autoScroll ? 'rgba(59,130,246,0.15)' : 'transparent', border: '1px solid ' + (autoScroll ? 'var(--accent)' : 'var(--border)'), borderRadius: 6, color: autoScroll ? 'var(--accent)' : 'var(--text2)', cursor: 'pointer', padding: '2px 6px', fontSize: 10, fontFamily: 'var(--font-mono)', marginLeft: 4 }}>
          ↓
        </button>
        {/* popout */}
        <button title="Open in window" onClick={openPopout}
          style={{ background: 'transparent', border: '1px solid var(--border)', borderRadius: 6, color: 'var(--text2)', cursor: 'pointer', padding: '2px 6px', fontSize: 10, lineHeight: 1 }}>
          ⬡
        </button>
        {/* copy */}
        <button title="Copy all" onClick={copyAll}
          style={{ background: copied ? 'rgba(16,185,129,0.15)' : 'transparent', border: '1px solid ' + (copied ? 'var(--green)' : 'var(--border)'), borderRadius: 6, color: copied ? 'var(--green)' : 'var(--text2)', cursor: 'pointer', padding: '2px 6px', fontSize: 10 }}>
          {copied ? '✓' : '⎘'}
        </button>
        {/* clear */}
        <button title="Clear logs" onClick={onClear}
          style={{ background: 'transparent', border: '1px solid var(--border)', borderRadius: 6, color: 'var(--text2)', cursor: 'pointer', padding: '2px 6px', fontSize: 10 }}>
          ✕
        </button>
        {/* toggle */}
        <button className="btn btn-ghost" style={{ padding: '2px 8px', fontSize: 10 }} onClick={onToggle}>
          {visible ? '▼' : '▲'}
        </button>
      </div>

      {/* Toolbar: filter + search */}
      {visible && (
        <div className="log-toolbar">
          {['all','ok','info','warn','err'].map(f => (
            <button key={f} className={`log-filter-btn ${filter === f ? 'active-'+f : ''}`} onClick={() => setFilter(f)}>
              {f.toUpperCase()}
            </button>
          ))}
          <div style={{ flex: 1 }} />
          <input
            className="log-search"
            placeholder="🔍 search…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
      )}

      {/* Log body */}
      {visible && (
        <div className="log-body" id="log-scroll" ref={bodyRef}>
          {filtered.length === 0 && (
            <div style={{ color: 'var(--text2)', fontStyle: 'italic', padding: '4px 0' }}>
              {logs.length === 0 ? '— No activity yet —' : '— No matching entries —'}
            </div>
          )}
          {filtered.map((l, i) => {
            const cfg = levelConfig[l.level] || levelConfig.info;
            return (
              <div key={i} style={{
                display: 'flex', alignItems: 'center', gap: 10,
                padding: '3px 8px', borderRadius: 6,
                background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.015)',
                marginBottom: 1,
              }}>
                <span style={{ fontSize: 10, color: 'var(--text2)', fontFamily: 'var(--font-mono)', flexShrink: 0, minWidth: 70 }}>{l.ts}</span>
                <span style={{
                  fontSize: 9, fontWeight: 700, letterSpacing: '.06em',
                  padding: '1px 6px', borderRadius: 99,
                  background: cfg.bg, color: cfg.color,
                  minWidth: 32, textAlign: 'center', flexShrink: 0,
                }}>{cfg.label}</span>
                <span style={{ fontSize: 11, color: cfg.color, fontFamily: 'var(--font-mono)', flex: 1 }}>{l.msg}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};
