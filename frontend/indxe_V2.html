  const lvlColors = {error:'var(--red)',warn:'var(--amber)',ok:'var(--green)',info:'var(--cyan)'};
  const lvlBg = {error:'rgba(248,113,113,0.08)',warn:'rgba(251,191,36,0.06)',ok:'rgba(52,211,153,0.06)',info:'transparent'};
  return (
    <div className="modal-overlay" onClick={()=>{esRef.current?.close();esRef.current=null;onClose();}}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div style={{width:9,height:9,borderRadius:'50%',
            background:modal.connecting?'var(--amber)':'var(--green)',
            boxShadow:`0 0 10px ${modal.connecting?'var(--amber)':'var(--green)'}`,
            animation:modal.connecting?'pulse-dot 0.8s infinite':'none',flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontFamily:'var(--font-head)',fontWeight:700,fontSize:13.5,color:'var(--text-0)'}}>{modal.label}</div>
            <div style={{fontSize:9,color:'var(--text-2)',fontFamily:'var(--font-mono)',marginTop:1}}>
              {modal.connecting?'Connecting to log stream...':`Live stream · ${modal.nodeId?.slice(0,20)}...`}
            </div>
          </div>
          <span style={{fontSize:10,color:'var(--text-2)',background:'rgba(255,255,255,0.06)',borderRadius:99,padding:'2px 9px',fontFamily:'var(--font-mono)'}}>
            {(modal.lines||[]).length} lines
          </span>
          <button onClick={()=>{const t=(modal.lines||[]).map(l=>l.text||l).join('\n');navigator.clipboard?.writeText(t);}}
            style={{background:'rgba(255,255,255,0.06)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
              color:'var(--text-1)',cursor:'pointer',padding:'4px 11px',fontSize:10,fontFamily:'var(--font-mono)'}}>
            Copy
          </button>
          <button onClick={()=>{esRef.current?.close();esRef.current=null;onClose();}}
            style={{background:'rgba(255,255,255,0.06)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
              color:'var(--text-2)',cursor:'pointer',padding:'4px 9px',fontSize:14,lineHeight:1}}>
            ✕
          </button>
        </div>
        <div className="modal-body" ref={el=>{if(el)el.scrollTop=el.scrollHeight;}}>
          {(modal.lines||[]).length===0?(
            <div style={{padding:'32px',textAlign:'center'}}>
              <div style={{fontSize:28,marginBottom:10}}>📡</div>
              <div style={{color:'var(--text-2)',fontFamily:'var(--font-mono)',fontSize:11}}>
                {modal.connecting?'Waiting for log stream...':'No logs received yet'}
              </div>
            </div>
          ):(modal.lines||[]).map((l,i)=>{
            const line=typeof l==='string'?{text:l,level:'info',ts:''}:l;
            const c=lvlColors[line.level]||'var(--text-1)';
            const bg=lvlBg[line.level]||'transparent';
            return (
              <div key={i} className="modal-log-row">
                {line.ts&&<span className="modal-log-ts">{line.ts}</span>}
                <span className="modal-log-lvl" style={{color:c,background:bg}}>
                  {line.level?.toUpperCase().slice(0,4)||'INFO'}
                </span>
                <span style={{color:line.level==='error'?'var(--red)':line.level==='warn'?'var(--amber)':line.level==='ok'?'var(--green)':'var(--text-1)',flex:1,wordBreak:'break-all'}}>
                  {line.text}
                </span>
              </div>
            );
          })}
        </div>
        <div className="modal-foot">
          <div style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',animation:'pulse-dot 1.5s infinite'}}/>
          <span style={{fontSize:10,color:'var(--text-2)',fontFamily:'var(--font-mono)'}}>Live streaming</span>
          <div style={{flex:1}}/>
          <button onClick={onClear}
            style={{background:'none',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',
              color:'var(--text-2)',cursor:'pointer',padding:'3px 11px',fontSize:10,fontFamily:'var(--font-mono)'}}>
            Clear
          </button>
        </div>
      </div>
    </div>
  );
};

// ── Main App ──────────────────────────────────────────────────────────────────
const nodeTypes = { gcpNode:CloudNode, vpcGroup:VPCGroupNode, groupBox:VPCGroupNode };
const edgeTypes = { gcpEdge:CloudEdge };

function VCOApp() {
  const [nodeTypesData,setNodeTypesData] = useState(DEFAULT_NODE_TYPES_DATA);
  const [nodes,setNodes,onNodesChange] = useNodesState([]);
  const [edges,setEdges,onEdgesChange] = useEdgesState([]);
  const [selectedNode,setSelectedNode] = useState(null);
  const [logs,setLogs] = useState([]);
  const [logVisible,setLogVisible] = useState(false);
  const [toasts,setToasts] = useState([]);
  const [search,setSearch] = useState('');
  const [isDeploying,setIsDeploying] = useState(false);
  const [wsConnected,setWsConnected] = useState(false);
  const [menuOpen,setMenuOpen] = useState(false);
  const [theme,setTheme] = useState('dark');
  const [ctxMenu,setCtxMenu] = useState(null);
  const [defaultEdgeType,setDefaultEdgeType] = useState('bezier');
  const [nodeLogsModal,setNodeLogsModal] = useState(null);
  const [infoModal,setInfoModal] = useState(null);
  const [cmdOpen,setCmdOpen] = useState(false);
  const wsRef = useRef(null);
  const nodesRef = useRef(nodes);
  const edgesRef = useRef(edges);
  const nodeLogsEsRef = useRef(null);
  const graphLoadedRef = useRef(false);
  const reactFlowWrapper = useRef(null);
  const {screenToFlowPosition,deleteElements,fitView} = useReactFlow();

  useEffect(()=>{ nodesRef.current=nodes; },[nodes]);
  useEffect(()=>{ edgesRef.current=edges; },[edges]);
  useEffect(()=>{ document.documentElement.setAttribute('data-theme',theme); },[theme]);

  // Keyboard shortcuts
  useEffect(()=>{
    const handler = e => {
      if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setCmdOpen(true);}
      if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();handleSave();}
    };
    document.addEventListener('keydown',handler);
    return ()=>document.removeEventListener('keydown',handler);
  },[]);

  // Close menus on click outside
  useEffect(()=>{
    if(!menuOpen) return;
    const h=e=>{
      const m=document.getElementById('menu-panel');
      const b=document.getElementById('menu-btn');
      if(!m||!b||m.contains(e.target)||b.contains(e.target)) return;
      setMenuOpen(false);
    };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[menuOpen]);

  // Load from backend
  useEffect(()=>{
    (async()=>{
      try {
        const r=await fetch('http://localhost:8000/api/node-types');
        const d=await r.json();
        if(d?.length) setNodeTypesData(d);
        const s=await fetch('http://localhost:8000/api/state');
        const state=await s.json();
        if(!state?.nodes?.length){graphLoadedRef.current=true;return;}
        const restored=state.nodes.map(n=>{
          const schema=d?.find(t=>t.type===n.type);
          return {id:n.id,type:'gcpNode',position:n.position||{x:Math.random()*600,y:Math.random()*400},
            data:{label:n.label,schema,status:n.status||'idle',props:n.props||{}}};
        });
        const rEdges=(state.edges||[]).map(e=>({
          id:e.id||`e-${e.source}-${e.target}`,source:e.source,sourceHandle:e.sourceHandle,
          target:e.target,targetHandle:e.targetHandle,type:'gcpEdge',animated:true,
          data:{color:e.color||'#4f8ef7'},
        }));
        setNodes(restored);setEdges(rEdges);
        graphLoadedRef.current=true;
        addLog(`Restored ${restored.length} node(s) from saved state`,'info');
      } catch {graphLoadedRef.current=true;}
    })();
  },[]);

  // WebSocket
  useEffect(()=>{
    const connect=()=>{
      try {
        const ws=new WebSocket('ws://localhost:8000/ws');
        ws.onopen=()=>{setWsConnected(true);addLog('WebSocket connected','ok');};
        ws.onclose=()=>{setWsConnected(false);setTimeout(connect,3000);};
        ws.onmessage=e=>handleWsMessage(JSON.parse(e.data));
        wsRef.current=ws;
      } catch {}
    };
    connect();
    return ()=>wsRef.current?.close();
  },[]);

  const autoSaveAfterDeploy = useCallback(async()=>{
    const payload={
      nodes:nodesRef.current.map(n=>({id:n.id,type:n.data.schema?.type,label:n.data.label,
        props:n.data.props||{},position:n.position,status:n.data.status||'idle'})),
      edges:edgesRef.current.map(e=>({id:e.id,source:e.source,sourceHandle:e.sourceHandle,
        target:e.target,targetHandle:e.targetHandle,color:e.data?.color||null})),
    };
    try { await fetch('http://localhost:8000/api/graph',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); }
    catch {}
  },[]);
  const autoSaveRef=useRef(autoSaveAfterDeploy);
  useEffect(()=>{autoSaveRef.current=autoSaveAfterDeploy;},[autoSaveAfterDeploy]);

  const handleWsMessage = useCallback((msg)=>{
    if(msg.event==='log') addLog(msg.msg,msg.level||'info');
    if(msg.event==='node_status'){
      setNodes(nds=>{
        const u=nds.map(n=>{
          if(n.id!==msg.node_id) return n;
          if(msg.action==='unchanged'&&(n.data.status==='failed'||n.data.status==='error')) return n;
          return {...n,data:{...n.data,status:msg.status}};
        });
        nodesRef.current=u;return u;
      });
    }
    if(msg.event==='node_working'){
      setNodes(nds=>{const u=nds.map(n=>n.id===msg.node_id?{...n,data:{...n.data,status:'working'}}:n);nodesRef.current=u;return u;});
    }
    if(msg.event==='deploy_started'){
      const ids=new Set(msg.touched_ids||[]);
      setNodes(nds=>{const u=nds.map(n=>(!ids.size||ids.has(n.id))?{...n,data:{...n.data,status:'deploying'}}:n);nodesRef.current=u;return u;});
      addLog(`Deploy started — ${msg.create} create / ${msg.update} update / ${msg.destroy} destroy`,'info');
    }
    if(msg.event==='deploy_complete'){
      setIsDeploying(false);
      if(msg.changed===0){addLog('Nothing changed — already up to date','ok');showToast('Already up to date','info');}
      else{addLog(`Deploy complete — ${msg.changed} resource(s) changed`,'ok');showToast('Deployment complete!','success');}
      setTimeout(()=>autoSaveRef.current(),600);
    }
    if(msg.event==='graph_saved') addLog(`Graph saved (${msg.node_count} nodes)`,'ok');
  },[]);

  const openNodeLogs = useCallback((nodeId,label)=>{
    nodeLogsEsRef.current?.close();
    nodeLogsEsRef.current=null;
    setNodeLogsModal({nodeId,label,lines:[],connecting:true});
    try {
      const es=new EventSource(`http://localhost:8000/api/logs/${nodeId}`);
      es.onopen=()=>setNodeLogsModal(m=>m?{...m,connecting:false}:m);
      es.onmessage=e=>{
        const raw=e.data;
        let level='info';
        if(/\[ERROR\]|\[CRIT\]/i.test(raw)) level='error';
        else if(/\[WARN\]/i.test(raw)) level='warn';
        else if(/\[OK\]|\[SUCCESS\]/i.test(raw)) level='ok';
        const ts=new Date().toLocaleTimeString('en-US',{hour12:false});
        setNodeLogsModal(m=>m?{...m,connecting:false,lines:[...(m.lines||[]).slice(-499),{text:raw,level,ts}]}:m);
      };
      es.onerror=()=>setNodeLogsModal(m=>m?{...m,connecting:false}:m);
      nodeLogsEsRef.current=es;
    } catch(err){
      setNodeLogsModal(m=>m?{...m,connecting:false,lines:[{text:`Cannot connect: ${err.message}`,level:'error',ts:new Date().toLocaleTimeString('en-US',{hour12:false})}]}:m);
    }
  },[]);

  const addLog = (msg,level='info')=>{
    const ts=new Date().toLocaleTimeString('en-US',{hour12:false});
    setLogs(l=>[...l.slice(-199),{ts,msg,level}]);
    setTimeout(()=>{const el=document.getElementById('log-scroll');if(el)el.scrollTop=el.scrollHeight;},50);
  };
  const showToast = (msg,type='info')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  };

  const onDragOver = useCallback(e=>{e.preventDefault();e.dataTransfer.dropEffect='move';},[]);

  const onDrop = useCallback(e=>{
    e.preventDefault();
    const typeStr=e.dataTransfer.getData('application/vco-node');
    if(!typeStr) return;
    const position=screenToFlowPosition({x:e.clientX,y:e.clientY});
    if(typeStr==='__VPC_GROUP__'||typeStr==='__GROUP_BOX__'){
      const isV=typeStr==='__GROUP_BOX__';
      const id=`${isV?'GroupBox':'VPCGroup'}-${Date.now()}`;
      setNodes(nds=>[...nds,{id,type:isV?'groupBox':'vpcGroup',position,
        style:{width:300,minHeight:200},
        data:{label:isV?'Visual Group':'VPC Network',groupType:isV?'visual':'vpc',children:[],
          props:isV?{}:{subnet_cidr:'',region:'us-central1'},
          onDropIntoVPC:(gid,de)=>{
            const t2=de.dataTransfer.getData('application/vco-node');
            if(!t2||t2==='__VPC_GROUP__'||t2==='__GROUP_BOX__') return;
            const sc=nodeTypesData.find(t=>t.type===t2);
            if(!sc) return;
            const p2=screenToFlowPosition({x:de.clientX,y:de.clientY});
            const cid=`${t2}-${Date.now()}`;
            setNodes(nds=>{
              const child={id:cid,type:'gcpNode',position:p2,
                data:{label:sc.label,schema:sc,status:'idle',props:{}},
                parentNode:gid,extent:'parent'};
              return [...nds.map(n=>n.id!==gid?n:{...n,data:{...n.data,children:[...(n.data.children||[]),{id:cid,label:sc.label,type:sc.type}]}}),child];
            });
          }}}]);
      addLog(`Added ${isV?'Visual Group':'VPC Group'}`,'info');return;
    }
    const schema=nodeTypesData.find(t=>t.type===typeStr);
    if(!schema) return;
    const id=`${typeStr}-${Date.now()}`;
    setNodes(nds=>[...nds,{id,type:'gcpNode',position,data:{label:schema.label,schema,status:'idle',props:{}}}]);
    addLog(`Added ${schema.label}`,'info');
  },[nodeTypesData,screenToFlowPosition]);

  const onConnect = useCallback(params=>{
    const src=nodesRef.current.find(n=>n.id===params.source);
    const tgt=nodesRef.current.find(n=>n.id===params.target);
    if(src&&tgt){
      const sPort=src.data.schema?.outputs?.find(p=>p.name===params.sourceHandle);
      const tPort=tgt.data.schema?.inputs?.find(p=>p.name===params.targetHandle);
      if(sPort&&tPort&&sPort.type!==tPort.type){
        showToast(`Type mismatch: ${sPort.type} → ${tPort.type}`,'error');return;
      }
      if(tPort&&!tPort.multi_in){
        const already=edgesRef.current.some(e=>e.target===params.target&&e.targetHandle===params.targetHandle);
        if(already){showToast(`Port "${tPort.name}" accepts only one connection`,'error');return;}
      }
      const color=sPort?.color||'#4f8ef7';
      setEdges(eds=>addEdge({...params,type:'gcpEdge',data:{color,edgeType:defaultEdgeType,animated:true,label:''}},eds));
      addLog(`Connected ${src.data.label} → ${tgt.data.label}`,'ok');
    } else {
      setEdges(eds=>addEdge({...params,type:'gcpEdge',data:{color:'#4f8ef7',edgeType:defaultEdgeType,animated:true,label:''}},eds));
    }
  },[defaultEdgeType]);

  const onNodeClick = useCallback((_,node)=>setSelectedNode(node),[]);
  const onPaneClick = useCallback(()=>setSelectedNode(null),[]);

  const handlePropChange = useCallback((nodeId,key,value,isProp=false)=>{
    setNodes(nds=>nds.map(n=>{
      if(n.id!==nodeId) return n;
      return isProp?{...n,data:{...n.data,props:{...n.data.props,[key]:value}}}:{...n,data:{...n.data,[key]:value}};
    }));
    setSelectedNode(prev=>{
      if(!prev||prev.id!==nodeId) return prev;
      return isProp?{...prev,data:{...prev.data,props:{...prev.data.props,[key]:value}}}:{...prev,data:{...prev.data,[key]:value}};
    });
  },[]);

  const handleDeploy = async()=>{
    if(nodes.length===0){showToast('Add some nodes first','error');return;}
    if(isDeploying) return;
    const payload={
      nodes:nodes.map(n=>({id:n.id,type:n.data.schema?.type,label:n.data.label,props:n.data.props||{}})),
      edges:edges.map(e=>({source:e.source,target:e.target,sourceHandle:e.sourceHandle,targetHandle:e.targetHandle})),
    };
    setIsDeploying(true);setLogVisible(true);
    addLog('Initiating deployment...','warn');
    try {
      const res=await fetch('http://localhost:8000/api/deploy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!res.ok){const err=await res.text();addLog(`Server error: ${err}`,'err');showToast('Deploy failed','error');setIsDeploying(false);}
    } catch(e){addLog(`Cannot reach server: ${e.message}`,'err');showToast('Server unreachable','error');setIsDeploying(false);}
  };

  const handleSave = async()=>{
    if(!graphLoadedRef.current&&nodesRef.current.length===0){showToast('Still loading...','warn');return;}
    const payload={
      nodes:nodesRef.current.map(n=>({id:n.id,type:n.data.schema?.type,label:n.data.label,
        props:n.data.props||{},position:n.position,status:n.data.status||'idle'})),
      edges:edgesRef.current.map(e=>({id:e.id,source:e.source,sourceHandle:e.sourceHandle,
        target:e.target,targetHandle:e.targetHandle,color:e.data?.color||null})),
    };
    try {
      await fetch('http://localhost:8000/api/graph',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      showToast('Saved to desired.yaml','success');addLog('Graph saved to desired.yaml','ok');
    } catch {
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='desired.json';a.click();
      showToast('Exported as desired.json','info');
    }
  };

  const handleClear = async()=>{
    setNodes([]);setEdges([]);setSelectedNode(null);
    addLog('Canvas cleared','warn');
    try { await fetch('http://localhost:8000/api/graph',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nodes:[],edges:[]})}); }
    catch {}
  };

  const handleCmdAction = (id) => {
    if(id==='fit') fitView({duration:400});
    else if(id==='save') handleSave();
    else if(id==='deploy') handleDeploy();
    else if(id==='clear') handleClear();
    else if(id==='theme') setTheme(t=>t==='dark'?'light':'dark');
    else if(id==='export'){
      const payload={nodes:nodesRef.current.map(n=>({id:n.id,type:n.data.schema?.type,label:n.data.label,props:n.data.props||{},position:n.position})),edges:edgesRef.current.map(e=>({id:e.id,source:e.source,target:e.target}))};
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='graph.json';a.click();
    }
  };

  const handleCmdAddNode = (schema) => {
    const id=`${schema.type}-${Date.now()}`;
    const position={x:200+Math.random()*300,y:100+Math.random()*300};
    setNodes(nds=>[...nds,{id,type:'gcpNode',position,data:{label:schema.label,schema,status:'idle',props:{}}}]);
    addLog(`Added ${schema.label} via command palette`,'info');
    showToast(`Added ${schema.label}`,'success');
  };

  const filteredTypes = useMemo(()=>
    nodeTypesData.filter(t=>t.label.toLowerCase().includes(search.toLowerCase())||(t.description||'').toLowerCase().includes(search.toLowerCase())),
  [nodeTypesData,search]);

  const onNodeContextMenu = useCallback((event,node)=>{
    event.preventDefault();
    setCtxMenu({x:event.clientX,y:event.clientY,nodeId:node.id,nodeData:node.data});
  },[]);

  return (
    <VCOCtx.Provider value={{openNodeLogs}}>
    <div className="app">
      {/* ── Sidebar ── */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">
            <div className="logo-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="5"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
              </svg>
            </div>
            <div>
              <div className="logo-text">VCO</div>
            </div>
          </div>
          <div className="logo-sub">Visual Cloud Orchestrator · v2.0</div>
        </div>

        <div className="sidebar-search">
          <div className="search-box">
            <span className="search-icon">{I.search}</span>
            <input placeholder="Search resources..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
        </div>

        <div className="node-list">
          {/* Group nodes */}
          <div style={{padding:'6px 8px 4px',fontSize:9,letterSpacing:'.12em',color:'var(--text-2)',fontWeight:600,textTransform:'uppercase',fontFamily:'var(--font-mono)'}}>
            Containers
          </div>
          {[
            {label:'VPC Network',desc:'Network group container',color:'#34d399',type:'__VPC_GROUP__',icon:'network'},
            {label:'Visual Group',desc:'Visual grouping box',color:'#8b5cf6',type:'__GROUP_BOX__',icon:'layers'},
          ].map(g=>(
            <div key={g.type} className="group-item" draggable
              style={{borderColor:g.color+'35',background:g.color+'0a',marginBottom:5}}
              onDragStart={e=>e.dataTransfer.setData('application/vco-node',g.type)}>
              <div className="ni-icon" style={{background:g.color+'20',color:g.color,width:26,height:26}}>
                {I[g.icon]}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div className="ni-name" style={{color:g.color+'ee'}}>{g.label}</div>
                <div className="ni-desc">{g.desc}</div>
              </div>
            </div>
          ))}
          <div style={{height:1,background:'var(--border)',margin:'6px 0'}}/>
          <CategoryList filteredTypes={filteredTypes}/>
        </div>

        {/* Footer: port legend */}
        <div className="sidebar-footer">
          <div className="port-legend">Port Types</div>
          <div className="port-badges">
            {[['SA','#a78bfa'],['Net','#34d399'],['GCS','#fbbf24'],['Secret','#f472b6'],['Topic','#4f8ef7'],['DB','#fb923c']].map(([l,c])=>(
              <span key={l} className="port-badge" style={{color:c,borderColor:c+'40'}}>{l}</span>
            ))}
          </div>
        </div>
      </div>

      {/* ── Canvas ── */}
      <div className="canvas-wrap" ref={reactFlowWrapper}
        onClick={()=>{setCtxMenu(null);setMenuOpen(false);}}>

        {/* Topbar */}
        <div className="topbar">
          <div className="topbar-logo">
            <div className="topbar-dot"/>
            <span>VCO</span>
          </div>
          <div className="topbar-sep"/>
          {/* Command palette button */}
          <button className="cmd-btn" onClick={()=>setCmdOpen(true)}>
            {I.cmd}
            <span>Quick action</span>
            <span className="cmd-badge">⌘K</span>
          </button>
          <div className="topbar-spacer"/>
          {/* WS status */}
          <div className="ws-status">
            <div className={`ws-dot${wsConnected?' connected':''}`}/>
            <span>{wsConnected?'Connected':'Offline'}</span>
          </div>
          {/* Theme toggle */}
          <button className="theme-toggle" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>
            {theme==='dark'?I.moon:I.sun}
            <span>{theme==='dark'?'Dark':'Light'}</span>
          </button>
          {/* Log button */}
          <button className="tb-btn tb-btn-ghost" onClick={()=>setLogVisible(v=>!v)}>
            {I.log}<span>Log</span>
            {logs.length>0&&<span style={{background:'rgba(79,142,247,0.3)',borderRadius:99,padding:'0 5px',fontSize:9,fontFamily:'var(--font-mono)'}}>{logs.length}</span>}
          </button>
          {/* Save */}
          <button className="tb-btn tb-btn-ghost" onClick={handleSave}>
            {I.save}<span>Save</span>
          </button>
          {/* Deploy */}
          <button className="tb-btn tb-btn-deploy" onClick={handleDeploy} disabled={isDeploying}>
            {isDeploying
              ? <><svg className="spin" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg><span>Deploying…</span></>
              : <>{I.play}<span>Deploy</span></>}
          </button>
          {/* Menu */}
          <div className="topbar-menu">
            <button id="menu-btn" className="tb-btn tb-btn-ghost"
              onClick={e=>{e.stopPropagation();setMenuOpen(o=>!o);}}>
              {I.menu}
            </button>
            {menuOpen&&(
              <div id="menu-panel" className="menu-panel" onClick={e=>e.stopPropagation()}>
                <div className="menu-item" onClick={()=>{fitView({duration:400});setMenuOpen(false);}}>
                  {I.focus}<span>Center View</span><span className="menu-item-hint">fit</span>
                </div>
                <div className="menu-item" onClick={()=>{handleSave();setMenuOpen(false);}}>
                  {I.save}<span>Save Graph</span><span className="menu-item-hint">⌘S</span>
                </div>
                <div className="menu-item" onClick={()=>{handleDeploy();setMenuOpen(false);}}>
                  {I.play}<span>Deploy</span>
                </div>
                <div className="menu-sep"/>
                <div className="menu-item" onClick={()=>{setInfoModal('guide');setMenuOpen(false);}}>
                  {I.help}<span>Getting Started</span>
                </div>
                <div className="menu-item" onClick={()=>{setInfoModal('about');setMenuOpen(false);}}>
                  {I.cmd}<span>About VCO</span>
                </div>
                <div className="menu-sep"/>
                <div className="menu-item danger" onClick={()=>{handleClear();setMenuOpen(false);}}>
                  {I.trash}<span>Clear Canvas</span>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Edge style toolbar */}
        <div className="canvas-toolbar">
          {['bezier','step','straight'].map(t=>(
            <button key={t} className={`edge-style-btn${defaultEdgeType===t?' active':''}`}
              onClick={()=>setDefaultEdgeType(t)}>
              {t}
            </button>
          ))}
          <div style={{width:1,background:'var(--border)',margin:'2px 3px',alignSelf:'stretch'}}/>
          <button className="edge-style-btn" style={{fontSize:9}} onClick={()=>fitView({duration:400})}>
            fit
          </button>
        </div>

        {/* ReactFlow */}
        <ReactFlow
          nodes={nodes} edges={edges}
          onNodesChange={onNodesChange} onEdgesChange={onEdgesChange}
          onConnect={onConnect} onDrop={onDrop} onDragOver={onDragOver}
          onNodeClick={onNodeClick} onPaneClick={onPaneClick}
          onNodeContextMenu={onNodeContextMenu}
          nodeTypes={nodeTypes} edgeTypes={edgeTypes}
          defaultEdgeOptions={{type:'gcpEdge',animated:true,data:{color:'#4f8ef7',edgeType:'bezier'}}}
          fitView fitViewOptions={{padding:0.15}}
          deleteKeyCode={['Delete','Backspace']}
          multiSelectionKeyCode="Shift"
          proOptions={{hideAttribution:true}}
        >
          <Background variant={BackgroundVariant.Dots} gap={28} size={1} color="rgba(79,142,247,0.15)"/>
          <Controls showInteractive={false}/>
          <MiniMap
            nodeColor={n=>n.data?.accentColor||n.data?.schema?.color||'#4f8ef7'}
            maskColor="rgba(7,13,26,0.65)"
            pannable zoomable/>
        </ReactFlow>

        {/* Empty state */}
        {nodes.length===0&&(
          <div className="empty-state">
            <div className="empty-title">Drop resources here</div>
            <div className="empty-sub">Drag from the sidebar · Press ⌘K to search</div>
          </div>
        )}

        {/* Context menu */}
        {ctxMenu&&(
          <div className="ctx-menu" style={{left:ctxMenu.x,top:ctxMenu.y}} onClick={e=>e.stopPropagation()}>
            <div className="ctx-item" onClick={()=>{
              setNodes(nds=>{const orig=nds.find(n=>n.id===ctxMenu.nodeId);if(!orig)return nds;const nid=`${orig.data.schema?.type}-${Date.now()}`;return[...nds,{...orig,id:nid,position:{x:orig.position.x+50,y:orig.position.y+50},selected:false}];});
              setCtxMenu(null);
            }}>
              {I.copy}<span>Duplicate</span>
            </div>
            <div className="ctx-item" onClick={()=>{
              const n=nodesRef.current.find(n=>n.id===ctxMenu.nodeId);
              const l=prompt('Name:',n?.data?.label||'');
              if(l?.trim()) setNodes(nds=>nds.map(nd=>nd.id===ctxMenu.nodeId?{...nd,data:{...nd.data,label:l.trim()}}:nd));
              setCtxMenu(null);
            }}>
              {I.pen}<span>Rename</span>
            </div>
            <div className="ctx-item" onClick={()=>{openNodeLogs&&openNodeLogs(ctxMenu.nodeId,ctxMenu.nodeData?.label||'Node');setCtxMenu(null);}}>
              {I.log}<span>View Logs</span>
            </div>
            <div className="ctx-sep"/>
            <div className="ctx-item" onClick={()=>{
              const cycle=['idle','deployed','deploying','error'];
              setNodes(nds=>nds.map(n=>{
                if(n.id!==ctxMenu.nodeId) return n;
                const cur=n.data.status||'idle';
                return {...n,data:{...n.data,status:cycle[(cycle.indexOf(cur)+1)%cycle.length]}};
              }));setCtxMenu(null);
            }}>
              {I.refresh}<span>Cycle Status</span>
            </div>
            <div className="ctx-sep"/>
            <div className="ctx-item danger" onClick={()=>{
              deleteElements({nodes:[{id:ctxMenu.nodeId}]});
              setCtxMenu(null);
              setTimeout(()=>{
                const curr=nodesRef.current;
                const currE=edgesRef.current;
                try{fetch('http://localhost:8000/api/graph',{method:'POST',headers:{'Content-Type':'application/json'},
                  body:JSON.stringify({nodes:curr.map(n=>({id:n.id,type:n.data.schema?.type,label:n.data.label,props:n.data.props||{},position:n.position})),
                  edges:currE.map(e=>({id:e.id,source:e.source,sourceHandle:e.sourceHandle,target:e.target,targetHandle:e.targetHandle}))})});}catch{}
              },100);
            }}>
              {I.trash}<span>Delete Node</span>
            </div>
          </div>
        )}

        {/* Log panel */}
        <LogPanel logs={logs} visible={logVisible} onToggle={()=>setLogVisible(v=>!v)}/>

        {/* Node Logs Modal */}
        <NodeLogsModal modal={nodeLogsModal} esRef={nodeLogsEsRef}
          onClose={()=>setNodeLogsModal(null)}
          onClear={()=>setNodeLogsModal(m=>m?{...m,lines:[]}:m)}/>

        {/* Toasts */}
        <ToastContainer toasts={toasts}/>
      </div>

      {/* ── Right Panel ── */}
      <div className={`panel-right${selectedNode?'':' collapsed'}`}>
        {selectedNode&&(
          <PropertyPanel node={selectedNode} onClose={()=>setSelectedNode(null)} onChange={handlePropChange}/>
        )}
      </div>

      {/* ── Modals ── */}
      <InfoModal type={infoModal} onClose={()=>setInfoModal(null)}/>

      {cmdOpen&&(
        <CommandPalette
          nodeTypes={nodeTypesData}
          onClose={()=>setCmdOpen(false)}
          onAddNode={handleCmdAddNode}
          onAction={handleCmdAction}/>
      )}
    </div>
    </VCOCtx.Provider>
  );
}

function App(){
  return (
    <ReactFlowProvider>
      <VCOApp/>
    </ReactFlowProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
