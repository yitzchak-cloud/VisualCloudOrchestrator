<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VCO — Visual Cloud Orchestrator</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23050810'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%234f8ef7' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%234f8ef7'/%3E%3Cpath d='M16 5v3M16 24v3M5 16h3M24 16h3' stroke='%234f8ef7' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/reactflow@11/dist/umd/index.js"></script>
<link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  /* Core palette */
  --bg-base:   #03060f;
  --bg-1:      #070d1a;
  --bg-2:      #0b1221;
  --bg-3:      #0f1a2e;
  --bg-4:      #142038;
  --bg-glass:  rgba(11,18,33,0.72);
  --bg-glass2: rgba(15,26,46,0.6);

  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.1);
  --border3:   rgba(255,255,255,0.15);

  --text-0:    #f8faff;
  --text-1:    #94a3b8;
  --text-2:    #4a5568;
  --text-3:    #2d3748;

  /* Accent system */
  --blue:      #4f8ef7;
  --blue-glow: rgba(79,142,247,0.35);
  --indigo:    #7c6ff7;
  --cyan:      #22d3ee;
  --teal:      #2dd4bf;
  --green:     #34d399;
  --amber:     #fbbf24;
  --orange:    #fb923c;
  --red:       #f87171;
  --pink:      #f472b6;
  --violet:    #a78bfa;

  --accent:    var(--blue);
  --accent-glow: var(--blue-glow);

  /* Fonts */
  --font-ui:   'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --font-head: 'Space Grotesk', sans-serif;

  /* Radii */
  --r-xs: 4px; --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 20px; --r-2xl: 28px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-lg: 0 16px 64px rgba(0,0,0,0.6);
  --shadow-blue: 0 0 24px rgba(79,142,247,0.25);

  /* Sidebar */
  --sidebar-w: 268px;
  --panel-w:   300px;
  --topbar-h:  52px;
}

/* ═══════════════════════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════════════════════ */
html, body, #root {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg-base);
  color: var(--text-0);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}

/* Scrollbars */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ═══════════════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════════════ */
.app {
  display: flex; height: 100vh; width: 100vw; overflow: hidden;
  background: var(--bg-base);
}

/* Animated background grid */
.app::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}
.app::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,142,247,0.08) 0%, transparent 70%);
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-glass);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
  position: relative;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.sidebar-logo {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  display: flex; align-items: center; gap: 10px; margin-bottom: 2px;
}
.logo-icon {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--blue), var(--indigo));
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px var(--blue-glow);
  flex-shrink: 0;
}
.logo-text {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text-0);
}
.logo-sub {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--text-2);
  letter-spacing: 0.06em;
  margin-top: 2px;
}

.sidebar-search {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  padding: 7px 10px;
  transition: border-color 0.15s, background 0.15s;
}
.search-box:focus-within {
  border-color: rgba(79,142,247,0.5);
  background: rgba(79,142,247,0.06);
}
.search-box input {
  background: none; border: none; outline: none;
  color: var(--text-0);
  font-family: var(--font-mono);
  font-size: 11.5px; width: 100%;
}
.search-box input::placeholder { color: var(--text-2); }
.search-icon { color: var(--text-2); flex-shrink: 0; }

.node-list { flex: 1; overflow-y: auto; padding: 8px; }

.cat-header {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: var(--r-sm);
  cursor: pointer; user-select: none; margin-bottom: 2px;
  transition: background 0.12s;
}
.cat-header:hover { background: rgba(255,255,255,0.04); }

.cat-label {
  font-family: var(--font-head); font-size: 10px;
  font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; flex: 1;
}
.cat-count {
  font-family: var(--font-mono); font-size: 9px;
  background: rgba(255,255,255,0.07);
  border-radius: 99px; padding: 1px 6px;
  color: var(--text-1);
}

.node-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--r-sm);
  cursor: grab; user-select: none; margin-bottom: 2px;
  border: 1px solid transparent;
  transition: all 0.15s; background: rgba(255,255,255,0.02);
  margin-left: 10px;
}
.node-item:hover {
  background: rgba(255,255,255,0.05);
  border-color: var(--border2);
  transform: translateX(2px);
}
.node-item:active { cursor: grabbing; opacity: 0.7; }
.ni-icon {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.ni-name {
  font-family: var(--font-head); font-size: 11.5px;
  font-weight: 600; color: var(--text-0);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ni-desc {
  font-family: var(--font-mono); font-size: 9.5px;
  color: var(--text-2); margin-top: 0.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Special group items */
.group-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--r-sm);
  cursor: grab; user-select: none; margin-bottom: 4px;
  border: 1px solid; transition: all 0.15s;
}
.group-item:active { cursor: grabbing; }

/* Sidebar footer */
.sidebar-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
}
.port-legend {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.1em; color: var(--text-2);
  text-transform: uppercase; margin-bottom: 6px; font-weight: 600;
}
.port-badges { display: flex; flex-wrap: wrap; gap: 4px; }
.port-badge {
  font-family: var(--font-mono); font-size: 9px; font-weight: 600;
  padding: 2px 7px; border-radius: 99px;
  border: 1px solid currentColor;
  opacity: 0.7;
}

/* ═══════════════════════════════════════════════════════════════
   CANVAS AREA
═══════════════════════════════════════════════════════════════ */
.canvas-wrap {
  flex: 1; position: relative; background: var(--bg-base); overflow: hidden;
}

/* ReactFlow overrides */
.react-flow { top: var(--topbar-h) !important; }
.react-flow__background { background: var(--bg-base) !important; }
.react-flow__background pattern circle { fill: rgba(79,142,247,0.12) !important; }
.react-flow__minimap {
  background: var(--bg-2) !important;
  border: 1px solid var(--border) !important;
  border-radius: var(--r-md) !important;
  box-shadow: var(--shadow-md) !important;
}
.react-flow__minimap-mask { fill: rgba(79,142,247,0.08) !important; opacity: 1 !important; }
.react-flow__controls {
  background: var(--bg-glass) !important;
  border: 1px solid var(--border) !important;
  border-radius: var(--r-md) !important;
  box-shadow: var(--shadow-md) !important;
  backdrop-filter: blur(16px) !important;
  overflow: hidden;
}
.react-flow__controls-button {
  background: transparent !important;
  border: none !important;
  border-bottom: 1px solid var(--border) !important;
  color: var(--text-1) !important;
  transition: all 0.12s !important;
}
.react-flow__controls-button:last-child { border-bottom: none !important; }
.react-flow__controls-button:hover { background: rgba(255,255,255,0.06) !important; color: var(--text-0) !important; }
.react-flow__controls-button svg { fill: currentColor !important; }
.react-flow__handle {
  width: 10px !important; height: 10px !important;
  border-radius: 50% !important;
  border: 2px solid var(--bg-2) !important;
  transition: transform 0.15s, box-shadow 0.15s !important;
}
.react-flow__handle:hover { transform: scale(1.5) !important; }
.react-flow__handle-left { left: -5px !important; }
.react-flow__handle-right { right: -5px !important; }
.react-flow__edge-path { stroke-width: 1.5 !important; }
.react-flow__connection-line {
  stroke: rgba(255,255,255,0.3) !important;
  stroke-width: 1.5 !important;
  stroke-dasharray: 5 3 !important;
}

/* ═══════════════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════════════ */
.topbar {
  height: var(--topbar-h);
  background: var(--bg-glass);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex; align-items: center;
  padding: 0 16px; gap: 10px;
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
}

.topbar-logo {
  font-family: var(--font-head);
  font-size: 14px; font-weight: 700;
  letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 8px;
  color: var(--text-0);
}
.topbar-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 8px var(--blue);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.8); }
}

.topbar-sep { width: 1px; height: 20px; background: var(--border2); margin: 0 4px; }
.topbar-spacer { flex: 1; }

/* Command palette button */
.cmd-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: var(--r-sm);
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.04);
  color: var(--text-1);
  cursor: pointer; font-family: var(--font-mono);
  font-size: 11px; transition: all 0.15s;
}
.cmd-btn:hover { border-color: rgba(79,142,247,0.4); background: rgba(79,142,247,0.06); color: var(--text-0); }
.cmd-badge {
  font-size: 9px; background: rgba(255,255,255,0.1);
  border-radius: 4px; padding: 1px 5px; color: var(--text-2);
}

/* Topbar buttons */
.tb-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: var(--r-sm);
  border: none; cursor: pointer;
  font-family: var(--font-ui); font-size: 12px; font-weight: 500;
  transition: all 0.15s; white-space: nowrap;
}
.tb-btn-ghost {
  background: transparent;
  color: var(--text-1);
  border: 1px solid var(--border2);
}
.tb-btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--text-0); }
.tb-btn-primary {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: #fff;
  box-shadow: 0 2px 12px rgba(79,142,247,0.3);
}
.tb-btn-primary:hover { box-shadow: 0 4px 20px rgba(79,142,247,0.5); transform: translateY(-1px); }
.tb-btn-deploy {
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff;
  box-shadow: 0 2px 12px rgba(16,185,129,0.3);
}
.tb-btn-deploy:hover { box-shadow: 0 4px 20px rgba(16,185,129,0.5); transform: translateY(-1px); }
.tb-btn-danger { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.tb-btn-danger:hover { background: rgba(248,113,113,0.25); }

/* Status badge in topbar */
.ws-status {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-2);
}
.ws-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-3);
  transition: background 0.3s, box-shadow 0.3s;
}
.ws-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse-dot 2s infinite; }

/* Menu dropdown */
.topbar-menu { position: relative; }
.menu-panel {
  position: absolute; top: calc(100% + 8px); right: 0;
  min-width: 210px;
  background: var(--bg-glass);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border2);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-lg);
  padding: 6px;
  z-index: 100;
  animation: menu-in 0.15s ease;
}
@keyframes menu-in {
  from { opacity:0; transform:translateY(-6px) scale(0.97); }
  to   { opacity:1; transform:translateY(0)   scale(1); }
}
.menu-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--r-sm);
  cursor: pointer; font-size: 12.5px; color: var(--text-1);
  transition: all 0.1s; font-family: var(--font-ui);
}
.menu-item:hover { background: rgba(255,255,255,0.06); color: var(--text-0); }
.menu-item.danger:hover { background: rgba(248,113,113,0.1); color: var(--red); }
.menu-sep { height: 1px; background: var(--border); margin: 4px 0; }
.menu-item-hint {
  margin-left: auto; font-family: var(--font-mono);
  font-size: 9px; color: var(--text-2);
}

/* ═══════════════════════════════════════════════════════════════
   CLOUD NODES
═══════════════════════════════════════════════════════════════ */
.cloud-node {
  background: var(--bg-glass);
  border: 1px solid var(--border2);
  border-radius: var(--r-md);
  min-width: 200px; overflow: hidden;
  position: relative;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: border-color 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.cloud-node::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--node-color, var(--blue));
  border-radius: var(--r-md) var(--r-md) 0 0;
}
.cloud-node:hover {
  border-color: var(--node-color, var(--blue));
  box-shadow: 0 0 0 1px var(--node-color, var(--blue)), var(--shadow-md),
              0 0 32px rgba(79,142,247,0.1);
}
.cloud-node.selected {
  border-color: var(--node-color, var(--blue));
  box-shadow: 0 0 0 2px var(--node-color, var(--blue)),
              0 8px 32px rgba(0,0,0,0.5),
              0 0 48px rgba(79,142,247,0.15);
}

/* Status bars */
.cloud-node.status-deployed::before { background: var(--green); }
.cloud-node.status-error::before { background: var(--red); }
.cloud-node.status-deploying::before {
  background: var(--amber);
  animation: shimmer-bar 1.2s ease-in-out infinite;
}
.cloud-node.status-working::before {
  background: #fff;
  animation: shimmer-bar 0.5s ease-in-out infinite;
}
.cloud-node.status-working {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.6),
              0 0 32px rgba(255,255,255,0.15) !important;
}
.cloud-node.status-failed::before {
  background: var(--red);
  animation: shimmer-bar 0.4s ease-in-out infinite;
}
@keyframes shimmer-bar {
  0%,100% { opacity:1; }
  50% { opacity:0.3; }
}

.node-head {
  padding: 11px 13px 9px;
  display: flex; align-items: center; gap: 9px;
  border-bottom: 1px solid var(--border);
}
.node-icon-wrap {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.node-label {
  font-family: var(--font-head); font-size: 12.5px;
  font-weight: 600; color: var(--text-0); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.node-type {
  font-family: var(--font-mono); font-size: 8.5px;
  font-weight: 500; letter-spacing: 0.08em;
  color: var(--text-2); text-transform: uppercase; margin-top: 1px;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.status-dot.idle { background: var(--text-2); }
.status-dot.deployed { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-dot.deploying { background: var(--amber); animation: pulse-dot 1s infinite; }
.status-dot.error, .status-dot.failed { background: var(--red); box-shadow: 0 0 6px var(--red); }
.status-dot.working { background: #fff; box-shadow: 0 0 10px #fff; animation: pulse-dot 0.4s infinite; }

.collapse-btn {
  width: 18px; height: 18px; border-radius: 4px;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); transition: all 0.12s; flex-shrink: 0; padding: 0;
}
.collapse-btn:hover { color: var(--text-0); background: rgba(255,255,255,0.08); }

.edge-count {
  font-family: var(--font-mono); font-size: 8.5px; font-weight: 700;
  color: var(--text-2); background: rgba(255,255,255,0.07);
  border-radius: 99px; padding: 1px 5px; flex-shrink: 0; margin-right: 2px;
}

/* Ports */
.node-ports { padding: 6px 0; }
.port-row {
  display: flex; align-items: center;
  padding: 2px 0; position: relative; height: 24px;
}
.port-lbl {
  font-family: var(--font-mono); font-size: 9.5px;
  color: var(--text-1); flex: 1;
}
.port-lbl.in { padding-left: 18px; }
.port-lbl.out { padding-right: 18px; text-align: right; }
.port-sep { height: 1px; background: var(--border); margin: 3px 10px; }

/* Node toolbar buttons */
.react-flow__node-toolbar {
  display: flex !important; gap: 3px !important;
  background: var(--bg-glass) !important;
  backdrop-filter: blur(16px) !important;
  border: 1px solid var(--border2) !important;
  border-radius: var(--r-md) !important;
  padding: 5px !important;
  box-shadow: var(--shadow-md) !important;
}
.nt-btn {
  width: 28px; height: 28px; border-radius: var(--r-sm);
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-1); transition: all 0.12s;
}
.nt-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-0); }
.nt-btn.danger:hover { background: rgba(248,113,113,0.15); color: var(--red); }
.nt-btn.success:hover { background: rgba(52,211,153,0.15); color: var(--green); }
.nt-btn.active { background: rgba(79,142,247,0.2); color: var(--blue); }
.nt-sep { width: 1px; background: var(--border); margin: 2px 2px; align-self: stretch; }

/* Color swatches */
.swatch {
  width: 14px; height: 14px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s; flex-shrink: 0;
}
.swatch:hover, .swatch.active { transform: scale(1.3); border-color: rgba(255,255,255,0.8); }

/* Missing required port indicator */
.node-missing-required::after {
  content: '!'; position: absolute; top: -4px; right: -4px;
  width: 14px; height: 14px; background: var(--amber); color: #000;
  font-size: 8.5px; font-weight: 900; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  line-height: 14px; text-align: center;
}

/* VPC/Group node */
.vpc-group-node {
  background: rgba(16,185,129,0.04);
  border: 1.5px dashed rgba(16,185,129,0.3);
  border-radius: var(--r-lg);
  position: relative; overflow: hidden;
  backdrop-filter: blur(8px);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.vpc-group-node.selected {
  border-color: rgba(16,185,129,0.7);
  box-shadow: 0 0 0 1px rgba(16,185,129,0.4), 0 8px 32px rgba(16,185,129,0.1);
}
.vpc-group-node.drag-over {
  border-color: rgba(16,185,129,0.9);
  background: rgba(16,185,129,0.08);
}
.vpc-group-header {
  padding: 10px 14px; display: flex; align-items: center; gap: 9px;
  border-bottom: 1px solid rgba(16,185,129,0.15);
  background: rgba(16,185,129,0.06);
}
.vpc-group-body {
  padding: 10px; display: flex; flex-direction: column; gap: 4px;
  overflow-y: auto;
}
.vpc-group-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: rgba(16,185,129,0.3); font-size: 10px; letter-spacing: 0.05em;
  border: 1px dashed rgba(16,185,129,0.15); border-radius: var(--r-sm);
  padding: 20px; text-align: center; line-height: 1.7;
  font-family: var(--font-mono);
}
.vpc-child-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(16,185,129,0.07);
  border: 1px solid rgba(16,185,129,0.18);
  border-radius: var(--r-sm); padding: 5px 9px;
  font-size: 10.5px; color: #a7f3d0;
}

/* Group box (visual) */
.group-box-node {
  background: rgba(139,92,246,0.04);
  border: 1.5px dashed rgba(139,92,246,0.28);
  border-radius: var(--r-lg);
  backdrop-filter: blur(8px);
  transition: all 0.15s;
}
.group-box-node.selected {
  border-color: rgba(139,92,246,0.6);
  box-shadow: 0 0 0 1px rgba(139,92,246,0.35);
}

/* ═══════════════════════════════════════════════════════════════
   EDGES
═══════════════════════════════════════════════════════════════ */
.edge-label-badge {
  background: var(--bg-3); border: 1px solid var(--border2);
  border-radius: var(--r-xs); padding: 2px 7px;
  font-family: var(--font-mono); font-size: 9px; color: var(--text-1);
  white-space: nowrap;
}
.edge-toolbar-row {
  display: flex; gap: 3px; background: var(--bg-glass);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border2); border-radius: var(--r-sm);
  padding: 3px; box-shadow: var(--shadow-sm);
}
.et-btn {
  padding: 3px 7px; border-radius: 5px; border: none;
  background: transparent; color: var(--text-1);
  font-size: 9.5px; font-family: var(--font-mono);
  cursor: pointer; transition: all 0.1s;
}
.et-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-0); }
.et-btn.active { background: var(--blue); color: #fff; }
.et-btn.del:hover { background: rgba(248,113,113,0.15); color: var(--red); }

/* ═══════════════════════════════════════════════════════════════
   RIGHT PROPERTY PANEL
═══════════════════════════════════════════════════════════════ */
.panel-right {
  width: var(--panel-w);
  min-width: var(--panel-w);
  background: var(--bg-glass);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: width 0.2s, min-width 0.2s;
  z-index: 10;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
}
.panel-right.collapsed { width: 0; min-width: 0; }

.panel-header {
  padding: 15px 16px 11px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title {
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  color: var(--text-0);
}
.panel-sub {
  font-family: var(--font-mono); font-size: 9px; color: var(--text-2);
  margin-top: 2px;
}
.panel-close {
  width: 24px; height: 24px; border-radius: 6px;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); transition: all 0.12s;
}
.panel-close:hover { background: rgba(255,255,255,0.08); color: var(--text-0); }
.panel-body { flex: 1; overflow-y: auto; padding: 16px; }

.field-grp { margin-bottom: 14px; }
.field-lbl {
  font-family: var(--font-mono); font-size: 9.5px; font-weight: 500;
  letter-spacing: 0.1em; color: var(--text-2); text-transform: uppercase;
  margin-bottom: 5px; display: block;
}
.field-in {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2); border-radius: var(--r-sm);
  padding: 7px 10px; color: var(--text-0);
  font-family: var(--font-mono); font-size: 11.5px; outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.field-in:focus { border-color: rgba(79,142,247,0.5); background: rgba(79,142,247,0.05); }
.field-sel {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2); border-radius: var(--r-sm);
  padding: 7px 10px; color: var(--text-0);
  font-family: var(--font-mono); font-size: 11.5px; outline: none; cursor: pointer;
}
.field-sel option { background: var(--bg-3); }
.field-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.field-check input { accent-color: var(--blue); }
.section-hdr {
  font-family: var(--font-head); font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; color: var(--text-2); text-transform: uppercase;
  margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
}

/* Color picker in panel */
.swatch-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
.swatch-lg {
  width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
}
.swatch-lg:hover, .swatch-lg.active { transform: scale(1.25); border-color: rgba(255,255,255,0.8); }

/* ═══════════════════════════════════════════════════════════════
   LOG PANEL
═══════════════════════════════════════════════════════════════ */
.log-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 170px;
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  z-index: 15; display: flex; flex-direction: column;
  transition: height 0.2s;
}
.log-panel.hidden { height: 0; overflow: hidden; }
.log-header {
  padding: 6px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.log-title {
  font-family: var(--font-mono); font-size: 9.5px;
  font-weight: 600; letter-spacing: 0.12em;
  color: var(--text-2); text-transform: uppercase; flex: 1;
}
.log-body {
  flex: 1; overflow-y: auto; padding: 6px 14px;
  font-family: var(--font-mono); font-size: 10.5px; line-height: 1.7;
}
.log-row { display: flex; gap: 10px; }
.log-ts { color: var(--text-2); flex-shrink: 0; font-size: 9.5px; padding-top: 1px; min-width: 52px; }
.log-msg { flex: 1; }
.log-row.ok .log-msg { color: var(--green); }
.log-row.err .log-msg { color: var(--red); }
.log-row.info .log-msg { color: var(--cyan); }
.log-row.warn .log-msg { color: var(--amber); }

/* ═══════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════ */
.toast-container {
  position: fixed; top: 68px; right: 16px;
  z-index: 1000; display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 15px; border-radius: var(--r-md);
  font-size: 12.5px; font-family: var(--font-ui);
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border2);
  box-shadow: var(--shadow-md);
  animation: toast-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: all; max-width: 290px;
  color: var(--text-0);
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.info { border-left: 3px solid var(--blue); }
.toast.warn { border-left: 3px solid var(--amber); }
@keyframes toast-in {
  from { opacity:0; transform:translateX(20px) scale(0.95); }
  to   { opacity:1; transform:translateX(0) scale(1); }
}

/* ═══════════════════════════════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════════════════════════════ */
.ctx-menu {
  position: fixed;
  background: var(--bg-glass);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border2);
  border-radius: var(--r-md); padding: 6px;
  box-shadow: var(--shadow-lg);
  z-index: 1000; min-width: 172px;
  animation: menu-in 0.12s ease;
}
.ctx-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: var(--r-sm);
  cursor: pointer; font-size: 12px; color: var(--text-1);
  transition: all 0.1s; font-family: var(--font-ui);
}
.ctx-item:hover { background: rgba(255,255,255,0.06); color: var(--text-0); }
.ctx-item.danger:hover { background: rgba(248,113,113,0.12); color: var(--red); }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ═══════════════════════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════════════════════ */
.empty-state {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; pointer-events: none; user-select: none;
}
.empty-title {
  font-family: var(--font-head);
  font-size: 24px; font-weight: 700;
  color: rgba(255,255,255,0.1); letter-spacing: -0.5px;
  margin-bottom: 10px;
}
.empty-sub {
  font-family: var(--font-mono); font-size: 11px;
  color: rgba(255,255,255,0.06); line-height: 1.7;
}

/* ═══════════════════════════════════════════════════════════════
   COMMAND PALETTE
═══════════════════════════════════════════════════════════════ */
.cmd-overlay {
  position: fixed; inset: 0;
  background: rgba(3,6,15,0.8);
  backdrop-filter: blur(8px);
  z-index: 2000;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 15vh;
  animation: fade-in 0.15s ease;
}
@keyframes fade-in {
  from { opacity:0; }
  to   { opacity:1; }
}
.cmd-palette {
  width: 560px; max-width: 92vw;
  background: var(--bg-glass);
  backdrop-filter: blur(32px);
  border: 1px solid var(--border3);
  border-radius: var(--r-xl);
  box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
  overflow: hidden;
  animation: cmd-in 0.2s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes cmd-in {
  from { opacity:0; transform:scale(0.94) translateY(-10px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.cmd-input-wrap {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.cmd-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text-0); font-family: var(--font-ui);
  font-size: 15px; font-weight: 400;
}
.cmd-input::placeholder { color: var(--text-2); }
.cmd-results { max-height: 360px; overflow-y: auto; padding: 6px; }
.cmd-result {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 12px; border-radius: var(--r-sm);
  cursor: pointer; transition: all 0.1s;
}
.cmd-result:hover, .cmd-result.focused {
  background: rgba(79,142,247,0.12);
}
.cmd-result-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cmd-result-name {
  font-family: var(--font-head); font-size: 13px; font-weight: 600;
  color: var(--text-0);
}
.cmd-result-desc {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-2);
  margin-top: 1px;
}
.cmd-result-tag {
  margin-left: auto; font-family: var(--font-mono); font-size: 9px;
  color: var(--text-2); background: rgba(255,255,255,0.06);
  border-radius: var(--r-xs); padding: 2px 7px; flex-shrink: 0;
}
.cmd-footer {
  padding: 8px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.cmd-key {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 9.5px; color: var(--text-2);
}
.kbd {
  background: rgba(255,255,255,0.08); border: 1px solid var(--border2);
  border-radius: 4px; padding: 1px 6px; font-size: 9px; color: var(--text-1);
  font-family: var(--font-mono);
}
.cmd-section-label {
  padding: 6px 12px 4px;
  font-family: var(--font-mono); font-size: 9px;
  color: var(--text-2); letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 600;
}

/* ═══════════════════════════════════════════════════════════════
   NODE LOGS MODAL
═══════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(3,6,15,0.75);
  backdrop-filter: blur(6px);
  z-index: 3000;
  display: flex; align-items: center; justify-content: center;
  animation: fade-in 0.15s ease;
}
.modal {
  background: var(--bg-glass);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border2);
  border-radius: var(--r-xl);
  width: 700px; height: 500px;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: cmd-in 0.18s ease;
}
.modal-head {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.02);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
}
.modal-body {
  flex: 1; overflow-y: auto;
  font-family: var(--font-mono); font-size: 10.5px; line-height: 1.75;
  padding: 6px 0;
}
.modal-log-row {
  display: flex; gap: 10px;
  padding: 2px 18px;
}
.modal-log-row:nth-child(even) { background: rgba(255,255,255,0.012); }
.modal-log-ts { color: var(--text-2); font-size: 9px; flex-shrink: 0; min-width: 56px; padding-top: 1px; }
.modal-log-lvl {
  font-size: 8.5px; font-weight: 700;
  border-radius: 3px; padding: 1px 5px;
  flex-shrink: 0; min-width: 34px; text-align: center;
  align-self: flex-start; margin-top: 2px;
}
.modal-foot {
  padding: 9px 18px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.02);
  border-radius: 0 0 var(--r-xl) var(--r-xl);
}

/* ═══════════════════════════════════════════════════════════════
   INFO MODAL
═══════════════════════════════════════════════════════════════ */
.info-overlay {
  position: fixed; inset: 0;
  background: rgba(3,6,15,0.75); backdrop-filter: blur(8px);
  z-index: 3000; display: flex; align-items: center; justify-content: center;
  animation: fade-in 0.15s ease;
}
.info-modal {
  background: var(--bg-glass); backdrop-filter: blur(24px);
  border: 1px solid var(--border2); border-radius: var(--r-xl);
  width: 520px; max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg); overflow: hidden;
  animation: cmd-in 0.18s ease;
}
.info-head {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.info-body { flex: 1; overflow-y: auto; padding: 20px 22px; }

/* ═══════════════════════════════════════════════════════════════
   EDGE STYLE SELECTOR (canvas toolbar)
═══════════════════════════════════════════════════════════════ */
.canvas-toolbar {
  position: absolute; top: 62px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px;
  background: var(--bg-glass); backdrop-filter: blur(16px);
  border: 1px solid var(--border2); border-radius: var(--r-lg);
  padding: 5px; z-index: 15;
  box-shadow: var(--shadow-sm);
}
.edge-style-btn {
  padding: 4px 10px; border-radius: var(--r-sm); border: none;
  background: transparent; color: var(--text-1);
  font-size: 10px; font-family: var(--font-mono);
  cursor: pointer; transition: all 0.12s;
}
.edge-style-btn.active { background: var(--blue); color: #fff; }
.edge-style-btn:not(.active):hover { background: rgba(255,255,255,0.07); color: var(--text-0); }

/* Theme toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border2);
  border-radius: 99px; padding: 4px 11px;
  cursor: pointer; font-size: 11px; color: var(--text-1);
  transition: all 0.15s;
}
.theme-toggle:hover { color: var(--text-0); background: rgba(255,255,255,0.08); }

/* Light mode */
[data-theme="light"] {
  --bg-base:   #f0f4f8;
  --bg-1:      #fff;
  --bg-2:      #f8fafc;
  --bg-3:      #edf2f7;
  --bg-4:      #e2e8f0;
  --bg-glass:  rgba(255,255,255,0.85);
  --bg-glass2: rgba(240,244,248,0.8);
  --border:    rgba(0,0,0,0.07);
  --border2:   rgba(0,0,0,0.1);
  --border3:   rgba(0,0,0,0.15);
  --text-0:    #0f172a;
  --text-1:    #475569;
  --text-2:    #94a3b8;
  --text-3:    #cbd5e1;
}
[data-theme="light"] .react-flow__background { background: var(--bg-base) !important; }
[data-theme="light"] .react-flow__background pattern circle { fill: rgba(0,0,0,0.07) !important; }

/* Deploying spinner */
.deploying-indicator {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px; color: var(--amber);
}
.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

/* Resizer handle */
.react-flow__resize-control.handle {
  width: 8px !important; height: 8px !important;
  background: var(--blue) !important;
  border: 2px solid var(--bg-1) !important;
  border-radius: 2px !important;
  opacity: 0.8 !important;
}
.react-flow__resize-control.line {
  border-color: var(--blue) !important; opacity: 0.3 !important;
}

/* Multi-in handle glow */
.react-flow__handle[data-multiin="true"] {
  box-shadow: 0 0 0 2px rgba(52,211,153,0.45) !important;
}

/* Node collapse */
.node-collapsed .node-ports { display: none !important; }
.node-collapsed .node-head { border-bottom: none !important; }

/* Fade animation for modals */
@keyframes pop-in {
  from { opacity:0; transform:scale(0.95); }
  to   { opacity:1; transform:scale(1); }
}
</style>

// ── GCP Icon ──────────────────────────────────────────────────────────────────
const iconCache = {};
const GCPIcon = ({ nodeType, fallbackIcon, color, size = 18 }) => {
  const [src, setSrc] = React.useState(() => iconCache[nodeType] || null);
  const [failed, setFailed] = React.useState(iconCache[nodeType] === false);

  React.useEffect(() => {
    if (iconCache[nodeType] !== undefined) {
      if (iconCache[nodeType] === false) setFailed(true);
      else setSrc(iconCache[nodeType]);
      return;
    }
    const fmt = (fallbackIcon||'cloud').replace(/([a-z])([A-Z])/g,'$1_$2').toLowerCase();
    const url = `icons/${fmt}/${fmt}.svg`;
    fetch(url).then(r => { if (!r.ok) throw 0; return r.text(); })
      .then(() => { iconCache[nodeType] = url; setSrc(url); })
      .catch(() => { iconCache[nodeType] = false; setFailed(true); });
  }, [nodeType, fallbackIcon]);

  if (src && !failed) {
    return <img src={src} width={size} height={size}
      style={{ display:'block', objectFit:'contain', filter:'drop-shadow(0 0 2px rgba(0,0,0,0.4))' }}
      onError={() => { iconCache[nodeType]=false; setFailed(true); setSrc(null); }}
      alt={nodeType} />;
  }
  const IconEl = I[fallbackIcon] || I.cloud;
  return <span style={{ color, display:'flex', alignItems:'center' }}>{IconEl}</span>;
};

// ── Cloud Node ────────────────────────────────────────────────────────────────
const CloudNode = ({ data, selected, id }) => {
  const schema = data.schema;
  if (!schema) return null;
  const status = data.status || 'idle';
  const collapsed = data.collapsed || false;
  const nodeColor = data.accentColor || schema.color || '#4f8ef7';
  const { setNodes, deleteElements, getEdges } = useReactFlow();
  const { openNodeLogs } = React.useContext(VCOCtx);

  const allEdges = getEdges();
  const edgeCount = allEdges.filter(e => e.source===id||e.target===id).length;
  const connectedTargets = new Set(allEdges.filter(e=>e.target===id).map(e=>e.targetHandle));

  const toggleCollapse = e => {
    e.stopPropagation();
    setNodes(nds => nds.map(n => n.id===id ? {...n,data:{...n.data,collapsed:!n.data.collapsed}} : n));
  };
  const duplicate = () => setNodes(nds => {
    const orig = nds.find(n=>n.id===id);
    if(!orig) return nds;
    const nid = `${schema.type}-${Date.now()}`;
    return [...nds, {...orig,id:nid,position:{x:orig.position.x+50,y:orig.position.y+50},selected:false}];
  });
  const rename = () => {
    const lbl = prompt('Node name:', data.label||schema.label);
    if(lbl?.trim()) setNodes(nds=>nds.map(n=>n.id===id?{...n,data:{...n.data,label:lbl.trim()}}:n));
  };
  const cycleStatus = () => {
    const cycle = ['idle','deployed','deploying','error'];
    const next = cycle[(cycle.indexOf(status)+1)%cycle.length];
    setNodes(nds=>nds.map(n=>n.id===id?{...n,data:{...n.data,status:next}}:n));
  };
  const setColor = c => setNodes(nds=>nds.map(n=>n.id===id?{...n,data:{...n.data,accentColor:c}}:n));

  return (
    <>
      <NodeToolbar isVisible={selected} position={Position.Top} offset={10}>
        <div style={{display:'flex',alignItems:'center',gap:3}}>
          {/* Collapse */}
          <button className="nt-btn" title={collapsed?'Expand':'Collapse'} onClick={toggleCollapse}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              {collapsed
                ? <><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>
                : <><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></>}
            </svg>
          </button>
          <button className="nt-btn success" title="Duplicate" onClick={duplicate}>{I.copy}</button>
          <button className="nt-btn" title="Rename" onClick={rename}>{I.pen}</button>
          <button className="nt-btn" title="Copy ID" onClick={()=>navigator.clipboard?.writeText(id)}>{I.layers}</button>
          <button className="nt-btn" title="Cycle status" onClick={cycleStatus}>{I.refresh}</button>
          <button className="nt-btn danger" title="Mark Error" onClick={()=>setNodes(nds=>nds.map(n=>n.id===id?{...n,data:{...n.data,status:'error'}}:n))}>{I.warn}</button>
          <div className="nt-sep"/>
          {NODE_ACCENT_COLORS.slice(0,7).map(c=>(
            <div key={c} className={`swatch${nodeColor===c?' active':''}`}
              style={{background:c}}
              onClick={()=>setColor(c)}/>
          ))}
          <div className="nt-sep"/>
          <button className="nt-btn" title="View Logs" style={{color:'var(--blue)'}}
            onClick={e=>{e.stopPropagation();openNodeLogs&&openNodeLogs(id,data.label||schema.label);}}>
            {I.log}
          </button>
          {schema.url_field && data.props?.[schema.url_field] && (
            <button className="nt-btn" title="Open URL" style={{color:'var(--green)'}}
              onClick={e=>{e.stopPropagation();window.open(data.props[schema.url_field],'_blank');}}>
              {I.link}
            </button>
          )}
          <div className="nt-sep"/>
          <button className="nt-btn danger" title="Delete" onClick={()=>deleteElements({nodes:[{id}]})}>{I.trash}</button>
        </div>
      </NodeToolbar>

      <NodeResizer isVisible={selected} minWidth={190} minHeight={collapsed?50:90}
        handleStyle={{width:8,height:8,background:'var(--blue)',border:'2px solid var(--bg-1)',borderRadius:2}}
        lineStyle={{border:'1px solid var(--blue)',opacity:.4}}/>

      <div className={`cloud-node${selected?' selected':''} status-${status}${collapsed?' node-collapsed':''}`}
        style={{'--node-color':nodeColor,width:'100%',height:'100%'}}>
        
        <div className="node-head">
          <div className="node-icon-wrap" style={{background:nodeColor+'20',color:nodeColor}}>
            <GCPIcon nodeType={schema.type} fallbackIcon={schema.icon} color={nodeColor} size={17}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div className="node-label">{data.label||schema.label}</div>
            <div className="node-type">{schema.type?.replace('Node','')}</div>
          </div>
          {edgeCount>0&&<span className="edge-count">{edgeCount}</span>}
          <div className={`status-dot ${status}`} style={{marginRight:2}}/>
          <button className="collapse-btn" onClick={toggleCollapse} title={collapsed?'Expand':'Collapse'}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              {collapsed?<polyline points="6 9 12 15 18 9"/>:<polyline points="18 15 12 9 6 15"/>}
            </svg>
          </button>
        </div>

        {!collapsed && (
          <div className="node-ports">
            {schema.inputs.map(port=>{
              const isConn = connectedTargets.has(port.name);
              const missing = port.required && !isConn;
              return (
                <div key={`in-${port.name}`} className="port-row" style={{position:'relative'}}>
                  <Handle type="target" position={Position.Left} id={port.name}
                    data-multiin={port.multi_in?'true':'false'}
                    style={{
                      background:port.color, position:'absolute', left:-5, top:'50%', transform:'translateY(-50%)',
                      border:missing?'2px solid var(--amber)':port.multi_in?'2px solid #34d399':'2px solid var(--bg-2)',
                      boxShadow:missing?'0 0 0 3px rgba(251,191,36,0.3)':'none',
                      transition:'transform .15s',
                    }}/>
                  <span className="port-lbl in">
                    <span style={{color:port.color,fontSize:8.5,fontWeight:700,marginRight:3}}>{port.label}</span>
                    {port.name.replace(/_/g,' ')}
                    {port.required&&<span style={{color:isConn?'var(--green)':'var(--amber)',marginLeft:3,fontSize:9}}>{isConn?'✓':'!'}</span>}
                  </span>
                </div>
              );
            })}
            {schema.inputs.length>0&&schema.outputs.length>0&&<div className="port-sep"/>}
            {schema.outputs.map(port=>(
              <div key={`out-${port.name}`} className="port-row" style={{position:'relative'}}>
                <span className="port-lbl out">
                  {port.name.replace(/_/g,' ')}
                  <span style={{color:port.color,fontSize:8.5,fontWeight:700,marginLeft:3}}>{port.label}</span>
                </span>
                <Handle type="source" position={Position.Right} id={port.name}
                  style={{background:port.color,position:'absolute',right:-5,top:'50%',transform:'translateY(-50%)',border:'2px solid var(--bg-2)',transition:'transform .15s'}}/>
              </div>
            ))}
          </div>
        )}
        {collapsed && (
          <>
            {schema.inputs.map((port,i)=>(
              <Handle key={`in-${port.name}`} type="target" position={Position.Left} id={port.name}
                style={{background:port.color,border:'2px solid var(--bg-2)',top:`${50+(i-(schema.inputs.length-1)/2)*20}%`}}/>
            ))}
            {schema.outputs.map((port,i)=>(
              <Handle key={`out-${port.name}`} type="source" position={Position.Right} id={port.name}
                style={{background:port.color,border:'2px solid var(--bg-2)',top:`${50+(i-(schema.outputs.length-1)/2)*20}%`}}/>
            ))}
          </>
        )}
      </div>
    </>
  );
};

// ── Custom Edge ───────────────────────────────────────────────────────────────
const CloudEdge = ({id,sourceX,sourceY,targetX,targetY,sourcePosition,targetPosition,data,style,markerEnd,selected}) => {
  const edgeType = data?.edgeType||'bezier';
  const color = data?.color||'#4f8ef7';
  const animated = data?.animated!==false;
  const label = data?.label||'';
  const {deleteElements,setEdges} = useReactFlow();

  let edgePath, labelX, labelY;
  if(edgeType==='straight') [edgePath,labelX,labelY]=getStraightPath({sourceX,sourceY,targetX,targetY});
  else if(edgeType==='step') [edgePath,labelX,labelY]=getSmoothStepPath({sourceX,sourceY,sourcePosition,targetX,targetY,targetPosition,borderRadius:10});
  else [edgePath,labelX,labelY]=getBezierPath({sourceX,sourceY,sourcePosition,targetX,targetY,targetPosition});

  return (
    <>
      <path id={id} d={edgePath} className="react-flow__edge-path"
        style={{stroke:color,strokeWidth:selected?2.5:1.5,strokeOpacity:0.8,fill:'none',
          strokeDasharray:animated?'6 3':'none',...style}}
        markerEnd={markerEnd}/>
      {label&&(
        <foreignObject x={labelX-36} y={labelY-11} width={72} height={22} style={{overflow:'visible'}}>
          <div className="edge-label-badge">{label}</div>
        </foreignObject>
      )}
      {selected&&(
        <foreignObject x={labelX-72} y={labelY-(label?32:14)} width={144} height={30} style={{overflow:'visible',zIndex:50}}>
          <div className="edge-toolbar-row">
            {['bezier','step','straight'].map(t=>(
              <button key={t} className={`et-btn${edgeType===t?' active':''}`}
                onClick={()=>setEdges(eds=>eds.map(e=>e.id===id?{...e,data:{...e.data,edgeType:t}}:e))}>
                {t[0].toUpperCase()}
              </button>
            ))}
            <button className={`et-btn${animated?' active':''}`}
              onClick={()=>setEdges(eds=>eds.map(e=>e.id===id?{...e,data:{...e.data,animated:!animated}}:e))}>
              ~
            </button>
            <button className="et-btn del"
              onClick={()=>deleteElements({edges:[{id}]})}>✕</button>
          </div>
        </foreignObject>
      )}
    </>
  );
};

// ── VPC Group Node ────────────────────────────────────────────────────────────
const VPCGroupNode = ({data,selected,id}) => {
  const [dragOver,setDragOver] = React.useState(false);
  const {getNodes,setNodes} = useReactFlow();
  const children = data.children||[];
  const isVisual = data.groupType==='visual';

  React.useEffect(()=>{
    if(children.length===0) return;
    const nodes = getNodes();
    const childNodes = nodes.filter(n=>children.some(c=>c.id===n.id));
    if(childNodes.length===0) return;
    const minX=Math.min(...childNodes.map(n=>n.position.x));
    const maxX=Math.max(...childNodes.map(n=>n.position.x+(n.width||200)));
    const minY=Math.min(...childNodes.map(n=>n.position.y));
    const maxY=Math.max(...childNodes.map(n=>n.position.y+(n.height||100)));
    const pad=40,nW=Math.max(300,maxX-minX+pad*2),nH=Math.max(200,maxY-minY+pad*2+60);
    if(Math.abs(nW-(data.width||300))>20||Math.abs(nH-(data.height||200))>20){
      setNodes(nds=>nds.map(n=>n.id===id?{...n,data:{...n.data,width:nW,height:nH}}:n));
    }
  },[children,getNodes,setNodes,id,data.width,data.height]);

  const handleDragOver=e=>{e.preventDefault();e.stopPropagation();setDragOver(true);};
  const handleDragLeave=e=>{e.stopPropagation();setDragOver(false);};
  const handleDrop=e=>{e.stopPropagation();setDragOver(false);if(data.onDropIntoVPC)data.onDropIntoVPC(id,e);};

  const gc = isVisual?'#8b5cf6':'#10b981';
  return (
    <div className={`vpc-group-node${selected?' selected':''}${dragOver?' drag-over':''}`}
      onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
      style={{width:data.width||300,height:data.height||200,
        background:isVisual?'rgba(139,92,246,0.04)':'rgba(16,185,129,0.04)',
        border:`1.5px dashed ${isVisual?'rgba(139,92,246,0.28)':'rgba(16,185,129,0.28)'}`,
        borderRadius:'var(--r-lg)'}}>
      <NodeResizer color={gc} isVisible={selected} minWidth={200} minHeight={150}
        onResizeEnd={(_,{width,height})=>setNodes(nds=>nds.map(n=>n.id===id?{...n,data:{...n.data,width,height}}:n))}/>
      {!isVisual&&(
        <>
          <Handle type="target" position={Position.Left} id="network_in"
            style={{background:'#10b981',border:'2px solid var(--bg-1)',top:28}}/>
          <Handle type="source" position={Position.Right} id="subnet"
            style={{background:'#34d399',border:'2px solid var(--bg-1)',top:28}}/>
        </>
      )}
      <div style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:9,
        borderBottom:`1px solid ${isVisual?'rgba(139,92,246,0.15)':'rgba(16,185,129,0.15)'}`,
        background:isVisual?'rgba(139,92,246,0.06)':'rgba(16,185,129,0.06)'}}>
        <div style={{width:28,height:28,borderRadius:8,background:`${gc}20`,color:gc,
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          {isVisual?I.layers:I.network}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:'var(--font-head)',fontSize:13,fontWeight:700,color:isVisual?'#c4b5fd':'#a7f3d0'}}>
            {data.label||(isVisual?'Visual Group':'VPC Network')}
          </div>

const CategoryList = ({filteredTypes}) => {
  const [openCats, setOpenCats] = React.useState({});

    const c=t.category||'Other';
    if(!acc[c]) acc[c]=[];
    acc[c].push(t);
    return acc;
  },{});
  const toggle = c => setOpenCats(p=>({...p,[c]:!p[c]}));
  return <>
    {Object.entries(grouped).map(([cat,items])=>{
      const meta = CAT_META[cat]||{color:'#94a3b8',icon:'cloud'};
      const isOpen = openCats[cat]!==false;

// ── Command Palette ───────────────────────────────────────────────────────────
const CommandPalette = ({nodeTypes,onClose,onAddNode,onAction}) => {
  const [query,setQuery] = React.useState('');
  const [focused,setFocused] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(()=>{ inputRef.current?.focus(); },[]);

  const actions = [
    {type:'action',name:'Center View',desc:'Fit all nodes into view',tag:'⌘ K',id:'fit'},
    {type:'action',name:'Save Graph',desc:'Save to desired.yaml',tag:'⌘ S',id:'save'},
    {type:'action',name:'Deploy',desc:'Deploy current architecture',tag:'⌘ D',id:'deploy'},
    {type:'action',name:'Clear Canvas',desc:'Remove all nodes and edges',tag:'',id:'clear'},
    {type:'action',name:'Toggle Theme',desc:'Switch between dark and light',tag:'',id:'theme'},
    {type:'action',name:'Export JSON',desc:'Download graph as JSON',tag:'',id:'export'},
  ];
  const nodeResults = nodeTypes.filter(t=>
    !query || t.label.toLowerCase().includes(query.toLowerCase()) ||
    (t.description||'').toLowerCase().includes(query.toLowerCase()) ||
    (t.category||'').toLowerCase().includes(query.toLowerCase())
  );
  const actionResults = actions.filter(a=>!query||a.name.toLowerCase().includes(query.toLowerCase()));
  const allResults = [
    ...actionResults.map(a=>({...a,kind:'action'})),
    ...nodeResults.map(n=>({...n,kind:'node'}))
  ];

  React.useEffect(()=>{ setFocused(0); },[query]);

  const handleKey = e => {
    if(e.key==='ArrowDown'){e.preventDefault();setFocused(f=>Math.min(f+1,allResults.length-1));}
    if(e.key==='ArrowUp'){e.preventDefault();setFocused(f=>Math.max(f-1,0));}
    if(e.key==='Enter'&&allResults[focused]){
      const r=allResults[focused];
      if(r.kind==='action') onAction(r.id);
      else onAddNode(r);
      onClose();
    }
    if(e.key==='Escape') onClose();
  };

  return (
    <div className="cmd-overlay" onClick={onClose}>
      <div className="cmd-palette" onClick={e=>e.stopPropagation()}>
        <div className="cmd-input-wrap">
          <span style={{color:'var(--text-2)',flexShrink:0}}>{I.cmd}</span>
          <input ref={inputRef} className="cmd-input" placeholder="Search nodes or run a command..."
            value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={handleKey}/>
          {query&&<button onClick={()=>setQuery('')} style={{background:'none',border:'none',color:'var(--text-2)',cursor:'pointer',fontSize:16,lineHeight:1}}>×</button>}
        </div>
        <div className="cmd-results">
          {actionResults.length>0&&(!query||actionResults.some(a=>a.name.toLowerCase().includes(query.toLowerCase())))&&(
            <>
              <div className="cmd-section-label">Commands</div>
              {actionResults.filter(a=>!query||a.name.toLowerCase().includes(query.toLowerCase())).map((a,idx)=>(
                <div key={a.id} className={`cmd-result${focused===idx?' focused':''}`}
                  onClick={()=>{onAction(a.id);onClose();}}>
                  <div className="cmd-result-icon" style={{background:'rgba(255,255,255,0.06)'}}>
                    <span style={{fontSize:13}}>{a.id==='save'?'💾':a.id==='deploy'?'🚀':a.id==='clear'?'🗑':a.id==='fit'?'🔍':a.id==='theme'?'🌙':'📤'}</span>
                  </div>
                  <div>
                    <div className="cmd-result-name">{a.name}</div>
                    <div className="cmd-result-desc">{a.desc}</div>
                  </div>
                  {a.tag&&<span className="cmd-result-tag">{a.tag}</span>}
                </div>
              ))}
            </>
          )}
          {nodeResults.length>0&&(
            <>
              <div className="cmd-section-label">Add Node</div>
              {nodeResults.slice(0,12).map((n,idx)=>{
                const aIdx = actionResults.filter(a=>!query||a.name.toLowerCase().includes(query.toLowerCase())).length + idx;
                return (
                  <div key={n.type} className={`cmd-result${focused===aIdx?' focused':''}`}
                    onClick={()=>{onAddNode(n);onClose();}}>
                    <div className="cmd-result-icon" style={{background:n.color+'20',color:n.color}}>
                      <GCPIcon nodeType={n.type} fallbackIcon={n.icon} color={n.color} size={16}/>
                    </div>
                    <div>
                      <div className="cmd-result-name">{n.label}</div>
                      <div className="cmd-result-desc">{n.description}</div>
                    </div>
                    <span className="cmd-result-tag">{n.category}</span>
                  </div>
                );
              })}
            </>
          )}
          {allResults.length===0&&(
            <div style={{padding:'24px',textAlign:'center',color:'var(--text-2)',fontFamily:'var(--font-mono)',fontSize:11}}>
              No results for "{query}"
            </div>
          )}
        </div>
        <div className="cmd-footer">
          <div className="cmd-key"><span className="kbd">↑↓</span> navigate</div>
          <div className="cmd-key"><span className="kbd">↵</span> select</div>
          <div className="cmd-key"><span className="kbd">esc</span> close</div>
        </div>
      </div>
    </div>
  );
};
