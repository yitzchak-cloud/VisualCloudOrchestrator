# nodes/resource/pubsub_topic/params.yaml
# ─────────────────────────────────────────────
# All parameters for PubsubTopicNode.

- key: name
  label: Topic Name
  type: text
  default: ""
  placeholder: your-topic-name
  category: Basic
  description: >
    The unique name of the Pub/Sub topic within the project.
    Must be 3–255 characters; letters, numbers, hyphens, dots, underscores, and tildes.

- key: message_retention_duration
  label: Message Retention Duration
  type: text
  default: 604800s
  category: Basic
  description: >
    Duration for which messages are retained in the topic if no subscription consumes them.
    Format: seconds with 's' suffix (e.g. "604800s" = 7 days).
    Minimum: 600s (10 min). Maximum: 31536000s (365 days).

- key: kms_key_name
  label: KMS Key Name (CMEK)
  type: text
  default: ""
  category: Encryption
  description: >
    Customer-managed encryption key from Cloud KMS.
    Format: projects/{project}/locations/{location}/keyRings/{ring}/cryptoKeys/{key}
    Leave blank to use Google-managed encryption.
