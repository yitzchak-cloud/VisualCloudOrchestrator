# nodes/resource/clod_run/params.yaml
# ─────────────────────────────────────────────
# All parameters for CloudRunNode.
# Loaded at import time by cloud_run.py via _load_params().

# ── Identity ─────────────────────────────────────────────────────────────────
- key: name
  label: Service Name
  type: text
  default: ""
  placeholder: your-service-name
  category: Basic
  description: >
    The unique name of the Cloud Run service within the project and region.

- key: image
  label: Container Image
  type: text
  default: ""
  placeholder: "gcr.io/project/image:tag"
  category: Basic
  description: >
    Full container image URI including registry, image name, and tag.

# ── Resources ────────────────────────────────────────────────────────────────
- key: memory
  label: Memory
  type: select
  options: [256Mi, 512Mi, 1Gi, 2Gi, 4Gi, 8Gi]
  default: 512Mi
  category: Resources
  description: Memory limit per container instance.

- key: cpu
  label: CPU
  type: select
  options: ["1", "2", "4", "8"]
  default: "1"
  category: Resources
  description: Number of vCPUs allocated per container instance.

- key: min_instances
  label: Min Instances
  type: number
  default: 0
  category: Resources
  description: Minimum number of container instances to keep warm.

- key: max_instances
  label: Max Instances
  type: number
  default: 10
  category: Resources
  description: Maximum number of container instances that can be scaled up.

- key: port
  label: Port
  type: number
  default: 8080
  category: Resources
  description: Container port the service listens on.

# ── Location ──────────────────────────────────────────────────────────────────
- key: region
  label: Region
  type: select
  options: [me-west1, us-central1, us-east1, us-west1, europe-west1]
  default: me-west1
  category: Location
  description: GCP region where the Cloud Run service is deployed.

# ── Access ────────────────────────────────────────────────────────────────────
- key: allow_unauthenticated
  label: Allow Unauthenticated (public access)
  type: checkbox
  default: false
  category: Access
  description: >
    Grant allUsers the roles/run.invoker role, making the service publicly accessible.
    Leave unchecked for private services (IAM-authenticated only).

- key: ingress
  label: Ingress
  type: select
  options:
    - INGRESS_TRAFFIC_ALL
    - INGRESS_TRAFFIC_INTERNAL_ONLY
    - INGRESS_TRAFFIC_INTERNAL_LOAD_BALANCER
  default: INGRESS_TRAFFIC_INTERNAL_ONLY
  category: Access
  description: Controls which traffic sources can reach the service.

# ── Networking ────────────────────────────────────────────────────────────────
- key: vpc_network
  label: VPC Network (fallback)
  type: text
  default: ""
  placeholder: "projects/HOST_PROJECT/global/networks/NETWORK"
  category: Networking
  description: >
    VPC network self-link. Only used when no SubnetworkNode is connected.
    Leave blank to skip VPC egress configuration.

- key: vpc_subnetwork
  label: VPC Subnetwork (fallback)
  type: text
  default: ""
  placeholder: "projects/HOST_PROJECT/regions/REGION/subnetworks/SUBNET"
  category: Networking
  description: >
    VPC subnetwork self-link. Only used when no SubnetworkNode is connected.

# ── Output URL ────────────────────────────────────────────────────────────────
- key: service_url
  label: Service URL
  type: text
  default: ""
  placeholder: "https://my-service.run.app"
  category: Output
  description: >
    Read-only. Populated automatically after deployment.
    Can be pre-filled to reference an existing service.
