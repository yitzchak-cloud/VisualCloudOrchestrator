# nodes/resource/service_account/service_account_params.yaml
# ─────────────────────────────────────────────────────────────────────────────
# All UI parameters for ServiceAccountNode.

# ── Identity ──────────────────────────────────────────────────────────────────
- key: create_sa
  label: Create SA (uncheck to reference existing)
  type: checkbox
  default: true
  category: Identity
  description: >
    When checked, a new Service Account is created in GCP.
    When unchecked, the node references an existing SA by email — no resource
    is created, but IAM bindings defined below are still applied.

- key: account_id
  label: Account ID
  type: text
  default: ""
  placeholder: my-service-runner
  category: Identity
  description: >
    The account ID used to generate the SA email:
      <account_id>@<project>.iam.gserviceaccount.com
    Must be 6–30 characters, lowercase letters, digits, and hyphens.
    Required when Create SA is checked.

- key: display_name
  label: Display Name
  type: text
  default: ""
  placeholder: My Service Runner SA
  category: Identity
  description: >
    Human-readable name shown in the GCP console.
    Defaults to the account_id when left blank.

- key: email
  label: Existing SA Email (reference mode)
  type: text
  default: ""
  placeholder: "sa@project.iam.gserviceaccount.com"
  category: Identity
  description: >
    Full email of an existing Service Account.
    Only used when Create SA is unchecked.
    IAM bindings below are applied to this SA.

# ── IAM Roles ─────────────────────────────────────────────────────────────────
- key: project_roles
  label: Project-Level Roles (one per line)
  type: textarea
  default: ""
  placeholder: "roles/logging.logWriter\nroles/datastore.user"
  category: IAM Roles
  description: >
    IAM roles to grant to this SA at the project level.
    Enter one role per line. Lines starting with # are ignored.
    Common roles:
      roles/logging.logWriter
      roles/datastore.user
      roles/cloudtasks.enqueuer
      roles/pubsub.publisher
      roles/storage.objectCreator
      roles/workflows.invoker
      roles/eventarc.eventReceiver
      roles/iam.serviceAccountUser
      roles/run.invoker

- key: resource_bindings
  label: Resource-Level Bindings (JSON)
  type: json
  default: "[]"
  placeholder: |
    [
      {
        "resource_type": "cloud_run_service",
        "resource_ref":  "<node_id>",
        "role":          "roles/run.invoker"
      }
    ]
  category: IAM Roles
  description: >
    JSON array of resource-scoped IAM bindings for this SA.
    Each entry must include:
      resource_type — one of: cloud_run_service, cloud_function,
                      workflow, cloud_tasks_queue
      resource_ref  — the node_id of the target resource node
      role          — the IAM role to grant
    Leave as [] to skip resource-level bindings.
    Use an IamBindingNode for more complex binding scenarios.
