# ── Core ──────────────────────────────────────────────────────────────────────
- key: name
  label: Repository Name
  type: text
  default: ""
  placeholder: my-docker-repo
  category: Basic
  description: >
    The unique name of this repository.

- key: region
  label: Region
  type: select
  options: [me-west1, us-central1, us-east1, europe-west1, asia-east1]
  default: me-west1
  category: Basic
  description: >
    GCP region (location) where this repository will be deployed.

- key: format
  label: Format
  type: select
  options: [DOCKER, MAVEN, NPM, PYTHON, APT, YUM]
  default: DOCKER
  category: Core
  description: >
    The format of packages that are stored in the repository.

- key: description
  label: Description
  type: text
  default: ""
  placeholder: "Stores core Docker images"
  category: Basic
  description: >
    Optional user-provided description of the repository.